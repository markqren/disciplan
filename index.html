.hdr{border-bottom:1px solid var(--bdr);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,10,20,0.95);backdrop-filter:blur(12px);z-index:10;flex-wrap:wrap;gap:8px}

.mn{padding:24px;max-width:1200px;margin:0 auto}
.cd{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:24px;margin-bottom:16px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.st{padding:18px 20px;display:flex;flex-direction:column;gap:6px}
.st-l{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--dim);font-weight:500}
.st-v{font-size:24px;font-weight:700;font-family:var(--mono);letter-spacing:-0.02em;line-height:1.1}
h2{font-size:18px;font-weight:700;color:#fff}
h3{font-size:14px;font-weight:600;color:rgba(255,255,255,0.7);margin-bottom:16px}
.sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px}
.chrt{position:relative;height:270px;margin:16px 0}
table{width:100%;border-collapse:collapse;font-size:12px}

th.r{text-align:right}
td{padding:9px 8px;border-bottom:1px solid rgba(255,255,255,0.04)}
tr:nth-child(even) td{background:rgba(255,255,255,0.015)}
.m{font-family:var(--mono);font-size:12px}
.r{text-align:right}
.badge{padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;display:inline-block}
.lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.4);font-weight:500;margin-bottom:4px;display:block}
.inp{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 12px;color:#e8e8e4;font-size:13px;outline:none;width:100%;font-family:var(--sans);transition:border-color 0.15s ease}
.inp:focus{border-color:rgba(129,178,154,0.4)}
select.inp{cursor:pointer;appearance:auto}
.btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:opacity 0.15s ease}
.btn:hover{opacity:0.85}
.preview{background:rgba(129,178,154,0.06);border:1px solid rgba(129,178,154,0.15);border-radius:10px;padding:14px 18px;margin-bottom:16px}
.ok-msg{background:rgba(129,178,154,0.15);border:1px solid rgba(129,178,154,0.3);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--g);font-weight:600}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px}

.hidden{display:none}

.pf-acct{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;overflow:hidden;margin-bottom:10px}

  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(c==='"'){if(inQ&&s[i+1]==='"'){cur+='"';i++}else inQ=!inQ}
    else if(c===","&&!inQ){lines.length?lines[lines.length-1].push(cur):lines.push([cur]);cur=""}
    else if((c==="\n"||(c==="\r"&&s[i+1]==="\n"))&&!inQ){
      if(c==="\r")i++;
      if(lines.length)lines[lines.length-1].push(cur);else lines.push([cur]);
      cur="";lines.push([])
    }else cur+=c;
  }
  if(cur||lines.length&&lines[lines.length-1].length)
    {if(lines.length)lines[lines.length-1].push(cur);else lines.push([cur])}
  const filtered=lines.filter(r=>r.length>1||r[0]!=="");
  if(!filtered.length)return{headers:[],rows:[]};
  const headers=filtered[0].map(v=>v.trim());
  const rows=filtered.slice(1).map(r=>{const o={};headers.forEach((hd,i)=>o[hd]=r[i]?r[i].trim():"");return o})
    .filter(r=>{const v=r[headers[0]]||"";return v!==""&&/\d/.test(v)});
  return{headers,rows};
}

function normalizeMerchant(desc){

async function fetchMerchantPatterns(){
  let all=[],off=0;

  const patterns={};
  for(const t of all){const k=normalizeMerchant(t.description);if(!patterns[k])patterns[k]={};patterns[k][t.category_id]=(patterns[k][t.category_id]||0)+1}

function transformCSVRow(row,profile,paymentType,bulkTag,index){
  const cols=profile.columns;
  const rawDate=row[cols.date]||"";
  const dp=rawDate.split("/");
  const date=dp.length===3?`${dp[2]}-${dp[0].padStart(2,"0")}-${dp[1].padStart(2,"0")}`:rawDate;
  const badDate=!date||!/^\d{4}-\d{2}-\d{2}$/.test(date);
  const rawAmt=parseFloat(row[cols.amount])||0;
  const isReturn=(row[cols.type]||"").toLowerCase()==="return";
  const isSkip=badDate||profile.skipTypes.includes(row[cols.type]||"");
  let amt=profile.transformAmount(rawAmt);
  if(isReturn)amt=-Math.abs(amt);
  return{
    date,description:row[cols.description]||"",amount_usd:amt,category_id:null,ai_confidence:null,
    currency:profile.currency||"USD",fx_rate:1,original_amount:amt,
    service_start:date,service_end:date,payment_type:paymentType,tag:bulkTag||"",credit:"",
    _status:isSkip?"skipped":"pending",_isDuplicate:false,
    _rawDescription:row[cols.description]||"",_bankCategory:row[cols.bankCategory]||"",
    _rowIndex:index,_skipReason:badDate?"Invalid date":isSkip?"CC Payment":null
  };
}

async function findDuplicates(candidates,paymentType){
  const dates=candidates.filter(c=>c._status!=="skipped").map(c=>c.date).sort();
  if(!dates.length)return;
  const minD=dates[0],maxD=dates[dates.length-1];
  const existing=await sb(`transactions?payment_type=eq.${encodeURIComponent(paymentType)}&date=gte.${minD}&date=lte.${maxD}&select=date,amount_usd,description`);
  for(const c of candidates){
    if(c._status==="skipped")continue;
    c._isDuplicate=existing.some(e=>e.date===c.date&&Math.abs(Math.abs(e.amount_usd)-Math.abs(c.amount_usd))<0.02);
    if(c._isDuplicate){c._status="skipped";c._skipReason="Duplicate"}
  }
}

function applyAIResults(candidates,aiResults){
  if(!aiResults){
    for(const c of candidates){
      if(c._status==="skipped")continue;
      c.category_id=CHASE_CAT_MAP[c._bankCategory]||"other";
      c.ai_confidence="low";
      c.service_end=getDefEnd(c.category_id,c.date)||c.date;
      const ss=new Date(c.service_start+"T00:00:00"),se=new Date(c.service_end+"T00:00:00");
      c.service_days=Math.max(1,Math.floor((se-ss)/864e5)+1);
      c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
    }
    return;
  }
  const byIdx={};for(const r of aiResults)byIdx[r.i]=r;
  for(let i=0;i<candidates.length;i++){
    const c=candidates[i];
    if(c._status==="skipped")continue;
    const ai=byIdx[i];
    if(ai){c.category_id=ai.cat;c.ai_confidence=ai.conf;c.description=ai.desc}
    else{c.category_id=CHASE_CAT_MAP[c._bankCategory]||"other";c.ai_confidence="low"}
    c.service_end=getDefEnd(c.category_id,c.date)||c.date;
    const ss=new Date(c.service_start+"T00:00:00"),se=new Date(c.service_end+"T00:00:00");
    c.service_days=Math.max(1,Math.floor((se-ss)/864e5)+1);
    c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
  }
}

function propagateEdits(candidates,editedIndex){
  const edited=candidates[editedIndex];
  const key=normalizeMerchant(edited._rawDescription);
  for(let i=0;i<candidates.length;i++){
    if(i===editedIndex)continue;
    const c=candidates[i];
    if(c._status!=="pending")continue;
    if(normalizeMerchant(c._rawDescription)===key){
      c.description=edited.description;
      c.category_id=edited.category_id;
      c.service_end=getDefEnd(c.category_id,c.date)||c.date;
      const ss=new Date(c.service_start+"T00:00:00"),se=new Date(c.service_end+"T00:00:00");
      c.service_days=Math.max(1,Math.floor((se-ss)/864e5)+1);
      c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
    }
  }
}

}

  function row(...children){const d=h("div",{style:{display:"grid",gridTemplateColumns:children.length===3?"1fr 1fr 1fr":children.length===2?"1fr 1fr":"1fr 2fr",gap:"12px",marginBottom:"14px"}});children.forEach(c=>d.append(c));return d}
  function field(lbl,input){const d=h("div");d.append(h("label",{class:"lbl"},lbl));d.append(input);return d}

  const dateInp=h("input",{class:"inp",type:"date",value:f.date,onInput:e=>{f.date=e.target.value}});
  const descInp=h("input",{class:"inp",type:"text",placeholder:"e.g., Whole Foods groceries",onInput:e=>{f.desc=e.target.value}});

  const catSel=h("select",{class:"inp",onChange:e=>{f.cat=e.target.value;if(!f.seManual){f.se=getDefEnd(f.cat,f.ss)||f.ss;seInp.value=f.se;updateHint()}updatePreview()}});
  CATS_LIST.forEach(c=>{const o=h("option",{value:c.id},c.l);if(c.id==="groceries")o.selected=true;catSel.append(o)});

  const amtInp=h("input",{class:"inp",type:"number",step:"0.01",placeholder:"0.00",onInput:e=>{f.amt=e.target.value;updatePreview()}});
  const curSel=h("select",{class:"inp",onChange:e=>{f.cur=e.target.value;fxRow.style.display=f.cur!=="USD"?"grid":"none";updatePreview()}});
  CURS.forEach(c=>curSel.append(h("option",{value:c},c)));

  const ssInp=h("input",{class:"inp",type:"date",value:f.ss,onInput:e=>{f.ss=e.target.value;if(!f.seManual){f.se=getDefEnd(f.cat,f.ss)||f.ss;seInp.value=f.se}updatePreview()}});
  const seInp=h("input",{class:"inp",type:"date",value:f.se,onInput:e=>{f.se=e.target.value;f.seManual=true;seInp.style.borderColor="rgba(242,204,143,0.3)";updatePreview()}});
  const hintSpan=h("span",{style:{color:"rgba(129,178,154,0.6)",textTransform:"none",letterSpacing:"0",fontWeight:"400",fontSize:"10px"}});
  function updateHint(){const r=ACCRUAL_D[f.cat];hintSpan.textContent=!f.seManual&&r?(r==="month"?"(Auto: end of month)":`(Auto: ${r} days)`):""}
  updateHint();
  const seLbl=h("label",{class:"lbl"});seLbl.append("Service End ");seLbl.append(hintSpan);

  const fxInp=h("input",{class:"inp",type:"number",step:"0.0001",onInput:e=>{f.fx=e.target.value;updatePreview()}});
  const fxRow=h("div",{style:{display:"none",gridTemplateColumns:"1fr 2fr",gap:"12px",marginBottom:"14px"}});
  fxRow.append(field("FX Rate",fxInp));
  fxRow.append(h("div",{style:{display:"flex",alignItems:"flex-end",paddingBottom:"4px"}},h("span",{style:{fontSize:"11px",color:"rgba(255,255,255,0.25)"}},"Leave blank for default rate.")));

  const ptSel=h("select",{class:"inp",onChange:e=>f.pt=e.target.value});
  PTS.forEach(p=>{const o=h("option",{value:p},p);if(p==="Chase Sapphire")o.selected=true;ptSel.append(o)});
  const tagInp=h("input",{class:"inp",type:"text",placeholder:"e.g., cozumel",onInput:e=>f.tag=e.target.value});

  const previewEl=h("div",{class:"preview hidden",id:"entryPreview"});
  function updatePreview(){
    const a=parseFloat(f.amt);if(isNaN(a)||!f.ss||!f.se){previewEl.classList.add("hidden");return}
    const ss=new Date(f.ss+"T00:00:00"),se=new Date(f.se+"T00:00:00");
    if(se<ss){previewEl.classList.add("hidden");return}
    const days=Math.max(1,Math.floor((se-ss)/864e5)+1);
    const fx=f.fx?parseFloat(f.fx):DFX[f.cur]||1;
    const usd=f.cur==="USD"?a:a*fx;
    const daily=usd/days;
    previewEl.classList.remove("hidden");
    previewEl.innerHTML=`<div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Accrual Preview</div>
    <div style="display:grid;grid-template-columns:${f.cur!=="USD"?"1fr 1fr 1fr 1fr":"1fr 1fr 1fr"};gap:12px">
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">USD Amount</div><div style="font-size:18px;font-weight:700;color:#fff;font-family:var(--mono)">${fmtF(usd)}</div></div>
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">Service Days</div><div style="font-size:18px;font-weight:700;color:var(--b);font-family:var(--mono)">${days}</div></div>
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">Daily Cost</div><div style="font-size:18px;font-weight:700;color:var(--g);font-family:var(--mono)">${fmtF(daily)}/d</div></div>
      ${f.cur!=="USD"?`<div><div style="font-size:10px;color:rgba(255,255,255,0.25)">FX Rate</div><div style="font-size:18px;font-weight:700;color:var(--y);font-family:var(--mono)">${fx}</div></div>`:""}
    </div>`;
  }

  const submitBtn=h("button",{class:"btn",style:{background:"rgba(129,178,154,0.2)",color:"var(--g)"},onClick:async()=>{
    const a=parseFloat(f.amt);if(isNaN(a)||!f.desc)return;
    const fx=f.fx?parseFloat(f.fx):DFX[f.cur]||1;
    const isInc=f.cat==="income";
    const orig=isInc?-Math.abs(a):a;
    const usd=f.cur==="USD"?orig:orig*fx;
    const ss=new Date(f.ss+"T00:00:00"),se=new Date(f.se+"T00:00:00");
    const days=Math.max(1,Math.floor((se-ss)/864e5)+1);
    submitBtn.textContent="Saving...";
    try{
      await sb("transactions",{method:"POST",body:JSON.stringify({date:f.date,service_start:f.ss,service_end:f.se,description:f.desc,category_id:f.cat,original_amount:orig,currency:f.cur,fx_rate:fx,amount_usd:Math.round(usd*100)/100,payment_type:f.pt,tag:f.tag.toLowerCase().trim(),daily_cost:Math.round(usd/days*1e6)/1e6,service_days:days,credit:""})});
      document.getElementById("okMsg").classList.remove("hidden");
      setTimeout(()=>document.getElementById("okMsg")?.classList.add("hidden"),2500);
      descInp.value="";amtInp.value="";tagInp.value="";fxInp.value="";
      f.desc="";f.amt="";f.tag="";f.fx="";f.seManual=false;
      previewEl.classList.add("hidden");
      state.txnCount++;
      document.getElementById("dbStatus").textContent=`в—ЏВЏ ${state.txnCount.toLocaleString()} txns`;
    }catch(e){alert("Error: "+e.message)}
    submitBtn.textContent="Add Transaction";
  }},"Add Transaction");

  card.append(row(field("Date Entered",dateInp),field("Description",descInp)));
  card.append(row(field("Category",catSel),field("Amount (positive)",amtInp),field("Currency",curSel)));

  const seField=h("div");seField.append(seLbl);seField.append(seInp);
  card.append(row(field("Service Start",ssInp),seField));
  card.append(fxRow);
  card.append(row(field("Payment Account",ptSel),field("Tag (optional)",tagInp)));
  card.append(previewEl);
  card.append(submitBtn);
  el.append(card);

  // в”Ђв”Ђ Import CSV Section в”Ђв”Ђ
  const impCard=h("div",{class:"cd"});
  let impOpen=false;
  const impHdr=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",cursor:"pointer"},onClick:()=>{impOpen=!impOpen;impArrow.textContent=impOpen?"\u25BE":"\u25B8";impBody.classList.toggle("hidden")}});
  const impArrow=h("span",{style:{fontSize:"10px",color:"rgba(255,255,255,0.4)"}},"\u25B8");
  impHdr.append(impArrow,h("h3",{style:{margin:"0"}},"Import CSV"));
  impCard.append(impHdr);

  const impBody=h("div",{class:"hidden",style:{marginTop:"16px"}});
  let impCandidates=null;

  // Upload bar
  const fileInp=h("input",{class:"inp",type:"file",accept:".csv"});
  const impPtSel=h("select",{class:"inp"});
  PTS.forEach(p=>{const o=h("option",{value:p},p);if(p==="Chase Sapphire")o.selected=true;impPtSel.append(o)});
  const impTagInp=h("input",{class:"inp",type:"text",placeholder:"Bulk tag for all rows"});
  const apiKeyInp=h("input",{class:"inp",type:"password",placeholder:"sk-ant-...",value:getApiKey()||""});
  const apiKeyHelp=h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.25)",marginTop:"2px"}},"Get one at console.anthropic.com \u00b7 Stored locally in your browser");
  const apiKeyField=h("div");
  apiKeyField.append(h("label",{class:"lbl"},"Anthropic API Key"));
  apiKeyField.append(apiKeyInp);
  apiKeyField.append(apiKeyHelp);

  const impStatus=h("div",{style:{fontSize:"12px",color:"rgba(255,255,255,0.4)",margin:"10px 0"},class:"hidden"});
  const impReview=h("div",{id:"importReview"});

  const impBtn=h("button",{class:"btn",style:{background:"rgba(74,111,165,0.2)",color:"var(--b)"},onClick:async()=>{
    const file=fileInp.files[0];
    if(!file)return alert("Choose a CSV file first.");

    // API key handling
    const keyVal=apiKeyInp.value.trim();
    if(keyVal)setApiKey(keyVal);
    else if(!getApiKey()){
      if(!confirm("No API key set. Import with basic category mapping (no AI description cleanup)?"))return;
    }

    impBtn.disabled=true;impBtn.textContent="Processing...";
    impStatus.classList.remove("hidden");
    impStatus.style.color="rgba(255,255,255,0.4)";
    impStatus.textContent="Parsing CSV...";
    try{
      const text=await file.text();
      const csv=parseCSV(text);
      if(!csv.rows.length)throw new Error("No data rows found in CSV.");

      const profile=detectBankProfile(csv.headers);
      if(!profile)throw new Error("Unrecognized bank format. Expected headers: Transaction Date, Post Date, Memo");

      // Auto-detect payment type from filename
      const fn=file.name.toLowerCase();
      if(fn.includes("chase"))impPtSel.value="Chase Sapphire";
      else if(fn.includes("amex"))impPtSel.value="AMEX Rose Gold";
      const pt=impPtSel.value;
      const tag=impTagInp.value.trim();

      // Transform rows
      const candidates=csv.rows.map((r,i)=>transformCSVRow(r,profile,pt,tag,i));
      impCandidates=candidates;

      // AI categorization
      impStatus.textContent="AI categorizing...";
      const[patterns,samples]=await Promise.all([fetchMerchantPatterns(),fetchSampleDescriptions()]);
      const aiResults=await aiCategorize(candidates,patterns,samples);
      applyAIResults(candidates,aiResults);

      // Duplicate detection
      impStatus.textContent="Checking for duplicates...";
      await findDuplicates(candidates,pt);

      const pending=candidates.filter(c=>c._status==="pending").length;
      if(!pending)impStatus.textContent="All transactions are duplicates or skipped.";
      else impStatus.textContent=aiResults?"AI categorization complete.":"Using default categories (no AI key).";
      renderReviewTable(impReview,candidates);
    }catch(e){
      impStatus.textContent="Error: "+e.message;
      impStatus.style.color="var(--r)";
    }
    impBtn.disabled=false;impBtn.textContent="Import";
  }},"Import");

  impBody.append(row(field("CSV File",fileInp),field("Payment Account",impPtSel)));
  impBody.append(row(field("Bulk Tag (optional)",impTagInp),apiKeyField));
  impBody.append(impBtn);
  impBody.append(impStatus);
  impBody.append(impReview);
  impCard.append(impBody);
  el.append(impCard);
}

function renderReviewTable(container,candidates){
  container.innerHTML="";
  const skipped=candidates.filter(c=>c._status==="skipped");
  const dupes=candidates.filter(c=>c._isDuplicate);
  const hi=candidates.filter(c=>c.ai_confidence==="high"&&c._status!=="skipped");
  const med=candidates.filter(c=>c.ai_confidence==="medium"&&c._status!=="skipped");
  const lo=candidates.filter(c=>c.ai_confidence==="low"&&c._status!=="skipped");

  const stats=h("div",{style:{fontSize:"12px",color:"rgba(255,255,255,0.5)",marginBottom:"12px"}},
    `${candidates.length} parsed \u00b7 ${skipped.length} auto-skipped \u00b7 ${dupes.length} duplicates \u00b7 ${hi.length} high \u00b7 ${med.length} medium \u00b7 ${lo.length} low confidence`);
  container.append(stats);

  const bulkBar=h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"12px"}});
  bulkBar.append(h("button",{class:"pg-btn",style:"color:var(--g);border-color:rgba(129,178,154,0.3)",onClick:()=>{
    candidates.forEach(c=>{if(c.ai_confidence==="high"&&c._status==="pending")c._status="approved"});
    renderReviewTable(container,candidates);
  }},"\u2713 Approve All High-Confidence"));
  bulkBar.append(h("button",{class:"pg-btn",style:"color:var(--b);border-color:rgba(74,111,165,0.3)",onClick:()=>{
    candidates.forEach(c=>{if(c._status==="pending")c._status="approved"});
    renderReviewTable(container,candidates);
  }},"\u2713 Approve All"));
  let saving=false;
  const saveBtn=h("button",{class:"pg-btn",style:"color:#fff;background:rgba(129,178,154,0.2);border-color:rgba(129,178,154,0.4);font-weight:600",onClick:async()=>{
    if(saving)return;
    const approved=candidates.filter(c=>c._status==="approved");
    if(!approved.length)return alert("No approved transactions to save.");
    saving=true;saveBtn.disabled=true;saveBtn.textContent="Saving...";
    try{
      const summary=await commitImport(candidates);
      renderReviewTable(container,candidates);
      // Success summary
      const sumEl=h("div",{class:"preview",style:{marginTop:"12px"}});
      const dates=summary.imported.map(c=>c.date).sort();
      sumEl.innerHTML=`<div style="color:var(--g);font-weight:600;margin-bottom:6px">\u2713 Imported ${summary.count} transactions \u00b7 ${summary.skipped} skipped \u00b7 ${summary.dupes} duplicates</div>`;
      const viewBtn=h("button",{class:"pg-btn",style:"color:var(--b);border-color:rgba(74,111,165,0.3);margin-top:4px",onClick:()=>{
        state.tab="ledger";state.lf={cat:"",pt:"",dfrom:dates[0]||"",dto:dates[dates.length-1]||"",q:""};state.page=0;renderTabs();renderContent();
      }},"View in Ledger \u2192");
      sumEl.append(viewBtn);
      container.append(sumEl);
      saveBtn.textContent="Saved";
    }catch(e){
      console.error("commitImport error:",e);
      alert("Error saving: "+e.message);
      saveBtn.disabled=false;saveBtn.textContent="Save Approved";
    }
  }},"Save Approved");
  bulkBar.append(saveBtn);
  container.append(bulkBar);

  const wrap=h("div",{style:{overflowX:"auto"}});
  const tbl=h("table");
  const thead=h("thead");
  thead.innerHTML=`<tr><th style="width:36px"></th><th>Date</th><th>Description</th><th class="r">Amount</th><th>Category</th><th class="hide-m">Svc Period</th><th class="hide-m">Tag</th><th class="hide-m">Bank Cat</th></tr>`;
  tbl.append(thead);
  const tbody=h("tbody");

  candidates.forEach((c,idx)=>{
    const tr=h("tr",{style:{borderLeft:c._status==="approved"?"3px solid var(--g)":c._isDuplicate?"3px solid var(--y)":"3px solid transparent",opacity:c._status==="skipped"?"0.4":"1"}});

    const statusIcon=c._status==="approved"?"\u2713":c._status==="skipped"?"\u2715":c._status==="committed"?"\u2713":"\u25CB";
    const statusColor=c._status==="approved"?"var(--g)":c._status==="skipped"?"var(--r)":c._status==="committed"?"var(--b)":"rgba(255,255,255,0.3)";
    tr.append(h("td",{style:{cursor:c._status==="committed"?"default":"pointer",textAlign:"center",fontSize:"14px",color:statusColor,userSelect:"none"},onClick:()=>{
      if(c._status==="committed")return;
      if(c._isDuplicate&&c._status==="skipped")c._status="pending";
      else if(c._status==="pending")c._status="approved";
      else if(c._status==="approved")c._status="skipped";
      else c._status="pending";
      renderReviewTable(container,candidates);
    }},statusIcon));

    tr.append(h("td",{class:"m",style:{color:"rgba(255,255,255,0.55)",whiteSpace:"nowrap",cursor:"pointer"},onClick:()=>{if(c._status!=="committed")openImportEditModal(candidates,idx,container)}},fmtD(c.date)));

    const descTd=h("td",{style:{maxWidth:"220px",cursor:"pointer"},onClick:()=>{if(c._status!=="committed")openImportEditModal(candidates,idx,container)}});
    const descMain=h("div",{style:{color:c._status==="skipped"?"rgba(255,255,255,0.35)":"rgba(255,255,255,0.85)",textDecoration:c._status==="skipped"?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},c.description||c._rawDescription);
    const descSub=h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.25)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}});
    descSub.textContent=c._skipReason?c._skipReason+(c._rawDescription?" \u00b7 "+c._rawDescription:""):c._rawDescription;
    descTd.append(descMain,descSub);
    tr.append(descTd);

    tr.append(h("td",{class:"r m",style:{color:c.amount_usd<0?"var(--g)":"rgba(255,255,255,0.75)"}},fmtF(c.amount_usd)));

    const catTd=h("td");
    catTd.append(h("span",{style:{display:"inline-block",width:"6px",height:"6px",borderRadius:"50%",marginRight:"4px",background:c.ai_confidence==="high"?"var(--g)":c.ai_confidence==="medium"?"var(--y)":"var(--r)"}}));
    const catSel2=h("select",{style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"5px",padding:"3px 6px",color:"#e8e8e4",fontSize:"11px",fontFamily:"var(--sans)",cursor:"pointer",outline:"none"},onChange:e=>{
      c.category_id=e.target.value;
      c.service_end=getDefEnd(c.category_id,c.date)||c.date;
      const ss=new Date(c.service_start+"T00:00:00"),se=new Date(c.service_end+"T00:00:00");
      c.service_days=Math.max(1,Math.floor((se-ss)/864e5)+1);
      c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
      propagateEdits(candidates,idx);
      renderReviewTable(container,candidates);
    }});
    CATS_LIST.forEach(cat=>{const o=h("option",{value:cat.id},cat.l);if(cat.id===c.category_id)o.selected=true;catSel2.append(o)});
    catTd.append(catSel2);
    tr.append(catTd);

    tr.append(h("td",{class:"m hide-m",style:{color:"rgba(255,255,255,0.4)",whiteSpace:"nowrap",fontSize:"11px"}},
      c.service_start===c.service_end?fmtD(c.date):`${fmtD(c.service_start)}\u2013${fmtD(c.service_end)}`));

    const tagTd=h("td",{class:"hide-m"});
    tagTd.append(h("input",{type:"text",value:c.tag||"",style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"5px",padding:"3px 6px",color:"#e8e8e4",fontSize:"11px",width:"70px",fontFamily:"var(--sans)",outline:"none"},onInput:e=>{c.tag=e.target.value}}));
    tr.append(tagTd);

    tr.append(h("td",{class:"hide-m",style:{color:"rgba(255,255,255,0.25)",fontSize:"11px"}},c._bankCategory));
    tbody.append(tr);
  });

  tbl.append(tbody);
  wrap.append(tbl);
  container.append(wrap);
}

function openImportEditModal(candidates,idx,reviewContainer){
  const c=candidates[idx];
  let seManual=false;
  const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg)bg.remove()}});
  const modal=h("div",{class:"modal"});

  // Header with close button
  const hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"20px"}});
  const hdrLeft=h("div");
  hdrLeft.append(h("h3",{style:{margin:"0"}},"Edit Transaction"));
  hdrLeft.append(h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.25)",marginTop:"4px"}},c._rawDescription));
  const closeBtn=h("span",{style:{cursor:"pointer",fontSize:"18px",color:"rgba(255,255,255,0.3)",lineHeight:"1"},onClick:()=>bg.remove()},"\u2715");
  hdr.append(hdrLeft,closeBtn);
  modal.append(hdr);

  function mRow(...ch){const d=h("div",{style:{display:"grid",gridTemplateColumns:ch.length===3?"1fr 1fr 1fr":ch.length===2?"1fr 1fr":"1fr",gap:"12px",marginBottom:"14px"}});ch.forEach(x=>d.append(x));return d}
  function mField(lbl,inp){const d=h("div");d.append(h("label",{class:"lbl"},lbl));d.append(inp);return d}

  const mDate=h("input",{class:"inp",type:"date",value:c.date,onInput:updatePreview});
  const mDesc=h("input",{class:"inp",type:"text",value:c.description||c._rawDescription});
  const rawRef=h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.2)",marginTop:"2px"}},"Bank: "+c._rawDescription);
  const descField=h("div");
  descField.append(h("label",{class:"lbl"},"Description"));
  descField.append(mDesc);
  descField.append(rawRef);

  const mAmt=h("input",{class:"inp",type:"number",step:"0.01",value:c.amount_usd,onInput:updatePreview});

  const mCat=h("select",{class:"inp",onChange:()=>{
    if(!seManual){mSe.value=getDefEnd(mCat.value,mSs.value)||mSs.value;updateHint()}
    updatePreview();
  }});
  CATS_LIST.forEach(cat=>{const o=h("option",{value:cat.id},cat.l);if(cat.id===c.category_id)o.selected=true;mCat.append(o)});

  const mSs=h("input",{class:"inp",type:"date",value:c.service_start,onInput:()=>{
    if(!seManual){mSe.value=getDefEnd(mCat.value,mSs.value)||mSs.value}
    updatePreview();
  }});
  const mSe=h("input",{class:"inp",type:"date",value:c.service_end,onInput:()=>{
    seManual=true;mSe.style.borderColor="rgba(242,204,143,0.3)";updatePreview();
  }});
  const hintSpan=h("span",{style:{color:"rgba(129,178,154,0.6)",textTransform:"none",letterSpacing:"0",fontWeight:"400",fontSize:"10px"}});
  function updateHint(){const r=ACCRUAL_D[mCat.value];hintSpan.textContent=!seManual&&r?(r==="month"?"(Auto: end of month)":`(Auto: ${r} days)`):""}
  updateHint();
  const seLbl=h("label",{class:"lbl"});seLbl.append("Service End ");seLbl.append(hintSpan);
  const seField=h("div");seField.append(seLbl);seField.append(mSe);

  const mPt=h("select",{class:"inp"});
  PTS.forEach(p=>{const o=h("option",{value:p},p);if(p===c.payment_type)o.selected=true;mPt.append(o)});
  const mTag=h("input",{class:"inp",type:"text",value:c.tag||""});

  // Accrual preview
  const previewEl=h("div",{class:"preview hidden"});
  function updatePreview(){
    const a=parseFloat(mAmt.value);if(isNaN(a)||!mSs.value||!mSe.value){previewEl.classList.add("hidden");return}
    const ss=new Date(mSs.value+"T00:00:00"),se=new Date(mSe.value+"T00:00:00");
    if(se<ss){previewEl.classList.add("hidden");return}
    const days=Math.max(1,Math.floor((se-ss)/864e5)+1);
    const daily=a/days;
    previewEl.classList.remove("hidden");
    previewEl.innerHTML=`<div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Accrual Preview</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">USD Amount</div><div style="font-size:18px;font-weight:700;color:#fff;font-family:var(--mono)">${fmtF(a)}</div></div>
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">Service Days</div><div style="font-size:18px;font-weight:700;color:var(--b);font-family:var(--mono)">${days}</div></div>
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">Daily Cost</div><div style="font-size:18px;font-weight:700;color:var(--g);font-family:var(--mono)">${fmtF(daily)}/d</div></div>
    </div>`;
  }
  updatePreview();

  // Action buttons
  const btnRow=h("div",{style:{display:"grid",gridTemplateColumns:"1fr auto auto",gap:"8px",marginTop:"4px"}});
  const mSave=h("button",{class:"btn",style:{background:"rgba(129,178,154,0.2)",color:"var(--g)"},onClick:()=>{
    c.date=mDate.value;c.description=mDesc.value;c.amount_usd=parseFloat(mAmt.value);
    c.original_amount=c.amount_usd;c.category_id=mCat.value;
    c.service_start=mSs.value;c.service_end=mSe.value;
    c.payment_type=mPt.value;c.tag=mTag.value;
    const ss=new Date(c.service_start+"T00:00:00"),se=new Date(c.service_end+"T00:00:00");
    c.service_days=Math.max(1,Math.floor((se-ss)/864e5)+1);
    c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
    c._status="approved";
    propagateEdits(candidates,idx);
    bg.remove();
    renderReviewTable(reviewContainer,candidates);
  }},"Save & Approve");
  const mSkip=h("button",{class:"btn",style:{background:"rgba(224,122,95,0.15)",color:"var(--r)",width:"auto",padding:"12px 20px"},onClick:()=>{
    c._status="skipped";bg.remove();renderReviewTable(reviewContainer,candidates);
  }},"Skip");
  const mCancel=h("button",{class:"btn",style:{background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.4)",width:"auto",padding:"12px 20px"},onClick:()=>bg.remove()},"Cancel");
  btnRow.append(mSave,mSkip,mCancel);

  modal.append(mRow(mField("Date",mDate),descField));
  modal.append(mRow(mField("Category",mCat),mField("Amount (USD)",mAmt)));
  modal.append(mRow(mField("Service Start",mSs),seField));
  modal.append(mRow(mField("Payment Account",mPt),mField("Tag",mTag)));
  modal.append(previewEl);
  modal.append(btnRow);
  bg.append(modal);
  document.body.append(bg);
}

async function commitImport(candidates){
  const approved=candidates.filter(c=>c._status==="approved");
  if(!approved.length)throw new Error("No approved transactions to save.");
  const valid=approved.filter(c=>c.date&&c.service_start&&c.service_end);
  if(valid.length<approved.length)console.warn(`commitImport: dropped ${approved.length-valid.length} rows with missing dates`);
  if(!valid.length)throw new Error("All approved transactions have invalid dates.");
  const batchId="import-"+new Date().toISOString().slice(0,16);
  const rows=valid.map(c=>({
    date:c.date,service_start:c.service_start,service_end:c.service_end,
    description:c.description,category_id:c.category_id,
    original_amount:c.original_amount,currency:c.currency,fx_rate:c.fx_rate,
    amount_usd:Math.round(c.amount_usd*100)/100,
    payment_type:c.payment_type,tag:(c.tag||"").toLowerCase().trim(),
    daily_cost:c.daily_cost,service_days:c.service_days,credit:c.credit||"",
    import_batch:batchId,bank_description:c._rawDescription||null,bank_category:c._bankCategory||null
  }));
  await sb("transactions",{method:"POST",headers:{"Prefer":"return=representation"},body:JSON.stringify(rows)});
  state.txnCount+=rows.length;
  document.getElementById("dbStatus").textContent=`\u25CF ${state.txnCount.toLocaleString()} txns`;
  valid.forEach(c=>c._status="committed");
  return{
    count:valid.length,
    imported:valid,
    skipped:candidates.filter(c=>c._status==="skipped").length,
    dupes:candidates.filter(c=>c._isDuplicate).length
  };
}

  try{
    const data=await sbRPC("get_income_statement",{p_year:state.year});

        let v=months[mk][p]||0;
        for(const c of ch)v+=months[mk][c]||0;
        months[mk]["_p_"+p]=v;
      }
    }

    const mKeys=Object.keys(months).sort();
    const mData=mKeys.map((k,i)=>{
      const c=months[k];
      const totE=PARENT_CATS.reduce((s,cat)=>s+(c["_p_"+cat]??c[cat]??0),0);
      const inc=Math.abs(c.income||0);
      return{month:ML[i],k,c,totE,inc,net:inc-totE};
    });
    const totI=mData.reduce((s,m)=>s+m.inc,0);
    const totE=mData.reduce((s,m)=>s+m.totE,0);

      {label:"Income",data:mData.map(m=>Math.round(m.inc)),backgroundColor:"rgba(74,111,165,0.75)",borderRadius:4},
      {label:"Expenses",data:mData.map(m=>[Math.round(m.net),Math.round(m.inc)]),backgroundColor:"rgba(224,122,95,0.75)",borderRadius:4},
      {label:"Net Savings",data:mData.map(m=>Math.round(m.net)),backgroundColor:"rgba(129,178,154,0.7)",borderRadius:4},

    // Stacked expense chart + pie in 2-col
    const row2=h("div",{class:"g2"});

    const pieCard=h("div",{class:"cd"});

async function renderBS(el){
  el.innerHTML=`<div style="margin-bottom:16px"><h2>Balance Sheet</h2><p class="sub">Loading...</p></div><div id="bsBody"></div>`;
  try{
    const snaps=await sb("balance_snapshots?select=*,accounts!inner(label,account_type)&order=snapshot_date.desc");
    const body=document.getElementById("bsBody");body.innerHTML="";

    const dates=[...new Set(snaps.map(s=>s.snapshot_date))].sort().reverse();
    const latest=dates[0];
    el.querySelector(".sub").textContent=`As of ${fmtD(latest)} В· ${dates.length} snapshots В· USD`;

    const byType={checking:[],savings:[],credit:[],investment:[],liability:[],other:[]};
    for(const s of snaps){
      if(s.snapshot_date!==latest)continue;
      const t=s.accounts?.account_type||"other";
      const bal=parseFloat(s.balance_usd||s.balance)||0;
      (byType[t]||byType.other).push({name:s.accounts?.label||s.account_id,bal});
    }
    Object.values(byType).forEach(a=>a.sort((x,y)=>y.bal-x.bal));

    const totA=[...byType.checking,...byType.savings,...byType.investment].reduce((s,a)=>s+a.bal,0);
    const totL=[...byType.credit,...byType.liability].reduce((s,a)=>s+Math.abs(a.bal),0);
    const nw=totA-totL;

    const stats=h("div",{class:"g4"});
    stats.append(statCard("рџЏ¦","total assets",fmtN(totA),"var(--b)"));
    stats.append(statCard("рџ’і","total liabilities",fmtN(totL),"var(--r)"));
    stats.append(statCard("рџ’Ћ","net worth",fmtN(nw),"var(--g)"));
    body.append(stats);

    // Snapshot age & reminder
    const daysSinceSnap=Math.floor((new Date()-new Date(latest))/864e5);
    if(daysSinceSnap>30){
      const banner=h("div",{class:"cd",style:{borderColor:"rgba(242,204,143,0.3)",marginBottom:"16px",padding:"14px 18px"}});
      banner.innerHTML=`<div style="display:flex;align-items:center;gap:10px"><span style="font-size:14px">вљ пёЏ</span><span style="font-size:12px;color:var(--y)">Last snapshot was ${daysSinceSnap} days ago. Consider taking a new one to keep your net worth chart current.</span></div>`;
      body.append(banner);
    }
    const snapBar=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",padding:"10px 16px",background:"rgba(255,255,255,0.02)",borderRadius:"10px",border:"1px solid var(--bdr)"}});
    snapBar.innerHTML=`<div><span style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.6)">Snapshots</span><span style="font-size:11px;color:rgba(255,255,255,0.3);margin-left:8px">${dates.length} saved В· Last: ${fmtD(latest)} (${daysSinceSnap}d ago)</span></div>`;
    const snapBtn=h("button",{class:"pg-btn",style:{background:"rgba(129,178,154,0.12)",borderColor:"rgba(129,178,154,0.3)",color:"var(--g)",padding:"6px 14px"},onClick:async()=>{
      snapBtn.textContent="Loading...";snapBtn.disabled=true;
      try{const accounts=await sb("accounts?is_active=eq.true&order=display_order");showSnapshotForm(accounts,latest,()=>renderContent())}
      catch(e){alert("Error: "+e.message);snapBtn.textContent="рџ“ё Take Snapshot";snapBtn.disabled=false}
    }},"рџ“ё Take Snapshot");
    snapBar.append(snapBtn);
    body.append(snapBar);

    // NW over time
    if(dates.length>2){
      const nwData=dates.sort().map(d=>{
        let a=0,l=0;
        for(const s of snaps){if(s.snapshot_date!==d)continue;const t=s.accounts?.account_type||"other";const b=parseFloat(s.balance_usd||s.balance)||0;if(["checking","savings","investment"].includes(t))a+=b;else if(["credit","liability"].includes(t))l+=Math.abs(b)}
        return{d,a,nw:a-l};
      });
      const nwCard=h("div",{class:"cd"});
      nwCard.innerHTML=`<h3>Net Worth Over Time</h3><div class="chrt"><canvas id="nwChart"></canvas></div>`;
      body.append(nwCard);
      setTimeout(()=>makeChart("nwChart",{type:"line",data:{labels:nwData.map(d=>fmtD(d.d)),datasets:[
        {label:"Assets",data:nwData.map(d=>Math.round(d.a)),backgroundColor:"rgba(74,111,165,0.2)",borderColor:"rgba(74,111,165,0.5)",fill:true,tension:0.3},
        {label:"Net Worth",data:nwData.map(d=>Math.round(d.nw)),borderColor:"#81B29A",backgroundColor:"rgba(129,178,154,0.1)",borderWidth:2.5,pointRadius:2,fill:false,tension:0.3}
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"rgba(255,255,255,0.5)",font:{size:11}}}},scales:{x:{ticks:{color:"rgba(255,255,255,0.3)",font:{size:9},maxTicksLimit:12},grid:{color:"rgba(255,255,255,0.04)"}},y:{ticks:{color:"rgba(255,255,255,0.3)",callback:v=>fmtN(v)},grid:{color:"rgba(255,255,255,0.04)"}}}}}),50);
    }

    // Account groups
    const row2=h("div",{class:"g2"});
    function acctGroup(title,accts,color){
      if(!accts.length)return"";
      const total=accts.reduce((s,a)=>s+a.bal,0);
      let html=`<div class="acct-grp"><div class="acct-hdr"><span style="font-size:12px;font-weight:600;color:${color};text-transform:uppercase;letter-spacing:0.05em">${title}</span><span style="font-size:13px;font-weight:700;color:${color};font-family:var(--mono)">${fmtF(total)}</span></div>`;
      accts.forEach(a=>html+=`<div class="acct-row"><span style="color:rgba(255,255,255,0.6)">${a.name}</span><span style="color:rgba(255,255,255,0.7);font-family:var(--mono)">${fmtF(a.bal)}</span></div>`);
      return html+"</div>";
    }
    const assetsCard=h("div",{class:"cd"});
    assetsCard.innerHTML=`<h3 style="color:var(--b)">Assets</h3>`+acctGroup("Checking & Savings",[...byType.checking,...byType.savings],"var(--b)")+acctGroup("Investments",byType.investment,"#2A9D8F");
    row2.append(assetsCard);

    const liabCard=h("div",{class:"cd"});
    liabCard.innerHTML=`<h3 style="color:var(--r)">Liabilities</h3>`+acctGroup("Credit Cards",byType.credit,"var(--r)")+acctGroup("Owed to Others",byType.liability,"var(--y)");
    if(!byType.credit.length&&!byType.liability.length)liabCard.innerHTML+=`<div style="color:rgba(255,255,255,0.2);font-size:12px;padding:20px;text-align:center">No liabilities recorded</div>`;
    row2.append(liabCard);
    body.append(row2);
  }catch(e){document.getElementById("bsBody").innerHTML=`<div class="cd" style="border-color:rgba(224,122,95,0.3);color:var(--r)">Error: ${e.message}</div>`}
}

// в—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џ
// PORTFOLIO
// в—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џ

let pfState={expandedAcct:null,expandedSym:null};

async function renderPortfolio(el){
  el.innerHTML=`<div style="margin-bottom:16px"><h2>Portfolio</h2><p class="sub" id="pfSub">Loading...</p></div><div id="pfBody"><div style="text-align:center;padding:60px;color:rgba(255,255,255,0.3)">Loading...</div></div>`;
  try{
    const [accounts,symbols,lots]=await Promise.all([
      sb("investment_accounts?order=label"),
      sb("investment_symbols?order=symbol"),
      sb("investment_lots?order=lot_date")
    ]);
    const body=document.getElementById("pfBody");body.innerHTML="";

    // Build lookup maps
    const symInfo={};for(const s of symbols)symInfo[s.symbol]=s;
    const lotMap={};for(const l of lots){const k=`${l.account_id}|${l.symbol}`;if(!lotMap[k])lotMap[k]=[];lotMap[k].push(l)}

    // Compute lot market values (not stored in DB)
    for(const l of lots){
      const si=symInfo[l.symbol]||{};
      const price=parseFloat(si.latest_price||0);
      l.price_exec=parseFloat(l.price_exec||0);
      l.shares=parseFloat(l.shares||0);
      l.cost_basis=parseFloat(l.cost_basis||0);
      l.ann_return=l.ann_return!=null?parseFloat(l.ann_return):null;
      l.market_value=l.sell_date?0:(price>0?l.shares*price:l.cost_basis);
    }

    // Price date from first symbol with one
    const priceDate=symbols.find(s=>s.price_as_of)?.price_as_of||null;
    document.getElementById("pfSub").textContent=priceDate?`Prices as of ${fmtD(priceDate)} В· USD`:"Live from Supabase В· USD";

    // Symbol-level ann return: cost-basis-weighted avg of lot ann_returns
    function symAnn(acctId,sym){
      const ls=lotMap[`${acctId}|${sym}`];
      if(!ls?.length)return null;
      const wl=ls.filter(l=>l.cost_basis>0&&l.ann_return!=null);if(!wl.length)return null;
      const tc=wl.reduce((s,l)=>s+l.cost_basis,0);
      return tc>0?wl.reduce((s,l)=>s+l.cost_basis*l.ann_return,0)/tc:null;
    }

    // Process accounts вЂ” derive holdings from lots, join symbol metadata
    const acctData=[];let portCost=0,portMarket=0;
    const allocBucket={};let totalLots=0;const totalSyms=new Set();

    for(const acct of accounts){
      const acctSymSet=new Set();
      for(const l of lots)if(l.account_id===acct.id)acctSymSet.add(l.symbol);
      let ac=0,am=0;const holdings=[];
      for(const symName of acctSymSet){
        const k=`${acct.id}|${symName}`;
        const sLots=lotMap[k]||[];
        const si=symInfo[symName]||{};
        const activeLots=sLots.filter(l=>!l.sell_date);
        const sold=sLots.length>0&&activeLots.length===0;
        const activeCost=activeLots.reduce((s,l)=>s+l.cost_basis,0);
        const activeMarket=activeLots.reduce((s,l)=>s+l.market_value,0);
        const activeShares=activeLots.reduce((s,l)=>s+l.shares,0);
        totalLots+=sLots.length;totalSyms.add(symName);
        holdings.push({symbol:symName,asset_class:si.asset_class||"unknown",latest_price:parseFloat(si.latest_price||0)||null,
          shares:activeShares,cost_basis:activeCost,market_value:activeMarket,
          sold,lots:sLots,annReturn:symAnn(acct.id,symName),name:si.name||symName});
        if(!sold){
          ac+=activeCost;am+=activeMarket;
          const cls=si.asset_class;
          if(cls){if(!allocBucket[cls])allocBucket[cls]={cost:0,market:0};allocBucket[cls].market+=activeMarket;allocBucket[cls].cost+=activeCost}
        }
      }
      const gain=am-ac,pctR=ac>0?(gain/ac)*100:0;
      let annR;
      if(PF_ACCT_ANN_OVERRIDE.hasOwnProperty(acct.id)){annR=PF_ACCT_ANN_OVERRIDE[acct.id]}
      else{const al=lots.filter(l=>l.account_id===acct.id&&l.cost_basis>0&&l.ann_return!=null);if(al.length){const tc=al.reduce((s,l)=>s+l.cost_basis,0);annR=tc>0?al.reduce((s,l)=>s+l.cost_basis*l.ann_return,0)/tc:null}else annR=null}
      portCost+=ac;portMarket+=am;
      acctData.push({...acct,holdings,totalCost:ac,totalMarket:am,gain,pctReturn:pctR,annReturn:annR});
    }

    // Portfolio ann return: cost-weighted avg of accounts with data (Vanguard 401K excluded via null)
    let paNum=0,paDen=0;
    for(const a of acctData){if(a.annReturn!=null&&a.totalCost>0){paNum+=a.totalCost*a.annReturn;paDen+=a.totalCost}}
    const portfolioAnn=paDen>0?paNum/paDen:null;
    const portGain=portMarket-portCost;
    const portPct=portCost>0?(portGain/portCost)*100:0;

    // Asset allocation
    const allocation=Object.entries(allocBucket).map(([ac,d])=>({asset_class:ac,...(PF_ACM[ac]||{label:ac,color:"#666",target:0}),value:d.market,pct:portMarket>0?(d.market/portMarket)*100:0})).sort((a,b)=>b.value-a.value);
    const displayAccts=acctData.filter(a=>a.totalMarket>0).sort((a,b)=>b.totalMarket-a.totalMarket);

    // Helper for formatting percent with sign
    const fPct=v=>v!=null?`${v>=0?"+":""}${v.toFixed(1)}%`:"вЂ”";
    const pCol=v=>v!=null?(v>=0?"var(--g)":"var(--r)"):"var(--dim)";

    // в”Ђв”Ђ KPI Cards в”Ђв”Ђ
    const kpi=h("div",{class:"pf-kpi"});
    [{l:"Market Value",v:fmtT(Math.round(portMarket)),c:"var(--g)"},
     {l:"Cost Basis",v:fmtT(Math.round(portCost)),c:"var(--b)"},
     {l:"Unrealized Gain",v:fmtT(Math.round(portGain)),c:portGain>=0?"var(--g)":"var(--r)"},
     {l:"Total Return",v:fPct(portPct),c:pCol(portPct)},
     {l:"Ann. Return",v:fPct(portfolioAnn),c:pCol(portfolioAnn),s:portfolioAnn!=null?"Excl. Vanguard 401K":null}
    ].forEach(k=>{
      const d=h("div",{class:"cd st"});
      d.innerHTML=`<div class="st-l">${k.l}</div><div class="st-v" style="color:${k.c}">${k.v}</div>${k.s?`<div style="font-size:9px;color:rgba(255,255,255,0.2);margin-top:2px">${k.s}</div>`:""}`;
      kpi.append(d);
    });
    body.append(kpi);

    // в”Ђв”Ђ Two-panel overview в”Ђв”Ђ
    const overview=h("div",{class:"g2"});

    // Left: Asset Allocation doughnut + legend
    const allocCard=h("div",{class:"cd"});
    allocCard.innerHTML=`<h3>Asset Allocation</h3><p style="font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:12px">Target: 70% US / 10% Intl / 5% each other</p><div class="chrt" style="height:200px"><canvas id="pfAllocChart"></canvas></div><div id="pfAllocLegend" style="margin-top:12px"></div>`;
    overview.append(allocCard);

    // Right: Account Performance bar + summary
    const perfCard=h("div",{class:"cd"});
    perfCard.innerHTML=`<h3>Account Performance</h3><div class="chrt" style="height:240px"><canvas id="pfPerfChart"></canvas></div><div id="pfPerfSummary" style="margin-top:8px"></div>`;
    overview.append(perfCard);
    body.append(overview);

    // Render allocation chart + legend
    setTimeout(()=>{
      makeChart("pfAllocChart",{type:"doughnut",data:{labels:allocation.map(a=>a.label),datasets:[{data:allocation.map(a=>Math.round(a.value)),backgroundColor:allocation.map(a=>a.color),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmtT(ctx.raw)} (${allocation[ctx.dataIndex].pct.toFixed(1)}%)`}}}}});
      const leg=document.getElementById("pfAllocLegend");
      if(leg){let lh="";allocation.forEach(a=>{lh+=`<div class="pf-alloc-row"><span style="display:flex;align-items:center;gap:6px;color:rgba(255,255,255,0.6)"><span style="width:8px;height:8px;border-radius:2px;background:${a.color};flex-shrink:0"></span>${a.label}</span><div class="pf-alloc-bar"><div style="height:100%;width:${Math.min(a.pct,100)}%;background:${a.color};border-radius:3px"></div></div><span style="font-family:var(--mono);font-size:10px;color:rgba(255,255,255,0.5);text-align:right">${a.pct.toFixed(1)}%</span><span style="font-family:var(--mono);font-size:10px;color:rgba(255,255,255,0.25);text-align:right">(${a.target}%)</span></div>`});leg.innerHTML=lh}
    },50);

    // Render performance chart + summary
    setTimeout(()=>{
      const pd=displayAccts.map(a=>({name:a.label,cost:Math.round(a.totalCost),gain:Math.max(0,Math.round(a.gain))}));
      makeChart("pfPerfChart",{type:"bar",data:{labels:pd.map(d=>d.name),datasets:[
        {label:"Cost Basis",data:pd.map(d=>d.cost),backgroundColor:"rgba(74,111,165,0.6)"},
        {label:"Gain",data:pd.map(d=>d.gain),backgroundColor:"rgba(129,178,154,0.7)",borderRadius:{topRight:4,bottomRight:4}}
      ]},options:{responsive:true,maintainAspectRatio:false,indexAxis:"y",plugins:{legend:{labels:{color:"rgba(255,255,255,0.5)",font:{size:10}}},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmtT(ctx.raw)}`}}},scales:{x:{stacked:true,ticks:{color:"rgba(255,255,255,0.3)",callback:v=>fmtN(v)},grid:{color:"rgba(255,255,255,0.04)"}},y:{stacked:true,ticks:{color:"rgba(255,255,255,0.5)",font:{size:10}},grid:{display:false}}}}});
      const sumEl=document.getElementById("pfPerfSummary");
      if(sumEl){let sh="";displayAccts.forEach(a=>{sh+=`<div class="pf-perf-row"><span style="color:rgba(255,255,255,0.45)">${a.label}</span><div style="display:flex;gap:12px"><span style="font-family:var(--mono);color:${pCol(a.pctReturn)}">${fPct(a.pctReturn)}</span><span style="font-family:var(--mono);min-width:50px;text-align:right;color:${pCol(a.annReturn)}">${fPct(a.annReturn)}</span></div></div>`});sumEl.innerHTML=sh}
    },100);

    // в”Ђв”Ђ Holdings Card в”Ђв”Ђ
    const holdCard=h("div",{class:"cd"});
    holdCard.innerHTML=`<h3>Holdings</h3><div id="pfHoldings"></div>`;
    body.append(holdCard);

    function renderHoldings(){
      const hEl=document.getElementById("pfHoldings");if(!hEl)return;
      let hh="";
      for(const acct of acctData){
        const vis=acct.holdings.filter(s=>s.market_value>0||s.cost_basis>0||s.sold);
        if(!vis.length)continue;
        const isEx=pfState.expandedAcct===acct.id;
        const activeN=acct.holdings.filter(s=>!s.sold&&s.market_value>0).length;
        const soldN=acct.holdings.filter(s=>s.sold).length;

        hh+=`<div class="pf-acct"><div class="pf-acct-hdr" data-acct="${acct.id}"><div><div style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px"><span class="pf-toggle${isEx?" open":""}">в–¶</span>${acct.label} <span class="pf-badge">${PF_ATL[acct.account_type]||acct.account_type}</span></div><div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px">${acct.institution} В· ${activeN} active${soldN?" + "+soldN+" sold":""}</div></div>`;

                  hh+=`<td class="r" style="font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.3)">${fmtT(Math.round(lot.market_value))}</td>`;
                  hh+=`<td class="r hide-m" style="font-family:var(--mono);font-size:11px;color:${sc}">${fmtT(Math.round(lg))}</td>`;
                  hh+=`<td class="r" style="font-family:var(--mono);font-size:11px;color:${sc}">${fPct(lr)}</td>`;

        hh+=`</div>`;
      }
      hEl.innerHTML=hh;

      // Attach click handlers for expand/collapse
      hEl.querySelectorAll(".pf-acct-hdr").forEach(el=>{

    // в”Ђв”Ђ Footer в”Ђв”Ђ

    foot.innerHTML=`<span>${totalLots} lots В· ${accounts.length} accounts В· ${totalSyms.size} symbols</span>${priceDate?`<span>Prices as of ${fmtD(priceDate)}</span>`:""}`;

  }catch(e){document.getElementById("pfBody").innerHTML=`<div class="cd" style="border-color:rgba(224,122,95,0.3);color:var(--r)">Error loading portfolio: ${e.message}</div>`}

async function renderTags(el){
  el.innerHTML=`<div style="margin-bottom:16px"><h2>Tags</h2><p class="sub">Loading...</p></div><div id="tagsBody"></div>`;
  try{
    const tagRows=await sb("tags?order=start_date.desc");
    // Paginate to get ALL tagged transactions (Supabase caps at 1000 per request)
    let allTxns=[];
    let offset=0;
    const batchSize=1000;
    while(true){
      const batch=await sb(`transactions?select=tag,amount_usd,daily_cost,service_start,service_end,category_id&tag=not.is.null&tag=neq.&order=id&limit=${batchSize}&offset=${offset}`);
      allTxns=allTxns.concat(batch);
      if(batch.length<batchSize)break;
      offset+=batchSize;
    }
    const txns=allTxns;
    // Build tag date lookup for accrual overlap
    const tagDates={};
    for(const t of tagRows)tagDates[t.name]={start:t.start_date,end:t.end_date};
    const tm={};
    for(const t of txns){
      if(!t.tag)continue;
      if(!tm[t.tag])tm[t.tag]={total:0,count:0,cats:{}};
      tm[t.tag].count++;
      if(t.category_id==="income"||t.category_id==="investment")continue;
      // Accrual: compute overlap of txn service period with tag date window
      const tg=tagDates[t.tag];
      if(tg&&tg.start&&tg.end&&t.daily_cost!=null&&t.service_start&&t.service_end){
        const oStart=t.service_start>tg.start?t.service_start:tg.start;
        const oEnd=t.service_end<tg.end?t.service_end:tg.end;
        if(oStart<=oEnd){
          const oDays=Math.floor((new Date(oEnd)-new Date(oStart))/864e5)+1;
          const amt=t.daily_cost*oDays;
          tm[t.tag].total+=amt;
          tm[t.tag].cats[t.category_id]=(tm[t.tag].cats[t.category_id]||0)+amt;
        }
      }else if(t.amount_usd>0){
        // Fallback: no tag dates or no service period
        tm[t.tag].total+=t.amount_usd;
        tm[t.tag].cats[t.category_id]=(tm[t.tag].cats[t.category_id]||0)+t.amount_usd;
      }
    }

    const tags=tagRows.map(t=>({...t,...(tm[t.name]||{total:0,count:0,cats:{}})})).sort((a,b)=>b.total-a.total);
    el.querySelector(".sub").textContent=`Click any tag for breakdown В· ${tags.length} tags`;
    const body=document.getElementById("tagsBody");body.innerHTML="";
    const grid=h("div",{class:"tag-grid"});

    tags.forEach((tag,i)=>{
      const card=h("div",{class:"tag-card",style:{borderLeftColor:TCOLS[i%TCOLS.length],cursor:tag.total>0?"pointer":"default"},onClick:()=>tag.total>0&&showTagDetail(tag)});
      let inner=`<div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:14px;font-weight:600;color:#fff">${tag.name}</div>`;
      if(tag.start_date)inner+=`<div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px">${fmtD(tag.start_date)} вЂ“ ${fmtD(tag.end_date)}</div>`;
      inner+=`</div><span style="font-size:10px;color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.04);padding:2px 6px;border-radius:4px">${tag.count||0} txns</span></div>`;
      if(tag.total>0){
        const days=tag.start_date&&tag.end_date?Math.max(1,Math.floor((new Date(tag.end_date)-new Date(tag.start_date))/864e5)+1):0;
        inner+=`<div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:8px"><div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--r)">${fmtF(tag.total)}</div>`;
        if(days>0)inner+=`<div style="font-size:11px;color:rgba(255,255,255,0.25);font-family:var(--mono)">${fmtF(tag.total/days)}/day</div>`;
        inner+=`</div>`;
        if(Object.keys(tag.cats).length>0){
          const posCats=Object.entries(tag.cats).filter(([,v])=>v>0);
          if(posCats.length>0){const barTotal=posCats.reduce((s,[,v])=>s+v,0);
          inner+=`<div style="display:flex;gap:2px;margin-top:6px;height:4px;border-radius:2px;overflow:hidden">`;
          posCats.sort((a,b)=>b[1]-a[1]).forEach(([c,v])=>inner+=`<div style="width:${(v/barTotal)*100}%;background:${CC[c]||"#666"};min-width:2px"></div>`);
          inner+=`</div>`;}
        }
      }
      card.innerHTML=inner;
      grid.append(card);
    });
    body.append(grid);
  }catch(e){document.getElementById("tagsBody").innerHTML=`<div class="cd" style="color:var(--r)">Error: ${e.message}</div>`}
}

async function showTagDetail(tag){
  const existing=document.querySelector(".modal-bg");if(existing)existing.remove();
  const txns=await sb(`transactions?tag=eq.${encodeURIComponent(tag.name)}&category_id=neq.income&category_id=neq.investment&order=date.desc`);
  const cats={};let total=0;
  for(const t of txns){
    if(t.daily_cost!=null&&tag.start_date&&tag.end_date&&t.service_start&&t.service_end){
      const oStart=t.service_start>tag.start_date?t.service_start:tag.start_date;
      const oEnd=t.service_end<tag.end_date?t.service_end:tag.end_date;
      if(oStart<=oEnd){
        const oDays=Math.floor((new Date(oEnd)-new Date(oStart))/864e5)+1;
        const amt=t.daily_cost*oDays;
        cats[t.category_id]=(cats[t.category_id]||0)+amt;total+=amt;
      }
    }else if(t.amount_usd>0){cats[t.category_id]=(cats[t.category_id]||0)+t.amount_usd;total+=t.amount_usd}
  }
  const days=tag.start_date&&tag.end_date?Math.max(1,Math.floor((new Date(tag.end_date)-new Date(tag.start_date))/864e5)+1):0;
  const mx=Math.max(...Object.values(cats).map(v=>Math.abs(v)),1);

  const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg)bg.remove()}});
  let mhtml=`<div style="display:flex;justify-content:space-between;margin-bottom:20px"><div><h2 style="font-size:22px">${tag.name}</h2>`;
  if(tag.start_date)mhtml+=`<p style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:4px">${fmtD(tag.start_date)} вЂ“ ${fmtD(tag.end_date)}</p>`;
  mhtml+=`</div><button onclick="this.closest('.modal-bg').remove()" style="background:rgba(255,255,255,0.06);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:16px">вњ•</button></div>`;
  mhtml+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px">`;
  [["Total",fmtF(total),"var(--r)"],["Days",days,"var(--b)"],["Per Day",days>0?fmtF(total/days):"вЂ”","var(--g)"]].forEach(([l,v,c])=>mhtml+=`<div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:12px 14px;text-align:center"><div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase">${l}</div><div style="font-size:20px;font-weight:700;color:${c};font-family:var(--mono)">${v}</div></div>`);
  mhtml+=`</div>`;

  Object.entries(cats).filter(([,v])=>Math.abs(v)>0.5).sort((a,b)=>Math.abs(b[1])-Math.abs(a[1])).forEach(([cat,val])=>{
    const isNeg=val<0;
    mhtml+=`<div style="display:grid;grid-template-columns:90px 1fr 65px 40px;align-items:center;gap:8px;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,0.6)"><span style="width:7px;height:7px;border-radius:2px;background:${CC[cat]||"#666"};flex-shrink:0"></span>${cat}</div>
      <div style="height:14px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden"><div style="height:100%;width:${(Math.abs(val)/mx)*100}%;background:${isNeg?"var(--g)":(CC[cat]||"#666")};border-radius:4px;opacity:0.7"></div></div>
      <div style="font-family:var(--mono);font-size:11px;color:${isNeg?"var(--g)":"rgba(255,255,255,0.5)"};text-align:right">${isNeg?"("+fmtF(Math.abs(val))+")":fmtF(val)}</div>
      <div style="font-family:var(--mono);font-size:10px;color:rgba(255,255,255,0.3);text-align:right">${total>0?((Math.abs(val)/total)*100).toFixed(0)+"%":""}</div></div>`;
  });

  const modal=h("div",{class:"modal"});
  modal.innerHTML=mhtml;
  bg.append(modal);
  document.body.append(bg);
}

function showSnapshotForm(accounts, lastDate, onSave){
  const existing=document.querySelector(".modal-bg");if(existing)existing.remove();
  const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg)bg.remove()}});
  const modal=h("div",{class:"modal",style:{maxWidth:"640px"}});

  const groups={checking:[],savings:[],credit:[],investment:[],liability:[]};
  accounts.forEach(a=>(groups[a.account_type]||[]).push(a));
  const typeLabels={checking:"Checking",savings:"Savings",credit:"Credit Cards",investment:"Investments",liability:"Liabilities"};

  let mhtml=`<div style="display:flex;justify-content:space-between;margin-bottom:20px"><div><h2 style="font-size:20px">New Balance Snapshot</h2><p style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:4px">Enter current balances for each account</p></div><button onclick="this.closest('.modal-bg').remove()" style="background:rgba(255,255,255,0.06);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:16px">\u2715</button></div>`;
  mhtml+=`<div style="margin-bottom:16px"><label class="lbl">Snapshot Date</label><input type="date" id="snapDate" class="inp" value="${today()}" style="max-width:200px"></div>`;

  for(const[type,accts]of Object.entries(groups)){
    if(!accts.length)continue;
    mhtml+=`<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">${typeLabels[type]||type}</div>`;
    accts.forEach(a=>{
      mhtml+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="font-size:12px;color:rgba(255,255,255,0.6);min-width:160px">${a.label}</span><input type="number" step="0.01" class="inp snap-bal" data-id="${a.id}" placeholder="0.00" style="max-width:160px;font-family:var(--mono)"></div>`;
    });
    mhtml+=`</div>`;
  }
  mhtml+=`<button id="saveSnapBtn" class="btn" style="background:rgba(129,178,154,0.2);color:var(--g);margin-top:12px">Save Snapshot</button>`;

  modal.innerHTML=mhtml;
  bg.append(modal);
  document.body.append(bg);

  document.getElementById("saveSnapBtn").addEventListener("click",async()=>{
    const btn=document.getElementById("saveSnapBtn");
    btn.textContent="Saving...";btn.disabled=true;
    const date=document.getElementById("snapDate").value;
    const rows=[];
    document.querySelectorAll(".snap-bal").forEach(inp=>{
      const val=parseFloat(inp.value);
      if(!isNaN(val)&&val!==0)rows.push({account_id:inp.dataset.id,snapshot_date:date,balance:val,balance_usd:val});
    });
    if(!rows.length){alert("Enter at least one balance.");btn.textContent="Save Snapshot";btn.disabled=false;return}
    try{
      const resp=await fetch(`${SB_URL}/rest/v1/balance_snapshots`,{method:"POST",headers:authHeaders({Prefer:"resolution=merge-duplicates,return=representation"}),body:JSON.stringify(rows)});
      if(!resp.ok)throw new Error(await resp.text());
      bg.remove();
      if(onSave)onSave();
    }catch(e){alert("Error saving: "+e.message);btn.textContent="Save Snapshot";btn.disabled=false}
  });
}

function openLedgerEditModal(txn,onSaved){
  let seManual=false;
  const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg)bg.remove()}});
  const modal=h("div",{class:"modal"});

  // Header
  const hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"20px"}});
  const hdrLeft=h("div");
  hdrLeft.append(h("h3",{style:{margin:"0"}},"Edit Transaction"));
  if(txn.bank_description)hdrLeft.append(h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.25)",marginTop:"4px"}},"Bank: "+txn.bank_description));
  const closeBtn=h("span",{style:{cursor:"pointer",fontSize:"18px",color:"rgba(255,255,255,0.3)",lineHeight:"1"},onClick:()=>bg.remove()},"\u2715");
  hdr.append(hdrLeft,closeBtn);
  modal.append(hdr);

  function mRow(...ch){const d=h("div",{style:{display:"grid",gridTemplateColumns:ch.length===3?"1fr 1fr 1fr":ch.length===2?"1fr 1fr":"1fr",gap:"12px",marginBottom:"14px"}});ch.forEach(x=>d.append(x));return d}
  function mField(lbl,inp){const d=h("div");d.append(h("label",{class:"lbl"},lbl));d.append(inp);return d}

  const mDate=h("input",{class:"inp",type:"date",value:txn.date,onInput:updatePreview});
  const mDesc=h("input",{class:"inp",type:"text",value:txn.description||""});
  const mAmt=h("input",{class:"inp",type:"number",step:"0.01",value:txn.amount_usd,onInput:updatePreview});

  const mCat=h("select",{class:"inp",onChange:()=>{
    if(!seManual){mSe.value=getDefEnd(mCat.value,mSs.value)||mSs.value;updateHint()}
    updatePreview();
  }});
  CATS_LIST.forEach(cat=>{const o=h("option",{value:cat.id},cat.l);if(cat.id===txn.category_id)o.selected=true;mCat.append(o)});

  const mSs=h("input",{class:"inp",type:"date",value:txn.service_start,onInput:()=>{
    if(!seManual){mSe.value=getDefEnd(mCat.value,mSs.value)||mSs.value}
    updatePreview();
  }});
  const mSe=h("input",{class:"inp",type:"date",value:txn.service_end,onInput:()=>{
    seManual=true;mSe.style.borderColor="rgba(242,204,143,0.3)";updatePreview();
  }});
  const hintSpan=h("span",{style:{color:"rgba(129,178,154,0.6)",textTransform:"none",letterSpacing:"0",fontWeight:"400",fontSize:"10px"}});
  function updateHint(){const r=ACCRUAL_D[mCat.value];hintSpan.textContent=!seManual&&r?(r==="month"?"(Auto: end of month)":`(Auto: ${r} days)`):""}
  updateHint();
  const seLbl=h("label",{class:"lbl"});seLbl.append("Service End ");seLbl.append(hintSpan);
  const seField=h("div");seField.append(seLbl);seField.append(mSe);

  const mPt=h("select",{class:"inp"});
  PTS.forEach(p=>{const o=h("option",{value:p},p);if(p===txn.payment_type)o.selected=true;mPt.append(o)});
  const mTag=h("input",{class:"inp",type:"text",value:txn.tag||""});

  // Accrual preview
  const previewEl=h("div",{class:"preview hidden"});
  function updatePreview(){
    const a=parseFloat(mAmt.value);if(isNaN(a)||!mSs.value||!mSe.value){previewEl.classList.add("hidden");return}
    const ss=new Date(mSs.value+"T00:00:00"),se=new Date(mSe.value+"T00:00:00");
    if(se<ss){previewEl.classList.add("hidden");return}
    const days=Math.max(1,Math.floor((se-ss)/864e5)+1);
    const daily=a/days;
    previewEl.classList.remove("hidden");
    previewEl.innerHTML=`<div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Accrual Preview</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">USD Amount</div><div style="font-size:18px;font-weight:700;color:#fff;font-family:var(--mono)">${fmtF(a)}</div></div>
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">Service Days</div><div style="font-size:18px;font-weight:700;color:var(--b);font-family:var(--mono)">${days}</div></div>
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">Daily Cost</div><div style="font-size:18px;font-weight:700;color:var(--g);font-family:var(--mono)">${fmtF(daily)}/d</div></div>
    </div>`;
  }
  updatePreview();

  // Action buttons
  const btnRow=h("div",{style:{display:"grid",gridTemplateColumns:"1fr auto auto",gap:"8px",marginTop:"4px"}});
  const mSave=h("button",{class:"btn",style:{background:"rgba(129,178,154,0.2)",color:"var(--g)"},onClick:async()=>{
    mSave.textContent="Saving...";mSave.disabled=true;
    const ss=new Date(mSs.value+"T00:00:00"),se=new Date(mSe.value+"T00:00:00");
    const sdays=Math.max(1,Math.floor((se-ss)/864e5)+1);
    const amt=Math.round(parseFloat(mAmt.value)*100)/100;
    const dc=Math.round(amt/sdays*1e6)/1e6;
    try{
      await sb(`transactions?id=eq.${txn.id}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({
        date:mDate.value,description:mDesc.value,category_id:mCat.value,
        amount_usd:amt,original_amount:amt,
        service_start:mSs.value,service_end:mSe.value,
        service_days:sdays,daily_cost:dc,
        payment_type:mPt.value,tag:(mTag.value||"").toLowerCase().trim()
      })});
      bg.remove();
      const msg=document.getElementById("ledgerOkMsg");
      if(msg){msg.textContent="Updated";msg.classList.remove("hidden");setTimeout(()=>msg.classList.add("hidden"),2500)}
      onSaved();
    }catch(e){alert("Save failed: "+e.message);mSave.textContent="Save";mSave.disabled=false}
  }},"Save");

  let delTimer=null;
  const mDel=h("button",{class:"btn",style:{background:"rgba(224,122,95,0.15)",color:"var(--r)",width:"auto",padding:"12px 20px"},onClick:async()=>{
    if(mDel.dataset.confirm!=="1"){
      mDel.dataset.confirm="1";mDel.textContent="Confirm Delete";
      delTimer=setTimeout(()=>{mDel.dataset.confirm="0";mDel.textContent="Delete"},3000);
      return;
    }
    if(delTimer)clearTimeout(delTimer);
    mDel.textContent="Deleting...";mDel.disabled=true;
    try{
      await sb(`transactions?id=eq.${txn.id}`,{method:"DELETE",headers:{"Prefer":"return=representation"}});
      state.txnCount--;
      document.getElementById("dbStatus").textContent=`\u25CF ${state.txnCount.toLocaleString()} txns`;
      bg.remove();
      const msg=document.getElementById("ledgerOkMsg");
      if(msg){msg.textContent="Deleted";msg.classList.remove("hidden");setTimeout(()=>msg.classList.add("hidden"),2500)}
      onSaved();
    }catch(e){alert("Delete failed: "+e.message);mDel.textContent="Delete";mDel.disabled=false;mDel.dataset.confirm="0"}
  }},"Delete");

  const mCancel=h("button",{class:"btn",style:{background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.4)",width:"auto",padding:"12px 20px"},onClick:()=>bg.remove()},"Cancel");
  btnRow.append(mSave,mDel,mCancel);

  modal.append(mRow(mField("Date",mDate),mField("Description",mDesc)));
  modal.append(mRow(mField("Category",mCat),mField("Amount (USD)",mAmt)));
  modal.append(mRow(mField("Service Start",mSs),seField));
  modal.append(mRow(mField("Payment Account",mPt),mField("Tag",mTag)));
  modal.append(previewEl);
  modal.append(btnRow);
  bg.append(modal);
  document.body.append(bg);
}

async function renderLedger(el){
  const PS=50;
  if(!state.lf)state.lf={cat:"",pt:"",dfrom:"",dto:"",q:""};
  const f=state.lf;
  const fS="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:6px 10px;color:#e8e8e4;font-size:11px;font-family:var(--sans);outline:none";

  el.innerHTML=`<div class="cd"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="margin:0">Transactions</h3><span id="ledgerOkMsg" class="ok-msg hidden"></span><div id="pgNav"></div></div><div id="filterBar" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px"></div><div id="ledgerBody">Loading...</div></div>`;

  const fb=document.getElementById("filterBar");

  // Search input
  const si=h("input",{style:fS+";width:160px",placeholder:"Search description...",value:f.q});
  si.addEventListener("keydown",e=>{if(e.key==="Enter"){f.q=si.value;state.page=0;loadPage()}});
  fb.append(si);

  // Category filter
  const cs=h("select",{style:fS+";cursor:pointer"});
  cs.innerHTML=`<option value="">All Categories</option>`+CATS_LIST.map(c=>`<option value="${c.id}"${c.id===f.cat?" selected":""}>${c.l}</option>`).join("");
  cs.addEventListener("change",()=>{f.cat=cs.value;state.page=0;loadPage()});
  fb.append(cs);

  // Payment type filter
  const ps=h("select",{style:fS+";cursor:pointer"});
  ps.innerHTML=`<option value="">All Payments</option>`+PTS.map(p=>`<option value="${p}"${p===f.pt?" selected":""}>${p}</option>`).join("");
  ps.addEventListener("change",()=>{f.pt=ps.value;state.page=0;loadPage()});
  fb.append(ps);

  // Date range
  fb.append(h("span",{style:"font-size:10px;color:rgba(255,255,255,0.3);align-self:center"},"From"));
  const df=h("input",{type:"date",style:fS+";width:130px",value:f.dfrom});
  df.addEventListener("change",()=>{f.dfrom=df.value;state.page=0;loadPage()});
  fb.append(df);
  fb.append(h("span",{style:"font-size:10px;color:rgba(255,255,255,0.3);align-self:center"},"To"));
  const dt=h("input",{type:"date",style:fS+";width:130px",value:f.dto});
  dt.addEventListener("change",()=>{f.dto=dt.value;state.page=0;loadPage()});
  fb.append(dt);

  // Clear button
  const clr=h("button",{class:"pg-btn",style:"font-size:11px",onClick:()=>{state.lf={cat:"",pt:"",dfrom:"",dto:"",q:""};state.page=0;renderLedger(el)}},"Clear");
  fb.append(clr);

  async function loadPage(){
    document.getElementById("ledgerBody").innerHTML="Loading...";
    let q=`transactions?order=date.desc,id.desc&limit=${PS}&offset=${state.page*PS}`;
    if(f.cat)q+=`&category_id=eq.${f.cat}`;
    if(f.pt)q+=`&payment_type=eq.${encodeURIComponent(f.pt)}`;
    if(f.dfrom)q+=`&date=gte.${f.dfrom}`;
    if(f.dto)q+=`&date=lte.${f.dto}`;
    if(f.q)q+=`&description=ilike.*${encodeURIComponent(f.q)}*`;
    const txns=await sb(q);
    const nav=document.getElementById("pgNav");
    nav.innerHTML="";
    const prev=h("button",{class:"pg-btn",onClick:()=>{if(state.page>0){state.page--;loadPage()}}},"\u2190 Prev");
    if(state.page===0)prev.disabled=true;
    nav.append(prev);
    nav.append(h("span",{style:{padding:"4px 8px",fontSize:"11px",color:"rgba(255,255,255,0.3)"}},`Page ${state.page+1}`));
    const next=h("button",{class:"pg-btn",onClick:()=>{state.page++;loadPage()}},`Next \u2192`);
    if(txns.length<PS)next.disabled=true;
    nav.append(next);

    const wrap=h("div",{style:{overflowX:"auto"}});
    const tbl=h("table");
    tbl.innerHTML=`<thead><tr><th>Date</th><th>Description</th><th>Category</th><th class="r">Amount</th><th class="hide-m">Payment</th><th class="hide-m">Service Period</th><th class="r hide-m">Daily Cost</th><th>Tag</th></tr></thead>`;
    const tbody=document.createElement("tbody");
    txns.forEach(t=>{
      const tr=h("tr",{style:{cursor:"pointer"},onClick:()=>openLedgerEditModal(t,loadPage)});
      tr.append(h("td",{class:"m",style:{color:"rgba(255,255,255,0.55)",whiteSpace:"nowrap"}},fmtD(t.date)));
      tr.append(h("td",{style:{color:"rgba(255,255,255,0.8)",maxWidth:"240px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},t.description));
      const catTd=h("td");catTd.append(h("span",{class:"badge",style:{background:(CC[t.category_id]||"#666")+"22",color:CC[t.category_id]||"#888"}},t.category_id));tr.append(catTd);
      const amtTd=h("td",{class:"r m",style:{color:t.amount_usd<0?"var(--g)":"rgba(255,255,255,0.75)"}});amtTd.append(document.createTextNode(fmtF(t.amount_usd)));if(t.currency!=="USD")amtTd.append(h("span",{style:{color:"rgba(255,255,255,0.25)",marginLeft:"3px",fontSize:"10px"}},t.currency));tr.append(amtTd);
      tr.append(h("td",{class:"hide-m",style:{color:"rgba(255,255,255,0.4)",fontSize:"11px",whiteSpace:"nowrap"}},t.payment_type||""));
      const spTd=h("td",{class:"m hide-m",style:{color:"rgba(255,255,255,0.4)",whiteSpace:"nowrap"}});spTd.append(document.createTextNode(fmtD(t.service_start)+"\u2013"+fmtD(t.service_end)));if(t.service_days>1)spTd.append(h("span",{style:{marginLeft:"3px",color:"rgba(255,255,255,0.2)"}},`(${t.service_days}d)`));tr.append(spTd);
      tr.append(h("td",{class:"r m hide-m",style:{color:"var(--g)"}},fmtF(t.daily_cost)));
      const tagTd=h("td",{style:{color:"rgba(255,255,255,0.35)",fontSize:"11px"}});if(t.tag)tagTd.append(h("span",{style:{background:"rgba(255,255,255,0.06)",padding:"2px 7px",borderRadius:"4px"}},t.tag));tr.append(tagTd);
      tbody.append(tr);
    });
    tbl.append(tbody);wrap.append(tbl);
    const body=document.getElementById("ledgerBody");body.innerHTML="";body.append(wrap);
  }
  loadPage();
}
