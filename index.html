<style>

.batch-bar .bb-count{font-size:12px;font-weight:600;color:var(--g);white-space:nowrap}
.batch-bar .bb-btn{padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.7);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all 0.15s}
.batch-bar .bb-btn:hover{border-color:rgba(255,255,255,0.2);color:#fff}
.batch-bar .bb-btn.bb-edit{border-color:rgba(129,178,154,0.3);color:var(--g)}

.batch-bar .bb-btn.bb-cancel{color:rgba(255,255,255,0.4)}
.ldg-chk{width:16px;height:16px;accent-color:var(--g);cursor:pointer}
.undo-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e1e2f;border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:12px;z-index:200;font-size:13px;color:rgba(255,255,255,0.7);box-shadow:0 4px 20px rgba(0,0,0,0.5);animation:slideUp 0.2s ease-out}
.undo-toast button{background:rgba(74,111,165,0.25);color:var(--b);border:none;border-radius:6px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer}
.undo-toast button:hover{background:rgba(74,111,165,0.4)}
.undo-toast .undo-dismiss{background:0;color:rgba(255,255,255,0.3);padding:2px 6px;font-size:14px;min-width:0}
.undo-toast .undo-dismiss:hover{color:rgba(255,255,255,0.6);background:0}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
</style>
</head>
<body>

<div id="offlineBanner" class="offline-banner hidden">Showing cached data · <span id="offlineTs"></span> <button onclick="this.parentElement.classList.add('hidden')" style="background:0;border:0;color:inherit;cursor:pointer;margin-left:8px">✕</button></div>

<div class="hdr">
  <div style="display:flex;align-items:baseline;gap:10px">
    <span class="logo">the disciplan</span>

</div>

<div class="mn" id="content"></div>

<script>

// ●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●
// TABS
// ●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●

const TABS=[["entry","+ new entry"],["income","income statement"],["balance","balance sheet"],["portfolio","portfolio"],["tags","tags"],["ledger","ledger"],["cashback","cashback"],["export","export"]];

function renderTabs(){
  const bar=document.getElementById("tabBar");
  bar.innerHTML="";
  const offline=!navigator.onLine;
  TABS.forEach(([id,label])=>{
    const disabled=offline&&(id==="entry"||id==="export");
    const b=h("button",{class:"tab"+(state.tab===id?" on":""),style:disabled?{opacity:"0.3",cursor:"default"}:{},onClick:()=>{state.tab=id;history.replaceState(null,null,"#"+id);renderTabs();renderContent()}},label);
    bar.append(b);
  });
  const so=h("button",{class:"tab",style:{color:"rgba(255,255,255,0.3)",borderColor:"transparent",fontSize:"11px"},onClick:()=>supabaseClient.auth.signOut()},"sign out");
  bar.append(so);
}

async function renderContent(){
  const ob=document.getElementById("offlineBanner");if(ob)ob.classList.add("hidden");
  document.querySelectorAll(".batch-bar").forEach(b=>b.remove());
  const el=document.getElementById("content");
  el.innerHTML="";
  if(!navigator.onLine&&(state.tab==="entry"||state.tab==="export")){
    el.innerHTML=`<div class="cd" style="text-align:center;padding:48px 24px"><div style="font-size:32px;margin-bottom:12px">\uD83D\uDCE1</div><h3 style="margin-bottom:8px">Offline Mode</h3><p style="font-size:13px;color:rgba(255,255,255,0.5)">${state.tab==="entry"?"Adding new transactions":"Exporting data"} requires an internet connection.<br>Browse cached data in other tabs while offline.</p></div>`;
    return;
  }
  try{
    if(state.tab==="entry")await renderEntry(el);
    else if(state.tab==="income"&&state.year==="all")await renderCrossYear(el);
    else if(state.tab==="income")await renderIS(el);
    else if(state.tab==="balance")await renderBS(el);
    else if(state.tab==="portfolio")await renderPortfolio(el);
    else if(state.tab==="tags")await renderTags(el);
    else if(state.tab==="ledger")await renderLedger(el);
    else if(state.tab==="cashback")await renderCashback(el);
    else if(state.tab==="export")await renderExport(el);
    else if(state.tab==="ai")await renderAIPortal(el);
  }catch(e){
    const tabLabel=TABS.find(t=>t[0]===state.tab)?.[1]||state.tab;
    el.innerHTML=`<div class="cd" style="border-color:rgba(224,122,95,0.3);text-align:center;padding:48px 24px"><h3 style="color:var(--r);margin-bottom:8px">Failed to load ${tabLabel}</h3><p style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:20px;font-family:var(--mono)">${e.message||String(e)}</p><button class="pg-btn" onclick="renderContent()" style="padding:8px 20px">Retry</button></div>`;
    console.error("Tab render error ["+state.tab+"]:",e);
  }
}

function statCard(icon,label,value,color){
  const d=h("div",{class:"cd st"});
  d.innerHTML=`<div class="st-l">${icon?icon+" ":""}${label}</div><div class="st-v" style="color:${color}">${value}</div>`;
  return d;
}

// ●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●
// ENTRY TAB
// ●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●



// ●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●
// INIT
// ●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●

async function init(){
  // Restore tab from URL hash
  const validTabs=TABS.map(t=>t[0]);
  const hash=location.hash.slice(1);
  if(hash==="income-all"){state.tab="income";state.year="all"}
  else if(hash==="ai"){state.tab="ai"}
  else if(validTabs.includes(hash)){state.tab=hash}
  if(!location.hash)history.replaceState(null,null,"#"+state.tab);

  renderTabs();
  fetchLiveFX();
  try{
    const r=await fetch(`${SB_URL}/rest/v1/transactions?select=id&limit=1`,{headers:authHeaders({Prefer:"count=exact"})});
    if(!r.ok)throw new Error(r.status);
    const count=r.headers.get("content-range")?.split("/")[1];
    state.txnCount=count?parseInt(count):0;
    document.getElementById("dbStatus").textContent=`● ${state.txnCount.toLocaleString()} txns`;
    document.getElementById("dbStatus").style.color="var(--g)";
  }catch(e){
    document.getElementById("dbStatus").textContent="● disconnected";
    document.getElementById("dbStatus").style.color="var(--r)";
  }
  // Check for pending email imports
  try{
    const pr=await fetch(`${SB_URL}/rest/v1/pending_imports?status=eq.pending&select=id&limit=1`,{headers:authHeaders({Prefer:"count=exact"})});
    if(pr.ok){
      const pc=pr.headers.get("content-range")?.split("/")[1];
      state.pendingEmails=pc?parseInt(pc):0;
      if(state.pendingEmails>0){
        const old=document.getElementById("emailImportBanner");
        if(old)old.remove();
        const banner=document.createElement("div");
        banner.id="emailImportBanner";
        banner.style.cssText="background:rgba(74,111,165,0.15);color:var(--b);text-align:center;padding:6px 12px;font-size:11px;border-bottom:1px solid rgba(74,111,165,0.2);cursor:pointer";
        banner.innerHTML=`\u{1F4E7} ${state.pendingEmails} pending email import${state.pendingEmails>1?"s":""} — <b>Review</b>`;
        banner.onclick=()=>{state.tab="entry";renderTabs();renderContent();setTimeout(()=>document.getElementById("emailImportSection")?.scrollIntoView({behavior:"smooth"}),100)};
        document.querySelector(".hdr").after(banner);
      }
    }
  }catch(e){/* silent — non-critical */}
  // Auto-link reimbursements (fire-and-forget, don't block app load)
  scanForReimbursementLinks().catch(e=>console.error("Link scan error:",e));
  // Refresh button handler
  document.getElementById("refreshBtn").addEventListener("click",function(){
    this.classList.add("spinning");
    this.addEventListener("animationend",()=>this.classList.remove("spinning"),{once:true});
    // Invalidate this tab's cache so refresh always fetches fresh data (FEA-89)
    if(state.tab==="income"&&state.year==="all")dcDel('crossyear');
    else if(state.tab==="income")dcDel('is_'+state.year);
    else if(state.tab==="balance")dcDel('bs');
    else if(state.tab==="portfolio")dcDel('portfolio');
    renderContent();
  });
  // Online/offline reactivity (FEA-23)
  window.addEventListener('online',()=>{document.getElementById("offlineBanner")?.classList.add("hidden");renderTabs();if(state.tab==="entry"||state.tab==="export")renderContent()});
  window.addEventListener('offline',()=>{renderTabs();if(state.tab==="entry"||state.tab==="export")renderContent()});
  renderContent();
}

// AUTH
// ●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●

function showLogin() {
  document.getElementById('loginScreen').classList.remove('hidden');
  document.querySelector('.hdr').classList.add('hidden');
  document.getElementById('content').classList.add('hidden');
  document.querySelector('.foot').classList.add('hidden');
}

function showApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.querySelector('.hdr').classList.remove('hidden');
  document.getElementById('content').classList.remove('hidden');
  document.querySelector('.foot').classList.remove('hidden');
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  const btn = e.target.querySelector('button');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email: document.getElementById('loginEmail').value,
      password: document.getElementById('loginPass').value
    });
    if (error) throw error;
    currentSession = data.session;
    showApp();
    init();
  } catch (err) {
    errEl.textContent = err.message || 'Invalid login credentials';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});

async function checkAuthAndInit() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  currentSession = session;

  if (session) {
    showApp();
    init();
  } else {
    showLogin();
  }

  supabaseClient.auth.onAuthStateChange((event, session) => {
    currentSession = session;
    if (event === 'SIGNED_OUT') {
      showLogin();
    }
  });
}

// Register Service Worker (FEA-23)
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(reg=>console.log('SW registered, scope:',reg.scope)).catch(err=>console.warn('SW registration failed:',err));
  navigator.serviceWorker.addEventListener('message',event=>{
    if(event.data?.type==='SW_UPDATE_AVAILABLE'){
      if(document.getElementById('updateBanner'))return;
      const banner=document.createElement('div');banner.id='updateBanner';
      banner.style.cssText='background:rgba(129,178,154,0.15);color:var(--g);text-align:center;padding:8px 12px;font-size:12px;border-bottom:1px solid rgba(129,178,154,0.2);cursor:pointer;font-weight:600';
      banner.innerHTML='New version available \u2014 <u>Refresh</u>';banner.onclick=()=>location.reload();
      const hdr=document.querySelector('.hdr');if(hdr)hdr.before(banner);
    }
  });
}

checkAuthAndInit();
</script>
