async function loadSheetJS(){
  if(window.XLSX)return;
  await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js";s.onload=res;s.onerror=rej;document.head.append(s)});
}

function detectPortfolioFormat(rows){
  const flat=rows.map(r=>(r||[]).map(c=>String(c||"")).join("|")).join("\n").toLowerCase();
  // Schwab: "open date" header + "cost/share" column + dollar-sign values
  const hasSchwabHeaders=/open.?date/.test(flat)&&/cost.?share/.test(flat);
  const hasDollarVals=rows.some(r=>(r||[]).some(c=>/^\$[\d,]+/.test(String(c||""))));
  if(hasSchwabHeaders&&hasDollarVals)return"schwab";
  // eTrade: "account summary" + "net account value" in header block
  const hasAccountSummary=/account summary/.test(flat);
  const hasNetAccountValue=/net account value/.test(flat);
  if(hasAccountSummary&&hasNetAccountValue)return"etrade";
  // Health Equity: "health equity" + "fund name"
  const hasHE=/health.?equity/.test(flat);
  const hasFundName=/fund.?name/.test(flat);
  if(hasHE&&hasFundName)return"healthequity";
  return"unknown";
}

function parseSchwabLots(rows,symbol){
  const headerIdx=rows.findIndex(r=>(r||[]).some(c=>/open\s*date/i.test(String(c))));
  if(headerIdx<0)throw new Error("Schwab: header row not found");
  const hdr=rows[headerIdx];
  const col=n=>hdr.findIndex(c=>new RegExp(n,"i").test(String(c)));
  const iDate=col("open date"),iQty=col("quantity"),iCost=col("cost.?share"),iMkt=col("market value"),iCostBasis=col("cost basis");
  let sym=symbol;
  if(!sym){const title=(rows[0]||[]).join(" ");const m=title.match(/([A-Z]{1,5})\s+Lot/i);if(m)sym=m[1].toUpperCase();}
  if(!sym)sym="UNKNOWN";
  const lots=[];const impliedPrices=[];
  for(let i=headerIdx+1;i<rows.length;i++){
    const r=rows[i]||[];
    const dateVal=String(r[iDate]||"").trim();
    if(!dateVal||/total/i.test(dateVal)||!/\d{2}\/\d{2}\/\d{4}/.test(dateVal))continue;
    const qty=parseFloat(String(r[iQty]||"").replace(/[^0-9.-]/g,""));
    const costShare=parseFloat(String(r[iCost]||"").replace(/[^0-9.-]/g,""));
    const mktVal=parseFloat(String(r[iMkt]||"").replace(/[^0-9.-]/g,""));
    const cbRaw=iCostBasis>=0?parseFloat(String(r[iCostBasis]||"").replace(/[^0-9.-]/g,"")):NaN;
    const cb=isNaN(cbRaw)?Math.round(qty*costShare*100)/100:cbRaw;
    if(isNaN(qty)||isNaN(costShare)||qty<=0||costShare<=0)continue;
    const[mm,dd,yyyy]=dateVal.split("/");
    const lot_date=`${yyyy}-${mm.padStart(2,"0")}-${dd.padStart(2,"0")}`;
    lots.push({symbol:sym,lot_date,shares:Math.round(qty*1e6)/1e6,price_exec:Math.round(costShare*1e6)/1e6,cost_basis:Math.round(cb*100)/100,implied_price:0});
    if(mktVal>0&&qty>0)impliedPrices.push(mktVal/qty);
  }
  const impliedPrice=impliedPrices.length?impliedPrices.reduce((a,b)=>a+b,0)/impliedPrices.length:0;
  lots.forEach(l=>l.implied_price=impliedPrice);
  return lots;
}

function parseEtradeLots(rows){
  const lots=[];let currentSym=null;let impliedPrice=0;
  for(let i=0;i<rows.length;i++){
    const r=rows[i]||[];
    const first=String(r[0]||"").trim();
    if(/^[A-Z]{1,5}$/.test(first)&&r.length>5){
      currentSym=first;
      const lp=parseFloat(String(r[1]||"").replace(/[^0-9.-]/g,""));
      if(lp>0)impliedPrice=lp;
      continue;
    }
    if(currentSym){
      const raw=String(r[0]||"");
      const dateM=raw.match(/(\d{2}\/\d{2}\/\d{4})/);
      if(dateM){
        const[mm,dd,yyyy]=dateM[1].split("/");
        const lot_date=`${yyyy}-${mm.padStart(2,"0")}-${dd.padStart(2,"0")}`;
        const qty=parseFloat(String(r[4]||"").replace(/[^0-9.-]/g,""));
        const pricePaid=parseFloat(String(r[5]||"").replace(/[^0-9.-]/g,""));
        if(isNaN(qty)||isNaN(pricePaid)||qty<=0||pricePaid<=0)continue;
        lots.push({symbol:currentSym,lot_date,shares:Math.round(qty*1e6)/1e6,price_exec:Math.round(pricePaid*1e6)/1e6,cost_basis:Math.round(qty*pricePaid*100)/100,implied_price:impliedPrice});
      }
    }
  }
  return lots;
}

function parseHealthEquityLots(rows){
  const headerIdx=rows.findIndex(r=>(r||[]).some(c=>/fund\s*name/i.test(String(c))));
  if(headerIdx<0)throw new Error("HealthEquity: header row not found");
  const hdr=rows[headerIdx];
  const col=n=>hdr.findIndex(c=>new RegExp(n,"i").test(String(c)));
  const iFund=col("fund"),iSym=col("symbol|ticker"),iShares=col("shares|units|qty"),iPrice=col("price|nav"),iDate=col("date|purchased");
  const today=new Date().toISOString().slice(0,10);
  const lots=[];
  for(let i=headerIdx+1;i<rows.length;i++){
    const r=rows[i]||[];
    if(r.every(c=>!String(c||"").trim()))continue;
    const sym=iSym>=0&&String(r[iSym]||"").trim()?String(r[iSym]).trim().toUpperCase():String(r[iFund]||"").trim().substring(0,8).toUpperCase();
    if(!sym)continue;
    const qty=parseFloat(String(r[iShares]||"").replace(/[^0-9.-]/g,""));
    const price=parseFloat(String(r[iPrice]||"").replace(/[^0-9.-]/g,""));
    if(isNaN(qty)||isNaN(price)||qty<=0||price<=0)continue;
    const lotRaw=iDate>=0&&r[iDate]?String(r[iDate]).trim():"";
    let lot_date=today;
    const dm=lotRaw.match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
    if(dm){const yy=dm[3].length===2?"20"+dm[3]:dm[3];lot_date=`${yy}-${dm[1].padStart(2,"0")}-${dm[2].padStart(2,"0")}`;}
    else if(/\d{4}-\d{2}-\d{2}/.test(lotRaw))lot_date=lotRaw.slice(0,10);
    lots.push({symbol:sym,lot_date,shares:Math.round(qty*1e6)/1e6,price_exec:Math.round(price*1e6)/1e6,cost_basis:Math.round(qty*price*100)/100,implied_price:price});
  }
  return lots;
}

async function parsePortfolioFile(file){
  const ext=file.name.split(".").pop().toLowerCase();
  let rows=[];
  if(ext==="csv"){
    const text=await file.text();
    rows=text.split("\n").map(line=>{
      const out=[];let cur="";let inQ=false;
      for(const ch of line){if(ch==='"'){inQ=!inQ}else if(ch===","&&!inQ){out.push(cur.trim());cur=""}else cur+=ch}
      out.push(cur.trim());return out;
    });
  }else if(ext==="xlsx"||ext==="xls"){
    await loadSheetJS();
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:"array"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
  }else throw new Error("Unsupported file type: ."+ext);
  const fmt=detectPortfolioFormat(rows);
  if(fmt==="schwab")return parseSchwabLots(rows,null);
  if(fmt==="etrade")return parseEtradeLots(rows);
  if(fmt==="healthequity")return parseHealthEquityLots(rows);
  throw new Error("Unrecognized file format. Supported: Schwab, eTrade, Health Equity.");
}

async function refreshPortfolioPrices(symbolList,impliedPrices={}){
  for(const sym of symbolList){
    try{
      let price=null,source="csv";
      try{
        const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),5000);
        const resp=await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`,{signal:ctrl.signal});
        clearTimeout(tid);
        if(resp.ok){const j=await resp.json();const p=j?.chart?.result?.[0]?.meta?.regularMarketPrice;if(p>0){price=p;source="live";}}
      }catch(_){}
      if(!price&&impliedPrices[sym]>0){price=impliedPrices[sym];source="csv";}
      if(!price)continue;
      const today=new Date().toISOString().slice(0,10);
      await sb(`investment_symbols?symbol=eq.${encodeURIComponent(sym)}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({latest_price:price,price_as_of:today,price_source:source})});
    }catch(err){console.warn("refreshPortfolioPrices error for",sym,err)}
  }
}

async function renderTags(el){
  el.innerHTML=`<div style="margin-bottom:16px"><h2>Tags</h2><p class="sub">Loading...</p></div><div id="tagsBody"></div>`;
  try{
    const tagRows=await sb("tags?order=start_date.desc");
    // Paginate to get ALL tagged transactions (Supabase caps at 1000 per request)
    let allTxns=[];
    let offset=0;
    const batchSize=1000;
    while(true){
      const batch=await sb(`transactions?select=tag,amount_usd,daily_cost,service_start,service_end,category_id&tag=not.is.null&tag=neq.&order=id&limit=${batchSize}&offset=${offset}`);
      allTxns=allTxns.concat(batch);
      if(batch.length<batchSize)break;
      offset+=batchSize;
    }
    const txns=allTxns;
    // Build tag date lookup for accrual overlap
    const tagDates={};
    for(const t of tagRows)tagDates[t.name]={start:t.start_date,end:t.end_date};
    const tm={};
    for(const t of txns){
      if(!t.tag)continue;
      if(!tm[t.tag])tm[t.tag]={total:0,count:0,cats:{}};
      tm[t.tag].count++;
      if(t.category_id==="income"||t.category_id==="investment"||t.category_id==="adjustment")continue;
      // Accrual: compute overlap of txn service period with tag date window
      const tg=tagDates[t.tag];
      if(tg&&tg.start&&tg.end&&t.daily_cost!=null&&t.service_start&&t.service_end){
        const oStart=t.service_start>tg.start?t.service_start:tg.start;
        const oEnd=t.service_end<tg.end?t.service_end:tg.end;
        if(oStart<=oEnd){
          const oDays=Math.floor((new Date(oEnd)-new Date(oStart))/864e5)+1;
          const amt=t.daily_cost*oDays;
          tm[t.tag].total+=amt;
          tm[t.tag].cats[t.category_id]=(tm[t.tag].cats[t.category_id]||0)+amt;
        }
      }else if(t.amount_usd>0){
        // Fallback: no tag dates or no service period
        tm[t.tag].total+=t.amount_usd;
        tm[t.tag].cats[t.category_id]=(tm[t.tag].cats[t.category_id]||0)+t.amount_usd;
      }
    }

    const tags=tagRows.map(t=>({...t,...(tm[t.name]||{total:0,count:0,cats:{}})})).sort((a,b)=>b.total-a.total);
    el.querySelector(".sub").textContent=`Click any tag for breakdown · ${tags.length} tags`;
    const body=document.getElementById("tagsBody");body.innerHTML="";
    const grid=h("div",{class:"tag-grid"});

    tags.forEach((tag,i)=>{
      const card=h("div",{class:"tag-card",style:{borderLeftColor:TCOLS[i%TCOLS.length],cursor:tag.total>0?"pointer":"default"},onClick:()=>tag.total>0&&showTagDetail(tag)});
      let inner=`<div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:14px;font-weight:600;color:#fff">${tag.name}</div>`;
      if(tag.start_date)inner+=`<div class="tag-date-edit" data-tag="${tag.name}" style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px;cursor:pointer" title="Click to edit dates">${fmtD(tag.start_date)} – ${fmtD(tag.end_date)}</div>`;
      inner+=`</div><span style="font-size:10px;color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.04);padding:2px 6px;border-radius:4px">${tag.count||0} txns</span></div>`;
      if(tag.total>0){
        const days=tag.start_date&&tag.end_date?Math.max(1,Math.floor((new Date(tag.end_date)-new Date(tag.start_date))/864e5)+1):0;
        inner+=`<div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:8px"><div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--r)">${fmtF(tag.total)}</div>`;
        if(days>0)inner+=`<div style="font-size:11px;color:rgba(255,255,255,0.25);font-family:var(--mono)">${fmtF(tag.total/days)}/day</div>`;
        inner+=`</div>`;
        if(Object.keys(tag.cats).length>0){
          const posCats=Object.entries(tag.cats).filter(([,v])=>v>0);
          if(posCats.length>0){const barTotal=posCats.reduce((s,[,v])=>s+v,0);
          inner+=`<div style="display:flex;gap:2px;margin-top:6px;height:4px;border-radius:2px;overflow:hidden">`;
          posCats.sort((a,b)=>b[1]-a[1]).forEach(([c,v])=>inner+=`<div style="width:${(v/barTotal)*100}%;background:${CC[c]||"#666"};min-width:2px"></div>`);
          inner+=`</div>`;}
        }
      }
      card.innerHTML=inner;
      grid.append(card);
    });
    body.append(grid);
    // Tag date editing — click date range to edit start/end
    grid.querySelectorAll(".tag-date-edit").forEach(dateEl=>{
      dateEl.addEventListener("click",e=>{
        e.stopPropagation();
        const tName=dateEl.dataset.tag;
        const tag=tags.find(t=>t.name===tName);if(!tag)return;
        const origHTML=dateEl.innerHTML;
        dateEl.innerHTML=`<input type="date" class="td-start" value="${tag.start_date}" style="font-size:11px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:4px;color:#fff;padding:1px 4px;width:120px"> – <input type="date" class="td-end" value="${tag.end_date}" style="font-size:11px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:4px;color:#fff;padding:1px 4px;width:120px">`;
        dateEl.style.cursor="default";
        const startIn=dateEl.querySelector(".td-start"),endIn=dateEl.querySelector(".td-end");
        let saving=false;
        const save=async()=>{
          if(saving)return;
          const ns=startIn.value,ne=endIn.value;
          if(!ns||!ne||ns>ne){dateEl.innerHTML=origHTML;dateEl.style.cursor="pointer";return}
          if(ns===tag.start_date&&ne===tag.end_date){dateEl.innerHTML=origHTML;dateEl.style.cursor="pointer";return}
          saving=true;
          try{
            await sb(`tags?name=eq.${encodeURIComponent(tName)}`,{method:"PATCH",headers:{Prefer:"return=minimal"},body:JSON.stringify({start_date:ns,end_date:ne})});
            renderTags(el);
          }catch(err){saving=false;dateEl.innerHTML=origHTML;dateEl.style.cursor="pointer";alert("Failed to save: "+err.message)}
        };
        const cancel=()=>{if(!saving){dateEl.innerHTML=origHTML;dateEl.style.cursor="pointer"}};
        // Save on blur only when focus leaves both inputs
        const blurSave=()=>{setTimeout(()=>{if(!dateEl.contains(document.activeElement))save()},150)};
        startIn.addEventListener("blur",blurSave);
        endIn.addEventListener("blur",blurSave);
        startIn.addEventListener("keydown",e=>{if(e.key==="Escape")cancel();if(e.key==="Enter"){e.preventDefault();endIn.focus()}});
        endIn.addEventListener("keydown",e=>{if(e.key==="Escape")cancel();if(e.key==="Enter"){e.preventDefault();save()}});
        startIn.focus();
      });
    });
    // Auto-open tag detail if navigated from Ledger tab
    if(state.tagDetail){
      const t=tags.find(tg=>tg.name===state.tagDetail);
      state.tagDetail=null;
      if(t)showTagDetail(t);
    }
  }catch(e){document.getElementById("tagsBody").innerHTML=`<div class="cd" style="color:var(--r)">Error: ${e.message}</div>`}
}

async function showTagDetail(tag){
  const existing=document.querySelector(".modal-bg");if(existing)existing.remove();
  const txns=await sb(`transactions?tag=eq.${encodeURIComponent(tag.name)}&category_id=neq.income&category_id=neq.investment&category_id=neq.adjustment&order=date.desc`);
  const cats={};let total=0;
  const txnAccruals=[];
  for(const t of txns){
    let accrual=0,oDays=0;
    if(t.daily_cost!=null&&tag.start_date&&tag.end_date&&t.service_start&&t.service_end){
      const oStart=t.service_start>tag.start_date?t.service_start:tag.start_date;
      const oEnd=t.service_end<tag.end_date?t.service_end:tag.end_date;
      if(oStart<=oEnd){
        oDays=Math.floor((new Date(oEnd)-new Date(oStart))/864e5)+1;
        accrual=t.daily_cost*oDays;
        cats[t.category_id]=(cats[t.category_id]||0)+accrual;total+=accrual;
      }
    }else if(t.amount_usd>0){accrual=t.amount_usd;cats[t.category_id]=(cats[t.category_id]||0)+t.amount_usd;total+=t.amount_usd}
    const noOverlap=accrual===0&&tag.start_date&&tag.end_date&&t.service_start&&t.service_end&&(t.service_end<tag.start_date||t.service_start>tag.end_date);
    if(Math.abs(accrual)>=0.01||noOverlap)txnAccruals.push({...t,_accrual:accrual,_oDays:oDays,_noOverlap:noOverlap});
  }
  // Group by transaction_group_id, sort groups by |net accrual|
  const tagGrps=new Map();
  for(const t of txnAccruals){
    const gid=t.transaction_group_id||("_s"+t.id);
    if(!tagGrps.has(gid))tagGrps.set(gid,{items:[],net:0});
    const g=tagGrps.get(gid);g.items.push(t);g.net+=t._accrual;
  }
  const sortedGrps=[...tagGrps.values()].sort((a,b)=>Math.abs(b.net)-Math.abs(a.net));
  txnAccruals.length=0;
  for(const g of sortedGrps){g.items.sort((a,b)=>Math.abs(b._accrual)-Math.abs(a._accrual));txnAccruals.push(...g.items)}
  // Build group summaries for linked transactions
  const tagGroupMembers={};
  txnAccruals.forEach(t=>{if(t.transaction_group_id){const gid=t.transaction_group_id;if(!tagGroupMembers[gid])tagGroupMembers[gid]=[];tagGroupMembers[gid].push(t)}});
  const tagGroupSummaries={};
  for(const[gid,members]of Object.entries(tagGroupMembers)){
    if(members.length<2)continue;
    const netAmt=members.reduce((s,m)=>s+m.amount_usd,0);
    const netAccrual=members.reduce((s,m)=>s+m._accrual,0);
    const dates=members.map(m=>m.date).sort();
    const catF={};members.forEach(m=>{catF[m.category_id]=(catF[m.category_id]||0)+1});
    const catS=Object.entries(catF).sort((a,b)=>b[1]-a[1]);
    const hasNoOverlap=members.some(m=>m._noOverlap);
    const hasPartial=members.some(m=>!m._noOverlap&&tag.start_date&&tag.end_date&&m.service_start&&m.service_end&&(m.service_start<tag.start_date||m.service_end>tag.end_date));
    tagGroupSummaries[gid]={netAmt,netAccrual,dateMax:dates[dates.length-1],
      dominantCat:catS[0][0],mixedCat:catS.length>1,
      label:generateGroupLabel(members),memberCount:members.length,
      hasNoOverlap,hasPartial};
  }
  const days=tag.start_date&&tag.end_date?Math.max(1,Math.floor((new Date(tag.end_date)-new Date(tag.start_date))/864e5)+1):0;
  const mx=Math.max(...Object.values(cats).map(v=>Math.abs(v)),1);

  const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg)bg.remove()}});
  let mhtml=`<div style="display:flex;justify-content:space-between;margin-bottom:20px"><div><h2 style="font-size:22px">${tag.name}</h2>`;
  if(tag.start_date)mhtml+=`<p class="tag-modal-dates" style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:4px;cursor:pointer" title="Click to edit dates"><span class="tmd-text">${fmtD(tag.start_date)} – ${fmtD(tag.end_date)}</span></p>`;
  mhtml+=`</div><button onclick="this.closest('.modal-bg').remove()" style="background:rgba(255,255,255,0.06);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:16px">✕</button></div>`;
  mhtml+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px">`;
  [["Total",fmtF(total),"var(--r)"],["Days",days,"var(--b)"],["Per Day",days>0?fmtF(total/days):"—","var(--g)"]].forEach(([l,v,c])=>mhtml+=`<div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:12px 14px;text-align:center"><div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase">${l}</div><div style="font-size:20px;font-weight:700;color:${c};font-family:var(--mono)">${v}</div></div>`);
  mhtml+=`</div>`;

  Object.entries(cats).filter(([,v])=>Math.abs(v)>0.5).sort((a,b)=>Math.abs(b[1])-Math.abs(a[1])).forEach(([cat,val])=>{
    const isNeg=val<0;
    mhtml+=`<div style="display:grid;grid-template-columns:90px 1fr 65px 40px;align-items:center;gap:8px;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,0.6)"><span style="width:7px;height:7px;border-radius:2px;background:${CC[cat]||"#666"};flex-shrink:0"></span>${cat}</div>
      <div style="height:14px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden"><div style="height:100%;width:${(Math.abs(val)/mx)*100}%;background:${isNeg?"var(--g)":(CC[cat]||"#666")};border-radius:4px;opacity:0.7"></div></div>
      <div style="font-family:var(--mono);font-size:11px;color:${isNeg?"var(--g)":"rgba(255,255,255,0.5)"};text-align:right">${isNeg?"("+fmtF(Math.abs(val))+")":fmtF(val)}</div>
      <div style="font-family:var(--mono);font-size:10px;color:rgba(255,255,255,0.3);text-align:right">${total>0?((Math.abs(val)/total)*100).toFixed(0)+"%":""}</div></div>`;
  });

  // Transaction list
  if(txnAccruals.length){
    mhtml+=`<div style="margin-top:20px;border-top:1px solid rgba(255,255,255,0.06);padding-top:14px"><div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">${txnAccruals.length} Transactions</div>`;
    mhtml+=`<div style="overflow-x:auto"><table style="width:100%;font-size:11px"><thead><tr style="color:rgba(255,255,255,0.3);font-size:10px;text-transform:uppercase"><th style="text-align:left;padding:4px 6px">Date</th><th style="text-align:left;padding:4px 6px">Description</th><th style="text-align:left;padding:4px 6px" class="hide-m">Category</th><th style="text-align:right;padding:4px 6px">Amount</th><th style="text-align:right;padding:4px 6px" class="hide-m">Accrual</th><th style="text-align:right;padding:4px 6px" class="hide-m">Days</th></tr></thead><tbody>`;
    const renderedTagGroups=new Set();
    txnAccruals.forEach(t=>{
      const gid=t.transaction_group_id;
      const gMembers=gid?tagGroupMembers[gid]:null;
      const gSummary=gid?tagGroupSummaries[gid]:null;
      // Linked group with 2+ members: render summary + hidden children
      if(gid&&gMembers&&gMembers.length>=2&&gSummary&&!renderedTagGroups.has(gid)){
        renderedTagGroups.add(gid);
        const sNeg=gSummary.netAccrual<0;
        const owStyle=gSummary.hasNoOverlap?"outline:1px dashed rgba(255,70,70,0.5);outline-offset:-1px;background:rgba(255,70,70,0.06);":gSummary.hasPartial?"outline:1px dashed rgba(255,165,0,0.35);outline-offset:-1px;":"";
        mhtml+=`<tr class="tag-grp-row" data-tag-gid="${gid}" style="cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.03);border-left:3px solid var(--b);background:rgba(74,111,165,0.04);${owStyle}"><td style="padding:5px 6px;color:rgba(255,255,255,0.4);white-space:nowrap">${fmtD(gSummary.dateMax)}</td><td style="padding:5px 6px;color:rgba(255,255,255,0.9);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><span class="tag-grp-chev" data-tag-grp-chev="${gid}" style="display:inline-block;font-size:10px;margin-right:4px;transition:transform 0.15s">&#9654;</span><span style="font-size:10px;margin-right:4px;color:var(--b)">\uD83D\uDD17${gSummary.memberCount}</span>${gSummary.label}</td><td style="padding:5px 6px" class="hide-m"><span style="background:${(CC[gSummary.dominantCat]||"#666")}22;color:${CC[gSummary.dominantCat]||"#888"};padding:1px 5px;border-radius:3px;font-size:10px">${gSummary.dominantCat}${gSummary.mixedCat?`<span style="margin-left:3px;font-size:9px;color:rgba(255,255,255,0.3)">+</span>`:""}</span></td><td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:${sNeg?"var(--g)":"rgba(255,255,255,0.75)"};font-weight:600">${fmtF(Math.round(gSummary.netAmt*100)/100)}</td><td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:${sNeg?"var(--g)":"var(--r)"}" class="hide-m">${fmtF(Math.round(gSummary.netAccrual*100)/100)}</td><td style="padding:5px 6px" class="hide-m"></td></tr>`;
        // Child rows (hidden by default)
        gMembers.forEach(m=>{
          const mNeg=m._accrual<0;
          const partialOverlap=!m._noOverlap&&tag.start_date&&tag.end_date&&m.service_start&&m.service_end&&(m.service_start<tag.start_date||m.service_end>tag.end_date);
          const mOwStyle=m._noOverlap?"outline:1px dashed rgba(255,70,70,0.5);outline-offset:-1px;background:rgba(255,70,70,0.06);":partialOverlap?"outline:1px dashed rgba(255,165,0,0.35);outline-offset:-1px;":"";
          const mOwTip=m._noOverlap?` title="⚠ Service period ${fmtD(m.service_start)}\u2013${fmtD(m.service_end)} is completely outside tag window"`:partialOverlap?` title="Service period ${fmtD(m.service_start)}\u2013${fmtD(m.service_end)} extends outside tag window"`:""
          mhtml+=`<tr class="tag-txn-row tag-grp-child" data-tid="${m.id}" data-tag-grp-child="${gid}" style="display:none;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.03);border-left:3px solid rgba(74,111,165,0.3);${mOwStyle}"${mOwTip}><td style="padding:5px 6px;padding-left:12px;color:rgba(255,255,255,0.3);white-space:nowrap">${fmtD(m.date)}</td><td style="padding:5px 6px;color:rgba(255,255,255,0.5);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.description}</td><td style="padding:5px 6px" class="hide-m"><span style="background:${(CC[m.category_id]||"#666")}22;color:${CC[m.category_id]||"#888"};padding:1px 5px;border-radius:3px;font-size:10px">${m.category_id}</span></td><td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:rgba(255,255,255,0.4)">${m.currency&&m.currency!=="USD"&&m.original_amount!=null?`<span style="color:rgba(255,255,255,0.2);font-size:10px;margin-right:5px">${m.currency==="CAD"?"CA$":m.currency+" "}${new Intl.NumberFormat("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}).format(Math.abs(m.original_amount))}</span>`:""}${fmtF(m.amount_usd)}</td><td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:${mNeg?"var(--g)":"var(--r)"}" class="hide-m">${fmtF(m._accrual)}</td><td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:rgba(255,255,255,0.25)" class="hide-m">${m._oDays||""}</td></tr>`;
        });
        return;// skip individual members processed above
      }
      // Skip members already rendered as children
      if(gid&&gMembers&&gMembers.length>=2&&renderedTagGroups.has(gid))return;
      // Normal ungrouped row
      const isNeg=t._accrual<0;
      const partialOverlap=!t._noOverlap&&tag.start_date&&tag.end_date&&t.service_start&&t.service_end&&(t.service_start<tag.start_date||t.service_end>tag.end_date);
      const owStyle=t._noOverlap?"outline:1px dashed rgba(255,70,70,0.5);outline-offset:-1px;background:rgba(255,70,70,0.06);":partialOverlap?"outline:1px dashed rgba(255,165,0,0.35);outline-offset:-1px;":"";
      const owTip=t._noOverlap?` title="⚠ Service period ${fmtD(t.service_start)}\u2013${fmtD(t.service_end)} is completely outside tag window — possible date error"`:partialOverlap?` title="Service period ${fmtD(t.service_start)}\u2013${fmtD(t.service_end)} extends outside tag window"`:""
      mhtml+=`<tr class="tag-txn-row" data-tid="${t.id}" style="cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.03);${owStyle}"${owTip}><td style="padding:5px 6px;color:rgba(255,255,255,0.4);white-space:nowrap">${fmtD(t.date)}</td><td style="padding:5px 6px;color:rgba(255,255,255,0.7);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.description}</td><td style="padding:5px 6px" class="hide-m"><span style="background:${(CC[t.category_id]||"#666")}22;color:${CC[t.category_id]||"#888"};padding:1px 5px;border-radius:3px;font-size:10px">${t.category_id}</span></td><td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:rgba(255,255,255,0.5)">${t.currency&&t.currency!=="USD"&&t.original_amount!=null?`<span style="color:rgba(255,255,255,0.28);font-size:10px;margin-right:5px">${t.currency==="CAD"?"CA$":t.currency+" "}${new Intl.NumberFormat("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}).format(Math.abs(t.original_amount))}</span>`:""}${fmtF(t.amount_usd)}</td><td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:${isNeg?"var(--g)":"var(--r)"}" class="hide-m">${fmtF(t._accrual)}</td><td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:rgba(255,255,255,0.3)" class="hide-m">${t._oDays||""}</td></tr>`;
    });
    mhtml+=`</tbody></table></div></div>`;
  }

  const modal=h("div",{class:"modal",style:{maxWidth:"700px"}});
  modal.innerHTML=mhtml;
  // Expand/collapse for linked transaction groups
  const expandedTagGroups=new Set();
  modal.querySelectorAll(".tag-grp-row").forEach(row=>{
    row.addEventListener("click",()=>{
      const gid=row.dataset.tagGid;
      if(expandedTagGroups.has(gid)){expandedTagGroups.delete(gid)}else{expandedTagGroups.add(gid)}
      const exp=expandedTagGroups.has(gid);
      modal.querySelectorAll(`[data-tag-grp-child="${gid}"]`).forEach(r=>{r.style.display=exp?"table-row":"none"});
      const ch=modal.querySelector(`[data-tag-grp-chev="${gid}"]`);if(ch)ch.style.transform=exp?"rotate(90deg)":"";
    });
    row.addEventListener("mouseenter",()=>row.style.background="rgba(74,111,165,0.08)");
    row.addEventListener("mouseleave",()=>row.style.background="rgba(74,111,165,0.04)");
  });
  // Attach click handlers for transaction rows (individual + child rows)
  modal.querySelectorAll(".tag-txn-row").forEach(row=>{
    row.addEventListener("click",e=>{
      e.stopPropagation();
      const tid=parseInt(row.dataset.tid);
      const txn=txnAccruals.find(t=>t.id===tid);
      if(txn){bg.remove();openLedgerEditModal(txn,()=>showTagDetail(tag))}
    });
    const isChild=row.classList.contains("tag-grp-child");
    row.addEventListener("mouseenter",()=>row.style.background=isChild?"rgba(74,111,165,0.06)":"rgba(255,255,255,0.04)");
    row.addEventListener("mouseleave",()=>row.style.background=isChild?"transparent":"transparent");
  });
  // Modal date editing
  const mdEl=modal.querySelector(".tag-modal-dates");
  if(mdEl){
    mdEl.addEventListener("click",()=>{
      const txtEl=mdEl.querySelector(".tmd-text");if(!txtEl)return;
      const origText=txtEl.innerHTML;
      txtEl.innerHTML=`<input type="date" class="tmd-s" value="${tag.start_date}" style="font-size:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:4px;color:#fff;padding:2px 4px;width:125px"> – <input type="date" class="tmd-e" value="${tag.end_date}" style="font-size:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:4px;color:#fff;padding:2px 4px;width:125px">`;
      mdEl.style.cursor="default";
      const sI=txtEl.querySelector(".tmd-s"),eI=txtEl.querySelector(".tmd-e");
      let saving=false;
      const doSave=async()=>{
        if(saving)return;
        const ns=sI.value,ne=eI.value;
        if(!ns||!ne||ns>ne){txtEl.innerHTML=origText;mdEl.style.cursor="pointer";return}
        if(ns===tag.start_date&&ne===tag.end_date){txtEl.innerHTML=origText;mdEl.style.cursor="pointer";return}
        saving=true;
        try{
          await sb(`tags?name=eq.${encodeURIComponent(tag.name)}`,{method:"PATCH",headers:{Prefer:"return=minimal"},body:JSON.stringify({start_date:ns,end_date:ne})});
          bg.remove();
          tag.start_date=ns;tag.end_date=ne;
          showTagDetail(tag);
          const contentEl=document.getElementById("content");
          if(contentEl)renderTags(contentEl);
        }catch(err){saving=false;txtEl.innerHTML=origText;mdEl.style.cursor="pointer";alert("Failed to save: "+err.message)}
      };
      const doCancel=()=>{if(!saving){txtEl.innerHTML=origText;mdEl.style.cursor="pointer"}};
      const blurSave=()=>{setTimeout(()=>{if(!txtEl.contains(document.activeElement))doSave()},150)};
      sI.addEventListener("blur",blurSave);
      eI.addEventListener("blur",blurSave);
      sI.addEventListener("keydown",e=>{if(e.key==="Escape")doCancel();if(e.key==="Enter"){e.preventDefault();eI.focus()}});
      eI.addEventListener("keydown",e=>{if(e.key==="Escape")doCancel();if(e.key==="Enter"){e.preventDefault();doSave()}});
      sI.focus();
    });
  }
  bg.append(modal);
  document.body.append(bg);
}

async function showISDrilldown(categoryId,isParent,monthIndex,year){
  const existing=document.querySelector(".modal-bg");if(existing)existing.remove();
  const mStart=`${year}-${String(monthIndex+1).padStart(2,"0")}-01`;
  const mEnd=new Date(year,monthIndex+1,0).toISOString().slice(0,10);
  const mLabel=ML[monthIndex]+" "+year;
  let catFilter,catLabel;
  if(categoryId==="_expenses"){
    catFilter="&category_id=neq.income&category_id=neq.investment&category_id=neq.adjustment";
    catLabel="Total Expenses";
  }else if(categoryId==="income"){
    catFilter="&category_id=eq.income";
    catLabel="Income";
  }else if(isParent&&SUB_MAP[categoryId]){
    const cats=[categoryId,...SUB_MAP[categoryId]];
    catFilter=`&category_id=in.(${cats.join(",")})`;
    catLabel=categoryId[0].toUpperCase()+categoryId.slice(1);
  }else{
    catFilter=`&category_id=eq.${categoryId}`;
    catLabel=categoryId[0].toUpperCase()+categoryId.slice(1);
  }
  const txns=await sb(`transactions?select=*${catFilter}&service_start=lte.${mEnd}&service_end=gte.${mStart}&order=date.desc&limit=500`);
  const txnAccruals=[];let total=0;
  for(const t of txns){
    const oStart=t.service_start>mStart?t.service_start:mStart;
    const oEnd=t.service_end<mEnd?t.service_end:mEnd;
    if(oStart>oEnd)continue;
    const oDays=Math.floor((new Date(oEnd)-new Date(oStart))/864e5)+1;
    const accrual=(t.daily_cost||0)*oDays;
    if(Math.abs(accrual)<0.01)continue;
    total+=accrual;
    txnAccruals.push({...t,_accrual:accrual,_oDays:oDays});
  }
  // Sort by net group accrual: linked transactions netted, then sorted by |net|
  const grps=new Map();
  for(const t of txnAccruals){
    const gid=t.transaction_group_id||("_s"+t.id);
    if(!grps.has(gid))grps.set(gid,{items:[],net:0});
    const g=grps.get(gid);g.items.push(t);g.net+=t._accrual;
  }
  const sorted=[...grps.values()].sort((a,b)=>Math.abs(b.net)-Math.abs(a.net));
  txnAccruals.length=0;
  for(const g of sorted){g.items.sort((a,b)=>Math.abs(b._accrual)-Math.abs(a._accrual));txnAccruals.push(...g.items)}
  const daysInMonth=Math.floor((new Date(mEnd)-new Date(mStart))/864e5)+1;
  const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg)bg.remove()}});
  let mhtml=`<div style="display:flex;justify-content:space-between;margin-bottom:20px"><div><h2 style="font-size:22px">${catLabel}</h2><p style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:4px">${mLabel}</p></div><button onclick="this.closest('.modal-bg').remove()" style="background:rgba(255,255,255,0.06);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:16px">✕</button></div>`;
  mhtml+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px">`;
  [["Total Accrued",fmtF(total),"var(--r)"],["Transactions",txnAccruals.length,"var(--b)"],["Per Day",daysInMonth>0?fmtF(total/daysInMonth):"—","var(--g)"]].forEach(([l,v,c])=>mhtml+=`<div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:12px 14px;text-align:center"><div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase">${l}</div><div style="font-size:20px;font-weight:700;color:${c};font-family:var(--mono)">${v}</div></div>`);
  mhtml+=`</div>`;
  // Build group summaries for parent row rendering
  const isSummaries=new Map();
  for(const g of sorted){
    if(g.items.length<2)continue;
    const gid=g.items[0].transaction_group_id;if(!gid)continue;
    const netAmt=g.items.reduce((s,t)=>s+t.amount_usd,0);
    const catCounts={};g.items.forEach(t=>{catCounts[t.category_id]=(catCounts[t.category_id]||0)+1});
    const dominantCat=Object.entries(catCounts).sort((a,b)=>b[1]-a[1])[0][0];
    const mixedCat=Object.keys(catCounts).length>1;
    const dateMax=g.items.reduce((mx,t)=>t.date>mx?t.date:mx,"");
    isSummaries.set(gid,{netAmt,netAccrual:g.net,dominantCat,mixedCat,dateMax,memberCount:g.items.length,label:generateGroupLabel(g.items),items:g.items});
  }

  if(txnAccruals.length){
    const showCat=categoryId==="_expenses"||(isParent&&SUB_MAP[categoryId]);
    const renderedIS=new Set();
    mhtml+=`<div style="margin-top:4px"><div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">${txnAccruals.length} Transactions</div>`;
    mhtml+=`<div style="overflow-x:auto"><table style="width:100%;font-size:11px"><thead><tr style="color:rgba(255,255,255,0.3);font-size:10px;text-transform:uppercase"><th style="text-align:left;padding:4px 6px">Date</th><th style="text-align:left;padding:4px 6px">Description</th>${showCat?`<th style="text-align:left;padding:4px 6px" class="hide-m">Category</th>`:""}<th style="text-align:right;padding:4px 6px">Amount</th><th style="text-align:right;padding:4px 6px" class="hide-m">Accrual</th><th style="text-align:right;padding:4px 6px" class="hide-m">Days</th></tr></thead><tbody>`;
    txnAccruals.forEach(t=>{
      const gid=t.transaction_group_id;
      const gSummary=gid?isSummaries.get(gid):null;
      if(gSummary&&!renderedIS.has(gid)){
        renderedIS.add(gid);
        const sNeg=gSummary.netAccrual<0;
        mhtml+=`<tr class="is-grp-row" data-is-gid="${gid}" style="cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.03);border-left:3px solid var(--b);background:rgba(74,111,165,0.04)"><td style="padding:5px 6px;color:rgba(255,255,255,0.4);white-space:nowrap">${fmtD(gSummary.dateMax)}</td><td style="padding:5px 6px;color:rgba(255,255,255,0.9);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><span class="is-grp-chev" data-is-grp-chev="${gid}" style="display:inline-block;font-size:10px;margin-right:4px;transition:transform 0.15s">&#9654;</span><span style="font-size:10px;margin-right:4px;color:var(--b)">🔗${gSummary.memberCount}</span>${gSummary.label}</td>${showCat?`<td style="padding:5px 6px" class="hide-m"><span style="background:${(CC[gSummary.dominantCat]||"#666")}22;color:${CC[gSummary.dominantCat]||"#888"};padding:1px 5px;border-radius:3px;font-size:10px">${gSummary.dominantCat}${gSummary.mixedCat?`<span style="margin-left:3px;font-size:9px;color:rgba(255,255,255,0.3)">+</span>`:""}</span></td>`:""}<td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:${sNeg?"var(--g)":"rgba(255,255,255,0.75)"};font-weight:600">${fmtF(Math.round(gSummary.netAmt*100)/100)}</td><td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:${sNeg?"var(--g)":"var(--r)"}" class="hide-m">${fmtF(Math.round(gSummary.netAccrual*100)/100)}</td><td style="padding:5px 6px" class="hide-m"></td></tr>`;
        gSummary.items.forEach(m=>{
          const mNeg=m._accrual<0;
          mhtml+=`<tr class="is-drill-row is-grp-child" data-tid="${m.id}" data-is-grp-child="${gid}" style="display:none;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.03);border-left:3px solid rgba(74,111,165,0.3)"><td style="padding:5px 6px;padding-left:12px;color:rgba(255,255,255,0.3);white-space:nowrap">${fmtD(m.date)}</td><td style="padding:5px 6px;color:rgba(255,255,255,0.5);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.description}</td>${showCat?`<td style="padding:5px 6px" class="hide-m"><span style="background:${(CC[m.category_id]||"#666")}22;color:${CC[m.category_id]||"#888"};padding:1px 5px;border-radius:3px;font-size:10px">${m.category_id}</span></td>`:""}<td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:rgba(255,255,255,0.4)">${fmtF(m.amount_usd)}</td><td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:${mNeg?"var(--g)":"var(--r)"}" class="hide-m">${fmtF(m._accrual)}</td><td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:rgba(255,255,255,0.25)" class="hide-m">${m._oDays||""}</td></tr>`;
        });
        return;
      }
      if(gSummary&&renderedIS.has(gid))return;
      const isNeg=t._accrual<0;
      mhtml+=`<tr class="is-drill-row" data-tid="${t.id}" style="cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.03)"><td style="padding:5px 6px;color:rgba(255,255,255,0.4);white-space:nowrap">${fmtD(t.date)}</td><td style="padding:5px 6px;color:rgba(255,255,255,0.7);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.description}</td>${showCat?`<td style="padding:5px 6px" class="hide-m"><span style="background:${(CC[t.category_id]||"#666")}22;color:${CC[t.category_id]||"#888"};padding:1px 5px;border-radius:3px;font-size:10px">${t.category_id}</span></td>`:""}<td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:rgba(255,255,255,0.5)">${fmtF(t.amount_usd)}</td><td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:${isNeg?"var(--g)":"var(--r)"}" class="hide-m">${fmtF(t._accrual)}</td><td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:rgba(255,255,255,0.3)" class="hide-m">${t._oDays||""}</td></tr>`;
    });
    mhtml+=`</tbody></table></div></div>`;
  }else{
    mhtml+=`<div style="text-align:center;padding:30px;color:rgba(255,255,255,0.3)">No transactions found</div>`;
  }
  const modal=h("div",{class:"modal",style:{maxWidth:"700px"}});
  modal.innerHTML=mhtml;
  // Expand/collapse for linked groups
  const expandedISGroups=new Set();
  modal.querySelectorAll(".is-grp-row").forEach(row=>{
    row.addEventListener("click",()=>{
      const gid=row.dataset.isGid;
      if(expandedISGroups.has(gid)){expandedISGroups.delete(gid)}else{expandedISGroups.add(gid)}
      const exp=expandedISGroups.has(gid);
      modal.querySelectorAll(`[data-is-grp-child="${gid}"]`).forEach(r=>{r.style.display=exp?"table-row":"none"});
      const ch=modal.querySelector(`[data-is-grp-chev="${gid}"]`);if(ch)ch.style.transform=exp?"rotate(90deg)":"";
    });
    row.addEventListener("mouseenter",()=>row.style.background="rgba(74,111,165,0.08)");
    row.addEventListener("mouseleave",()=>row.style.background="rgba(74,111,165,0.04)");
  });
  modal.querySelectorAll(".is-drill-row").forEach(row=>{
    row.addEventListener("click",e=>{
      e.stopPropagation();
      const tid=parseInt(row.dataset.tid);
      const txn=txnAccruals.find(t=>t.id===tid);
      if(txn){bg.remove();openLedgerEditModal(txn,()=>showISDrilldown(categoryId,isParent,monthIndex,year))}
    });
    const isChild=row.classList.contains("is-grp-child");
    row.addEventListener("mouseenter",()=>row.style.background=isChild?"rgba(74,111,165,0.06)":"rgba(255,255,255,0.04)");
    row.addEventListener("mouseleave",()=>row.style.background="transparent");
  });

}

function showSnapshotForm(accounts, lastDate, onSave, liveBals){
  const existing=document.querySelector(".modal-bg");if(existing)existing.remove();
  const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg)bg.remove()}});
  const modal=h("div",{class:"modal",style:{maxWidth:"640px"}});

  // Build lookup: account label → live ledger balance
  const balByLabel={};
  if(liveBals)for(const lb of liveBals){const b=parseFloat(lb.net_balance)||0;if(Math.abs(b)>=0.01)balByLabel[lb.payment_type]=b}

  const groups={checking:[],savings:[],credit:[],investment:[],liability:[]};
  accounts.forEach(a=>(groups[a.account_type]||[]).push(a));
  const typeLabels={checking:"Checking",savings:"Savings",credit:"Credit Cards",investment:"Investments",liability:"Liabilities"};

  let mhtml=`<div style="display:flex;justify-content:space-between;margin-bottom:20px"><div><h2 style="font-size:20px">New Balance Snapshot</h2><p style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:4px">Pre-filled from live ledger balances · edit any values before saving</p></div><button onclick="this.closest('.modal-bg').remove()" style="background:rgba(255,255,255,0.06);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:16px">\u2715</button></div>`;
  mhtml+=`<div style="margin-bottom:16px"><label class="lbl">Snapshot Date</label><input type="date" id="snapDate" class="inp" value="${today()}" style="max-width:200px"></div>`;

  for(const[type,accts]of Object.entries(groups)){
    if(!accts.length)continue;
    mhtml+=`<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">${typeLabels[type]||type}</div>`;
    accts.forEach(a=>{
      const live=balByLabel[a.label];
      const val=live!==undefined?live.toFixed(2):"";
      mhtml+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="font-size:12px;color:rgba(255,255,255,0.6);min-width:160px">${a.label}</span><input type="number" step="0.01" class="inp snap-bal" data-id="${a.id}" value="${val}" placeholder="0.00" style="max-width:160px;font-family:var(--mono)"></div>`;
    });
    mhtml+=`</div>`;
  }
  mhtml+=`<button id="saveSnapBtn" class="btn" style="background:rgba(129,178,154,0.2);color:var(--g);margin-top:12px">Save Snapshot</button>`;

  modal.innerHTML=mhtml;
  bg.append(modal);
  document.body.append(bg);

  document.getElementById("saveSnapBtn").addEventListener("click",async()=>{
    const btn=document.getElementById("saveSnapBtn");
    btn.textContent="Saving...";btn.disabled=true;
    const date=document.getElementById("snapDate").value;
    const rows=[];
    document.querySelectorAll(".snap-bal").forEach(inp=>{
      const val=parseFloat(inp.value);
      if(!isNaN(val)&&val!==0)rows.push({account_id:inp.dataset.id,snapshot_date:date,balance:val,balance_usd:val});
    });
    if(!rows.length){alert("Enter at least one balance.");btn.textContent="Save Snapshot";btn.disabled=false;return}
    try{
      const resp=await fetch(`${SB_URL}/rest/v1/balance_snapshots`,{method:"POST",headers:authHeaders({Prefer:"resolution=merge-duplicates,return=representation"}),body:JSON.stringify(rows)});
      if(!resp.ok)throw new Error(await resp.text());
      bg.remove();
      if(onSave)onSave();
    }catch(e){alert("Error saving: "+e.message);btn.textContent="Save Snapshot";btn.disabled=false}
  });
}

function openGroupEditModal(gid,members,summary,override,onSaved){
  const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg)bg.remove()}});

  const gPt=h("select",{class:"inp"});
  gPt.append(h("option",{value:""},"Auto (dominant)"));
  PTS.forEach(p=>{const o=h("option",{value:p},p);if(p===(override?.payment_type||""))o.selected=true;gPt.append(o)});

  kpiRow.append(h("div",{style:{textAlign:"center"}},[h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.3)"}},"Net Amount"),h("div",{style:{fontSize:"16px",fontWeight:"700",color:summary.net<0?"var(--g)":"#fff",fontFamily:"var(--mono)"}},fmtF(Math.round(summary.net*100)/100))]));
  kpiRow.append(h("div",{style:{textAlign:"center"}},[h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.3)"}},"Daily Cost"),h("div",{style:{fontSize:"16px",fontWeight:"700",color:"var(--g)",fontFamily:"var(--mono)"}},fmtF(Math.round(summary.netDailyCost*1e6)/1e6)+"/d")]));
  kpiRow.append(h("div",{style:{textAlign:"center"}},[h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.3)"}},"Service Period"),h("div",{style:{fontSize:"13px",fontWeight:"600",color:"rgba(255,255,255,0.6)"}},fmtD(summary.serviceStart)+"\u2013"+fmtD(summary.serviceEnd))]));
  modal.append(kpiRow);

  modal.append(h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:"8px"}},"Transactions"));

    const tr=h("tr",{style:{cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.04)"},onClick:()=>{bg.remove();openLedgerEditModal(m,onSaved)}});
    tr.append(h("td",{class:"m",style:{color:"rgba(255,255,255,0.5)",whiteSpace:"nowrap",padding:"6px 4px"}},fmtD(m.date)));
    tr.append(h("td",{style:{color:"rgba(255,255,255,0.75)",maxWidth:"180px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"6px 4px"}},m.description||""));
    const catTd=h("td",{style:{padding:"6px 4px"}});catTd.append(h("span",{class:"badge",style:{background:(CC[m.category_id]||"#666")+"22",color:CC[m.category_id]||"#888"}},m.category_id));tr.append(catTd);
    tr.append(h("td",{class:"r m",style:{color:m.amount_usd<0?"var(--g)":"rgba(255,255,255,0.7)",padding:"6px 4px"}},fmtF(m.amount_usd)));
    tr.append(h("td",{class:"hide-m",style:{color:"rgba(255,255,255,0.35)",fontSize:"11px",padding:"6px 4px"}},m.payment_type||""));

  const btnRow=h("div",{style:{display:"flex",gap:"10px",justifyContent:"flex-end"}});
  const resetBtn=h("button",{class:"pg-btn",style:{background:"rgba(224,122,95,0.15)",color:"#E07A5F"},onClick:async()=>{
    if(!override&&!gLabel.value&&!gCat.value&&!gPt.value&&!gTag.value){bg.remove();return}
    await sb(`group_overrides?group_id=eq.${gid}`,{method:"DELETE",headers:{"Prefer":"return=minimal"}});
    sessionStorage.removeItem(`grp_label_${gid}`);
    sessionStorage.removeItem("grp_label_examples");
    bg.remove();if(onSaved)onSaved();
  }},"Reset to Auto");
  const saveBtn=h("button",{class:"pg-btn",style:{background:"var(--b)",color:"#fff"},onClick:async()=>{
    const body={group_id:parseInt(gid),updated_at:new Date().toISOString()};
    if(gLabel.value.trim())body.label=gLabel.value.trim();else body.label=null;
    if(gCat.value)body.category_id=gCat.value;else body.category_id=null;
    if(gPt.value)body.payment_type=gPt.value;else body.payment_type=null;
    if(gTag.value.trim())body.tag=gTag.value.trim();else body.tag=null;
    // Only save if at least one field is set
    const hasAny=body.label||body.category_id||body.payment_type||body.tag;
    if(!hasAny){
      await sb(`group_overrides?group_id=eq.${gid}`,{method:"DELETE",headers:{"Prefer":"return=minimal"}});
    }else{
      await sb("group_overrides",{method:"POST",headers:{"Prefer":"return=minimal,resolution=merge-duplicates"},body:JSON.stringify(body)});
    }
    // Update DOM immediately
    if(body.label){const el=document.querySelector(`[data-grp-label="${gid}"]`);if(el)el.textContent=body.label;sessionStorage.setItem(`grp_label_${gid}`,body.label)}
    sessionStorage.removeItem("grp_label_examples");
    bg.remove();if(onSaved)onSaved();
  }},"Save");
  btnRow.append(resetBtn,saveBtn);modal.append(btnRow);
  bg.append(modal);document.body.append(bg);
}

function openLedgerEditModal(txn,onSaved){
  let seManual=false;
  const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg)bg.remove()}});
  const modal=h("div",{class:"modal"});

  // Header
  const hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"20px"}});
  const hdrLeft=h("div");
  hdrLeft.append(h("h3",{style:{margin:"0"}},"Edit Transaction"));
  if(txn.bank_description)hdrLeft.append(h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.25)",marginTop:"4px"}},"Bank: "+txn.bank_description));
  const closeBtn=h("span",{style:{cursor:"pointer",fontSize:"18px",color:"rgba(255,255,255,0.3)",lineHeight:"1"},onClick:()=>bg.remove()},"\u2715");
  hdr.append(hdrLeft,closeBtn);
  modal.append(hdr);

  function mRow(...ch){const d=h("div",{style:{display:"grid",gridTemplateColumns:ch.length===3?"1fr 1fr 1fr":ch.length===2?"1fr 1fr":"1fr",gap:"12px",marginBottom:"14px"}});ch.forEach(x=>d.append(x));return d}
  function mField(lbl,inp){const d=h("div");d.append(h("label",{class:"lbl"},lbl));d.append(inp);return d}

  const mDate=h("input",{class:"inp",type:"date",value:txn.date,onInput:updatePreview});
  const mDesc=h("input",{class:"inp",type:"text",value:txn.description||""});
  const initCur=txn.currency||"USD";
  const initAmtVal=initCur!=="USD"&&txn.original_amount!=null?txn.original_amount:txn.amount_usd;
  const mAmt=h("input",{class:"inp",type:"number",step:"0.01",value:initAmtVal,onInput:updatePreview});
  const mCur=h("select",{class:"inp",style:{width:"80px"},onChange:()=>{
    const isUsd=mCur.value==="USD";
    mFxRow.style.display=isUsd?"none":"grid";
    if(!isUsd&&!mFx.value)mFx.value=DFX[mCur.value]||1;
    updatePreview();
  }});
  CURS.forEach(c=>{const o=h("option",{value:c},c);if(c===initCur)o.selected=true;mCur.append(o)});
  const mFx=h("input",{class:"inp",type:"number",step:"0.0001",value:txn.fx_rate&&initCur!=="USD"?txn.fx_rate:(DFX[initCur]||1),onInput:updatePreview});
  const mFxRow=h("div",{style:{display:initCur==="USD"?"none":"grid",gridTemplateColumns:"1fr",gap:"12px",marginBottom:"14px"}});
  mFxRow.append(mField("FX Rate (→ USD)",mFx));

  const mCat=h("select",{class:"inp",onChange:()=>{
    if(!seManual){mSs.value=getDefStart(mCat.value,txn.date)||mSs.value;mSe.value=getDefEnd(mCat.value,mSs.value)||mSs.value;updateHint()}
    updatePreview();
  }});
  CATS_LIST.forEach(cat=>{const o=h("option",{value:cat.id},cat.l);if(cat.id===txn.category_id)o.selected=true;mCat.append(o)});

  const mSs=h("input",{class:"inp",type:"date",value:txn.service_start,onInput:()=>{
    if(!seManual){mSe.value=getDefEnd(mCat.value,mSs.value)||mSs.value}
    updatePreview();
  }});
  const mSe=h("input",{class:"inp",type:"date",value:txn.service_end,onInput:()=>{
    seManual=true;mSe.style.borderColor="rgba(242,204,143,0.3)";updatePreview();
  }});
  const hintSpan=h("span",{style:{color:"rgba(129,178,154,0.6)",textTransform:"none",letterSpacing:"0",fontWeight:"400",fontSize:"10px"}});
  function updateHint(){const r=ACCRUAL_D[mCat.value];hintSpan.textContent=!seManual&&r?(r==="month"?"(Auto: full month)":`(Auto: ${r} days)`):""}
  updateHint();
  const seLbl=h("label",{class:"lbl"});seLbl.append("Service End ");seLbl.append(hintSpan);
  const seField=h("div");seField.append(seLbl);seField.append(mSe);

  const mCredit=buildCreditSelect(txn.credit||"");
  const mCreditRow=h("div",{style:{display:txn.payment_type==="Transfer"?"grid":"none",gridTemplateColumns:"1fr 2fr",gap:"6px",marginBottom:"14px"}});
  mCreditRow.append(mField("Credit Sub-Account",mCredit));
  const mPt=h("select",{class:"inp",onChange:()=>{mCreditRow.style.display=mPt.value==="Transfer"?"grid":"none"}});
  if(txn.payment_type&&!PTS.includes(txn.payment_type))mPt.append(h("option",{value:txn.payment_type,selected:true},txn.payment_type));
  PTS.forEach(p=>{const o=h("option",{value:p},p);if(p===txn.payment_type)o.selected=true;mPt.append(o)});
  const mTag=h("input",{class:"inp",type:"text",value:txn.tag||""});

  // Accrual preview
  const previewEl=h("div",{class:"preview hidden"});
  function updatePreview(){
    const a=parseFloat(mAmt.value);if(isNaN(a)||!mSs.value||!mSe.value){previewEl.classList.add("hidden");return}
    const ss=new Date(mSs.value+"T00:00:00"),se=new Date(mSe.value+"T00:00:00");
    if(se<ss){previewEl.classList.add("hidden");return}
    const days=Math.max(1,Math.floor((se-ss)/864e5)+1);
    const cur=mCur.value;
    const fx=cur==="USD"?1:(parseFloat(mFx.value)||DFX[cur]||1);
    const usd=cur==="USD"?a:a*fx;
    const daily=usd/days;
    previewEl.classList.remove("hidden");
    const cols=cur==="USD"?3:4;
    previewEl.innerHTML=`<div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Accrual Preview</div>
    <div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:12px">
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">USD Amount</div><div style="font-size:18px;font-weight:700;color:#fff;font-family:var(--mono)">${fmtF(usd)}</div></div>
      ${cur!=="USD"?`<div><div style="font-size:10px;color:rgba(255,255,255,0.25)">FX Rate</div><div style="font-size:18px;font-weight:700;color:rgba(255,255,255,0.5);font-family:var(--mono)">${fx}</div></div>`:""}
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">Service Days</div><div style="font-size:18px;font-weight:700;color:var(--b);font-family:var(--mono)">${days}</div></div>
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">Daily Cost</div><div style="font-size:18px;font-weight:700;color:var(--g);font-family:var(--mono)">${fmtF(daily)}/d</div></div>
    </div>`;
  }
  updatePreview();

  // Action buttons
  const isReimbursable=txn.amount_usd>0&&!["income","investment","financial","adjustment"].includes(txn.category_id);
  const isCashbackable=txn.amount_usd>0&&!["income","investment","adjustment"].includes(txn.category_id);
  const extraBtns=(isReimbursable?1:0)+(isCashbackable?1:0);
  const btnRow=h("div",{style:{display:"grid",gridTemplateColumns:"1fr"+(" auto".repeat(extraBtns+2)),gap:"8px",marginTop:"4px"}});
  const mSave=h("button",{class:"btn",style:{background:"rgba(129,178,154,0.2)",color:"var(--g)"},onClick:async()=>{
    mSave.textContent="Saving...";mSave.disabled=true;
    const ss=new Date(mSs.value+"T00:00:00"),se=new Date(mSe.value+"T00:00:00");
    const sdays=Math.max(1,Math.floor((se-ss)/864e5)+1);
    const cur=mCur.value;
    const fx=cur==="USD"?1:(parseFloat(mFx.value)||DFX[cur]||1);
    const orig=Math.round(parseFloat(mAmt.value)*100)/100;
    const amt=cur==="USD"?orig:Math.round(orig*fx*100)/100;
    const dc=Math.round(amt/sdays*1e6)/1e6;
    const tagVal=(mTag.value||"").toLowerCase().trim();
    const prev={date:txn.date,description:txn.description,category_id:txn.category_id,
      amount_usd:txn.amount_usd,original_amount:txn.original_amount,
      currency:txn.currency,fx_rate:txn.fx_rate,
      service_start:txn.service_start,service_end:txn.service_end,
      service_days:txn.service_days,daily_cost:txn.daily_cost,
      payment_type:txn.payment_type,tag:txn.tag,is_subscription:txn.is_subscription||false,credit:txn.credit||""};
    try{
      if(tagVal)await ensureTagExists(tagVal);
      await sb(`transactions?id=eq.${txn.id}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({
        date:mDate.value,description:mDesc.value,category_id:mCat.value,
        amount_usd:amt,original_amount:orig,currency:cur,fx_rate:fx,
        service_start:mSs.value,service_end:mSe.value,
        service_days:sdays,daily_cost:dc,
        payment_type:mPt.value,tag:tagVal,
        is_subscription:mSubChk.checked,
        credit:mPt.value==="Transfer"?mCredit.getValue():""
      })});
      // Prompt to update linked transactions' service dates
      const datesChanged=mSs.value!==txn.service_start||mSe.value!==txn.service_end;
      if(datesChanged&&txn.transaction_group_id){
        const others=await sb(`transactions?transaction_group_id=eq.${txn.transaction_group_id}&id=neq.${txn.id}&select=id,description,amount_usd,service_start,service_end,service_days,daily_cost`);
        if(others.length&&confirm(`Update service dates for ${others.length} other linked transaction${others.length>1?"s":""}?\n\n${others.map(o=>o.description+" ("+fmtF(o.amount_usd)+")").join("\n")}\n\n→ ${mSs.value} to ${mSe.value}`)){
          for(const o of others){
            const oDc=Math.round(o.amount_usd/sdays*1e6)/1e6;
            await sb(`transactions?id=eq.${o.id}`,{method:"PATCH",body:JSON.stringify({service_start:mSs.value,service_end:mSe.value,service_days:sdays,daily_cost:oDc})});
          }
        }
      }
      bg.remove();
      showUndo("\u2713 Edited: "+txn.description,async()=>{
        await sb(`transactions?id=eq.${txn.id}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify(prev)});
        onSaved();
      });
      onSaved();
    }catch(e){alert("Save failed: "+e.message);mSave.textContent="Save";mSave.disabled=false}
  }},"Save");

  let delTimer=null;
  const mDel=h("button",{class:"btn",style:{background:"rgba(224,122,95,0.15)",color:"var(--r)",width:"auto",padding:"12px 20px"},onClick:async()=>{
    if(mDel.dataset.confirm!=="1"){
      mDel.dataset.confirm="1";mDel.textContent="Confirm Delete";
      delTimer=setTimeout(()=>{mDel.dataset.confirm="0";mDel.textContent="Delete"},3000);
      return;
    }
    if(delTimer)clearTimeout(delTimer);
    mDel.textContent="Deleting...";mDel.disabled=true;
    const txnCopy={...txn};delete txnCopy.id;
    try{
      await sb(`transactions?id=eq.${txn.id}`,{method:"DELETE",headers:{"Prefer":"return=representation"}});
      state.txnCount--;
      document.getElementById("dbStatus").textContent=`\u25CF ${state.txnCount.toLocaleString()} txns`;
      bg.remove();
      showUndo("\u2713 Deleted: "+txn.description,async()=>{
        await sb("transactions",{method:"POST",headers:{"Prefer":"return=representation"},body:JSON.stringify({id:txn.id,...txnCopy})});
        state.txnCount++;document.getElementById("dbStatus").textContent=`\u25CF ${state.txnCount.toLocaleString()} txns`;
        onSaved();
      });
      onSaved();
    }catch(e){alert("Delete failed: "+e.message);mDel.textContent="Delete";mDel.disabled=false;mDel.dataset.confirm="0"}
  }},"Delete");

  const mCancel=h("button",{class:"btn",style:{background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.4)",width:"auto",padding:"12px 20px"},onClick:()=>bg.remove()},"Cancel");

  // Reimburse button (only for reimbursable expenses)
  const mReimb=isReimbursable?h("button",{class:"btn",style:{background:"rgba(74,111,165,0.2)",color:"var(--b)",width:"auto",padding:"12px 20px"},onClick:()=>showReimburseForm()},"\uD83D\uDCB8 Reimburse"):null;

  // Cashback button (FEA-14)
  const mCashback=isCashbackable?h("button",{class:"btn",style:{background:"rgba(242,204,143,0.15)",color:"#F2CC8F",width:"auto",padding:"12px 20px"},onClick:()=>showCashbackForm()},"\uD83C\uDFC6 Cashback"):null;

  function showReimburseForm(){
    // Save edit form content and replace with reimburse form
    const editContent=Array.from(modal.children);
    modal.innerHTML="";
    let selectedPerson="",selectedRatio=0.5,manualMode=false,manualAmt=0;

    // Header
    const rHdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"20px"}});
    const rHdrLeft=h("div");
    rHdrLeft.append(h("h3",{style:{margin:"0"}},"\uD83D\uDCB8 Reimburse"));
    rHdrLeft.append(h("div",{style:{fontSize:"11px",color:"rgba(255,255,255,0.5)",marginTop:"4px"}},`${txn.description} \u00B7 ${fmtF(txn.amount_usd)}`));
    const rClose=h("span",{style:{cursor:"pointer",fontSize:"18px",color:"rgba(255,255,255,0.3)",lineHeight:"1"},onClick:()=>bg.remove()},"\u2715");
    rHdr.append(rHdrLeft,rClose);
    modal.append(rHdr);

    // Person selection
    const personWrap=h("div",{style:{marginBottom:"14px"}});
    personWrap.append(h("label",{class:"lbl"},"Person"));
    const personSelect=h("select",{class:"inp",onChange:()=>{selectedPerson=personSelect.value;if(personSelect.value)personFree.value="";updateRPreview()}});
    personSelect.append(h("option",{value:""},"Loading..."));
    personSelect.disabled=true;
    const personFree=h("input",{class:"inp",type:"text",placeholder:"or type a name",style:{marginTop:"6px"},onInput:()=>{selectedPerson=personFree.value.trim();if(selectedPerson)personSelect.value="";updateRPreview()}});
    personWrap.append(personSelect,personFree);
    modal.append(personWrap);

    // Load friends async
    fetchReimburseFriends().then(friends=>{
      personSelect.innerHTML="";
      if(friends.length){
        personSelect.append(h("option",{value:""},"Select a person..."));
        friends.forEach(name=>{personSelect.append(h("option",{value:name},name))});
        personSelect.disabled=false;
      }else{
        personSelect.classList.add("hidden");
      }
    }).catch(()=>{personSelect.classList.add("hidden")});

    // Split presets
    const splitWrap=h("div",{style:{marginBottom:"14px"}});
    splitWrap.append(h("label",{class:"lbl"},"Split"));
    const splitBtns=h("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap"}});
    const customWrap=h("div",{class:"hidden",style:{marginTop:"6px"}});
    const customInp=h("input",{class:"inp",type:"text",placeholder:"e.g. 40% or $60",style:{width:"140px"},onInput:()=>{
      const v=customInp.value.trim();
      if(v.startsWith("$")){const d=parseFloat(v.slice(1));if(!isNaN(d)&&d>0){selectedRatio=d/txn.amount_usd}}
      else{const p=parseFloat(v.replace("%",""));if(!isNaN(p)&&p>0){selectedRatio=p/100}}
      updateRPreview();
    }});
    customWrap.append(customInp);
    const manualWrap=h("div",{class:"hidden",style:{marginTop:"6px"}});
    const manualInp=h("input",{class:"inp",type:"number",step:"0.01",placeholder:"e.g. 150.00",style:{width:"140px"},onInput:()=>{
      manualAmt=parseFloat(manualInp.value)||0;
      updateRPreview();
    }});
    manualWrap.append(manualInp);

    SPLIT_PRESETS.forEach(sp=>{
      const b=h("button",{class:"pg-btn",style:{padding:"6px 14px",fontSize:"11px",border:"1px solid rgba(255,255,255,0.1)"},onClick:()=>{
        splitBtns.querySelectorAll("button").forEach(x=>{x.style.background="";x.style.borderColor="rgba(255,255,255,0.1)"});
        b.style.background="rgba(74,111,165,0.3)";b.style.borderColor="var(--b)";
        if(sp.value==="manual"){manualMode=true;customWrap.classList.add("hidden");manualWrap.classList.remove("hidden");manualInp.focus()}
        else if(sp.value!==null){manualMode=false;selectedRatio=sp.value;customWrap.classList.add("hidden");manualWrap.classList.add("hidden")}
        else{manualMode=false;customWrap.classList.remove("hidden");manualWrap.classList.add("hidden");customInp.focus()}
        updateRPreview();
      }},sp.label);
      if(sp.value===0.5){b.style.background="rgba(74,111,165,0.3)";b.style.borderColor="var(--b)"}
      splitBtns.append(b);
    });
    splitWrap.append(splitBtns,customWrap,manualWrap);
    modal.append(splitWrap);

    // Amount display
    const amtDisplay=h("div",{style:{marginBottom:"14px"}});
    amtDisplay.append(h("label",{class:"lbl"},"Reimbursement Amount"));
    const amtVal=h("div",{style:{fontSize:"20px",fontWeight:"700",color:"var(--g)",fontFamily:"var(--mono)"}});
    amtDisplay.append(amtVal);
    modal.append(amtDisplay);

    // Payment method
    const rPt=h("select",{class:"inp",onChange:()=>updateRPreview()});
    PTS.forEach(p=>{const o=h("option",{value:p},p);if(p==="Venmo")o.selected=true;rPt.append(o)});
    modal.append(mRow(mField("Payment Method",rPt)));

    // Note
    const rNote=h("input",{class:"inp",type:"text",placeholder:"optional context"});
    modal.append(mRow(mField("Note",rNote)));

    // Preview
    const rPreview=h("div",{class:"preview",style:{marginBottom:"14px"}});
    modal.append(rPreview);

    // Validation error
    const errEl=h("div",{style:{color:"var(--r)",fontSize:"11px",marginBottom:"8px",minHeight:"16px"}});
    modal.append(errEl);

    function updateRPreview(){
      const amt=manualMode?Math.round(manualAmt*100)/100:Math.round(txn.amount_usd*selectedRatio*100)/100;
      amtVal.textContent=fmtF(-amt);
      const pName=selectedPerson||"___";
      const firstName=pName.split(" ")[0];
      const desc=`Reimbursed - ${txn.description} - ${firstName}`;
      rPreview.innerHTML=`<div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Preview</div>
        <div style="margin-bottom:4px;color:#fff;font-weight:600">${desc}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.5)">${fmtF(-amt)} \u00B7 ${rPt.value} \u00B7 ${txn.category_id}</div>
        <div style="font-size:11px;color:rgba(74,111,165,0.7);margin-top:4px">\uD83D\uDD17 Linked to: ${txn.description}</div>`;
    }
    updateRPreview();

    // Action buttons
    const rBtnRow=h("div",{style:{display:"grid",gridTemplateColumns:"1fr auto",gap:"8px",marginTop:"4px"}});
    const rCreate=h("button",{class:"btn",style:{background:"rgba(129,178,154,0.2)",color:"var(--g)"},onClick:async()=>{
      // Validate
      const person=selectedPerson.trim();
      if(!person){errEl.textContent="Please select or type a person name.";return}
      const reimbAmt=manualMode?Math.round(manualAmt*100)/100:Math.round(txn.amount_usd*selectedRatio*100)/100;
      if(reimbAmt<=0){errEl.textContent="Reimbursement amount must be greater than $0.";return}
      errEl.textContent="";
      rCreate.textContent="Creating...";rCreate.disabled=true;
      const effectiveRatio=manualMode?manualAmt/txn.amount_usd:selectedRatio;
      try{
        await createReimbursement(txn,person,effectiveRatio,rPt.value,rNote.value);
        bg.remove();
        const msg=document.getElementById("ledgerOkMsg");
        if(msg){msg.textContent="Reimbursement created";msg.classList.remove("hidden");setTimeout(()=>msg.classList.add("hidden"),2500)}
        document.getElementById("dbStatus").textContent=`\u25CF ${state.txnCount.toLocaleString()} txns`;
        onSaved();
      }catch(e){alert("Failed: "+e.message);rCreate.textContent="Create Reimbursement";rCreate.disabled=false}
    }},"Create Reimbursement");
    const rBack=h("button",{class:"btn",style:{background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.4)",width:"auto",padding:"12px 20px"},onClick:()=>{
      modal.innerHTML="";
      editContent.forEach(c=>modal.append(c));
    }},"Back");
    rBtnRow.append(rCreate,rBack);
    modal.append(rBtnRow);
  }

  // Cashback form (FEA-14)
  function showCashbackForm(){
    const editContent=Array.from(modal.children);
    modal.innerHTML="";
    let cbType="Dollar Value";

    const cHdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"20px"}});
    const cHdrLeft=h("div");
    cHdrLeft.append(h("h3",{style:{margin:"0"}},"\uD83C\uDFC6 Cashback"));
    cHdrLeft.append(h("div",{style:{fontSize:"11px",color:"rgba(255,255,255,0.5)",marginTop:"4px"}},`${txn.description} \u00B7 ${fmtF(txn.amount_usd)}`));
    cHdr.append(cHdrLeft,h("span",{style:{cursor:"pointer",fontSize:"18px",color:"rgba(255,255,255,0.3)",lineHeight:"1"},onClick:()=>bg.remove()},"\u2715"));
    modal.append(cHdr);

    // Type selector
    const typeWrap=h("div",{style:{marginBottom:"14px"}});
    typeWrap.append(h("label",{class:"lbl"},"Cashback Type"));
    const typeSelect=h("select",{class:"inp",onChange:()=>{cbType=typeSelect.value;ptsFields.style.display=cbType==="Points"?"grid":"none";updateCPreview()}});
    typeSelect.append(h("option",{value:"Dollar Value"},"Dollar Value"));
    typeSelect.append(h("option",{value:"Points"},"Points"));
    typeWrap.append(typeSelect);
    modal.append(typeWrap);

    // Dollar value input
    const dvWrap=h("div",{style:{marginBottom:"14px"}});
    dvWrap.append(h("label",{class:"lbl"},"Dollar Value"));
    const dvInp=h("input",{class:"inp",type:"number",step:"0.01",placeholder:"e.g. 10.00",onInput:updateCPreview});
    dvWrap.append(dvInp);
    modal.append(dvWrap);

    // Points fields (hidden by default)
    const ptsFields=h("div",{style:{display:"none",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"14px"}});
    const ptsAmtWrap=h("div");ptsAmtWrap.append(h("label",{class:"lbl"},"Points Redeemed"));
    const ptsAmtInp=h("input",{class:"inp",type:"number",placeholder:"e.g. 30000",onInput:()=>{
      const pts=parseFloat(ptsAmtInp.value)||0;const rate=parseFloat(ptsRateInp.value)||0;
      if(pts>0&&rate>0)dvInp.value=(pts*rate/100).toFixed(2);
      updateCPreview();
    }});
    ptsAmtWrap.append(ptsAmtInp);ptsFields.append(ptsAmtWrap);
    const ptsRateWrap=h("div");ptsRateWrap.append(h("label",{class:"lbl"},"Rate (\u00A2/pt)"));
    const ptsRateInp=h("input",{class:"inp",type:"number",step:"0.01",placeholder:"e.g. 1.63",onInput:()=>{
      const pts=parseFloat(ptsAmtInp.value)||0;const rate=parseFloat(ptsRateInp.value)||0;
      if(pts>0&&rate>0)dvInp.value=(pts*rate/100).toFixed(2);
      updateCPreview();
    }});
    ptsRateWrap.append(ptsRateInp);ptsFields.append(ptsRateWrap);
    modal.append(ptsFields);

    // Description
    const descWrap=h("div",{style:{marginBottom:"14px"}});
    descWrap.append(h("label",{class:"lbl"},"Description"));
    const cDesc=h("input",{class:"inp",type:"text",value:"Cashback - "+txn.description});
    descWrap.append(cDesc);
    modal.append(descWrap);

    // Preview
    const cPreview=h("div",{class:"preview",style:{marginBottom:"14px"}});
    modal.append(cPreview);

    const errEl=h("div",{style:{color:"var(--r)",fontSize:"11px",marginBottom:"8px",minHeight:"16px"}});
    modal.append(errEl);

    function updateCPreview(){
      const dv=parseFloat(dvInp.value)||0;
      const desc=cDesc.value||"Cashback";
      cPreview.innerHTML=`<div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Preview</div>
        <div style="margin-bottom:4px;color:#fff;font-weight:600">${desc}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.5)">${fmtF(-dv)} \u00B7 ${txn.payment_type} \u00B7 income</div>
        <div style="font-size:11px;color:rgba(242,204,143,0.7);margin-top:4px">\uD83C\uDFC6 Cashback record: ${fmtF(dv)} ${cbType==="Points"?"("+((parseFloat(ptsAmtInp.value)||0).toLocaleString())+" pts)":""}</div>`;
    }
    updateCPreview();

    const cBtnRow=h("div",{style:{display:"grid",gridTemplateColumns:"1fr auto",gap:"8px",marginTop:"4px"}});
    const cCreate=h("button",{class:"btn",style:{background:"rgba(129,178,154,0.2)",color:"var(--g)"},onClick:async()=>{
      const dv=parseFloat(dvInp.value);
      if(!dv||dv<=0){errEl.textContent="Dollar value must be greater than $0.";return}
      errEl.textContent="";
      cCreate.textContent="Creating...";cCreate.disabled=true;

      try{
        // 1. Create negative income transaction (same pattern as reimbursement)
        const ss=txn.service_start||txn.date;
        const se=txn.service_end||txn.date;
        const serviceDays=Math.max(1,Math.round((new Date(se)-new Date(ss))/864e5)+1);
        const amt=-Math.abs(dv);
        const dc=Math.round(amt/serviceDays*1e6)/1e6;
        const newTxn={
          date:txn.date,service_start:ss,service_end:se,
          description:cDesc.value||"Cashback - "+txn.description,
          category_id:"income",original_amount:amt,currency:"USD",fx_rate:1,
          amount_usd:amt,payment_type:txn.payment_type,
          tag:(txn.tag||"").toLowerCase().trim(),
          daily_cost:dc,service_days:serviceDays,credit:""
        };
        const result=await sb("transactions",{method:"POST",headers:{"Prefer":"return=representation"},body:JSON.stringify(newTxn)});
        const newId=result[0]?.id;

        // Link to original transaction
        if(newId){
          const newTxnObj={id:newId,transaction_group_id:null};
          await linkToGroup(txn,newTxnObj);
        }
        state.txnCount++;

        // 2. Create cashback_redemptions record
        const redemptionAmount=cbType==="Points"?(parseFloat(ptsAmtInp.value)||dv):dv;
        const rate=cbType==="Points"?(parseFloat(ptsRateInp.value)||1)/100:1;
        await sb("cashback_redemptions",{method:"POST",headers:{"Prefer":"return=representation"},body:JSON.stringify({
          date:txn.date,item:cDesc.value||"Cashback - "+txn.description,
          redemption_amount:redemptionAmount,payment_type:txn.payment_type,
          cashback_type:cbType,redemption_rate:rate,dollar_value:dv,
          transaction_id:newId||null
        })});

        bg.remove();
        showUndo("\u2713 Cashback: "+fmtF(dv),async()=>{
          // Undo: delete both the transaction and cashback record
          if(newId){
            await sb(`transactions?id=eq.${newId}`,{method:"DELETE"});
            state.txnCount--;
          }
          await sb(`cashback_redemptions?transaction_id=eq.${newId}`,{method:"DELETE"});
          onSaved();
        });
        document.getElementById("dbStatus").textContent=`\u25CF ${state.txnCount.toLocaleString()} txns`;
        onSaved();
      }catch(e){alert("Failed: "+e.message);cCreate.textContent="Create Cashback";cCreate.disabled=false}
    }},"Create Cashback");
    const cBack=h("button",{class:"btn",style:{background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.4)",width:"auto",padding:"12px 20px"},onClick:()=>{
      modal.innerHTML="";editContent.forEach(c=>modal.append(c));
    }},"Back");
    cBtnRow.append(cCreate,cBack);
    modal.append(cBtnRow);
  }

  btnRow.append(mSave);
  if(mReimb)btnRow.append(mReimb);
  if(mCashback)btnRow.append(mCashback);
  btnRow.append(mDel,mCancel);

  modal.append(mRow(mField("Date",mDate),mField("Description",mDesc)));
  const amtWithCur=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 80px",gap:"6px"}});
  amtWithCur.append(mAmt,mCur);
  modal.append(mRow(mField("Category",mCat),mField("Amount",amtWithCur)));
  modal.append(mFxRow);
  modal.append(mRow(mField("Service Start",mSs),seField));
  const mSubChk=h("input",{type:"checkbox",style:{accentColor:"var(--g)",cursor:"pointer"}});
  if(txn.is_subscription)mSubChk.checked=true;
  const mSubLabel=h("label",{style:{display:"flex",alignItems:"center",gap:"6px",fontSize:"12px",color:"rgba(255,255,255,0.6)",cursor:"pointer"}});
  mSubLabel.append(mSubChk,document.createTextNode("Subscription"));
  const mSubWrap=h("div",{style:{display:"flex",alignItems:"flex-end",paddingBottom:"4px"}});
  mSubWrap.append(mSubLabel);
  modal.append(mRow(mField("Payment Account",mPt),mField("Tag",mTag),mSubWrap));

      footer.append(h("span",{style:{color:"rgba(255,255,255,0.5)",fontWeight:"600"}},"Net Amount"));

      const patch={};
      if(bCat.value)patch.category_id=bCat.value;
      if(bPt.value)patch.payment_type=bPt.value;

      if(bTagClearChk.checked)patch.tag="";

      const ids=txns.map(t=>t.id);

      const prevStates=txns.map(t=>{const p={id:t.id};patchKeys.forEach(k=>{if(t[k]!==undefined)p[k]=t[k]});return p});
