function authHeaders(extra = {}) {

// Cache helpers for offline fallback (FEA-32)
const CACHE_PREFIX="dc_";
function cacheSet(key,data){try{localStorage.setItem(CACHE_PREFIX+key,JSON.stringify({ts:Date.now(),data}))}catch(e){
  if(e.name==='QuotaExceededError'){const entries=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith(CACHE_PREFIX)){try{entries.push([k,JSON.parse(localStorage.getItem(k)).ts||0])}catch{}}}entries.sort((a,b)=>a[1]-b[1]);const n=Math.max(1,Math.floor(entries.length*0.25));for(let i=0;i<n;i++)localStorage.removeItem(entries[i][0]);try{localStorage.setItem(CACHE_PREFIX+key,JSON.stringify({ts:Date.now(),data}))}catch{}}
}}
function cacheGet(key){try{const raw=localStorage.getItem(CACHE_PREFIX+key);return raw?JSON.parse(raw):null}catch(e){return null}}
function showOfflineBanner(ts){
  const el=document.getElementById("offlineBanner");
  if(el){
    const ago=Math.round((Date.now()-ts)/60000);
    document.getElementById("offlineTs").textContent=ago<1?"just now":ago<60?`${ago}m ago`:`${Math.round(ago/60)}h ago`;
    el.classList.remove("hidden");
  }
}

async function sb(path,opts={}){
  const{headers:hd,...rest}=opts;
  const method=(rest.method||"GET").toUpperCase();
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${path}`,{...rest,headers:{...authHeaders(),...(hd||{})}});
    if(!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
    const txt=await r.text();
    const data=txt?JSON.parse(txt):[];
    if(method==="GET") cacheSet(path,data);
    return data;
  }catch(e){
    if(method==="GET"){const cached=cacheGet(path);if(cached){showOfflineBanner(cached.ts);return cached.data;}}
    throw e;
  }
}
async function sbRPC(fn,params={}){
  const cacheKey=`rpc_${fn}_${JSON.stringify(params)}`;
  try{
    const r=await fetch(`${SB_URL}/rest/v1/rpc/${fn}`,{method:"POST",headers:authHeaders(),body:JSON.stringify(params)});
    if(!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
    const data=await r.json();
    cacheSet(cacheKey,data);
    return data;
  }catch(e){
    const cached=cacheGet(cacheKey);
    if(cached){showOfflineBanner(cached.ts);return cached.data;}
    throw e;
  }
}

function parseCSV(text){
  const s=text.charCodeAt(0)===0xFEFF?text.slice(1):text;
  const lines=[];let cur="",inQ=false;
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(c==='"'){if(inQ&&s[i+1]==='"'){cur+='"';i++}else inQ=!inQ}
    else if(c===","&&!inQ){lines.length?lines[lines.length-1].push(cur):lines.push([cur]);cur=""}
    else if((c==="\n"||(c==="\r"&&s[i+1]==="\n"))&&!inQ){
      if(c==="\r")i++;
      if(lines.length)lines[lines.length-1].push(cur);else lines.push([cur]);
      cur="";lines.push([])
    }else cur+=c;
  }
  if(cur||lines.length&&lines[lines.length-1].length)
    {if(lines.length)lines[lines.length-1].push(cur);else lines.push([cur])}
  const filtered=lines.filter(r=>r.length>1||r[0]!=="");
  if(!filtered.length)return{headers:[],rows:[]};
  const headers=filtered[0].map(v=>v.trim());
  const rows=filtered.slice(1).map(r=>{const o={};headers.forEach((hd,i)=>o[hd]=r[i]?r[i].trim():"");return o})
    .filter(r=>{const vals=Object.values(r);return vals.some(v=>v!=="")&&vals.some(v=>/\d/.test(v))});
  return{headers,rows};
}

function generateGroupLabel(members){
  if(!members.length)return"Linked group";
  // Prefer the primary (non-reimbursement/adjustment) transaction's description
  const secondary=/^(reimburs|cashback|reimb|bill paid|payment)/i;
  const primary=members.find(m=>!secondary.test(m.description)&&m.amount_usd>0)||members.find(m=>!secondary.test(m.description))||members[0];
  if(members.length===2)return primary.description;
  // For 3+ members, check if descriptions are similar
  const descs=members.map(m=>m.description);
  const roots=descs.map(d=>d.split(/\s+/).slice(0,3).join(" ").replace(/\d{1,2}\/\d{1,2}|\d{4}|#\d+/g,"").trim());
  const freq={};roots.forEach(r=>{const k=r.toLowerCase();freq[k]=(freq[k]||0)+1});
  const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
  const top=sorted[0];
  if(top[1]===members.length)return`${primary.description} x${members.length}`;
  if(top[1]>members.length/2)return`${primary.description} +${members.length-1}`;
  return primary.description+` +${members.length-1}`;
}

function transformCSVRow(row,profile,paymentType,bulkTag,index){
  const cols=profile.columns;
  const rawDate=row[cols.date]||"";
  const dp=rawDate.split("/");
  const date=dp.length===3?`${dp[2]}-${dp[0].padStart(2,"0")}-${dp[1].padStart(2,"0")}`:rawDate;
  const badDate=!date||!/^\d{4}-\d{2}-\d{2}$/.test(date);
  const rawAmt=parseFloat(row[cols.amount])||0;
  const typeVal=cols.type!=="_none_"?(row[cols.type]||""):"";
  const isReturn=typeVal.toLowerCase()==="return";
  const isCCPay=typeVal==="Payment"||(profile.detectPayment&&profile.detectPayment(row));
  const isSkip=badDate||(typeVal&&profile.skipTypes.includes(typeVal));
  let amt=profile.transformAmount(rawAmt);
  if(isReturn)amt=-Math.abs(amt);
  const baseFields={date,description:row[cols.description]||"",amount_usd:amt,currency:profile.currency||"USD",fx_rate:1,original_amount:amt,service_start:date,service_end:date,payment_type:paymentType,tag:bulkTag||"",credit:"",_rawDescription:row[cols.description]||"",_bankCategory:row[cols.bankCategory]||"",_rowIndex:index};
  if(profile.isCheckingAccount&&!badDate){
    const billName=profile.detectBillPay&&profile.detectBillPay(row);
    if(billName)return{...baseFields,amount_usd:amt,category_id:"financial",ai_confidence:"high",service_days:1,daily_cost:amt,_status:"skipped",_isDuplicate:false,_skipReason:"Bill Payment: "+billName,_isBillPay:true};
    if(profile.detectPayroll&&profile.detectPayroll(row))return{...baseFields,amount_usd:amt,category_id:"income",ai_confidence:"high",service_days:1,daily_cost:amt,_status:"skipped",_isDuplicate:false,_skipReason:"Payroll (payslip imported)",_isPayroll:true,_payrollAmount:amt};
    if(rawAmt>0)return{...baseFields,amount_usd:amt,category_id:"income",ai_confidence:"medium",service_days:1,daily_cost:amt,_status:"pending",_isDuplicate:false,_skipReason:null,_isCredit:true};
  }
  if(isCCPay){
    const names=CC_PAY_NAMES[paymentType]||["Bill Paid: "+paymentType,paymentType+" Bill Payment"];
    return{
      date,description:names[0],amount_usd:amt,category_id:"financial",ai_confidence:"high",
      currency:profile.currency||"USD",fx_rate:1,original_amount:amt,
      service_start:date,service_end:date,service_days:1,daily_cost:amt,
      payment_type:paymentType,tag:bulkTag||"",credit:"",
      _status:"approved",_isDuplicate:false,_isCCPayment:true,
      _rawDescription:row[cols.description]||"",_bankCategory:row[cols.bankCategory]||"",
      _rowIndex:index,_skipReason:null,
      _ccPaymentPair:{description:names[1],payment_type:"Chase Chequing",amount:Math.abs(amt)}
    };
  }
  return{
    date,description:row[cols.description]||"",amount_usd:amt,category_id:null,ai_confidence:null,
    currency:profile.currency||"USD",fx_rate:1,original_amount:amt,
    service_start:date,service_end:date,payment_type:paymentType,tag:bulkTag||"",credit:"",
    _status:isSkip?"skipped":"pending",_isDuplicate:false,
    _rawDescription:row[cols.description]||"",_bankCategory:row[cols.bankCategory]||"",
    _rowIndex:index,_skipReason:badDate?"Invalid date":isSkip?"CC Payment":null
  };
}

async function findDuplicates(candidates,paymentType){
  const dates=candidates.filter(c=>c._status!=="skipped").map(c=>c.date).sort();
  if(!dates.length)return;
  const minD=dates[0],maxD=dates[dates.length-1];
  const existing=await sb(`transactions?payment_type=eq.${encodeURIComponent(paymentType)}&date=gte.${minD}&date=lte.${maxD}&select=date,amount_usd,description,service_start,service_end`);
  for(const c of candidates){
    if(c._status==="skipped")continue;
    c._isDuplicate=existing.some(e=>e.date===c.date&&Math.abs(Math.abs(e.amount_usd)-Math.abs(c.amount_usd))<0.02
      &&(!c.service_start||!e.service_start||c.service_start===e.service_start)
      &&(!c.service_end||!e.service_end||c.service_end===e.service_end));
    if(c._isDuplicate){c._status="skipped";c._skipReason="Duplicate"}
  }
}

function fallbackCatMap(bankCat){return AMEX_CAT_MAP[bankCat]||CHASE_CAT_MAP[bankCat]||"other"}
function applyAIResults(candidates,aiResults,detectedSubs){
  if(!aiResults){
    for(const c of candidates){
      if(c._status==="skipped")continue;
      if(c._isCCPayment)continue;
      if(!c.category_id)c.category_id=fallbackCatMap(c._bankCategory);
      if(!c.ai_confidence)c.ai_confidence="low";
      c.service_start=getDefStart(c.category_id,c.date)||c.date;
      c.service_end=getDefEnd(c.category_id,c.service_start)||c.service_start;
      const ss=new Date(c.service_start+"T00:00:00"),se=new Date(c.service_end+"T00:00:00");
      c.service_days=Math.max(1,Math.floor((se-ss)/864e5)+1);
      c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
    }
    return;
  }
  const byIdx={};for(const r of aiResults)byIdx[r.i]=r;
  for(let i=0;i<candidates.length;i++){
    const c=candidates[i];
    if(c._status==="skipped")continue;
    if(c._isCCPayment)continue;
    const ai=byIdx[i];
    if(ai){c.category_id=ai.cat;c.ai_confidence=ai.conf;c.description=ai.desc}
    else{if(!c.category_id)c.category_id=fallbackCatMap(c._bankCategory);if(!c.ai_confidence)c.ai_confidence="low"}
    c.service_start=getDefStart(c.category_id,c.date)||c.date;
    c.service_end=getDefEnd(c.category_id,c.service_start)||c.service_start;
    const ss=new Date(c.service_start+"T00:00:00"),se=new Date(c.service_end+"T00:00:00");
    c.service_days=Math.max(1,Math.floor((se-ss)/864e5)+1);
    c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
  }
  // Auto-apply month accrual for detected subscriptions
  if(detectedSubs&&detectedSubs.length){
    const subMerchants=new Set(detectedSubs.map(s=>s.merchant));
    for(const c of candidates){
      if(c._status==="skipped"||c._isCCPayment)continue;
      if(subMerchants.has(normalizeMerchant(c._rawDescription||c.description))){
        c.service_start=startOfMonth(c.date);
        c.service_end=endOfMonth(c.service_start);
        const ss=new Date(c.service_start+"T00:00:00"),se=new Date(c.service_end+"T00:00:00");
        c.service_days=Math.max(1,Math.floor((se-ss)/864e5)+1);
        c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
      }
    }
  }
}

function propagateEdits(candidates,editedIndex){
  const edited=candidates[editedIndex];
  const key=normalizeMerchant(edited._rawDescription);
  for(let i=0;i<candidates.length;i++){
    if(i===editedIndex)continue;
    const c=candidates[i];
    if(c._status!=="pending")continue;
    if(normalizeMerchant(c._rawDescription)===key){
      c.description=edited.description;
      c.category_id=edited.category_id;
      c.service_start=getDefStart(c.category_id,c.date)||c.date;
      c.service_end=getDefEnd(c.category_id,c.service_start)||c.service_start;
      const ss=new Date(c.service_start+"T00:00:00"),se=new Date(c.service_end+"T00:00:00");
      c.service_days=Math.max(1,Math.floor((se-ss)/864e5)+1);
      c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
    }
  }
}

function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)for(const[k,v]of Object.entries(attrs)){if(k==="style"&&typeof v==="object")Object.assign(el.style,v);else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);else el.setAttribute(k,v)}
  if(children!=null){if(Array.isArray(children))children.forEach(c=>{if(c!=null)el.append(typeof c==="string"?document.createTextNode(c):c)});else if(typeof children==="string")el.textContent=children;else el.append(children)}
  return el;
}

// Payslip PDF parsing (FEA-45)
function pn(s){return parseFloat(String(s).replace(/,/g,""))||0}

function extractLinesFromPage(tc){
  const items=tc.items.filter(i=>i.str.trim());
  if(!items.length)return[];
  const groups=[];let cur=[items[0]],cy=items[0].transform[5];
  for(let i=1;i<items.length;i++){
    const it=items[i],y=it.transform[5];
    if(Math.abs(y-cy)<=2){cur.push(it)}
    else{groups.push({y:cy,items:cur});cur=[it];cy=y}
  }
  groups.push({y:cy,items:cur});
  groups.sort((a,b)=>b.y-a.y);
  return groups.map(g=>{
    g.items.sort((a,b)=>a.transform[4]-b.transform[4]);
    return g.items.map(i=>i.str).join(" ");
  });
}

function parsePayslipPage(lines,fullText){
  // Extract 3 consecutive dates
  const dm=fullText.match(/(\d{2}\/\d{2}\/\d{4})\s+(\d{2}\/\d{2}\/\d{4})\s+(\d{2}\/\d{2}\/\d{4})/);
  if(!dm)return null;
  const ppb=convertMMDDYYYY(dm[1]),ppe=convertMMDDYYYY(dm[2]),cd=convertMMDDYYYY(dm[3]);

  // Parse Current summary row
  const cm=fullText.match(/Current\s+([\d,.]+)\s+([\d,.]+)\s+([\d,.]+)\s+([\d,.]+)\s+([\d,.]+)\s+([\d,.]+)/);
  if(!cm)return null;
  const grossPay=pn(cm[2]),preTaxSum=pn(cm[3]),empTaxSum=pn(cm[4]),postTaxSum=pn(cm[5]),netPay=pn(cm[6]);

  // Skip if all zeros
  if(grossPay===0&&empTaxSum===0&&preTaxSum===0&&postTaxSum===0){
    return{payPeriodBegin:ppb,payPeriodEnd:ppe,checkDate:cd,grossPay:0,netPay:0,
      earningsTotal:0,employeeTaxTotal:0,preTaxTotal:0,postTaxTotal:0,
      gtl:0,deferral401k:0,match401k:0,rsuOffset:0,isRSU:false,isSkip:true};
  }

  // Section totals: try combined-line format first (old layout), then "Total:" lines (new layout)
  let earningsTotal=0,employeeTaxTotal=0,preTaxTotal=0,postTaxTotal=0;
  for(const ln of lines){
    const em=ln.match(/^Earnings\s+([\d,.]+)\s+[\d,.]+\s+Employee Taxes\s+([\d,.]+)/);
    if(em){earningsTotal=pn(em[1]);employeeTaxTotal=pn(em[2])}
    const pm=ln.match(/^Pre Tax Deductions\s+([\d,.]+)\s+[\d,.]+\s+Post Tax Deductions\s+([\d,.]+)/);
    if(pm){preTaxTotal=pn(pm[1]);postTaxTotal=pn(pm[2])}
  }
  // Fallback: parse "Total:" lines after each section header (new PDF layout)
  if(!earningsTotal&&!employeeTaxTotal){
    const sectionOrder=["Earnings","Employee Taxes","Pre Tax Deductions","Post Tax Deductions"];
    let curSection="";
    for(const ln of lines){
      const sh=sectionOrder.find(s=>ln.trim()===s||ln.startsWith(s+" "));
      if(sh){curSection=sh;continue}
      if(curSection){const tm=ln.match(/^Total:\s+([\d,.]+)/);if(tm){
        const v=pn(tm[1]);
        if(curSection==="Earnings")earningsTotal=v;
        else if(curSection==="Employee Taxes")employeeTaxTotal=v;
        else if(curSection==="Pre Tax Deductions")preTaxTotal=v;
        else if(curSection==="Post Tax Deductions")postTaxTotal=v;
        curSection="";
      }}
    }
  }
  // Fallback to Current row values for any section totals missing due to cross-page splits
  if(!earningsTotal)earningsTotal=grossPay;
  if(!employeeTaxTotal)employeeTaxTotal=empTaxSum;
  if(!preTaxTotal&&preTaxSum)preTaxTotal=preTaxSum;
  if(!postTaxTotal&&postTaxSum)postTaxTotal=postTaxSum;

  // GTL current amount (earnings item with date range)
  const gm=fullText.match(/GTL\s+\d{2}\/\d{2}\/\d{4}\s*-\s*\d{2}\/\d{2}\/\d{4}\s+[\d,.]+\s+[\d,.]+\s+([\d,.]+)/);
  const gtl=gm?pn(gm[1]):0;

  // 401(k) After-tax Deferral: 2 numbers = [current, YTD], 1 number = YTD only
  let deferral401k=0;
  const km=fullText.match(/401\(k\) After-tax Deferral\s+([\d,.]+)(?:\s+([\d,.]+))?/);
  if(km&&km[2])deferral401k=pn(km[1]);

  // 401(k) Company/Employer Match: same pattern
  let match401k=0;
  const mm=fullText.match(/(?:401\(k\)\s*(?:Company|Employer)\s*Match|Company\s*Match|Employer\s*Match)\s+([\d,.]+)(?:\s+([\d,.]+))?/i);
  if(mm&&mm[2])match401k=pn(mm[1]);else if(mm&&mm[1]&&!mm[2])match401k=0; // YTD only, no current

  // RSU Gain Offset: same pattern
  let rsuOffset=0;
  const rm=fullText.match(/RSU Gain Offset\s+([\d,.]+)(?:\s+([\d,.]+))?/);
  if(rm&&rm[2])rsuOffset=pn(rm[1]);

  // RSU detection: RSU Gain followed by a date
  const isRSU=!!fullText.match(/RSU Gain\s+\d{2}\/\d{2}\/\d{4}/);

  return{payPeriodBegin:ppb,payPeriodEnd:ppe,checkDate:cd,grossPay,netPay,
    earningsTotal,employeeTaxTotal,preTaxTotal,postTaxTotal,
    gtl,deferral401k,match401k,rsuOffset,isRSU,isSkip:false};
}

async function parsePayslipPDF(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const pages=[];
  for(let i=1;i<=pdf.numPages;i++){
    const pg=await pdf.getPage(i);
    const tc=await pg.getTextContent();
    const lines=extractLinesFromPage(tc);
    const fullText=tc.items.map(it=>it.str).join(" ");
    const parsed=parsePayslipPage(lines,fullText);
    if(parsed)pages.push(parsed);
  }
  return pages;
}

function generatePayslipTransactions(pages,enteredDate){
  const txns=[];
  for(const p of pages){
    if(p.isSkip)continue;
    const ss=p.payPeriodBegin,se=p.payPeriodEnd;
    if(p.isRSU){
      const vp=getQuarterlyVestingPeriod(ss);
      const q=Math.ceil((new Date(ss+"T00:00:00").getMonth()+1)/3);
      const y=new Date(ss+"T00:00:00").getFullYear();
      txns.push({date:enteredDate,service_start:vp.start,service_end:vp.end,
        description:`Pinterest Stock Units Vested (Q${q} ${y})`,category_id:"income",
        amount_usd:-p.earningsTotal,payment_type:"Charles Schwab",
        _group:`${fmtD(ss)} \u2013 ${fmtD(se)} (RSU Vesting)`,_source:"rsu",_pageData:p});
      txns.push({date:enteredDate,service_start:vp.start,service_end:vp.end,
        description:"Income Taxes and Social Security",category_id:"income",
        amount_usd:p.employeeTaxTotal,payment_type:"Charles Schwab",
        _group:`${fmtD(ss)} \u2013 ${fmtD(se)} (RSU Vesting)`,_source:"rsu_tax",_pageData:p});
    }else{
      const postTaxNon401k=Math.round((p.postTaxTotal-p.deferral401k-p.rsuOffset)*100)/100;
      const medical=Math.round((p.preTaxTotal+postTaxNon401k+p.gtl)*100)/100;
      const grp=`${fmtD(ss)} \u2013 ${fmtD(se)} (Regular)`;
      txns.push({date:enteredDate,service_start:ss,service_end:se,
        description:"Pinterest Income",category_id:"income",
        amount_usd:-p.earningsTotal,payment_type:"Chase Chequing",
        _group:grp,_source:"salary",_pageData:p});
      txns.push({date:enteredDate,service_start:ss,service_end:se,
        description:"Income Taxes and Social Security",category_id:"income",
        amount_usd:p.employeeTaxTotal,payment_type:"Chase Chequing",
        _group:grp,_source:"tax",_pageData:p});
      txns.push({date:enteredDate,service_start:ss,service_end:se,
        description:"Medical Insurance Benefits",category_id:"health",
        amount_usd:medical,payment_type:"Chase Chequing",
        _group:grp,_source:"benefits",_pageData:p});
      if(p.deferral401k>0){
        txns.push({date:enteredDate,service_start:ss,service_end:se,
          description:"401K",category_id:"financial",
          amount_usd:p.deferral401k,payment_type:"Chase Chequing",
          _group:grp,_source:"401k_out",_pageData:p});
        txns.push({date:enteredDate,service_start:ss,service_end:se,
          description:"Vanguard Deposited 401K",category_id:"financial",
          amount_usd:-p.deferral401k,payment_type:"Vanguard",
          _group:grp,_source:"401k_in",_pageData:p});
      }
      if(p.match401k>0){
        txns.push({date:enteredDate,service_start:ss,service_end:se,
          description:"401K Match",category_id:"income",
          amount_usd:-p.match401k,payment_type:"Vanguard",
          _group:grp,_source:"401k_match",_pageData:p});
      }
    }
  }
  return txns;
}

  const existing=await sb("tags?select=name");

  return new Promise(resolve=>{
    const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg){bg.remove();resolve()}}});
    const modal=h("div",{class:"modal"});
    const hdr=h("div",{style:{marginBottom:"20px"}});
    hdr.append(h("h3",{style:{margin:"0"}},"New Tag Detected"));
    hdr.append(h("div",{style:{fontSize:"12px",color:"rgba(255,255,255,0.5)",marginTop:"6px"}},`"${tagName}" doesn't exist in the tags table yet.`));
    modal.append(hdr);
    const tStart=h("input",{class:"inp",type:"date"});
    const tEnd=h("input",{class:"inp",type:"date"});
    const tType=h("select",{class:"inp"});
    ["trip","event","recurring"].forEach(v=>tType.append(h("option",{value:v},v)));
    function mF(lbl,inp){const d=h("div");d.append(h("label",{class:"lbl"},lbl));d.append(inp);return d}
    function mR(...ch){const d=h("div",{style:{display:"grid",gridTemplateColumns:ch.length===2?"1fr 1fr":"1fr",gap:"12px",marginBottom:"14px"}});ch.forEach(x=>d.append(x));return d}
    modal.append(mR(mF("Start Date",tStart),mF("End Date",tEnd)));
    modal.append(mR(mF("Tag Type",tType)));
    const errEl=h("div",{style:{color:"var(--r)",fontSize:"11px",marginBottom:"8px",minHeight:"16px"}});
    modal.append(errEl);
    const btnRow=h("div",{style:{display:"grid",gridTemplateColumns:"1fr auto",gap:"8px"}});
    const createBtn=h("button",{class:"btn",style:{background:"rgba(129,178,154,0.2)",color:"var(--g)"},onClick:async()=>{
      if(!tStart.value||!tEnd.value){errEl.textContent="Start and end dates are required.";return}
      if(tEnd.value<tStart.value){errEl.textContent="End date must be after start date.";return}
      createBtn.textContent="Creating...";createBtn.disabled=true;
      try{
        await sb("tags",{method:"POST",headers:{"Prefer":"return=representation"},body:JSON.stringify({name:tagName,start_date:tStart.value,end_date:tEnd.value,tag_type:tType.value})});
        bg.remove();resolve();
      }catch(e){errEl.textContent="Failed: "+e.message;createBtn.textContent="Create Tag";createBtn.disabled=false}
    }},"Create Tag");
    const skipBtn=h("button",{class:"btn",style:{background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.4)",width:"auto",padding:"12px 20px"},onClick:()=>{bg.remove();resolve()}},"Skip");
    btnRow.append(createBtn,skipBtn);
    modal.append(btnRow);
    bg.append(modal);
    document.body.append(bg);
  });
}

const TABS=[["entry","+ new entry"],["income","income statement"],["balance","balance sheet"],["portfolio","portfolio"],["tags","tags"],["ledger","ledger"],["cashback","cashback"],["export","export"]];

function renderTabs(){
  const bar=document.getElementById("tabBar");
  bar.innerHTML="";
  const offline=!navigator.onLine;
  TABS.forEach(([id,label])=>{
    const disabled=offline&&(id==="entry"||id==="export");
    const b=h("button",{class:"tab"+(state.tab===id?" on":""),style:disabled?{opacity:"0.3",cursor:"default"}:{},onClick:()=>{state.tab=id;history.replaceState(null,null,"#"+id);renderTabs();renderContent()}},label);
    bar.append(b);
  });
  const so=h("button",{class:"tab",style:{color:"rgba(255,255,255,0.3)",borderColor:"transparent",fontSize:"11px"},onClick:()=>supabaseClient.auth.signOut()},"sign out");
  bar.append(so);
}

function renderContent(){
  const ob=document.getElementById("offlineBanner");if(ob)ob.classList.add("hidden");
  document.querySelectorAll(".batch-bar").forEach(b=>b.remove());
  const el=document.getElementById("content");
  el.innerHTML="";
  if(!navigator.onLine&&(state.tab==="entry"||state.tab==="export")){
    el.innerHTML=`<div class="cd" style="text-align:center;padding:48px 24px"><div style="font-size:32px;margin-bottom:12px">\uD83D\uDCE1</div><h3 style="margin-bottom:8px">Offline Mode</h3><p style="font-size:13px;color:rgba(255,255,255,0.5)">${state.tab==="entry"?"Adding new transactions":"Exporting data"} requires an internet connection.<br>Browse cached data in other tabs while offline.</p></div>`;
    return;
  }
  if(state.tab==="entry")renderEntry(el);
  else if(state.tab==="income"&&state.year==="all")renderCrossYear(el);
  else if(state.tab==="income")renderIS(el);
  else if(state.tab==="balance")renderBS(el);
  else if(state.tab==="portfolio")renderPortfolio(el);
  else if(state.tab==="tags")renderTags(el);
  else if(state.tab==="ledger")renderLedger(el);
  else if(state.tab==="cashback")renderCashback(el);
  else if(state.tab==="export")renderExport(el);
}

  sb("preferences?key=eq.inbound_email_address&select=value&limit=1").then(r=>{if(r?.[0]?.value){inboundAddr=r[0].value;addrSpan.textContent=inboundAddr}}).catch(()=>{});

  const emailReview=h("div");
  emailBody.append(emailReview);
  let emailCandidates=null;

  async function loadEmailImports(){
    emailReview.innerHTML="<div style='text-align:center;padding:20px;color:rgba(255,255,255,0.3)'>Loading...</div>";
    try{
      const rows=await sb("pending_imports?status=eq.pending&order=email_received_at.desc");
      if(!rows.length){emailReview.innerHTML="<div style='padding:16px;color:rgba(255,255,255,0.3);font-size:12px'>No pending imports</div>";return}
      emailCandidates=rows.map(r=>({
        _id:r.id,_status:"pending",_isDuplicate:false,_source:r.source,
        _emailSubject:r.email_subject,_emailBodyText:r.email_body_text,
        _parsedData:r.parsed_data||{},
        date:r.date,description:r.description||r.ai_description||r.email_subject,
        amount_usd:parseFloat(r.amount_usd)||0,category_id:r.category_id||r.ai_category||"other",
        ai_confidence:r.ai_confidence||"low",
        currency:r.currency||"USD",fx_rate:1,original_amount:parseFloat(r.amount_usd)||0,
        service_start:r.service_start||r.date,service_end:r.service_end||r.date,
        service_days:r.service_days||1,daily_cost:parseFloat(r.daily_cost)||parseFloat(r.amount_usd)||0,
        payment_type:r.payment_type||"Venmo",tag:r.tag||"",credit:r.credit||""
      }));
      const ptGroups={};
      for(const c of emailCandidates){const pt=c.payment_type;if(!ptGroups[pt])ptGroups[pt]=[];ptGroups[pt].push(c)}
      for(const[pt,group]of Object.entries(ptGroups)){await findDuplicates(group,pt)}
      renderEmailReviewTable(emailReview,emailCandidates);
    }catch(e){emailReview.innerHTML=`<div style="padding:16px;color:var(--r);font-size:12px">Error: ${e.message}</div>`}
  }

  emailCard.append(emailBody);
  el.append(emailCard);
  if(emailOpen){emailBody._loaded=true;loadEmailImports()}

  // ── Payslip Import Section (FEA-45) ──
  const psCard=h("div",{class:"cd"});
  let psOpen=false;
  const psHdr=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",cursor:"pointer"},onClick:()=>{
    psOpen=!psOpen;psArrow.textContent=psOpen?"\u25BE":"\u25B8";psBody.classList.toggle("hidden");
  }});
  const psArrow=h("span",{style:{fontSize:"10px",color:"rgba(255,255,255,0.4)"}},"\u25B8");
  psHdr.append(psArrow,h("h3",{style:{margin:"0"}},"\uD83D\uDCB0 Payslip Import"));
  psCard.append(psHdr);

  const psBody=h("div",{class:"hidden",style:{marginTop:"16px"}});
  let psCandidates=null;
  let psSkippedPages=[];

  const psFileInp=h("input",{class:"inp",type:"file",accept:".pdf,.csv"});
  const psDateInp=h("input",{class:"inp",type:"date",value:today()});
  const psStatus=h("div",{style:{fontSize:"12px",color:"rgba(255,255,255,0.4)",margin:"10px 0"},class:"hidden"});
  const psReview=h("div");

  const psBtn=h("button",{class:"btn",style:{background:"rgba(74,111,165,0.2)",color:"var(--b)"},onClick:async()=>{
    const file=psFileInp.files[0];
    if(!file)return alert("Choose a payslip PDF first.");
    psBtn.disabled=true;psBtn.textContent="Processing...";
    psStatus.classList.remove("hidden");
    psStatus.style.color="rgba(255,255,255,0.4)";
    psStatus.textContent="Parsing PDF...";
    try{
      if(!window.pdfjsLib)throw new Error("PDF parser not available. Reload the page.");
      const pages=await parsePayslipPDF(file);
      if(!pages.length)throw new Error("No payslip pages found. Is this a Pinterest payslip?");

      const active=pages.filter(p=>!p.isSkip);
      psSkippedPages=pages.filter(p=>p.isSkip);

      psStatus.textContent=`Found ${pages.length} payslip pages (${active.length} active, ${psSkippedPages.length} skipped)...`;

      const enteredDate=psDateInp.value||today();
      const txns=generatePayslipTransactions(pages,enteredDate);

      txns.forEach(c=>{
        c._status="pending";
        c._isDuplicate=false;
        c._rawDescription=c.description;
        c.currency="USD";c.fx_rate=1;
        c.original_amount=c.amount_usd;
        c.credit="";
        const ss=new Date(c.service_start+"T00:00:00"),se=new Date(c.service_end+"T00:00:00");
        c.service_days=Math.max(1,Math.floor((se-ss)/864e5)+1);
        c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
      });

      psCandidates=txns;

      psStatus.textContent="Checking for duplicates...";
      const ptGroups={};
      for(const c of txns){const pt=c.payment_type;if(!ptGroups[pt])ptGroups[pt]=[];ptGroups[pt].push(c)}
      for(const[pt,group] of Object.entries(ptGroups)){await findDuplicates(group,pt)}

      const dupes=txns.filter(c=>c._isDuplicate).length;
      psStatus.textContent=`${txns.length} transactions generated \u00b7 ${dupes} duplicates`;

      renderPayslipReviewTable(psReview,psCandidates,psSkippedPages);
    }catch(e){
      psStatus.textContent="Error: "+e.message;
      psStatus.style.color="var(--r)";
    }
    psBtn.disabled=false;psBtn.textContent="Import";
  }},"Import");

  psBody.append(row(field("Payslip PDF",psFileInp),field("Entered Date",psDateInp)));
  psBody.append(psBtn);
  psBody.append(psStatus);
  psBody.append(psReview);
  psCard.append(psBody);
  el.append(psCard);

}

function renderReviewTable(container,candidates){
  container.innerHTML="";
  const skipped=candidates.filter(c=>c._status==="skipped");
  const dupes=candidates.filter(c=>c._isDuplicate);
  const hi=candidates.filter(c=>c.ai_confidence==="high"&&c._status!=="skipped");
  const med=candidates.filter(c=>c.ai_confidence==="medium"&&c._status!=="skipped");
  const lo=candidates.filter(c=>c.ai_confidence==="low"&&c._status!=="skipped");

  const stats=h("div",{style:{fontSize:"12px",color:"rgba(255,255,255,0.5)",marginBottom:"12px"}},
    `${candidates.length} parsed \u00b7 ${skipped.length} auto-skipped \u00b7 ${dupes.length} duplicates \u00b7 ${hi.length} high \u00b7 ${med.length} medium \u00b7 ${lo.length} low confidence`);
  container.append(stats);

  const bulkBar=h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"12px"}});
  bulkBar.append(h("button",{class:"pg-btn",style:"color:var(--g);border-color:rgba(129,178,154,0.3)",onClick:()=>{
    candidates.forEach(c=>{if(c.ai_confidence==="high"&&c._status==="pending")c._status="approved"});
    renderReviewTable(container,candidates);
  }},"\u2713 Approve All High-Confidence"));
  bulkBar.append(h("button",{class:"pg-btn",style:"color:var(--b);border-color:rgba(74,111,165,0.3)",onClick:()=>{
    candidates.forEach(c=>{if(c._status==="pending")c._status="approved"});
    renderReviewTable(container,candidates);
  }},"\u2713 Approve All"));
  let saving=false;
  const saveBtn=h("button",{class:"pg-btn",style:"color:#fff;background:rgba(129,178,154,0.2);border-color:rgba(129,178,154,0.4);font-weight:600",onClick:async()=>{
    if(saving)return;
    const approved=candidates.filter(c=>c._status==="approved");
    if(!approved.length)return alert("No approved transactions to save.");
    saving=true;saveBtn.disabled=true;saveBtn.textContent="Saving...";
    try{
      const summary=await commitImport(candidates);
      renderReviewTable(container,candidates);
      showUndo(`\u2713 Imported ${summary.count} transactions`,async()=>{
        await sb(`transactions?import_batch=eq.${encodeURIComponent(summary.batchId)}`,{method:"DELETE"});
        state.txnCount-=summary.count;document.getElementById("dbStatus").textContent=`\u25CF ${state.txnCount.toLocaleString()} txns`;
      });
      const sumEl=h("div",{class:"preview",style:{marginTop:"12px"}});
      const dates=summary.imported.map(c=>c.date).sort();
      sumEl.innerHTML=`<div style="color:var(--g);font-weight:600;margin-bottom:6px">\u2713 Imported ${summary.count} transactions \u00b7 ${summary.skipped} skipped \u00b7 ${summary.dupes} duplicates</div>`;
      const viewBtn=h("button",{class:"pg-btn",style:"color:var(--b);border-color:rgba(74,111,165,0.3);margin-top:4px",onClick:()=>{
        state.tab="ledger";state.lf={cat:"",pt:"",dfrom:dates[0]||"",dto:dates[dates.length-1]||"",q:""};state.page=0;renderTabs();renderContent();
      }},"View in Ledger \u2192");
      sumEl.append(viewBtn);
      container.append(sumEl);
      saveBtn.textContent="Saved";
    }catch(e){
      console.error("commitImport error:",e);
      alert("Error saving: "+e.message);
      saveBtn.disabled=false;saveBtn.textContent="Save Approved";
    }
  }},"Save Approved");
  bulkBar.append(saveBtn);
  container.append(bulkBar);

  const wrap=h("div",{style:{overflowX:"auto"}});
  const tbl=h("table");
  const thead=h("thead");
  thead.innerHTML=`<tr><th style="width:36px"></th><th>Date</th><th>Description</th><th class="r">Amount</th><th>Category</th><th class="hide-m">Svc Period</th><th class="hide-m">Tag</th><th class="hide-m">Bank Cat</th></tr>`;
  tbl.append(thead);
  const tbody=h("tbody");

  candidates.forEach((c,idx)=>{
    const tr=h("tr",{style:{borderLeft:c._status==="approved"?"3px solid var(--g)":c._isDuplicate?"3px solid var(--y)":"3px solid transparent",opacity:c._status==="skipped"?"0.4":"1"}});

    const statusIcon=c._status==="approved"?"\u2713":c._status==="skipped"?"\u2715":c._status==="committed"?"\u2713":"\u25CB";
    const statusColor=c._status==="approved"?"var(--g)":c._status==="skipped"?"var(--r)":c._status==="committed"?"var(--b)":"rgba(255,255,255,0.3)";
    tr.append(h("td",{style:{cursor:c._status==="committed"?"default":"pointer",textAlign:"center",fontSize:"14px",color:statusColor,userSelect:"none"},onClick:()=>{
      if(c._status==="committed")return;
      if(c._isDuplicate&&c._status==="skipped")c._status="pending";
      else if(c._status==="pending")c._status="approved";
      else if(c._status==="approved")c._status="skipped";
      else c._status="pending";
      renderReviewTable(container,candidates);
    }},statusIcon));

    tr.append(h("td",{class:"m",style:{color:"rgba(255,255,255,0.55)",whiteSpace:"nowrap",cursor:"pointer"},onClick:()=>{if(c._status!=="committed")openImportEditModal(candidates,idx,container)}},fmtD(c.date)));

    const descTd=h("td",{style:{maxWidth:"220px",cursor:"pointer"},onClick:()=>{if(c._status!=="committed")openImportEditModal(candidates,idx,container)}});
    const descText=(c._isCCPayment?"\uD83D\uDCB3 ":"")+(c.description||c._rawDescription)+((c._linkToTransactionId||c._linkToStagedIdx!=null)?" \uD83D\uDD17":"");
    const descMain=h("div",{style:{color:c._status==="skipped"?"rgba(255,255,255,0.35)":"rgba(255,255,255,0.85)",textDecoration:c._status==="skipped"?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}});
    descMain.textContent=descText;
    if(c._isCCPayment){const pairHint=h("span",{style:{color:"rgba(255,255,255,0.3)",fontSize:"11px"}}," \u2192 Chase Chequing");descMain.append(pairHint)}
    const descSub=h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.25)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}});
    descSub.textContent=c._skipReason?c._skipReason+(c._rawDescription?" \u00b7 "+c._rawDescription:""):c._rawDescription;
    descTd.append(descMain,descSub);
    tr.append(descTd);

    tr.append(h("td",{class:"r m",style:{color:c.amount_usd<0?"var(--g)":"rgba(255,255,255,0.75)"}},fmtF(c.amount_usd)));

    const catTd=h("td");
    catTd.append(h("span",{style:{display:"inline-block",width:"6px",height:"6px",borderRadius:"50%",marginRight:"4px",background:c.ai_confidence==="high"?"var(--g)":c.ai_confidence==="medium"?"var(--y)":"var(--r)"}}));
    const catSel2=h("select",{style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"5px",padding:"3px 6px",color:"#e8e8e4",fontSize:"11px",fontFamily:"var(--sans)",cursor:"pointer",outline:"none"},onChange:e=>{
      c.category_id=e.target.value;
      c.service_start=getDefStart(c.category_id,c.date)||c.date;
      c.service_end=getDefEnd(c.category_id,c.service_start)||c.service_start;
      const ss=new Date(c.service_start+"T00:00:00"),se=new Date(c.service_end+"T00:00:00");
      c.service_days=Math.max(1,Math.floor((se-ss)/864e5)+1);
      c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
      propagateEdits(candidates,idx);
      renderReviewTable(container,candidates);
    }});
    CATS_LIST.forEach(cat=>{const o=h("option",{value:cat.id},cat.l);if(cat.id===c.category_id)o.selected=true;catSel2.append(o)});
    catTd.append(catSel2);
    tr.append(catTd);

    tr.append(h("td",{class:"m hide-m",style:{color:"rgba(255,255,255,0.4)",whiteSpace:"nowrap",fontSize:"11px"}},
      c.service_start===c.service_end?fmtD(c.date):`${fmtD(c.service_start)}\u2013${fmtD(c.service_end)}`));

    const tagTd=h("td",{class:"hide-m"});
    tagTd.append(h("input",{type:"text",value:c.tag||"",style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"5px",padding:"3px 6px",color:"#e8e8e4",fontSize:"11px",width:"70px",fontFamily:"var(--sans)",outline:"none"},onInput:e=>{c.tag=e.target.value}}));
    tr.append(tagTd);

    tr.append(h("td",{class:"hide-m",style:{color:"rgba(255,255,255,0.25)",fontSize:"11px"}},c._bankCategory));
    tbody.append(tr);
  });

  tbl.append(tbody);
  wrap.append(tbl);
  container.append(wrap);
}

function openImportEditModal(candidates,idx,reviewContainer){
  const c=candidates[idx];
  let seManual=false;
  const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg)bg.remove()}});
  const modal=h("div",{class:"modal"});

  // Header with close button
  const hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"20px"}});
  const hdrLeft=h("div");
  hdrLeft.append(h("h3",{style:{margin:"0"}},"Edit Transaction"));
  hdrLeft.append(h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.25)",marginTop:"4px"}},c._rawDescription));
  const closeBtn=h("span",{style:{cursor:"pointer",fontSize:"18px",color:"rgba(255,255,255,0.3)",lineHeight:"1"},onClick:()=>bg.remove()},"\u2715");
  hdr.append(hdrLeft,closeBtn);
  modal.append(hdr);

  function mRow(...ch){const d=h("div",{style:{display:"grid",gridTemplateColumns:ch.length===3?"1fr 1fr 1fr":ch.length===2?"1fr 1fr":"1fr",gap:"12px",marginBottom:"14px"}});ch.forEach(x=>d.append(x));return d}
  function mField(lbl,inp){const d=h("div");d.append(h("label",{class:"lbl"},lbl));d.append(inp);return d}

  const mDate=h("input",{class:"inp",type:"date",value:c.date,onInput:updatePreview});
  const mDesc=h("input",{class:"inp",type:"text",value:c.description||c._rawDescription});
  const rawRef=h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.2)",marginTop:"2px"}},"Bank: "+c._rawDescription);
  const descField=h("div");
  descField.append(h("label",{class:"lbl"},"Description"));
  descField.append(mDesc);
  descField.append(rawRef);

  const mAmt=h("input",{class:"inp",type:"number",step:"0.01",value:c.amount_usd,onInput:updatePreview});

  const mCat=h("select",{class:"inp",onChange:()=>{
    if(!seManual){mSs.value=getDefStart(mCat.value,c.date)||mSs.value;mSe.value=getDefEnd(mCat.value,mSs.value)||mSs.value;updateHint()}
    updatePreview();
  }});
  CATS_LIST.forEach(cat=>{const o=h("option",{value:cat.id},cat.l);if(cat.id===c.category_id)o.selected=true;mCat.append(o)});

  const mSs=h("input",{class:"inp",type:"date",value:c.service_start,onInput:()=>{
    if(!seManual){mSe.value=getDefEnd(mCat.value,mSs.value)||mSs.value}
    updatePreview();
  }});
  const mSe=h("input",{class:"inp",type:"date",value:c.service_end,onInput:()=>{
    seManual=true;mSe.style.borderColor="rgba(242,204,143,0.3)";updatePreview();
  }});
  const hintSpan=h("span",{style:{color:"rgba(129,178,154,0.6)",textTransform:"none",letterSpacing:"0",fontWeight:"400",fontSize:"10px"}});
  function updateHint(){const r=ACCRUAL_D[mCat.value];hintSpan.textContent=!seManual&&r?(r==="month"?"(Auto: full month)":`(Auto: ${r} days)`):""}
  updateHint();
  const seLbl=h("label",{class:"lbl"});seLbl.append("Service End ");seLbl.append(hintSpan);
  const seField=h("div");seField.append(seLbl);seField.append(mSe);

  const mPt=h("select",{class:"inp"});
  if(c.payment_type&&!PTS.includes(c.payment_type))mPt.append(h("option",{value:c.payment_type,selected:true},c.payment_type));
  PTS.forEach(p=>{const o=h("option",{value:p},p);if(p===c.payment_type)o.selected=true;mPt.append(o)});
  const mTag=h("input",{class:"inp",type:"text",value:c.tag||""});

  // Accrual preview
  const previewEl=h("div",{class:"preview hidden"});
  function updatePreview(){
    const a=parseFloat(mAmt.value);if(isNaN(a)||!mSs.value||!mSe.value){previewEl.classList.add("hidden");return}
    const ss=new Date(mSs.value+"T00:00:00"),se=new Date(mSe.value+"T00:00:00");
    if(se<ss){previewEl.classList.add("hidden");return}
    const days=Math.max(1,Math.floor((se-ss)/864e5)+1);
    const daily=a/days;
    previewEl.classList.remove("hidden");
    previewEl.innerHTML=`<div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Accrual Preview</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">USD Amount</div><div style="font-size:18px;font-weight:700;color:#fff;font-family:var(--mono)">${fmtF(a)}</div></div>
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">Service Days</div><div style="font-size:18px;font-weight:700;color:var(--b);font-family:var(--mono)">${days}</div></div>
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">Daily Cost</div><div style="font-size:18px;font-weight:700;color:var(--g);font-family:var(--mono)">${fmtF(daily)}/d</div></div>
    </div>`;
  }
  updatePreview();

  // Link to Transaction section
  const linkSection=h("div",{style:{marginTop:"12px",marginBottom:"4px"}});
  const linkBody=h("div");
  function renderImportLink(){
    linkBody.innerHTML="";
    const hasLink=c._linkToTransactionId||c._linkToStagedIdx!=null;
    if(hasLink){
      const info=c._linkDisplay||{};
      const isStaged=c._linkToStagedIdx!=null;
      const row=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 8px",background:isStaged?"rgba(242,204,143,0.12)":"rgba(74,111,165,0.12)",borderRadius:"4px",marginTop:"6px"}});
      const left=h("div");
      left.innerHTML=`<div style="color:rgba(255,255,255,0.7)">${isStaged?`<span style="font-size:9px;background:rgba(242,204,143,0.25);color:#F2CC8F;padding:1px 5px;border-radius:3px;margin-right:4px">Staged</span>`:""} ${info.description||"Transaction #"+(c._linkToTransactionId||"staged")}</div><div style="color:rgba(255,255,255,0.35);font-size:10px">${info.date?fmtD(info.date):""} \u00b7 ${info.category_id||""} \u00b7 ${info.payment_type||""}</div>`;
      row.append(left);
      const right=h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});
      if(info.amount_usd!=null)right.append(h("span",{style:{fontFamily:"var(--mono)",color:info.amount_usd<0?"var(--g)":"rgba(255,255,255,0.6)",whiteSpace:"nowrap"}},fmtF(info.amount_usd)));
      right.append(h("button",{class:"pg-btn",style:{fontSize:"9px",color:"rgba(224,122,95,0.7)",padding:"2px 6px"},onClick:()=>{
        delete c._linkToTransactionId;delete c._linkToGroupId;delete c._linkDisplay;delete c._linkToStagedIdx;
        renderImportLink();
      }},"Unlink"));
      row.append(right);
      linkBody.append(row);
      const changeBtn=h("button",{class:"pg-btn",style:{fontSize:"10px",color:"var(--b)",marginTop:"6px"},onClick:()=>{changeBtn.style.display="none";buildImportLinkSearch(linkBody)}},"\u2026 Change Link");
      linkBody.append(changeBtn);
    }else{
      const linkToggle=h("button",{class:"pg-btn",style:{fontSize:"10px",color:"var(--b)"},onClick:()=>{linkToggle.style.display="none";buildImportLinkSearch(linkBody)}},"\uD83D\uDD17 Link to Transaction");
      linkBody.append(linkToggle);
    }
  }
  function buildImportLinkSearch(container){
    const lsWrap=h("div",{style:{marginTop:"6px"}});
    const lsRow=h("div",{style:{display:"flex",gap:"6px",marginBottom:"8px"}});
    const lsInput=h("input",{class:"inp",type:"text",placeholder:"Search description...",style:{flex:"1",fontSize:"11px",padding:"5px 8px"}});
    const lsBtn=h("button",{class:"pg-btn",style:{fontSize:"10px",padding:"5px 10px"}},"Search");
    lsRow.append(lsInput,lsBtn);lsWrap.append(lsRow);
    const lsResults=h("div",{style:{maxHeight:"250px",overflowY:"auto"}});lsWrap.append(lsResults);
    async function doSearch(){
      const q=lsInput.value.trim();if(!q){lsResults.innerHTML="<div style='color:rgba(255,255,255,0.3);padding:8px'>Type a description to search</div>";return}
      lsBtn.textContent="...";lsBtn.disabled=true;
      try{
        // Search staged candidates first
        const ql=q.toLowerCase();
        const staged=candidates.map((sc,si)=>({sc,si})).filter(({sc,si})=>si!==idx&&sc._status!=="skipped"&&sc._status!=="committed"&&(sc.description||sc._rawDescription||"").toLowerCase().includes(ql)).slice(0,10);
        lsResults.innerHTML="";

async function commitImport(candidates){
  const approved=candidates.filter(c=>c._status==="approved");
  if(!approved.length)throw new Error("No approved transactions to save.");
  const valid=approved.filter(c=>c.date&&c.service_start&&c.service_end);
  if(valid.length<approved.length)console.warn(`commitImport: dropped ${approved.length-valid.length} rows with missing dates`);
  if(!valid.length)throw new Error("All approved transactions have invalid dates.");
  const batchId="import-"+new Date().toISOString().slice(0,16);
  const rows=valid.map(c=>({
    date:c.date,service_start:c.service_start,service_end:c.service_end,
    description:c.description,category_id:c.category_id,
    original_amount:c.original_amount,currency:c.currency,fx_rate:c.fx_rate,
    amount_usd:Math.round(c.amount_usd*100)/100,
    payment_type:c.payment_type,tag:(c.tag||"").toLowerCase().trim(),
    daily_cost:c.daily_cost,service_days:c.service_days,credit:c.credit||"",
    import_batch:batchId,bank_description:c._rawDescription||null,bank_category:c._bankCategory||null
  }));
  // Generate Side B rows for CC payments and track pairs for linking
  const ccPairs=valid.filter(c=>c._isCCPayment&&c._ccPaymentPair);
  const ccLinkPairs=[];// [{sideAIdx, sideBIdx}] — indices into rows array
  if(ccPairs.length){
    const ccDates=ccPairs.map(c=>c.date).sort();
    const existingCQ=await sb(`transactions?payment_type=eq.${encodeURIComponent("Chase Chequing")}&date=gte.${ccDates[0]}&date=lte.${ccDates[ccDates.length-1]}&select=date,amount_usd`);
    for(const c of ccPairs){
      const p=c._ccPaymentPair;
      const isDupe=existingCQ.some(e=>e.date===c.date&&Math.abs(Math.abs(e.amount_usd)-p.amount)<0.02);
      if(!isDupe){
        const sideAIdx=valid.indexOf(c);
        const sideBIdx=rows.length;
        ccLinkPairs.push({sideAIdx,sideBIdx});
        rows.push({
          date:c.date,service_start:c.service_start,service_end:c.service_end,
          description:p.description,category_id:"financial",
          original_amount:p.amount,currency:c.currency,fx_rate:c.fx_rate,
          amount_usd:Math.round(p.amount*100)/100,
          payment_type:p.payment_type,tag:(c.tag||"").toLowerCase().trim(),
          daily_cost:p.amount,service_days:1,credit:"",
          import_batch:batchId,bank_description:null,bank_category:null
        });
      }
    }
  }
  const uniqueTags=[...new Set(rows.map(r=>r.tag).filter(Boolean))];
  for(const t of uniqueTags)await ensureTagExists(t);
  const inserted=await sb("transactions",{method:"POST",headers:{"Prefer":"return=representation"},body:JSON.stringify(rows)});
  state.txnCount+=rows.length;
  document.getElementById("dbStatus").textContent=`\u25CF ${state.txnCount.toLocaleString()} txns`;
  // Link CC payment Side A ↔ Side B pairs
  for(const pair of ccLinkPairs){
    const sideA=inserted[pair.sideAIdx];
    const sideB=inserted[pair.sideBIdx];
    if(sideA?.id&&sideB?.id)await linkToGroup(sideA,sideB);
  }
  // Apply pre-set links from import edit modal (DB links)
  for(let i=0;i<valid.length;i++){
    const c=valid[i];
    if(!c._linkToTransactionId)continue;
    const ins=inserted[i];if(!ins||!ins.id)continue;
    const targetGroup=c._linkToGroupId||Math.min(ins.id,c._linkToTransactionId);
    await sb(`transactions?id=eq.${ins.id}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({transaction_group_id:targetGroup})});
    if(!c._linkToGroupId){
      await sb(`transactions?id=eq.${c._linkToTransactionId}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({transaction_group_id:targetGroup})});
    }
  }
  // Apply staged-to-staged links
  const stagedLinked=new Set();
  for(let i=0;i<valid.length;i++){
    const c=valid[i];
    if(c._linkToStagedIdx==null)continue;
    const linkedCand=candidates[c._linkToStagedIdx];
    const linkedIdx=valid.indexOf(linkedCand);
    if(linkedIdx===-1)continue;// linked candidate was skipped
    const pairKey=[Math.min(i,linkedIdx),Math.max(i,linkedIdx)].join(",");
    if(stagedLinked.has(pairKey))continue;// avoid double-linking A→B and B→A
    stagedLinked.add(pairKey);
    const insA=inserted[i],insB=inserted[linkedIdx];
    if(insA?.id&&insB?.id)await linkToGroup(insA,insB);
  }
  valid.forEach(c=>c._status="committed");
  return{
    count:valid.length,
    imported:valid,
    skipped:candidates.filter(c=>c._status==="skipped").length,
    dupes:candidates.filter(c=>c._isDuplicate).length,
    batchId
  };
}

function renderEmailReviewTable(container,candidates){

    if(!appr.length)return alert("No approved transactions to save.");
    saving=true;saveBtn.disabled=true;saveBtn.textContent="Saving...";
    try{
      const summary=await commitEmailImports(candidates);
      renderEmailReviewTable(container,candidates);
      showUndo(`\u2713 Imported ${summary.count} transactions`,async()=>{
        await sb(`transactions?import_batch=eq.${encodeURIComponent(summary.batchId)}`,{method:"DELETE"});
        for(const pid of summary.pendingIds)await sb(`pending_imports?id=eq.${pid}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({status:"approved",committed_at:null})});
        state.txnCount-=summary.count;document.getElementById("dbStatus").textContent=`\u25CF ${state.txnCount.toLocaleString()} txns`;
      });
      const sumEl=h("div",{class:"preview",style:{marginTop:"12px"}});

      sumEl.innerHTML=`<div style="color:var(--g);font-weight:600;margin-bottom:6px">\u2713 Committed ${summary.count} transactions \u00b7 ${summary.skipped} skipped \u00b7 ${summary.dupes} duplicates</div>`;
      sumEl.append(h("button",{class:"pg-btn",style:"color:var(--b);border-color:rgba(74,111,165,0.3);margin-top:4px",onClick:()=>{
        state.tab="ledger";state.lf={cat:"",pt:"",dfrom:dates[0]||"",dto:dates[dates.length-1]||"",q:""};state.page=0;renderTabs();renderContent();

      alert("Error saving: "+e.message);
      saveBtn.disabled=false;saveBtn.textContent="Save Approved";
    }
  }},"Save Approved");
  bulkBar.append(saveBtn);

  const skippedItems=candidates.filter(c=>c._status==="skipped");
  if(skippedItems.length){
    const dismissBtn=h("button",{class:"pg-btn",style:"color:var(--r);border-color:rgba(224,122,95,0.3)",onClick:async()=>{
      if(dismissBtn.dataset.confirm!=="1"){dismissBtn.dataset.confirm="1";dismissBtn.textContent="Confirm Dismiss";setTimeout(()=>{dismissBtn.dataset.confirm="0";dismissBtn.textContent="\u2715 Dismiss Skipped ("+skippedItems.length+")"},3000);return}
      dismissBtn.textContent="Dismissing...";dismissBtn.disabled=true;
      try{
        for(const c of skippedItems)await sb(`pending_imports?id=eq.${c._id}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({status:"dismissed"})});
        const remaining=candidates.filter(c=>c._status!=="skipped");

        renderEmailReviewTable(container,candidates);
      }catch(e){alert("Dismiss failed: "+e.message);dismissBtn.textContent="\u2715 Dismiss Skipped ("+skippedItems.length+")";dismissBtn.disabled=false}
    }},"\u2715 Dismiss Skipped ("+skippedItems.length+")");
    bulkBar.append(dismissBtn);

    const statusIcon=c._status==="approved"?"\u2713":c._status==="skipped"?"\u2715":c._status==="committed"?"\u2713":"\u25CB";
    const statusColor=c._status==="approved"?"var(--g)":c._status==="skipped"?"var(--r)":c._status==="committed"?"var(--b)":"rgba(255,255,255,0.3)";
    tr.append(h("td",{style:{cursor:c._status==="committed"?"default":"pointer",textAlign:"center",fontSize:"14px",color:statusColor,userSelect:"none"},onClick:()=>{
      if(c._status==="committed")return;
      if(c._isDuplicate&&c._status==="skipped")c._status="pending";
      else if(c._status==="pending")c._status="approved";
      else if(c._status==="approved")c._status="skipped";
      else c._status="pending";
      renderEmailReviewTable(container,candidates);
    }},statusIcon));

    tr.append(h("td",{class:"m",style:{color:"rgba(255,255,255,0.55)",whiteSpace:"nowrap",cursor:"pointer"},onClick:()=>{if(c._status!=="committed")openEmailEditModal(candidates,idx,container)}},fmtD(c.date)));

    tr.append(h("td",{class:"hide-m"},[h("span",{style:{padding:"2px 6px",borderRadius:"4px",fontSize:"10px",fontWeight:"600",background:srcColors[c._source]||srcColors.unknown}},c._source||"unknown")]));

    const descTd=h("td",{style:{maxWidth:"220px",cursor:"pointer"},onClick:()=>{if(c._status!=="committed")openEmailEditModal(candidates,idx,container)}});
    const descMain=h("div",{style:{color:c._status==="skipped"?"rgba(255,255,255,0.35)":"rgba(255,255,255,0.85)",textDecoration:c._status==="skipped"?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}});
    descMain.textContent=c.description;
    const descSub=h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.25)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}});
    descSub.textContent=c._skipReason||c._emailSubject||"";
    descTd.append(descMain,descSub);
    tr.append(descTd);

    tr.append(h("td",{class:"r m",style:{color:c.amount_usd<0?"var(--g)":"rgba(255,255,255,0.75)"}},fmtF(c.amount_usd)));

    const catTd=h("td");

    const catSel=h("select",{style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"5px",padding:"3px 6px",color:"#e8e8e4",fontSize:"11px",fontFamily:"var(--sans)",cursor:"pointer",outline:"none"},onChange:e=>{
      c.category_id=e.target.value;
      c.service_start=getDefStart(c.category_id,c.date)||c.date;
      c.service_end=getDefEnd(c.category_id,c.service_start)||c.service_start;
      const ss=new Date(c.service_start+"T00:00:00"),se=new Date(c.service_end+"T00:00:00");
      c.service_days=Math.max(1,Math.floor((se-ss)/864e5)+1);
      c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
      renderEmailReviewTable(container,candidates);
    }});
    CATS_LIST.forEach(cat=>{const o=h("option",{value:cat.id},cat.l);if(cat.id===c.category_id)o.selected=true;catSel.append(o)});
    catTd.append(catSel);
    tr.append(catTd);

    tr.append(h("td",{class:"hide-m",style:{color:"rgba(255,255,255,0.4)",fontSize:"11px"}},c.payment_type));

    const tagTd=h("td",{class:"hide-m"});
    tagTd.append(h("input",{type:"text",value:c.tag||"",style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"5px",padding:"3px 6px",color:"#e8e8e4",fontSize:"11px",width:"70px",fontFamily:"var(--sans)",outline:"none"},onInput:e=>{c.tag=e.target.value}}));
    tr.append(tagTd);

  });

  tbl.append(tbody);
  wrap.append(tbl);
  container.append(wrap);

        state.txnCount-=summary.count;document.getElementById("dbStatus").textContent=`\u25CF ${state.txnCount.toLocaleString()} txns`;

  groups.forEach(grp=>{
    const grpTxns=groupMap[grp];
    const pd=grpTxns[0]?._pageData;

    // Group header row
    const hdrTr=h("tr",{style:{background:"rgba(255,255,255,0.03)"}});
    const hdrTd=h("td",{style:{padding:"8px 10px",fontSize:"12px",fontWeight:"600",color:"rgba(255,255,255,0.6)",borderBottom:"1px solid rgba(255,255,255,0.06)"}});
    hdrTd.setAttribute("colspan","6");
    hdrTd.textContent="\u2500\u2500 "+grp+" ";
    if(pd&&!pd.isRSU&&!pd.isSkip){
      const expectedNet=Math.round((pd.earningsTotal-pd.gtl-pd.employeeTaxTotal-pd.preTaxTotal-pd.postTaxTotal)*100)/100;
      const diff=Math.abs(expectedNet-pd.netPay);
      const chk=h("span",{style:{fontSize:"10px",fontWeight:"400",color:diff>0.02?"var(--r)":"rgba(255,255,255,0.3)"}},
        ` \u00b7 Net Pay: ${fmtF(pd.netPay)}`+(diff>0.02?` \u26a0 (expected ${fmtF(expectedNet)})`:" \u2713"));
      hdrTd.append(chk);
    }
    hdrTr.append(hdrTd);
    tbody.append(hdrTr);

    // Transaction rows
    grpTxns.forEach(c=>{
      const idx=candidates.indexOf(c);
      const tr=h("tr",{style:{borderLeft:c._status==="approved"?"3px solid var(--g)":c._isDuplicate?"3px solid var(--y)":"3px solid transparent",opacity:c._status==="skipped"?"0.4":"1"}});

      const statusIcon=c._status==="approved"?"\u2713":c._status==="skipped"?"\u2715":c._status==="committed"?"\u2713":"\u25CB";
      const statusColor=c._status==="approved"?"var(--g)":c._status==="skipped"?"var(--r)":c._status==="committed"?"var(--b)":"rgba(255,255,255,0.3)";
      tr.append(h("td",{style:{cursor:c._status==="committed"?"default":"pointer",textAlign:"center",fontSize:"14px",color:statusColor,userSelect:"none"},onClick:()=>{
        if(c._status==="committed")return;
        if(c._isDuplicate&&c._status==="skipped")c._status="pending";
        else if(c._status==="pending")c._status="approved";
        else if(c._status==="approved")c._status="skipped";
        else c._status="pending";
        renderPayslipReviewTable(container,candidates,skippedPages);
      }},statusIcon));

      const descTd=h("td",{style:{maxWidth:"220px",cursor:"pointer"},onClick:()=>{if(c._status!=="committed")openPayslipEditModal(candidates,idx,container,skippedPages)}});
      const descMain=h("div",{style:{color:c._status==="skipped"?"rgba(255,255,255,0.35)":"rgba(255,255,255,0.85)",textDecoration:c._status==="skipped"?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}});
      descMain.textContent=c.description;
      const descSub=h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.25)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}});
      descSub.textContent=c._skipReason||"";
      descTd.append(descMain,descSub);
      tr.append(descTd);

      tr.append(h("td",{class:"r m",style:{color:c.amount_usd<0?"var(--g)":"rgba(255,255,255,0.75)"}},fmtF(c.amount_usd)));

      const catTd=h("td");
      const catSel=h("select",{style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"5px",padding:"3px 6px",color:"#e8e8e4",fontSize:"11px",fontFamily:"var(--sans)",cursor:"pointer",outline:"none"},onChange:e=>{
        c.category_id=e.target.value;
        c.service_start=getDefStart(c.category_id,c.date||c.service_start)||c.service_start;
        c.service_end=getDefEnd(c.category_id,c.service_start)||c.service_end;
        const ss2=new Date(c.service_start+"T00:00:00"),se2=new Date(c.service_end+"T00:00:00");
        c.service_days=Math.max(1,Math.floor((se2-ss2)/864e5)+1);
        c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
        renderPayslipReviewTable(container,candidates,skippedPages);
      }});
      CATS_LIST.forEach(cat=>{const o=h("option",{value:cat.id},cat.l);if(cat.id===c.category_id)o.selected=true;catSel.append(o)});
      catTd.append(catSel);
      tr.append(catTd);

      tr.append(h("td",{class:"m hide-m",style:{color:"rgba(255,255,255,0.4)",whiteSpace:"nowrap",fontSize:"11px"}},
        c.service_start===c.service_end?fmtD(c.service_start):`${fmtD(c.service_start)}\u2013${fmtD(c.service_end)}`));

      tr.append(h("td",{class:"hide-m",style:{color:"rgba(255,255,255,0.4)",fontSize:"11px"}},c.payment_type));

      tbody.append(tr);
    });
  });

  // Skipped periods
  if(skippedPages&&skippedPages.length){
    skippedPages.forEach(p=>{
      const tr=h("tr",{style:{opacity:"0.35"}});
      const td=h("td",{style:{padding:"6px 10px",fontSize:"11px",fontStyle:"italic",color:"rgba(255,255,255,0.3)"}});
      td.setAttribute("colspan","6");
      td.textContent=`\u26a0 ${fmtD(p.payPeriodBegin)} \u2013 ${fmtD(p.payPeriodEnd)}: Skipped (YTD-only stub, $0 current pay)`;
      tr.append(td);
      tbody.append(tr);
    });
  }

  tbl.append(tbody);
  wrap.append(tbl);
  container.append(wrap);
}

async function commitEmailImports(candidates){
  const approved=candidates.filter(c=>c._status==="approved");
  if(!approved.length)throw new Error("No approved transactions to save.");
  const valid=approved.filter(c=>c.date&&c.service_start&&c.service_end);
  if(valid.length<approved.length)console.warn(`commitEmailImports: dropped ${approved.length-valid.length} rows with missing dates`);
  if(!valid.length)throw new Error("All approved transactions have invalid dates.");
  const batchId="email-"+new Date().toISOString().slice(0,16);
  const rows=valid.map(c=>({
    date:c.date,service_start:c.service_start,service_end:c.service_end,
    description:c.description,category_id:c.category_id,
    original_amount:c.original_amount||c.amount_usd,currency:c.currency||"USD",fx_rate:c.fx_rate||1,
    amount_usd:Math.round(c.amount_usd*100)/100,
    payment_type:c.payment_type,tag:(c.tag||"").toLowerCase().trim(),
    daily_cost:c.daily_cost,service_days:c.service_days,credit:c.credit||"",
    import_batch:batchId
  }));
  const uniqueTags=[...new Set(rows.map(r=>r.tag).filter(Boolean))];
  for(const t of uniqueTags)await ensureTagExists(t);
  const created=await sb("transactions",{method:"POST",headers:{"Prefer":"return=representation"},body:JSON.stringify(rows)});
  const now=new Date().toISOString();
  for(const c of valid){
    await sb(`pending_imports?id=eq.${c._id}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({status:"committed",committed_at:now})});
  }
  state.txnCount+=rows.length;
  document.getElementById("dbStatus").textContent=`\u25CF ${state.txnCount.toLocaleString()} txns`;
  valid.forEach(c=>c._status="committed");
  const banner=document.getElementById("emailImportBanner");
  if(banner)banner.remove();
  state.pendingEmails=0;
  // Trigger reimbursement auto-linking for newly committed Venmo reimbursements
  const newReimb=valid.filter(c=>c.amount_usd<0&&c.payment_type==="Venmo");
  if(newReimb.length)setTimeout(()=>scanForReimbursementLinks().catch(e=>console.error("Post-commit link scan:",e)),1000);
  // Auto-link Rakuten cashback to parent purchases and create cashback_redemptions
  const rakutenCB=valid.filter(c=>c._parsedData?.type==="cashback_earned"&&c._parsedData?.store_name);
  if(rakutenCB.length&&created?.length)setTimeout(()=>linkRakutenCashback(rakutenCB,valid,created).catch(e=>console.error("Rakuten cashback link:",e)),1000);
  return{
    count:valid.length,
    imported:valid,
    skipped:candidates.filter(c=>c._status==="skipped").length,
    dupes:candidates.filter(c=>c._isDuplicate).length,
    batchId,
    pendingIds:valid.map(c=>c._id)
  };
}

async function linkRakutenCashback(rakutenCandidates,allValid,createdTxns){
  for(const c of rakutenCandidates){
    const idx=allValid.indexOf(c);
    const newTxn=createdTxns[idx];
    if(!newTxn?.id)continue;
    const store=c._parsedData.store_name;
    const searchDate=c._parsedData.order_date||c.date;
    const from=new Date(new Date(searchDate).getTime()-30*864e5).toISOString().slice(0,10);
    const to=new Date(new Date(searchDate).getTime()+30*864e5).toISOString().slice(0,10);
    try{
      const matches=await sb(`transactions?description=ilike.*${encodeURIComponent(store)}*&date=gte.${from}&date=lte.${to}&amount_usd=gt.0&order=date.desc&limit=5`);
      if(matches.length){
        const parent=matches[0];
        await linkToGroup(parent,{id:newTxn.id,transaction_group_id:newTxn.transaction_group_id||null});
        // Update category and service dates to match parent purchase
        const patch={};
        if(parent.category_id)patch.category_id=parent.category_id;
        if(parent.service_start)patch.service_start=parent.service_start;
        if(parent.service_end)patch.service_end=parent.service_end;
        if(parent.service_start&&parent.service_end){
          const sd=Math.max(1,Math.round((new Date(parent.service_end)-new Date(parent.service_start))/864e5)+1);
          patch.service_days=sd;
          patch.daily_cost=Math.round(c.amount_usd/sd*1e6)/1e6;
        }
        if(Object.keys(patch).length)await sb(`transactions?id=eq.${newTxn.id}`,{method:"PATCH",headers:{"Prefer":"return=minimal"},body:JSON.stringify(patch)});
        const dv=Math.abs(c.amount_usd);
        await sb("cashback_redemptions",{method:"POST",headers:{"Prefer":"return=minimal"},body:JSON.stringify({
          date:c.date,item:c.description,payment_type:"Rakuten",
          cashback_type:"Dollar Value",redemption_amount:dv,redemption_rate:1,
          dollar_value:dv,transaction_id:newTxn.id
        })});
        console.log(`Rakuten: linked "${c.description}" to "${parent.description}" (cat: ${parent.category_id}) + created cashback record`);
      }else{
        console.log(`Rakuten: no parent found for "${store}" around ${searchDate}`);
        // Still create cashback_redemptions even without parent link
        const dv=Math.abs(c.amount_usd);
        await sb("cashback_redemptions",{method:"POST",headers:{"Prefer":"return=minimal"},body:JSON.stringify({
          date:c.date,item:c.description,payment_type:"Rakuten",
          cashback_type:"Dollar Value",redemption_amount:dv,redemption_rate:1,
          dollar_value:dv,transaction_id:newTxn.id
        })});
      }
    }catch(e){console.error(`Rakuten link error for "${store}":`,e)}
  }
}

async function commitPayslipImport(candidates){
  const approved=candidates.filter(c=>c._status==="approved");
  if(!approved.length)throw new Error("No approved transactions to save.");
  const valid=approved.filter(c=>c.date&&c.service_start&&c.service_end);
  if(valid.length<approved.length)console.warn(`commitPayslipImport: dropped ${approved.length-valid.length} rows with missing dates`);
  if(!valid.length)throw new Error("All approved transactions have invalid dates.");
  const batchId="payslip-"+new Date().toISOString().slice(0,16);
  const rows=valid.map(c=>({
    date:c.date,service_start:c.service_start,service_end:c.service_end,
    description:c.description,category_id:c.category_id,
    original_amount:c.amount_usd,currency:"USD",fx_rate:1,
    amount_usd:Math.round(c.amount_usd*100)/100,
    payment_type:c.payment_type,tag:(c.tag||"").toLowerCase().trim(),
    daily_cost:c.daily_cost,service_days:c.service_days,credit:"",
    import_batch:batchId
  }));
  const uniqueTags=[...new Set(rows.map(r=>r.tag).filter(Boolean))];
  for(const t of uniqueTags)await ensureTagExists(t);
  const created=await sb("transactions",{method:"POST",headers:{"Prefer":"return=representation"},body:JSON.stringify(rows)});
  // Auto-link payslip groups by _group
  const groupMap={};
  valid.forEach((c,i)=>{if(c._group&&created[i]){if(!groupMap[c._group])groupMap[c._group]=[];groupMap[c._group].push(created[i].id)}});
  for(const ids of Object.values(groupMap)){
    if(ids.length<2)continue;
    const gid=Math.min(...ids);
    await sb(`transactions?id=in.(${ids.join(",")})`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({transaction_group_id:gid})});
  }
  state.txnCount+=rows.length;
  document.getElementById("dbStatus").textContent=`\u25CF ${state.txnCount.toLocaleString()} txns`;
  valid.forEach(c=>c._status="committed");
  return{
    count:valid.length,
    imported:valid,
    skipped:candidates.filter(c=>c._status==="skipped").length,
    dupes:candidates.filter(c=>c._isDuplicate).length,
    batchId
  };
}

async function scanForReimbursementLinks(){
  try{
    const cutoff=new Date(Date.now()-90*864e5).toISOString().slice(0,10);
    const reimbursements=await sb(
      `transactions?payment_type=eq.Venmo&amount_usd=lt.0`+
      `&transaction_group_id=is.null&date=gte.${cutoff}`+
      `&select=id,date,description,amount_usd,category_id,tag`
    );
    if(!reimbursements.length)return;
    const expandedCutoff=new Date(Date.now()-120*864e5).toISOString().slice(0,10);
    const expenses=await sb(
      `transactions?amount_usd=gt.0&transaction_group_id=is.null`+
      `&date=gte.${expandedCutoff}`+
      `&select=id,date,description,amount_usd,category_id,payment_type,tag,service_start,service_end,transaction_group_id`
    );
    const links=[];
    for(const reimb of reimbursements){
      const reimbAmt=Math.abs(reimb.amount_usd);
      const noteMatch=reimb.description.match(/Reimbursed - (.+?)(?:\s*\(.+?\))?\s*-\s*\w+$/);
      const reimbNote=noteMatch?noteMatch[1].toLowerCase().trim():"";
      let bestMatch=null,bestScore=0;
      for(const exp of expenses){
        let score=0;
        if(reimbAmt>exp.amount_usd*1.05)continue;
        const ratio=reimbAmt/exp.amount_usd;
        const CLEAN_FRACTIONS=[1,1/2,1/3,1/4,1/5,2/3,3/4,2/5,3/5,4/5];
        const isCleanFraction=CLEAN_FRACTIONS.some(f=>Math.abs(ratio-f)<0.03);
        if(Math.abs(reimbAmt-exp.amount_usd)<1.0)score+=40;
        else if(isCleanFraction)score+=35;
        else if(reimbAmt<exp.amount_usd)score+=10;
        const daysDiff=Math.abs((new Date(reimb.date)-new Date(exp.date))/864e5);
        if(daysDiff<=3)score+=25;
        else if(daysDiff<=14)score+=20;
        else if(daysDiff<=30)score+=10;
        else if(daysDiff<=90)score+=5;
        else continue;
        const expDesc=exp.description.toLowerCase();
        if(reimbNote&&expDesc.includes(reimbNote))score+=35;
        else if(reimbNote){
          const words=reimbNote.split(/\s+/).filter(w=>w.length>=3);
          const matches=words.filter(w=>expDesc.includes(w));
          if(matches.length>0)score+=15*(matches.length/words.length);
        }
        if(reimb.category_id&&reimb.category_id===exp.category_id)score+=10;
        if(reimb.tag&&reimb.tag===exp.tag)score+=10;
        if(score>bestScore){bestScore=score;bestMatch=exp}
      }
      if(bestMatch&&bestScore>=60){
        links.push({reimbursement:reimb,expense:bestMatch,score:bestScore});
        expenses.splice(expenses.indexOf(bestMatch),1);
      }
    }
    // Filter out previously rejected pairs
    const filtered=links.filter(l=>!isLinkRejected(l.reimbursement.id,l.expense.id));
    if(filtered.length>0)showLinkConfirmModal(filtered);
  }catch(e){console.error("Link scan error:",e)}
}

function rejectedLinkKey(idA,idB){return[idA,idB].sort((a,b)=>a-b).join(":")}
function isLinkRejected(idA,idB){
  try{const s=localStorage.getItem("rejected_links");if(!s)return false;return JSON.parse(s).includes(rejectedLinkKey(idA,idB))}
  catch(e){return false}
}
function rejectLinks(links){
  try{
    const s=localStorage.getItem("rejected_links");
    const existing=s?JSON.parse(s):[];
    links.forEach(l=>{const k=rejectedLinkKey(l.reimbursement.id,l.expense.id);if(!existing.includes(k))existing.push(k)});
    localStorage.setItem("rejected_links",JSON.stringify(existing));
  }catch(e){console.warn("Failed to save rejected links:",e)}
}

async function applyReimbursementLinks(links){
  for(const link of links){
    const expDate=link.expense.date,expSS=link.expense.service_start||expDate,expSE=link.expense.service_end||expDate;
    const reimbSD=Math.round((new Date(expSE)-new Date(expSS))/864e5)+1;
    const reimbDC=link.reimbursement.amount_usd/reimbSD;
    const groupId=link.expense.transaction_group_id||Math.min(link.expense.id,link.reimbursement.id);
    await sb(`transactions?id=eq.${link.reimbursement.id}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({
      transaction_group_id:groupId,
      date:expDate,service_start:expSS,service_end:expSE,
      service_days:reimbSD,daily_cost:reimbDC,
      ...(link.reimbursement.category_id==="other"?{category_id:link.expense.category_id}:{})
    })});
    if(!link.expense.transaction_group_id){
      await sb(`transactions?id=eq.${link.expense.id}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({transaction_group_id:groupId})});
    }
  }
  console.log(`Linked ${links.length} reimbursement(s)`);
}

async function linkToGroup(txnA,txnB){
  const gA=txnA.transaction_group_id,gB=txnB.transaction_group_id;
  let targetGroup;
  if(gA&&gB&&gA!==gB){
    targetGroup=Math.min(gA,gB);const oldGroup=Math.max(gA,gB);
    await sb(`transactions?transaction_group_id=eq.${oldGroup}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({transaction_group_id:targetGroup})});
  }else if(gA){targetGroup=gA}
  else if(gB){targetGroup=gB}
  else{targetGroup=Math.min(txnA.id,txnB.id)}
  const ids=[txnA.id,txnB.id].filter(id=>{const t=id===txnA.id?txnA:txnB;return t.transaction_group_id!==targetGroup});
  if(ids.length){await sb(`transactions?id=in.(${ids.join(",")})`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({transaction_group_id:targetGroup})})}
  txnA.transaction_group_id=targetGroup;txnB.transaction_group_id=targetGroup;
  return targetGroup;
}

async function unlinkFromGroup(txnId,groupId){
  await sb(`transactions?id=eq.${txnId}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({transaction_group_id:null})});
  const remaining=await sb(`transactions?transaction_group_id=eq.${groupId}&select=id`);
  if(remaining.length<=1&&remaining.length>0){
    await sb(`transactions?id=eq.${remaining[0].id}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({transaction_group_id:null})});
  }
}

async function fetchReimburseFriends(){
  const reimbRows=await sb("transactions?description=like.Reimbursed*&amount_usd=lt.0&select=description,date&order=date.desc&limit=5000");
  const seen={};const result=[];
  for(const r of reimbRows){const m=r.description.match(/-\s*(\w+)\s*$/);if(m){const name=m[1].trim();if(!seen[name]){seen[name]=true;result.push(name)}}}
  return result.slice(0,15);
}

async function createReimbursement(originalTxn,person,splitRatio,paymentType,note){
  const reimbAmount=Math.round(-(originalTxn.amount_usd*splitRatio)*100)/100;
  const ss=originalTxn.service_start||originalTxn.date;
  const se=originalTxn.service_end||originalTxn.date;
  const serviceDays=Math.max(1,Math.round((new Date(se)-new Date(ss))/864e5)+1);
  const dailyCost=Math.round(reimbAmount/serviceDays*1e6)/1e6;
  const firstName=person.split(" ")[0];
  const description=`Reimbursed - ${originalTxn.description} - ${firstName}`;
  const newTxn={
    date:originalTxn.date,
    service_start:ss,
    service_end:se,
    description,
    category_id:originalTxn.category_id,
    original_amount:reimbAmount,
    currency:"USD",
    fx_rate:1,
    amount_usd:reimbAmount,
    payment_type:paymentType,
    tag:(originalTxn.tag||"").toLowerCase().trim(),
    daily_cost:dailyCost,
    service_days:serviceDays,
    credit:""
  };
  const result=await sb("transactions",{method:"POST",headers:{"Prefer":"return=representation"},body:JSON.stringify(newTxn)});
  const newId=result[0]?.id;
  if(newId){
    const newTxnObj={id:newId,transaction_group_id:null};
    await linkToGroup(originalTxn,newTxnObj);
  }
  state.txnCount++;
  return result;
}

    // Budget vs Actual chart (single-year only)
    const bgt=state.year!=="all"?getBudgetTargets(state.year):null;
    if(bgt&&totI>0){
      const budgetCard=h("div",{class:"cd"});
