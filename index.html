function openPasteModal(onDone){
  const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg)bg.remove()}});
  const modal=h("div",{class:"modal",style:{maxWidth:"800px"}});
  const hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"20px"}});
  hdr.append(h("h3",{style:{margin:"0"}},"Paste Transactions"));
  hdr.append(h("span",{style:{cursor:"pointer",fontSize:"18px",color:"rgba(255,255,255,0.3)",lineHeight:"1"},onClick:()=>bg.remove()},"\u2715"));
  modal.append(hdr);
  modal.append(h("div",{style:{fontSize:"11px",color:"rgba(255,255,255,0.4)",marginBottom:"12px"}},"Paste TSV rows (from Copy or a spreadsheet). Header row is optional."));

  const ta=h("textarea",{class:"inp",style:{width:"100%",height:"120px",fontFamily:"'JetBrains Mono',monospace",fontSize:"11px",resize:"vertical",boxSizing:"border-box"},placeholder:"Date\tService Start\tService End\tDescription\tCategory\t..."});
  modal.append(ta);

  const previewArea=h("div",{style:{marginTop:"12px"}});
  modal.append(previewArea);

  const btnRow=h("div",{style:{display:"flex",gap:"12px",marginTop:"16px"}});
  let parsed=[];

  // Reverse category map: display name -> category_id
  const catMap={};
  CATS_LIST.forEach(c=>{
    catMap[c.l.toLowerCase()]=c.id;
    // Also map without " (other)" suffix
    const plain=c.l.replace(/\s*\(other\)\s*/i,"").toLowerCase();
    catMap[plain]=c.id;
  });

  const HEADER_COLS=["date","service start","service end","description","category","original amount","currency","amount usd","payment type","credit","tags","daily cost"];

  function parseTSV(text){
    const lines=text.trim().split("\n").filter(l=>l.trim());
    if(!lines.length)return[];
    // Detect header row
    const first=lines[0].split("\t").map(c=>c.trim().toLowerCase());
    const hasHeader=first[0]==="date"&&first.length>=4;
    const dataLines=hasHeader?lines.slice(1):lines;
    return dataLines.map(line=>{
      const cols=line.split("\t");
      // Unquote description (TSV-quoted with "" escaping)
      const rawDesc=(cols[3]||"").trim();
      const desc=rawDesc.startsWith('"')&&rawDesc.endsWith('"')?rawDesc.slice(1,-1).replace(/""/g,'"'):rawDesc;
      const catStr=(cols[4]||"").trim().toLowerCase();
      const catId=catMap[catStr]||"other";
      const date=(cols[0]||"").trim();
      const ss=(cols[1]||"").trim()||date;
      const se=(cols[2]||"").trim()||date;
      const origAmt=parseFloat(cols[5])||0;
      const currency=(cols[6]||"").trim()||"USD";
      const amtUsd=parseFloat(cols[7])||origAmt;
      const pt=(cols[8]||"").trim()||"Chase Sapphire";
      const credit=(cols[9]||"").trim();
      const tag=(cols[10]||"").trim().toLowerCase();
      // Compute service_days and daily_cost
      const d0=new Date(ss),d1=new Date(se);
      const sDays=isNaN(d0)||isNaN(d1)?1:Math.max(1,Math.round((d1-d0)/(864e5))+1);
      const dc=amtUsd/sDays;
      return{date,service_start:ss,service_end:se,description:desc,category_id:catId,
        original_amount:origAmt,currency,amount_usd:Math.round(amtUsd*100)/100,
        payment_type:pt,credit,tag,daily_cost:Math.round(dc*1e6)/1e6,service_days:sDays,_catDisplay:cols[4]||""};
    }).filter(r=>r.date&&r.description&&r.amount_usd);
  }

  function showPreview(){
    previewArea.innerHTML="";
    parsed=parseTSV(ta.value);
    if(!parsed.length){previewArea.append(h("div",{style:{color:"rgba(255,255,255,0.4)",fontSize:"12px"}},"No valid rows found."));importBtn.disabled=true;return}
    previewArea.append(h("div",{style:{fontSize:"12px",marginBottom:"8px"}},`${parsed.length} row${parsed.length>1?"s":""} parsed`));
    const wrap=h("div",{style:{maxHeight:"240px",overflow:"auto"}});
    const tbl=h("table",{class:"tbl",style:{fontSize:"11px"}});
    tbl.innerHTML=`<thead><tr><th>Date</th><th>Description</th><th>Category</th><th style="text-align:right">Amount</th><th>Payment</th><th>Tag</th></tr></thead>`;
    const tbody=h("tbody");
    parsed.forEach(r=>{
      const tr=h("tr");
      tr.innerHTML=`<td>${r.date}</td><td>${r.description.length>40?r.description.slice(0,40)+"...":r.description}</td><td>${r._catDisplay}</td><td style="text-align:right">${fmtT(r.amount_usd)}</td><td>${r.payment_type}</td><td>${r.tag}</td>`;
      tbody.append(tr);
    });
    tbl.append(tbody);
    wrap.append(tbl);
    previewArea.append(wrap);
    importBtn.disabled=false;
    importBtn.textContent=`Import ${parsed.length} row${parsed.length>1?"s":""}`;
  }

  const parseBtn=h("button",{class:"btn",style:{width:"auto",padding:"10px 20px"},onClick:showPreview},"Parse");

  const importBtn=h("button",{class:"btn",style:{width:"auto",padding:"10px 20px",background:"rgba(42,157,143,0.25)"},disabled:true,onClick:async()=>{
    if(!parsed.length)return;
    importBtn.disabled=true;importBtn.textContent="Importing...";
    try{
      const batchId="paste-"+new Date().toISOString().slice(0,16);
      const rows=parsed.map(r=>({
        date:r.date,service_start:r.service_start,service_end:r.service_end,
        description:r.description,category_id:r.category_id,
        original_amount:r.original_amount,currency:r.currency,
        amount_usd:r.amount_usd,payment_type:r.payment_type,
        credit:r.credit,tag:r.tag,daily_cost:r.daily_cost,
        service_days:r.service_days,import_batch:batchId
      }));
      // Ensure tags exist
      const uniqueTags=[...new Set(rows.map(r=>r.tag).filter(Boolean))];
      for(const t of uniqueTags)await ensureTagExists(t);
      await sb("transactions",{method:"POST",headers:{"Prefer":"return=representation"},body:JSON.stringify(rows)});
      state.txnCount+=rows.length;
      document.getElementById("dbStatus").textContent=`\u25CF ${state.txnCount.toLocaleString()} txns`;
      bg.remove();
      showUndo(`\u2713 Pasted ${rows.length} transaction${rows.length>1?"s":""}`,async()=>{
        await sb(`transactions?import_batch=eq.${encodeURIComponent(batchId)}`,{method:"DELETE"});
        state.txnCount-=rows.length;document.getElementById("dbStatus").textContent=`\u25CF ${state.txnCount.toLocaleString()} txns`;
        onDone();
      });
      onDone();
    }catch(e){
      importBtn.disabled=false;importBtn.textContent=`Import ${parsed.length} rows`;
      alert("Paste import failed: "+e.message);
    }
  }},`Import ${parsed.length||0} rows`);

  const cancelBtn=h("button",{class:"btn",style:{background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.4)",width:"auto",padding:"10px 20px"},onClick:()=>bg.remove()},"Cancel");
  btnRow.append(parseBtn,importBtn,cancelBtn);
  modal.append(btnRow);
  bg.append(modal);
  document.body.append(bg);
  // Auto-parse if textarea already has content (e.g. from paste event)
  ta.addEventListener("paste",()=>setTimeout(showPreview,50));
}

async function doBatchLink(txns,onDone){
  if(txns.length<2){alert("Select at least 2 transactions to link.");return}
  // Determine target group: use min ID, merge any existing groups
  const existingGroups=new Set(txns.filter(t=>t.transaction_group_id).map(t=>t.transaction_group_id));
  const allIds=txns.map(t=>t.id);
  const targetGroup=Math.min(...allIds,...(existingGroups.size?existingGroups:[]));

  try{
    // Merge any existing groups into target
    for(const gid of existingGroups){
      if(gid!==targetGroup){
        await sb(`transactions?transaction_group_id=eq.${gid}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({transaction_group_id:targetGroup})});
      }
    }
    // Set all selected to target group
    await sb(`transactions?id=in.(${allIds.join(",")})`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({transaction_group_id:targetGroup})});
    const msg=document.getElementById("ledgerOkMsg");
    if(msg){msg.textContent=`Linked ${txns.length} items`;msg.classList.remove("hidden");setTimeout(()=>msg.classList.add("hidden"),2500)}
    onDone();
  }catch(e){alert("Batch link failed: "+e.message)}
}

        const spTd=h("td",{class:"m hide-m",style:{color:"rgba(255,255,255,0.4)",whiteSpace:"nowrap"}});
        spTd.append(document.createTextNode(fmtD(summary.serviceStart)+"\u2013"+fmtD(summary.serviceEnd)));str.append(spTd);
        // Daily cost (not meaningful for group)
        str.append(h("td",{class:"r m hide-m",style:{color:"var(--g)"}},fmtF(Math.round(summary.netDailyCost*1e6)/1e6)));
        // Tag
        const tagTd=h("td",{style:{color:"rgba(255,255,255,0.35)",fontSize:"11px"}});
        if(summary.dominantTag)tagTd.append(h("span",{style:{background:"rgba(255,255,255,0.06)",padding:"2px 7px",borderRadius:"4px"}},summary.dominantTag));
        str.append(tagTd);
        tbody.append(str);
        // Child rows
        const members=groupMembers[gid]||[];
        members.forEach(m=>{
          const childTr=renderNormalRow(m,true);
          childTr.setAttribute("data-grp-child",gid);
          childTr.style.display=isExpanded?"table-row":"none";
          tbody.append(childTr);
        });
      } else if(!isLinked||gSize<2){
        // Normal ungrouped row
        tbody.append(renderNormalRow(t,false));
      }
      // Skip individual group members that were already rendered as children
    });
    tbl.append(tbody);wrap.append(tbl);
    const body=document.getElementById("ledgerBody");body.innerHTML="";body.append(wrap);
    document.getElementById("ldgChkAll")?.addEventListener("change",e=>{
      const checked=e.target.checked;
      currentTxns.forEach(t=>{if(checked)selected.add(t.id);else selected.delete(t.id)});
      document.querySelectorAll(".ldg-chk:not(#ldgChkAll)").forEach(c=>c.checked=checked);
      updateBatchBar();
    });
  }
  loadPage();
}

// CROSS-YEAR SUMMARY
// ●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●●

async function renderCrossYear(el){
  el.innerHTML=`<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px">
    <div><h2>Income Statement</h2><p class="sub">Cross-year summary · USD · All Years</p></div>
    <div class="tabs" id="yearTabs"></div></div><div id="isBody"><div style="text-align:center;padding:60px;color:rgba(255,255,255,0.3)">Loading...</div></div>`;
  const yt=document.getElementById("yearTabs");
  ["all",2023,2024,2025,2026].forEach(y=>{const b=h("button",{class:"tab"+(state.year===y?" on":""),onClick:()=>{state.year=y;history.replaceState(null,null,y==="all"?"#income-all":"#income");renderContent()}},y==="all"?"All":String(y));yt.append(b)});

  try{
    const years=[2017,2018,2019,2020,2021,2022,2023,2024,2025,2026];
    const results=await Promise.all(years.map(y=>sbRPC("get_income_statement",{p_year:y})));
    const body=document.getElementById("isBody");body.innerHTML="";

    const yearData=years.map((y,i)=>{
      const data=results[i];
      let inc=0,exp=0,inv=0;
      const cats={};
      for(const r of data){
        const amt=parseFloat(r.amount)||0;
        if(r.category_id==="income"){inc+=Math.abs(amt);continue}
        if(r.category_id==="adjustment")continue;
        if(r.category_id==="investment"){inv+=amt;continue}
        exp+=amt;
        const p=Object.entries(SUB_MAP).find(([,subs])=>subs.includes(r.category_id));
        const pid=p?p[0]:r.category_id;
        cats[pid]=(cats[pid]||0)+amt;
      }
      return{year:y,inc,exp,inv,net:inc-exp,rate:inc>0?(inc-exp)/inc:0,cats};
    }).filter(d=>d.inc>0||d.exp>0);

    const totI=yearData.reduce((s,d)=>s+d.inc,0);
    const totE=yearData.reduce((s,d)=>s+d.exp,0);
    const totInv=yearData.reduce((s,d)=>s+d.inv,0);
    const stats=h("div",{class:"g5"});
    stats.append(statCard("💵","total income",fmtN(totI),"var(--b)"));
    stats.append(statCard("📊","total expenses",fmtN(totE),"var(--r)"));
    stats.append(statCard("✨","total saved",fmtN(totI-totE),"var(--g)"));
    stats.append(statCard("📈","avg savings rate",totI>0?((totI-totE)/totI*100).toFixed(1)+"%":"—","var(--y)"));
    stats.append(statCard("📊","unrealized G/L",(totInv<0?"+":totInv>0?"-":"")+fmtN(totInv),totInv<=0?"var(--g)":"var(--r)"));
    body.append(stats);

    const chartCard=h("div",{class:"cd"});
    chartCard.innerHTML=`<h3>Annual Cash Flow</h3><div class="chrt"><canvas id="crossYearChart"></canvas></div>`;
    body.append(chartCard);
    // Waterfall: income goes up from 0, expenses float from net to income, net is the remainder
    setTimeout(()=>makeChart("crossYearChart",{type:"bar",data:{labels:yearData.map(d=>d.year),datasets:[
      {label:"Income",data:yearData.map(d=>Math.round(d.inc)),backgroundColor:"rgba(74,111,165,0.75)",borderRadius:4},
      {label:"Expenses",data:yearData.map(d=>[Math.round(d.net),Math.round(d.inc)]),backgroundColor:"rgba(224,122,95,0.75)",borderRadius:4},
      {label:"Net Savings",data:yearData.map(d=>Math.round(d.net)),backgroundColor:"rgba(129,178,154,0.7)",borderRadius:4,borderColor:"rgba(129,178,154,0.9)",borderWidth:1},
      {label:"Savings Rate",data:yearData.map(d=>d.rate*100),type:"line",borderColor:"#F2CC8F",backgroundColor:"rgba(242,204,143,0.1)",borderWidth:2,pointRadius:3,pointBackgroundColor:"#F2CC8F",fill:false,yAxisID:"y1"}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"rgba(255,255,255,0.6)",font:{size:11},usePointStyle:true,pointStyleWidth:16}}},scales:{x:{ticks:{color:"rgba(255,255,255,0.4)"},grid:{display:false}},y:{ticks:{color:"rgba(255,255,255,0.4)",callback:v=>fmtN(v)},grid:{color:"rgba(255,255,255,0.04)"}},y1:{position:"right",min:0,max:100,ticks:{color:"rgba(242,204,143,0.6)",callback:v=>String(v).padStart(3)+"%",font:{size:10,family:"'JetBrains Mono',monospace"}},grid:{display:false}}}}}),50);

    const tblCard=h("div",{class:"cd"});
    const cyExpCats=PARENT_CATS;
    let thtml=`<h3>Annual Detail</h3><div style="overflow-x:auto"><table><thead><tr><th>Year</th><th class="r">Income</th><th class="r">Expenses</th><th class="r">Net</th><th class="r">Rate</th>`;
    cyExpCats.forEach(c=>thtml+=`<th class="r hide-m">${c[0].toUpperCase()+c.slice(1,5)}</th>`);
    thtml+=`<th class="r hide-m" style="color:#264653">G/L</th>`;
    thtml+=`</tr></thead><tbody>`;
    yearData.forEach(d=>{
      thtml+=`<tr><td style="font-weight:600">${d.year}</td><td class="r m" style="color:var(--b)">${fmtT(Math.round(d.inc))}</td><td class="r m" style="color:var(--r)">${fmtT(Math.round(d.exp))}</td><td class="r m" style="color:var(--g)">${fmtT(Math.round(d.net))}</td><td class="r m" style="color:var(--y)">${(d.rate*100).toFixed(1)}%</td>`;
      cyExpCats.forEach(c=>thtml+=`<td class="r m hide-m" style="color:rgba(255,255,255,0.5)">${d.cats[c]?fmtT(Math.round(d.cats[c])):""}</td>`);
      thtml+=`<td class="r m hide-m" style="color:#264653;font-weight:600">${Math.abs(d.inv)>0.5?fmtT(Math.round(d.inv)):""}</td>`;
      thtml+=`</tr>`;
    });
    thtml+=`</tbody></table></div>`;
    tblCard.innerHTML=thtml;
    body.append(tblCard);
  }catch(e){document.getElementById("isBody").innerHTML=`<div class="cd" style="color:var(--r)">Error: ${e.message}</div>`}
}

  <div class="cd"><h3>Export Transactions</h3><p style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:14px">TSV format compatible with your original Numbers spreadsheet.</p>

    <button onclick="exportTSV('new')" style="display:inline-block;padding:10px 20px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,0.03);color:var(--g);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)">🆕 New Only (since import)</button>

    <button onclick="exportJSON()" style="display:inline-block;padding:10px 20px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,0.03);color:var(--g);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)">💾 Full JSON Backup</button>
  </div></div>
  <div class="cd"><h3>Import Status</h3><p style="font-size:12px;color:rgba(255,255,255,0.4)">${state.txnCount.toLocaleString()} transactions in Supabase. Original import: 12,010 rows (Jun 2017 – Feb 2026).</p></div>`;
  const lastId=localStorage.getItem("disciplan_last_export_id");
  const lastDate=localStorage.getItem("disciplan_last_export_date");
  const sinceBtn=document.getElementById("sinceExportBtn");
  if(sinceBtn)sinceBtn.textContent=lastDate?`📤 Since Last Export (${lastDate})`:"📤 Since Last Export (first run)";
}

async function exportTSV(mode){
  try{
    let all=[];let off=0;
    let filter="";
    if(mode==="new")filter="&id=gt.12010";
    else if(mode==="since"){const lastId=localStorage.getItem("disciplan_last_export_id");if(lastId)filter="&id=gt."+lastId}
    const base="transactions?order=date.asc"+filter;
    while(true){const b=await sb(`${base}&limit=1000&offset=${off}`);all=all.concat(b);if(b.length<1000)break;off+=1000}
    if(mode==="since"&&!all.length){alert("No new transactions since last export.");return}
    const pMap={accommodation:"Entertainment",games:"Entertainment",groceries:"Food",restaurant:"Food",rent:"Home",furniture:"Home",clothes:"Personal",tech:"Personal"};
    const lines=["Date\tService Start\tService End\tDescription\tCategory\tOriginal Amount\tCurrency\tAmount USD\tPayment Type\tCredit\tTags\tDaily Cost"];
    for(const t of all){
      const cat=pMap[t.category_id]||(t.category_id?t.category_id[0].toUpperCase()+t.category_id.slice(1):"");
      lines.push([t.date,t.service_start,t.service_end,'"'+t.description.replace(/"/g,'""')+'"',cat,t.original_amount,t.currency,t.amount_usd,t.payment_type,t.credit||"",t.tag||"",t.daily_cost].join("\t"));
    }
    const label=mode==="new"?"new_":mode==="since"?"since_":"";
    dlFile(lines.join("\n"),"disciplan_"+label+"export_"+new Date().toISOString().slice(0,10)+".tsv","text/tab-separated-values");
    // Track last export high-water mark (only for "since" mode)
    if(mode==="since"&&all.length){
      const maxId=Math.max(...all.map(t=>t.id));
      const prev=parseInt(localStorage.getItem("disciplan_last_export_id")||"0");
      if(maxId>prev){localStorage.setItem("disciplan_last_export_id",String(maxId));localStorage.setItem("disciplan_last_export_date",today())}
    }
  }catch(e){alert("Export error: "+e.message)}
}

async function exportJSON(){
  try{
    const [txns,accts,tags,snaps]=await Promise.all([
      sb("transactions?order=date.asc&limit=50000"),sb("accounts?order=id"),sb("tags?order=start_date.desc"),sb("balance_snapshots?order=snapshot_date.desc&limit=500")
    ]);
    dlFile(JSON.stringify({exported:today(),transactions:txns,accounts:accts,tags,balance_snapshots:snaps},null,2),"disciplan_backup_"+new Date().toISOString().slice(0,10)+".json","application/json");
  }catch(e){alert("Export error: "+e.message)}
}

function dlFile(content,filename,type){
  const blob=new Blob([content],{type});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);
}

async function init(){
  // Restore tab from URL hash
  const validTabs=TABS.map(t=>t[0]);
  const hash=location.hash.slice(1);
  if(hash==="income-all"){state.tab="income";state.year="all"}
  else if(validTabs.includes(hash)){state.tab=hash}
  if(!location.hash)history.replaceState(null,null,"#"+state.tab);

  renderTabs();
  fetchLiveFX();
  try{
    const r=await fetch(`${SB_URL}/rest/v1/transactions?select=id&limit=1`,{headers:authHeaders({Prefer:"count=exact"})});
    if(!r.ok)throw new Error(r.status);
    const count=r.headers.get("content-range")?.split("/")[1];
    state.txnCount=count?parseInt(count):0;
    document.getElementById("dbStatus").textContent=`● ${state.txnCount.toLocaleString()} txns`;
    document.getElementById("dbStatus").style.color="var(--g)";
  }catch(e){
    document.getElementById("dbStatus").textContent="● disconnected";
    document.getElementById("dbStatus").style.color="var(--r)";
  }
  // Check for pending email imports
  try{
    const pr=await fetch(`${SB_URL}/rest/v1/pending_imports?status=eq.pending&select=id&limit=1`,{headers:authHeaders({Prefer:"count=exact"})});
    if(pr.ok){
      const pc=pr.headers.get("content-range")?.split("/")[1];
      state.pendingEmails=pc?parseInt(pc):0;
      if(state.pendingEmails>0){
        const old=document.getElementById("emailImportBanner");
        if(old)old.remove();
        const banner=document.createElement("div");
        banner.id="emailImportBanner";
        banner.style.cssText="background:rgba(74,111,165,0.15);color:var(--b);text-align:center;padding:6px 12px;font-size:11px;border-bottom:1px solid rgba(74,111,165,0.2);cursor:pointer";
        banner.innerHTML=`\u{1F4E7} ${state.pendingEmails} pending email import${state.pendingEmails>1?"s":""} — <b>Review</b>`;
        banner.onclick=()=>{state.tab="entry";renderTabs();renderContent();setTimeout(()=>document.getElementById("emailImportSection")?.scrollIntoView({behavior:"smooth"}),100)};
        document.querySelector(".hdr").after(banner);
      }
    }
  }catch(e){/* silent — non-critical */}
  // Auto-link reimbursements (fire-and-forget, don't block app load)
  scanForReimbursementLinks().catch(e=>console.error("Link scan error:",e));
  // Refresh button handler
  document.getElementById("refreshBtn").addEventListener("click",function(){
    this.classList.add("spinning");
    this.addEventListener("animationend",()=>this.classList.remove("spinning"),{once:true});
    renderContent();
  });
  // Online/offline reactivity (FEA-23)
  window.addEventListener('online',()=>{document.getElementById("offlineBanner")?.classList.add("hidden");renderTabs();if(state.tab==="entry"||state.tab==="export")renderContent()});
  window.addEventListener('offline',()=>{renderTabs();if(state.tab==="entry"||state.tab==="export")renderContent()});
  renderContent();
}

function showLogin() {
  document.getElementById('loginScreen').classList.remove('hidden');
  document.querySelector('.hdr').classList.add('hidden');
  document.getElementById('content').classList.add('hidden');
  document.querySelector('.foot').classList.add('hidden');
}

function showApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.querySelector('.hdr').classList.remove('hidden');
  document.getElementById('content').classList.remove('hidden');
  document.querySelector('.foot').classList.remove('hidden');
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  const btn = e.target.querySelector('button');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email: document.getElementById('loginEmail').value,
      password: document.getElementById('loginPass').value
    });
    if (error) throw error;
    currentSession = data.session;
    showApp();
    init();
  } catch (err) {
    errEl.textContent = err.message || 'Invalid login credentials';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});

async function checkAuthAndInit() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  currentSession = session;

  if (session) {
    showApp();
    init();
  } else {
    showLogin();
  }

  supabaseClient.auth.onAuthStateChange((event, session) => {
    currentSession = session;
    if (event === 'SIGNED_OUT') {
      showLogin();
    }
  });
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(reg=>console.log('SW registered, scope:',reg.scope)).catch(err=>console.warn('SW registration failed:',err));
  navigator.serviceWorker.addEventListener('message',event=>{

      const banner=document.createElement('div');banner.id='updateBanner';

      banner.innerHTML='New version available \u2014 <u>Refresh</u>';banner.onclick=()=>location.reload();
      const hdr=document.querySelector('.hdr');if(hdr)hdr.before(banner);
    }
  });
}
