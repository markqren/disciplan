.logo{font-size:20px;font-weight:700;letter-spacing:-0.03em;color:#fff}
.dbst{font-size:10px;font-family:var(--mono);margin-left:10px}
.tabs{display:flex;gap:5px;flex-wrap:wrap}

.tab.on{border-color:rgba(129,178,154,0.4);background:rgba(129,178,154,0.12);color:var(--g)}
.mn{padding:24px;max-width:1200px;margin:0 auto}
.cd{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:24px;margin-bottom:16px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.st{padding:18px 20px;display:flex;flex-direction:column;gap:6px}
.st-l{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--dim);font-weight:500}
.st-v{font-size:24px;font-weight:700;font-family:var(--mono);letter-spacing:-0.02em;line-height:1.1}

.r{text-align:right}

.lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.4);font-weight:500;margin-bottom:4px;display:block}
.inp{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 12px;color:#e8e8e4;font-size:13px;outline:none;width:100%;font-family:var(--sans);transition:border-color 0.15s ease}
.inp:focus{border-color:rgba(129,178,154,0.4)}

.pg-btn:disabled{opacity:0.3;cursor:default}
.hidden{display:none!important}
.acct-grp{margin-bottom:16px}
.acct-hdr{display:flex;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}

const TABS=[["entry","+ new entry"],["income","income statement"],["balance","balance sheet"],["tags","tags"],["ledger","ledger"],["export","export"]];

function renderTabs(){
  const bar=document.getElementById("tabBar");
  bar.innerHTML="";
  TABS.forEach(([id,label])=>{
    const b=h("button",{class:"tab"+(state.tab===id?" on":""),onClick:()=>{state.tab=id;renderTabs();renderContent()}},label);
    bar.append(b);
  });
}

function renderContent(){
  const el=document.getElementById("content");
  el.innerHTML="";
  if(state.tab==="entry")renderEntry(el);
  else if(state.tab==="income"&&state.year==="all")renderCrossYear(el);
  else if(state.tab==="income")renderIS(el);
  else if(state.tab==="balance")renderBS(el);
  else if(state.tab==="tags")renderTags(el);
  else if(state.tab==="ledger")renderLedger(el);
  else if(state.tab==="export")renderExport(el);
}

function statCard(icon,label,value,color){
  const d=h("div",{class:"cd st"});
  d.innerHTML=`<div class="st-l">${icon?icon+" ":""}${label}</div><div class="st-v" style="color:${color}">${value}</div>`;
  return d;
}

function renderEntry(el){
  const card=h("div",{class:"cd"});
  card.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h3 style="margin:0">New Transaction</h3><span id="okMsg" class="ok-msg hidden">вњ“ Saved to Supabase</span></div>`;

  const t=today();
  let f={date:t,desc:"",cat:"groceries",amt:"",cur:"USD",pt:"Chase Sapphire",tag:"",fx:"",ss:t,se:getDefEnd("groceries",t),seManual:false};

  function row(...children){const d=h("div",{style:{display:"grid",gridTemplateColumns:children.length===3?"1fr 1fr 1fr":children.length===2?"1fr 1fr":"1fr 2fr",gap:"12px",marginBottom:"14px"}});children.forEach(c=>d.append(c));return d}
  function field(lbl,input){const d=h("div");d.append(h("label",{class:"lbl"},lbl));d.append(input);return d}

  const dateInp=h("input",{class:"inp",type:"date",value:f.date,onInput:e=>{f.date=e.target.value}});
  const descInp=h("input",{class:"inp",type:"text",placeholder:"e.g., Whole Foods groceries",onInput:e=>{f.desc=e.target.value}});

  const catSel=h("select",{class:"inp",onChange:e=>{f.cat=e.target.value;if(!f.seManual){f.se=getDefEnd(f.cat,f.ss)||f.ss;seInp.value=f.se;updateHint()}updatePreview()}});
  CATS_LIST.forEach(c=>{const o=h("option",{value:c.id},c.l);if(c.id==="groceries")o.selected=true;catSel.append(o)});

  const amtInp=h("input",{class:"inp",type:"number",step:"0.01",placeholder:"0.00",onInput:e=>{f.amt=e.target.value;updatePreview()}});
  const curSel=h("select",{class:"inp",onChange:e=>{f.cur=e.target.value;fxRow.style.display=f.cur!=="USD"?"grid":"none";updatePreview()}});
  CURS.forEach(c=>curSel.append(h("option",{value:c},c)));

  const ssInp=h("input",{class:"inp",type:"date",value:f.ss,onInput:e=>{f.ss=e.target.value;if(!f.seManual){f.se=getDefEnd(f.cat,f.ss)||f.ss;seInp.value=f.se}updatePreview()}});
  const seInp=h("input",{class:"inp",type:"date",value:f.se,onInput:e=>{f.se=e.target.value;f.seManual=true;seInp.style.borderColor="rgba(242,204,143,0.3)";updatePreview()}});
  const hintSpan=h("span",{style:{color:"rgba(129,178,154,0.6)",textTransform:"none",letterSpacing:"0",fontWeight:"400",fontSize:"10px"}});
  function updateHint(){const r=ACCRUAL_D[f.cat];hintSpan.textContent=!f.seManual&&r?(r==="month"?"(Auto: end of month)":`(Auto: ${r} days)`):""}
  updateHint();
  const seLbl=h("label",{class:"lbl"});seLbl.append("Service End ");seLbl.append(hintSpan);

  const fxInp=h("input",{class:"inp",type:"number",step:"0.0001",onInput:e=>{f.fx=e.target.value;updatePreview()}});
  const fxRow=h("div",{style:{display:"none",gridTemplateColumns:"1fr 2fr",gap:"12px",marginBottom:"14px"}});
  fxRow.append(field("FX Rate",fxInp));
  fxRow.append(h("div",{style:{display:"flex",alignItems:"flex-end",paddingBottom:"4px"}},h("span",{style:{fontSize:"11px",color:"rgba(255,255,255,0.25)"}},"Leave blank for default rate.")));

  const ptSel=h("select",{class:"inp",onChange:e=>f.pt=e.target.value});
  PTS.forEach(p=>{const o=h("option",{value:p},p);if(p==="Chase Sapphire")o.selected=true;ptSel.append(o)});
  const tagInp=h("input",{class:"inp",type:"text",placeholder:"e.g., cozumel",onInput:e=>f.tag=e.target.value});

  const previewEl=h("div",{class:"preview hidden",id:"entryPreview"});
  function updatePreview(){
    const a=parseFloat(f.amt);if(isNaN(a)||!f.ss||!f.se){previewEl.classList.add("hidden");return}
    const ss=new Date(f.ss+"T00:00:00"),se=new Date(f.se+"T00:00:00");
    if(se<ss){previewEl.classList.add("hidden");return}
    const days=Math.max(1,Math.floor((se-ss)/864e5)+1);
    const fx=f.fx?parseFloat(f.fx):DFX[f.cur]||1;
    const usd=f.cur==="USD"?a:a*fx;
    const daily=usd/days;
    previewEl.classList.remove("hidden");
    previewEl.innerHTML=`<div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Accrual Preview</div>
    <div style="display:grid;grid-template-columns:${f.cur!=="USD"?"1fr 1fr 1fr 1fr":"1fr 1fr 1fr"};gap:12px">
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">USD Amount</div><div style="font-size:18px;font-weight:700;color:#fff;font-family:var(--mono)">${fmtF(usd)}</div></div>
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">Service Days</div><div style="font-size:18px;font-weight:700;color:var(--b);font-family:var(--mono)">${days}</div></div>
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">Daily Cost</div><div style="font-size:18px;font-weight:700;color:var(--g);font-family:var(--mono)">${fmtF(daily)}/d</div></div>
      ${f.cur!=="USD"?`<div><div style="font-size:10px;color:rgba(255,255,255,0.25)">FX Rate</div><div style="font-size:18px;font-weight:700;color:var(--y);font-family:var(--mono)">${fx}</div></div>`:""}
    </div>`;
  }

  const submitBtn=h("button",{class:"btn",style:{background:"rgba(129,178,154,0.2)",color:"var(--g)"},onClick:async()=>{
    const a=parseFloat(f.amt);if(isNaN(a)||!f.desc)return;
    const fx=f.fx?parseFloat(f.fx):DFX[f.cur]||1;
    const isInc=f.cat==="income";
    const orig=isInc?-Math.abs(a):a;
    const usd=f.cur==="USD"?orig:orig*fx;
    const ss=new Date(f.ss+"T00:00:00"),se=new Date(f.se+"T00:00:00");
    const days=Math.max(1,Math.floor((se-ss)/864e5)+1);
    submitBtn.textContent="Saving...";
    try{
      await sb("transactions",{method:"POST",body:JSON.stringify({date:f.date,service_start:f.ss,service_end:f.se,description:f.desc,category_id:f.cat,original_amount:orig,currency:f.cur,fx_rate:fx,amount_usd:Math.round(usd*100)/100,payment_type:f.pt,tag:f.tag.toLowerCase().trim(),daily_cost:Math.round(usd/days*1e6)/1e6,service_days:days,credit:""})});
      document.getElementById("okMsg").classList.remove("hidden");
      setTimeout(()=>document.getElementById("okMsg")?.classList.add("hidden"),2500);
      descInp.value="";amtInp.value="";tagInp.value="";fxInp.value="";
      f.desc="";f.amt="";f.tag="";f.fx="";f.seManual=false;
      previewEl.classList.add("hidden");
      state.txnCount++;
      document.getElementById("dbStatus").textContent=`в—ЏВЏ ${state.txnCount.toLocaleString()} txns`;
    }catch(e){alert("Error: "+e.message)}
    submitBtn.textContent="Add Transaction";
  }},"Add Transaction");

  card.append(row(field("Date Entered",dateInp),field("Description",descInp)));
  card.append(row(field("Category",catSel),field("Amount (positive)",amtInp),field("Currency",curSel)));

  const seField=h("div");seField.append(seLbl);seField.append(seInp);
  card.append(row(field("Service Start",ssInp),seField));
  card.append(fxRow);
  card.append(row(field("Payment Account",ptSel),field("Tag (optional)",tagInp)));
  card.append(previewEl);
  card.append(submitBtn);
  el.append(card);
}

async function renderIS(el){
  el.innerHTML=`<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px">
    <div><h2>Income Statement</h2><p class="sub">Accrual basis В· USD В· ${state.year} В· Live from Supabase</p></div>
    <div class="tabs" id="yearTabs"></div></div><div id="isBody"><div style="text-align:center;padding:60px;color:rgba(255,255,255,0.3)">Loading...</div></div>`;

  const yt=document.getElementById("yearTabs");
  ["all",2023,2024,2025,2026].forEach(y=>{const b=h("button",{class:"tab"+(state.year===y?" on":""),onClick:()=>{state.year=y;renderContent()}},y==="all"?"All":String(y));yt.append(b)});

  try{
    const data=await sbRPC("get_income_statement",{p_year:state.year});
    const body=document.getElementById("isBody");body.innerHTML="";

    // Process monthly data
    const months={};
    for(let m=1;m<=12;m++)months[`${state.year}-${String(m).padStart(2,"0")}`]={};
    for(const r of data){const mk=r.month?.slice(0,7);if(mk&&months[mk])months[mk][r.category_id]=(parseFloat(r.amount)||0)}

    // Compute parent totals
    for(const mk of Object.keys(months)){
      for(const[p,ch]of Object.entries(SUB_MAP)){
        let v=months[mk][p]||0;
        for(const c of ch)v+=months[mk][c]||0;
        months[mk]["_p_"+p]=v;
      }
    }

    const mKeys=Object.keys(months).sort();
    const mData=mKeys.map((k,i)=>{
      const c=months[k];
      const totE=PARENT_CATS.reduce((s,cat)=>s+(c["_p_"+cat]??c[cat]??0),0);
      const inc=Math.abs(c.income||0);
      return{month:ML[i],k,c,totE,inc,net:inc-totE};
    });
    const totI=mData.reduce((s,m)=>s+m.inc,0);
    const totE=mData.reduce((s,m)=>s+m.totE,0);

    // Stats
    const stats=h("div",{class:"g4"});
    stats.append(statCard("рџ’µ","income",fmtN(totI),"var(--b)"));
    stats.append(statCard("рџ“Љ","expenses",fmtN(totE),"var(--r)"));
    stats.append(statCard("вњЁ","net savings",fmtN(totI-totE),"var(--g)"));
    stats.append(statCard("рџ“€","savings rate",totI>0?((totI-totE)/totI*100).toFixed(1)+"%":"вЂ”","var(--y)"));
    body.append(stats);

    // Cash flow chart
    const cfCard=h("div",{class:"cd"});
    cfCard.innerHTML=`<h3>Monthly Cash Flow</h3><div class="chrt"><canvas id="cfChart"></canvas></div>`;
    body.append(cfCard);
    setTimeout(()=>makeChart("cfChart",{type:"bar",data:{labels:mData.map(m=>m.month),datasets:[
      {label:"Income",data:mData.map(m=>Math.round(m.inc)),backgroundColor:"rgba(74,111,165,0.7)",borderRadius:3},
      {label:"Expenses",data:mData.map(m=>Math.round(m.totE)),backgroundColor:"rgba(224,122,95,0.7)",borderRadius:3},

      const stackCats=PARENT_CATS.filter(c=>mData.some(m=>(m.c["_p_"+c]??m.c[c]??0)>0));
      makeChart("stackChart",{type:"bar",data:{labels:mData.map(m=>m.month),datasets:stackCats.map(c=>({label:c,data:mData.map(m=>Math.round(m.c["_p_"+c]??m.c[c]??0)),backgroundColor:CC[c]||"#666"}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,ticks:{color:"rgba(255,255,255,0.3)"},grid:{color:"rgba(255,255,255,0.04)"}},y:{stacked:true,ticks:{color:"rgba(255,255,255,0.3)",callback:v=>fmtN(v)},grid:{color:"rgba(255,255,255,0.04)"}}}}});
    },100);

    // Detail table with subcategories
    const tblCard=h("div",{class:"cd"});
    const activeMonths=mData.filter(m=>m.totE>0||m.inc>0).length||1;
    let thtml=`<h3>Monthly Detail</h3><div style="overflow-x:auto"><table style="table-layout:fixed"><colgroup><col style="width:110px">`;
    for(let i=0;i<12;i++)thtml+=`<col>`;
    thtml+=`<col style="width:70px"><col style="width:70px"></colgroup><thead><tr><th>Category</th>`;
    ML.forEach(m=>thtml+=`<th class="r">${m}</th>`);
    thtml+=`<th class="r" style="font-weight:700">Total</th><th class="r" style="font-weight:700">Avg</th></tr></thead><tbody>`;

    const allRows=[];
    for(const p of PARENT_CATS){
      const pm=mData.map(m=>m.c["_p_"+p]??m.c[p]??0);
      const pt=pm.reduce((s,v)=>s+v,0);
      if(Math.abs(pt)<1)continue;
      allRows.push({id:p,lbl:p[0].toUpperCase()+p.slice(1),m:pm,t:pt,par:true});
      if(SUB_MAP[p])for(const ch of SUB_MAP[p]){
        const cm=mData.map(m=>m.c[ch]||0);
        const ct=cm.reduce((s,v)=>s+v,0);
        if(Math.abs(ct)<1)continue;
        allRows.push({id:ch,lbl:ch[0].toUpperCase()+ch.slice(1),m:cm,t:ct,par:false});
      }
    }

    for(const r of allRows){
      const avg=r.t/activeMonths;
      if(r.par){
        const hasSubs=SUB_MAP[r.id]&&allRows.some(x=>!x.par&&SUB_MAP[r.id].includes(x.id));
        thtml+=`<tr style="cursor:${hasSubs?"pointer":"default"}" ${hasSubs?`onclick="document.querySelectorAll('.sub-${r.id}').forEach(el=>el.classList.toggle('hidden'));this.querySelector('.toggl').textContent=this.querySelector('.toggl').textContent==='в–ё'?'в–ѕ':'в–ё'"`:""}><td style="padding-left:4px;color:rgba(255,255,255,0.85);font-weight:600;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${hasSubs?`<span class="toggl" style="display:inline-block;width:14px;font-size:10px;color:rgba(255,255,255,0.3)">в–ё</span>`:`<span style="display:inline-block;width:14px"></span>`}<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${CC[r.id]||"#555"};margin-right:6px;vertical-align:middle"></span>${r.lbl}</td>`;
      }else{
        const parentId=Object.entries(SUB_MAP).find(([,ch])=>ch.includes(r.id))?.[0]||"";
        thtml+=`<tr class="sub-${parentId} hidden"><td style="padding-left:32px;color:rgba(255,255,255,0.5);font-weight:400;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${CC[r.id]||"#555"};margin-right:6px;vertical-align:middle"></span>${r.lbl}</td>`;
      }
      r.m.forEach(v=>thtml+=`<td class="r m" style="color:${v<-0.5?"var(--g)":v>0.5?"rgba(255,255,255,0.6)":"rgba(255,255,255,0.15)"}">${Math.abs(v)>0.5?fmtT(Math.round(v)):""}</td>`);
      thtml+=`<td class="r m" style="font-weight:${r.par?700:500};color:${r.par?"rgba(255,255,255,0.85)":"rgba(255,255,255,0.6)"}">${fmtT(Math.round(r.t))}</td>`;
      thtml+=`<td class="r m" style="color:rgba(255,255,255,0.4)">${fmtT(Math.round(avg))}</td></tr>`;
    }

    // Totals rows
    thtml+=`<tr style="border-top:2px solid rgba(255,255,255,0.1)"><td style="font-weight:700;color:var(--r)">Total Expenses</td>`;
    mData.forEach(m=>thtml+=`<td class="r m" style="color:var(--r);font-weight:600">${fmtT(Math.round(m.totE))}</td>`);
    thtml+=`<td class="r m" style="color:var(--r);font-weight:700">${fmtT(Math.round(totE))}</td>`;
    thtml+=`<td class="r m" style="color:var(--r);font-weight:600">${fmtT(Math.round(totE/activeMonths))}</td></tr>`;

    thtml+=`<tr><td style="font-weight:700;color:var(--b)">Income</td>`;
    mData.forEach(m=>thtml+=`<td class="r m" style="color:var(--b);font-weight:600">${fmtT(Math.round(m.inc))}</td>`);
    thtml+=`<td class="r m" style="color:var(--b);font-weight:700">${fmtT(Math.round(totI))}</td>`;
    thtml+=`<td class="r m" style="color:var(--b);font-weight:600">${fmtT(Math.round(totI/activeMonths))}</td></tr>`;

    thtml+=`<tr style="border-top:1px solid rgba(255,255,255,0.08)"><td style="font-weight:700;color:var(--g)">Net Savings</td>`;
    mData.forEach(m=>thtml+=`<td class="r m" style="color:var(--g);font-weight:600">${fmtT(Math.round(m.net))}</td>`);
    thtml+=`<td class="r m" style="color:var(--g);font-weight:700">${fmtT(Math.round(totI-totE))}</td>`;
    thtml+=`<td class="r m" style="color:var(--g);font-weight:600">${fmtT(Math.round((totI-totE)/activeMonths))}</td></tr>`;

    thtml+=`</tbody></table></div>`;
    tblCard.innerHTML=thtml;
    body.append(tblCard);
  }catch(e){document.getElementById("isBody").innerHTML=`<div class="cd" style="border-color:rgba(224,122,95,0.3);color:var(--r)">Error loading: ${e.message}</div>`}

async function renderBS(el){
  el.innerHTML=`<div style="margin-bottom:16px"><h2>Balance Sheet</h2><p class="sub">Loading...</p></div><div id="bsBody"></div>`;
  try{
    const snaps=await sb("balance_snapshots?select=*,accounts!inner(label,account_type)&order=snapshot_date.desc");
    const body=document.getElementById("bsBody");body.innerHTML="";

    const dates=[...new Set(snaps.map(s=>s.snapshot_date))].sort().reverse();
    const latest=dates[0];
    el.querySelector(".sub").textContent=`As of ${fmtD(latest)} В· ${dates.length} snapshots В· USD`;

    const byType={checking:[],savings:[],credit:[],investment:[],liability:[],other:[]};
    for(const s of snaps){
      if(s.snapshot_date!==latest)continue;
      const t=s.accounts?.account_type||"other";
      const bal=parseFloat(s.balance_usd||s.balance)||0;
      (byType[t]||byType.other).push({name:s.accounts?.label||s.account_id,bal});
    }
    Object.values(byType).forEach(a=>a.sort((x,y)=>y.bal-x.bal));

    const totA=[...byType.checking,...byType.savings,...byType.investment].reduce((s,a)=>s+a.bal,0);
    const totL=[...byType.credit,...byType.liability].reduce((s,a)=>s+Math.abs(a.bal),0);
    const nw=totA-totL;

    const stats=h("div",{class:"g4"});
    stats.append(statCard("рџЏ¦","total assets",fmtN(totA),"var(--b)"));
    stats.append(statCard("рџ’і","total liabilities",fmtN(totL),"var(--r)"));
    stats.append(statCard("рџ’Ћ","net worth",fmtN(nw),"var(--g)"));
    body.append(stats);

    // Snapshot age & reminder
    const daysSinceSnap=Math.floor((new Date()-new Date(latest))/864e5);
    if(daysSinceSnap>30){
      const banner=h("div",{class:"cd",style:{borderColor:"rgba(242,204,143,0.3)",marginBottom:"16px",padding:"14px 18px"}});
      banner.innerHTML=`<div style="display:flex;align-items:center;gap:10px"><span style="font-size:14px">вљ пёЏ</span><span style="font-size:12px;color:var(--y)">Last snapshot was ${daysSinceSnap} days ago. Consider taking a new one to keep your net worth chart current.</span></div>`;
      body.append(banner);
    }
    const snapBar=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",padding:"10px 16px",background:"rgba(255,255,255,0.02)",borderRadius:"10px",border:"1px solid var(--bdr)"}});
    snapBar.innerHTML=`<div><span style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.6)">Snapshots</span><span style="font-size:11px;color:rgba(255,255,255,0.3);margin-left:8px">${dates.length} saved В· Last: ${fmtD(latest)} (${daysSinceSnap}d ago)</span></div>`;
    const snapBtn=h("button",{class:"pg-btn",style:{background:"rgba(129,178,154,0.12)",borderColor:"rgba(129,178,154,0.3)",color:"var(--g)",padding:"6px 14px"},onClick:async()=>{
      snapBtn.textContent="Loading...";snapBtn.disabled=true;
      try{const accounts=await sb("accounts?is_active=eq.true&order=display_order");showSnapshotForm(accounts,latest,()=>renderContent())}
      catch(e){alert("Error: "+e.message);snapBtn.textContent="рџ“ё Take Snapshot";snapBtn.disabled=false}
    }},"рџ“ё Take Snapshot");
    snapBar.append(snapBtn);
    body.append(snapBar);

    // NW over time
    if(dates.length>2){
      const nwData=dates.sort().map(d=>{
        let a=0,l=0;
        for(const s of snaps){if(s.snapshot_date!==d)continue;const t=s.accounts?.account_type||"other";const b=parseFloat(s.balance_usd||s.balance)||0;if(["checking","savings","investment"].includes(t))a+=b;else if(["credit","liability"].includes(t))l+=Math.abs(b)}
        return{d,a,nw:a-l};
      });
      const nwCard=h("div",{class:"cd"});
      nwCard.innerHTML=`<h3>Net Worth Over Time</h3><div class="chrt"><canvas id="nwChart"></canvas></div>`;
      body.append(nwCard);
      setTimeout(()=>makeChart("nwChart",{type:"line",data:{labels:nwData.map(d=>fmtD(d.d)),datasets:[
        {label:"Assets",data:nwData.map(d=>Math.round(d.a)),backgroundColor:"rgba(74,111,165,0.2)",borderColor:"rgba(74,111,165,0.5)",fill:true,tension:0.3},
        {label:"Net Worth",data:nwData.map(d=>Math.round(d.nw)),borderColor:"#81B29A",backgroundColor:"rgba(129,178,154,0.1)",borderWidth:2.5,pointRadius:2,fill:false,tension:0.3}
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"rgba(255,255,255,0.5)",font:{size:11}}}},scales:{x:{ticks:{color:"rgba(255,255,255,0.3)",font:{size:9},maxTicksLimit:12},grid:{color:"rgba(255,255,255,0.04)"}},y:{ticks:{color:"rgba(255,255,255,0.3)",callback:v=>fmtN(v)},grid:{color:"rgba(255,255,255,0.04)"}}}}}),50);
    }

    // Account groups
    const row2=h("div",{class:"g2"});
    function acctGroup(title,accts,color){
      if(!accts.length)return"";
      const total=accts.reduce((s,a)=>s+a.bal,0);
      let html=`<div class="acct-grp"><div class="acct-hdr"><span style="font-size:12px;font-weight:600;color:${color};text-transform:uppercase;letter-spacing:0.05em">${title}</span><span style="font-size:13px;font-weight:700;color:${color};font-family:var(--mono)">${fmtF(total)}</span></div>`;
      accts.forEach(a=>html+=`<div class="acct-row"><span style="color:rgba(255,255,255,0.6)">${a.name}</span><span style="color:rgba(255,255,255,0.7);font-family:var(--mono)">${fmtF(a.bal)}</span></div>`);
      return html+"</div>";
    }
    const assetsCard=h("div",{class:"cd"});
    assetsCard.innerHTML=`<h3 style="color:var(--b)">Assets</h3>`+acctGroup("Checking & Savings",[...byType.checking,...byType.savings],"var(--b)")+acctGroup("Investments",byType.investment,"#2A9D8F");
    row2.append(assetsCard);

    const liabCard=h("div",{class:"cd"});
    liabCard.innerHTML=`<h3 style="color:var(--r)">Liabilities</h3>`+acctGroup("Credit Cards",byType.credit,"var(--r)")+acctGroup("Owed to Others",byType.liability,"var(--y)");
    if(!byType.credit.length&&!byType.liability.length)liabCard.innerHTML+=`<div style="color:rgba(255,255,255,0.2);font-size:12px;padding:20px;text-align:center">No liabilities recorded</div>`;
    row2.append(liabCard);
    body.append(row2);
  }catch(e){document.getElementById("bsBody").innerHTML=`<div class="cd" style="border-color:rgba(224,122,95,0.3);color:var(--r)">Error: ${e.message}</div>`}
}

async function renderTags(el){
  el.innerHTML=`<div style="margin-bottom:16px"><h2>Tags</h2><p class="sub">Loading...</p></div><div id="tagsBody"></div>`;
  try{
    const tagRows=await sb("tags?order=start_date.desc");
    // Paginate to get ALL tagged transactions (Supabase caps at 1000 per request)
    let allTxns=[];
    let offset=0;
    const batchSize=1000;
    while(true){
      const batch=await sb(`transactions?select=tag,amount_usd,daily_cost,service_start,service_end,category_id&tag=not.is.null&tag=neq.&order=id&limit=${batchSize}&offset=${offset}`);
      allTxns=allTxns.concat(batch);
      if(batch.length<batchSize)break;
      offset+=batchSize;
    }
    const txns=allTxns;
    // Build tag date lookup for accrual overlap
    const tagDates={};
    for(const t of tagRows)tagDates[t.name]={start:t.start_date,end:t.end_date};
    const tm={};
    for(const t of txns){
      if(!t.tag)continue;
      if(!tm[t.tag])tm[t.tag]={total:0,count:0,cats:{}};
      tm[t.tag].count++;
      if(t.category_id==="income"||t.category_id==="investment")continue;
      // Accrual: compute overlap of txn service period with tag date window
      const tg=tagDates[t.tag];
      if(tg&&tg.start&&tg.end&&t.daily_cost!=null&&t.service_start&&t.service_end){
        const oStart=t.service_start>tg.start?t.service_start:tg.start;
        const oEnd=t.service_end<tg.end?t.service_end:tg.end;
        if(oStart<=oEnd){
          const oDays=Math.floor((new Date(oEnd)-new Date(oStart))/864e5)+1;
          const amt=t.daily_cost*oDays;
          tm[t.tag].total+=amt;
          tm[t.tag].cats[t.category_id]=(tm[t.tag].cats[t.category_id]||0)+amt;
        }
      }else if(t.amount_usd>0){
        // Fallback: no tag dates or no service period
        tm[t.tag].total+=t.amount_usd;
        tm[t.tag].cats[t.category_id]=(tm[t.tag].cats[t.category_id]||0)+t.amount_usd;
      }
    }

    const tags=tagRows.map(t=>({...t,...(tm[t.name]||{total:0,count:0,cats:{}})})).sort((a,b)=>b.total-a.total);
    el.querySelector(".sub").textContent=`Click any tag for breakdown В· ${tags.length} tags`;
    const body=document.getElementById("tagsBody");body.innerHTML="";
    const grid=h("div",{class:"tag-grid"});

    tags.forEach((tag,i)=>{
      const card=h("div",{class:"tag-card",style:{borderLeftColor:TCOLS[i%TCOLS.length],cursor:tag.total>0?"pointer":"default"},onClick:()=>tag.total>0&&showTagDetail(tag)});
      let inner=`<div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:14px;font-weight:600;color:#fff">${tag.name}</div>`;
      if(tag.start_date)inner+=`<div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px">${fmtD(tag.start_date)} вЂ“ ${fmtD(tag.end_date)}</div>`;
      inner+=`</div><span style="font-size:10px;color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.04);padding:2px 6px;border-radius:4px">${tag.count||0} txns</span></div>`;
      if(tag.total>0){
        const days=tag.start_date&&tag.end_date?Math.max(1,Math.floor((new Date(tag.end_date)-new Date(tag.start_date))/864e5)+1):0;
        inner+=`<div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:8px"><div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--r)">${fmtF(tag.total)}</div>`;
        if(days>0)inner+=`<div style="font-size:11px;color:rgba(255,255,255,0.25);font-family:var(--mono)">${fmtF(tag.total/days)}/day</div>`;
        inner+=`</div>`;
        if(Object.keys(tag.cats).length>0){
          const posCats=Object.entries(tag.cats).filter(([,v])=>v>0);
          if(posCats.length>0){const barTotal=posCats.reduce((s,[,v])=>s+v,0);
          inner+=`<div style="display:flex;gap:2px;margin-top:6px;height:4px;border-radius:2px;overflow:hidden">`;
          posCats.sort((a,b)=>b[1]-a[1]).forEach(([c,v])=>inner+=`<div style="width:${(v/barTotal)*100}%;background:${CC[c]||"#666"};min-width:2px"></div>`);
          inner+=`</div>`;}
        }
      }
      card.innerHTML=inner;
      grid.append(card);
    });
    body.append(grid);
  }catch(e){document.getElementById("tagsBody").innerHTML=`<div class="cd" style="color:var(--r)">Error: ${e.message}</div>`}
}

async function showTagDetail(tag){
  const existing=document.querySelector(".modal-bg");if(existing)existing.remove();
  const txns=await sb(`transactions?tag=eq.${encodeURIComponent(tag.name)}&category_id=neq.income&category_id=neq.investment&order=date.desc`);
  const cats={};let total=0;
  for(const t of txns){
    if(t.daily_cost!=null&&tag.start_date&&tag.end_date&&t.service_start&&t.service_end){
      const oStart=t.service_start>tag.start_date?t.service_start:tag.start_date;
      const oEnd=t.service_end<tag.end_date?t.service_end:tag.end_date;
      if(oStart<=oEnd){
        const oDays=Math.floor((new Date(oEnd)-new Date(oStart))/864e5)+1;
        const amt=t.daily_cost*oDays;
        cats[t.category_id]=(cats[t.category_id]||0)+amt;total+=amt;
      }
    }else if(t.amount_usd>0){cats[t.category_id]=(cats[t.category_id]||0)+t.amount_usd;total+=t.amount_usd}
  }
  const days=tag.start_date&&tag.end_date?Math.max(1,Math.floor((new Date(tag.end_date)-new Date(tag.start_date))/864e5)+1):0;
  const mx=Math.max(...Object.values(cats).map(v=>Math.abs(v)),1);

  const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg)bg.remove()}});
  let mhtml=`<div style="display:flex;justify-content:space-between;margin-bottom:20px"><div><h2 style="font-size:22px">${tag.name}</h2>`;
  if(tag.start_date)mhtml+=`<p style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:4px">${fmtD(tag.start_date)} вЂ“ ${fmtD(tag.end_date)}</p>`;
  mhtml+=`</div><button onclick="this.closest('.modal-bg').remove()" style="background:rgba(255,255,255,0.06);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:16px">вњ•</button></div>`;
  mhtml+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px">`;
  [["Total",fmtF(total),"var(--r)"],["Days",days,"var(--b)"],["Per Day",days>0?fmtF(total/days):"вЂ”","var(--g)"]].forEach(([l,v,c])=>mhtml+=`<div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:12px 14px;text-align:center"><div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase">${l}</div><div style="font-size:20px;font-weight:700;color:${c};font-family:var(--mono)">${v}</div></div>`);
  mhtml+=`</div>`;

  Object.entries(cats).filter(([,v])=>Math.abs(v)>0.5).sort((a,b)=>Math.abs(b[1])-Math.abs(a[1])).forEach(([cat,val])=>{
    const isNeg=val<0;
    mhtml+=`<div style="display:grid;grid-template-columns:90px 1fr 65px 40px;align-items:center;gap:8px;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,0.6)"><span style="width:7px;height:7px;border-radius:2px;background:${CC[cat]||"#666"};flex-shrink:0"></span>${cat}</div>
      <div style="height:14px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden"><div style="height:100%;width:${(Math.abs(val)/mx)*100}%;background:${isNeg?"var(--g)":(CC[cat]||"#666")};border-radius:4px;opacity:0.7"></div></div>
      <div style="font-family:var(--mono);font-size:11px;color:${isNeg?"var(--g)":"rgba(255,255,255,0.5)"};text-align:right">${isNeg?"("+fmtF(Math.abs(val))+")":fmtF(val)}</div>
      <div style="font-family:var(--mono);font-size:10px;color:rgba(255,255,255,0.3);text-align:right">${total>0?((Math.abs(val)/total)*100).toFixed(0)+"%":""}</div></div>`;
  });

  const modal=h("div",{class:"modal"});
  modal.innerHTML=mhtml;
  bg.append(modal);
  document.body.append(bg);
}

// SNAPSHOT FORM
// в—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џ

function showSnapshotForm(accounts, lastDate, onSave){
  const existing=document.querySelector(".modal-bg");if(existing)existing.remove();
  const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg)bg.remove()}});
  const modal=h("div",{class:"modal",style:{maxWidth:"640px"}});

  const groups={checking:[],savings:[],credit:[],investment:[],liability:[]};
  accounts.forEach(a=>(groups[a.account_type]||[]).push(a));
  const typeLabels={checking:"Checking",savings:"Savings",credit:"Credit Cards",investment:"Investments",liability:"Liabilities"};

  let mhtml=`<div style="display:flex;justify-content:space-between;margin-bottom:20px"><div><h2 style="font-size:20px">New Balance Snapshot</h2><p style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:4px">Enter current balances for each account</p></div><button onclick="this.closest('.modal-bg').remove()" style="background:rgba(255,255,255,0.06);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:16px">\u2715</button></div>`;
  mhtml+=`<div style="margin-bottom:16px"><label class="lbl">Snapshot Date</label><input type="date" id="snapDate" class="inp" value="${today()}" style="max-width:200px"></div>`;

  for(const[type,accts]of Object.entries(groups)){
    if(!accts.length)continue;
    mhtml+=`<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">${typeLabels[type]||type}</div>`;
    accts.forEach(a=>{
      mhtml+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="font-size:12px;color:rgba(255,255,255,0.6);min-width:160px">${a.label}</span><input type="number" step="0.01" class="inp snap-bal" data-id="${a.id}" placeholder="0.00" style="max-width:160px;font-family:var(--mono)"></div>`;
    });
    mhtml+=`</div>`;
  }
  mhtml+=`<button id="saveSnapBtn" class="btn" style="background:rgba(129,178,154,0.2);color:var(--g);margin-top:12px">Save Snapshot</button>`;

  modal.innerHTML=mhtml;
  bg.append(modal);
  document.body.append(bg);

  document.getElementById("saveSnapBtn").addEventListener("click",async()=>{
    const btn=document.getElementById("saveSnapBtn");
    btn.textContent="Saving...";btn.disabled=true;
    const date=document.getElementById("snapDate").value;
    const rows=[];
    document.querySelectorAll(".snap-bal").forEach(inp=>{
      const val=parseFloat(inp.value);
      if(!isNaN(val)&&val!==0)rows.push({account_id:inp.dataset.id,snapshot_date:date,balance:val,balance_usd:val});
    });
    if(!rows.length){alert("Enter at least one balance.");btn.textContent="Save Snapshot";btn.disabled=false;return}
    try{
      const resp=await fetch(`${SB_URL}/rest/v1/balance_snapshots`,{method:"POST",headers:{...HDRS,"Content-Type":"application/json",Prefer:"resolution=merge-duplicates,return=representation"},body:JSON.stringify(rows)});
      if(!resp.ok)throw new Error(await resp.text());
      bg.remove();
      if(onSave)onSave();
    }catch(e){alert("Error saving: "+e.message);btn.textContent="Save Snapshot";btn.disabled=false}
  });
}

async function renderLedger(el){
  const PS=50;
  if(!state.lf)state.lf={cat:"",pt:"",dfrom:"",dto:"",q:""};
  const f=state.lf;
  const fS="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:6px 10px;color:#e8e8e4;font-size:11px;font-family:var(--sans);outline:none";

  el.innerHTML=`<div class="cd"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="margin:0">Transactions</h3><div id="pgNav"></div></div><div id="filterBar" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px"></div><div id="ledgerBody">Loading...</div></div>`;

  const fb=document.getElementById("filterBar");

  // Search input
  const si=h("input",{style:fS+";width:160px",placeholder:"Search description...",value:f.q});
  si.addEventListener("keydown",e=>{if(e.key==="Enter"){f.q=si.value;state.page=0;loadPage()}});
  fb.append(si);

  // Category filter
  const cs=h("select",{style:fS+";cursor:pointer"});
  cs.innerHTML=`<option value="">All Categories</option>`+CATS_LIST.map(c=>`<option value="${c.id}"${c.id===f.cat?" selected":""}>${c.l}</option>`).join("");
  cs.addEventListener("change",()=>{f.cat=cs.value;state.page=0;loadPage()});
  fb.append(cs);

  // Payment type filter
  const ps=h("select",{style:fS+";cursor:pointer"});
  ps.innerHTML=`<option value="">All Payments</option>`+PTS.map(p=>`<option value="${p}"${p===f.pt?" selected":""}>${p}</option>`).join("");
  ps.addEventListener("change",()=>{f.pt=ps.value;state.page=0;loadPage()});
  fb.append(ps);

  // Date range
  fb.append(h("span",{style:"font-size:10px;color:rgba(255,255,255,0.3);align-self:center"},"From"));
  const df=h("input",{type:"date",style:fS+";width:130px",value:f.dfrom});
  df.addEventListener("change",()=>{f.dfrom=df.value;state.page=0;loadPage()});
  fb.append(df);
  fb.append(h("span",{style:"font-size:10px;color:rgba(255,255,255,0.3);align-self:center"},"To"));
  const dt=h("input",{type:"date",style:fS+";width:130px",value:f.dto});
  dt.addEventListener("change",()=>{f.dto=dt.value;state.page=0;loadPage()});
  fb.append(dt);

  // Clear button
  const clr=h("button",{class:"pg-btn",style:"font-size:11px",onClick:()=>{state.lf={cat:"",pt:"",dfrom:"",dto:"",q:""};state.page=0;renderLedger(el)}},"Clear");
  fb.append(clr);

  async function loadPage(){
    document.getElementById("ledgerBody").innerHTML="Loading...";
    let q=`transactions?order=date.desc,id.desc&limit=${PS}&offset=${state.page*PS}`;
    if(f.cat)q+=`&category_id=eq.${f.cat}`;
    if(f.pt)q+=`&payment_type=eq.${encodeURIComponent(f.pt)}`;
    if(f.dfrom)q+=`&date=gte.${f.dfrom}`;
    if(f.dto)q+=`&date=lte.${f.dto}`;
    if(f.q)q+=`&description=ilike.*${encodeURIComponent(f.q)}*`;
    const txns=await sb(q);
    const nav=document.getElementById("pgNav");
    nav.innerHTML="";
    const prev=h("button",{class:"pg-btn",onClick:()=>{if(state.page>0){state.page--;loadPage()}}},"\u2190 Prev");
    if(state.page===0)prev.disabled=true;
    nav.append(prev);
    nav.append(h("span",{style:{padding:"4px 8px",fontSize:"11px",color:"rgba(255,255,255,0.3)"}},`Page ${state.page+1}`));
    const next=h("button",{class:"pg-btn",onClick:()=>{state.page++;loadPage()}},`Next \u2192`);
    if(txns.length<PS)next.disabled=true;
    nav.append(next);

    let thtml=`<div style="overflow-x:auto"><table><thead><tr><th>Date</th><th>Description</th><th>Category</th><th class="r">Amount</th><th class="hide-m">Payment</th><th class="hide-m">Service Period</th><th class="r hide-m">Daily Cost</th><th>Tag</th></tr></thead><tbody>`;
    txns.forEach(t=>{
      thtml+=`<tr>
        <td class="m" style="color:rgba(255,255,255,0.55);white-space:nowrap">${fmtD(t.date)}</td>
        <td style="color:rgba(255,255,255,0.8);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.description}</td>
        <td><span class="badge" style="background:${(CC[t.category_id]||"#666")}22;color:${CC[t.category_id]||"#888"}">${t.category_id}</span></td>
        <td class="r m" style="color:${t.amount_usd<0?"var(--g)":"rgba(255,255,255,0.75)"}">${fmtF(t.amount_usd)}${t.currency!=="USD"?`<span style="color:rgba(255,255,255,0.25);margin-left:3px;font-size:10px">${t.currency}</span>`:""}</td>
        <td class="hide-m" style="color:rgba(255,255,255,0.4);font-size:11px;white-space:nowrap">${t.payment_type||""}</td>
        <td class="m hide-m" style="color:rgba(255,255,255,0.4);white-space:nowrap">${fmtD(t.service_start)}\u2013${fmtD(t.service_end)}${t.service_days>1?`<span style="margin-left:3px;color:rgba(255,255,255,0.2)">(${t.service_days}d)</span>`:""}</td>
        <td class="r m hide-m" style="color:var(--g)">${fmtF(t.daily_cost)}</td>
        <td style="color:rgba(255,255,255,0.35);font-size:11px">${t.tag?`<span style="background:rgba(255,255,255,0.06);padding:2px 7px;border-radius:4px">${t.tag}</span>`:""}</td>
      </tr>`;
    });
    thtml+=`</tbody></table></div>`;
    document.getElementById("ledgerBody").innerHTML=thtml;
  }
  loadPage();
}

// CROSS-YEAR SUMMARY
// в—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џ

async function renderCrossYear(el){
  el.innerHTML=`<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px">
    <div><h2>Income Statement</h2><p class="sub">Cross-year summary В· USD В· All Years</p></div>
    <div class="tabs" id="yearTabs"></div></div><div id="isBody"><div style="text-align:center;padding:60px;color:rgba(255,255,255,0.3)">Loading...</div></div>`;
  const yt=document.getElementById("yearTabs");
  ["all",2023,2024,2025,2026].forEach(y=>{const b=h("button",{class:"tab"+(state.year===y?" on":""),onClick:()=>{state.year=y;renderContent()}},y==="all"?"All":String(y));yt.append(b)});

  try{
    const years=[2017,2018,2019,2020,2021,2022,2023,2024,2025,2026];
    const results=await Promise.all(years.map(y=>sbRPC("get_income_statement",{p_year:y})));
    const body=document.getElementById("isBody");body.innerHTML="";

    const yearData=years.map((y,i)=>{
      const data=results[i];
      let inc=0,exp=0;
      const cats={};
      for(const r of data){
        const amt=parseFloat(r.amount)||0;
        if(r.category_id==="income"){inc+=Math.abs(amt);continue}
        if(r.category_id==="investment")continue;
        exp+=amt;
        const p=Object.entries(SUB_MAP).find(([,subs])=>subs.includes(r.category_id));
        const pid=p?p[0]:r.category_id;
        cats[pid]=(cats[pid]||0)+amt;
      }
      return{year:y,inc,exp,net:inc-exp,rate:inc>0?(inc-exp)/inc:0,cats};
    }).filter(d=>d.inc>0||d.exp>0);

    const totI=yearData.reduce((s,d)=>s+d.inc,0);
    const totE=yearData.reduce((s,d)=>s+d.exp,0);
    const stats=h("div",{class:"g4"});
    stats.append(statCard("рџ’µ","total income",fmtN(totI),"var(--b)"));
    stats.append(statCard("рџ“Љ","total expenses",fmtN(totE),"var(--r)"));
    stats.append(statCard("вњЁ","total saved",fmtN(totI-totE),"var(--g)"));
    stats.append(statCard("рџ“€","avg savings rate",totI>0?((totI-totE)/totI*100).toFixed(1)+"%":"вЂ”","var(--y)"));
    body.append(stats);

    const chartCard=h("div",{class:"cd"});
    chartCard.innerHTML=`<h3>Annual Cash Flow</h3><div class="chrt"><canvas id="crossYearChart"></canvas></div>`;
    body.append(chartCard);
    // Waterfall: income goes up from 0, expenses go down from income, net is the remainder
    setTimeout(()=>makeChart("crossYearChart",{type:"bar",data:{labels:yearData.map(d=>d.year),datasets:[
      {label:"Income",data:yearData.map(d=>Math.round(d.inc)),backgroundColor:"rgba(74,111,165,0.75)",borderRadius:4,stack:"waterfall"},
      {label:"Expenses",data:yearData.map(d=>-Math.round(d.exp)),backgroundColor:"rgba(224,122,95,0.75)",borderRadius:4,stack:"waterfall"},
      {label:"Net Savings",data:yearData.map(d=>Math.round(d.net)),type:"bar",backgroundColor:"rgba(129,178,154,0.6)",borderRadius:4,borderColor:"rgba(129,178,154,0.9)",borderWidth:1},
      {label:"Savings Rate",data:yearData.map(d=>d.rate*100),type:"line",borderColor:"var(--y)",backgroundColor:"rgba(242,204,143,0.1)",borderWidth:2,pointRadius:3,pointBackgroundColor:"var(--y)",fill:false,yAxisID:"y1"}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"rgba(255,255,255,0.6)",font:{size:11}}}},scales:{x:{stacked:true,ticks:{color:"rgba(255,255,255,0.4)"},grid:{display:false}},y:{stacked:true,ticks:{color:"rgba(255,255,255,0.4)",callback:v=>fmtN(v)},grid:{color:"rgba(255,255,255,0.04)"}},y1:{position:"right",min:0,max:100,ticks:{color:"rgba(242,204,143,0.6)",callback:v=>v+"%",font:{size:10}},grid:{display:false}}}}}),50);

    const tblCard=h("div",{class:"cd"});
    let thtml=`<h3>Annual Detail</h3><div style="overflow-x:auto"><table><thead><tr><th>Year</th><th class="r">Income</th><th class="r">Expenses</th><th class="r">Net</th><th class="r">Rate</th>`;
    PARENT_CATS.forEach(c=>thtml+=`<th class="r hide-m">${c[0].toUpperCase()+c.slice(1,5)}</th>`);
    thtml+=`</tr></thead><tbody>`;
    yearData.forEach(d=>{
      thtml+=`<tr><td style="font-weight:600">${d.year}</td><td class="r m" style="color:var(--b)">${fmtT(Math.round(d.inc))}</td><td class="r m" style="color:var(--r)">${fmtT(Math.round(d.exp))}</td><td class="r m" style="color:var(--g)">${fmtT(Math.round(d.net))}</td><td class="r m" style="color:var(--y)">${(d.rate*100).toFixed(1)}%</td>`;
      PARENT_CATS.forEach(c=>thtml+=`<td class="r m hide-m" style="color:rgba(255,255,255,0.5)">${d.cats[c]?fmtT(Math.round(d.cats[c])):""}</td>`);
      thtml+=`</tr>`;
    });
    thtml+=`</tbody></table></div>`;
    tblCard.innerHTML=thtml;
    body.append(tblCard);
  }catch(e){document.getElementById("isBody").innerHTML=`<div class="cd" style="color:var(--r)">Error: ${e.message}</div>`}
}

function renderExport(el){
  el.innerHTML=`<div style="margin-bottom:14px"><h2>Export & Backup</h2><p class="sub">Download data for backup or import to Numbers</p></div>
  <div class="cd"><h3>Export Transactions</h3><p style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:14px">TSV format compatible with your original Numbers spreadsheet.</p>
  <div style="display:flex;flex-wrap:wrap;gap:8px">
    <button onclick="exportTSV('all')" style="display:inline-block;padding:10px 20px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,0.03);color:var(--g);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)">рџ“‹ All Transactions (TSV)</button>
    <button onclick="exportTSV('new')" style="display:inline-block;padding:10px 20px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,0.03);color:var(--g);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)">рџ†• New Only (since import)</button>
    <button onclick="exportJSON()" style="display:inline-block;padding:10px 20px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,0.03);color:var(--g);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)">рџ’ѕ Full JSON Backup</button>
  </div></div>
  <div class="cd"><h3>Import Status</h3><p style="font-size:12px;color:rgba(255,255,255,0.4)">${state.txnCount.toLocaleString()} transactions in Supabase. Original import: 12,010 rows (Jun 2017 вЂ“ Feb 2026).</p></div>`;
}

async function exportTSV(mode){
  try{
    let all=[];let off=0;
    const base="transactions?order=date.asc"+(mode==="new"?"&id=gt.12010":"");
    while(true){const b=await sb(`${base}&limit=1000&offset=${off}`);all=all.concat(b);if(b.length<1000)break;off+=1000}
    const pMap={groceries:"Food",restaurant:"Food",rent:"Home",furniture:"Home",clothes:"Personal",tech:"Personal"};
    const lines=["Date\tService Start\tService End\tDescription\tCategory\tOriginal Amount\tCurrency\tAmount USD\tPayment Type\tCredit\tTags\tDaily Cost"];
    for(const t of all){
      const cat=pMap[t.category_id]||(t.category_id?t.category_id[0].toUpperCase()+t.category_id.slice(1):"");
      lines.push([t.date,t.service_start,t.service_end,'"'+t.description.replace(/"/g,'""')+'"',cat,t.original_amount,t.currency,t.amount_usd,t.payment_type,t.credit||"",t.tag||"",t.daily_cost].join("\t"));
    }
    dlFile(lines.join("\n"),"disciplan_"+(mode==="new"?"new_":"")+"export_"+new Date().toISOString().slice(0,10)+".tsv","text/tab-separated-values");
  }catch(e){alert("Export error: "+e.message)}
}

async function exportJSON(){
  try{
    const [txns,accts,tags,snaps]=await Promise.all([
      sb("transactions?order=date.asc&limit=50000"),sb("accounts?order=id"),sb("tags?order=start_date.desc"),sb("balance_snapshots?order=snapshot_date.desc&limit=500")
    ]);
    dlFile(JSON.stringify({exported:today(),transactions:txns,accounts:accts,tags,balance_snapshots:snaps},null,2),"disciplan_backup_"+new Date().toISOString().slice(0,10)+".json","application/json");
  }catch(e){alert("Export error: "+e.message)}
}

function dlFile(content,filename,type){
  const blob=new Blob([content],{type});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);
}

async function init(){
  renderTabs();
  try{
    const r=await fetch(`${SB_URL}/rest/v1/transactions?select=id&limit=1`,{headers:{...HDRS,Prefer:"count=exact"}});
    if(!r.ok)throw new Error(r.status);
    const count=r.headers.get("content-range")?.split("/")[1];
    state.txnCount=count?parseInt(count):0;
    document.getElementById("dbStatus").textContent=`в—ЏВЏ ${state.txnCount.toLocaleString()} txns`;
    document.getElementById("dbStatus").style.color="var(--g)";
  }catch(e){
    document.getElementById("dbStatus").textContent="в—ЏВЏ disconnected";
    document.getElementById("dbStatus").style.color="var(--r)";
  }
  renderContent();
}
init();
