function authHeaders(extra = {}) {
  const token = currentSession?.access_token || SB_KEY;
  return {"apikey":SB_KEY,"Authorization":`Bearer ${token}`,"Content-Type":"application/json",...extra};
}

// Cache helpers for offline fallback (FEA-32)
const CACHE_PREFIX="dc_";
function cacheSet(key,data){try{sessionStorage.setItem(CACHE_PREFIX+key,JSON.stringify({ts:Date.now(),data}))}catch(e){}}
function cacheGet(key){try{const raw=sessionStorage.getItem(CACHE_PREFIX+key);return raw?JSON.parse(raw):null}catch(e){return null}}
function showOfflineBanner(ts){
  const el=document.getElementById("offlineBanner");
  if(el){
    const ago=Math.round((Date.now()-ts)/60000);
    document.getElementById("offlineTs").textContent=ago<1?"just now":ago<60?`${ago}m ago`:`${Math.round(ago/60)}h ago`;
    el.classList.remove("hidden");
  }
}

async function sb(path,opts={}){
  const{headers:hd,...rest}=opts;
  const method=(rest.method||"GET").toUpperCase();
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${path}`,{...rest,headers:{...authHeaders(),...(hd||{})}});
    if(!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
    const txt=await r.text();
    const data=txt?JSON.parse(txt):[];
    if(method==="GET") cacheSet(path,data);
    return data;
  }catch(e){
    if(method==="GET"){const cached=cacheGet(path);if(cached){showOfflineBanner(cached.ts);return cached.data;}}
    throw e;
  }
}
async function sbRPC(fn,params={}){
  const cacheKey=`rpc_${fn}_${JSON.stringify(params)}`;
  try{
    const r=await fetch(`${SB_URL}/rest/v1/rpc/${fn}`,{method:"POST",headers:authHeaders(),body:JSON.stringify(params)});
    if(!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
    const data=await r.json();
    cacheSet(cacheKey,data);
    return data;
  }catch(e){
    const cached=cacheGet(cacheKey);
    if(cached){showOfflineBanner(cached.ts);return cached.data;}
    throw e;
  }
}

function parseCSV(text){
  const s=text.charCodeAt(0)===0xFEFF?text.slice(1):text;
  const lines=[];let cur="",inQ=false;
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(c==='"'){if(inQ&&s[i+1]==='"'){cur+='"';i++}else inQ=!inQ}
    else if(c===","&&!inQ){lines.length?lines[lines.length-1].push(cur):lines.push([cur]);cur=""}
    else if((c==="\n"||(c==="\r"&&s[i+1]==="\n"))&&!inQ){
      if(c==="\r")i++;
      if(lines.length)lines[lines.length-1].push(cur);else lines.push([cur]);
      cur="";lines.push([])
    }else cur+=c;
  }
  if(cur||lines.length&&lines[lines.length-1].length)
    {if(lines.length)lines[lines.length-1].push(cur);else lines.push([cur])}
  const filtered=lines.filter(r=>r.length>1||r[0]!=="");
  if(!filtered.length)return{headers:[],rows:[]};
  const headers=filtered[0].map(v=>v.trim());
  const rows=filtered.slice(1).map(r=>{const o={};headers.forEach((hd,i)=>o[hd]=r[i]?r[i].trim():"");return o})
    .filter(r=>{const v=r[headers[0]]||"";return v!==""&&/\d/.test(v)});
  return{headers,rows};
}

function transformCSVRow(row,profile,paymentType,bulkTag,index){
  const cols=profile.columns;
  const rawDate=row[cols.date]||"";
  const dp=rawDate.split("/");
  const date=dp.length===3?`${dp[2]}-${dp[0].padStart(2,"0")}-${dp[1].padStart(2,"0")}`:rawDate;
  const badDate=!date||!/^\d{4}-\d{2}-\d{2}$/.test(date);
  const rawAmt=parseFloat(row[cols.amount])||0;
  const isReturn=(row[cols.type]||"").toLowerCase()==="return";
  const isCCPay=(row[cols.type]||"")==="Payment";
  const isSkip=badDate||profile.skipTypes.includes(row[cols.type]||"");
  let amt=profile.transformAmount(rawAmt);
  if(isReturn)amt=-Math.abs(amt);
  if(isCCPay){
    const names=CC_PAY_NAMES[paymentType]||["Bill Paid: "+paymentType,paymentType+" Bill Payment"];
    return{
      date,description:names[0],amount_usd:amt,category_id:"financial",ai_confidence:"high",
      currency:profile.currency||"USD",fx_rate:1,original_amount:amt,
      service_start:date,service_end:date,service_days:1,daily_cost:amt,
      payment_type:paymentType,tag:bulkTag||"",credit:"",
      _status:"approved",_isDuplicate:false,_isCCPayment:true,
      _rawDescription:row[cols.description]||"",_bankCategory:row[cols.bankCategory]||"",
      _rowIndex:index,_skipReason:null,
      _ccPaymentPair:{description:names[1],payment_type:"Chase Chequing",amount:Math.abs(amt)}
    };
  }
  return{
    date,description:row[cols.description]||"",amount_usd:amt,category_id:null,ai_confidence:null,
    currency:profile.currency||"USD",fx_rate:1,original_amount:amt,
    service_start:date,service_end:date,payment_type:paymentType,tag:bulkTag||"",credit:"",
    _status:isSkip?"skipped":"pending",_isDuplicate:false,
    _rawDescription:row[cols.description]||"",_bankCategory:row[cols.bankCategory]||"",
    _rowIndex:index,_skipReason:badDate?"Invalid date":isSkip?"CC Payment":null
  };
}

async function findDuplicates(candidates,paymentType){
  const dates=candidates.filter(c=>c._status!=="skipped").map(c=>c.date).sort();
  if(!dates.length)return;
  const minD=dates[0],maxD=dates[dates.length-1];
  const existing=await sb(`transactions?payment_type=eq.${encodeURIComponent(paymentType)}&date=gte.${minD}&date=lte.${maxD}&select=date,amount_usd,description,service_start,service_end`);
  for(const c of candidates){
    if(c._status==="skipped")continue;
    c._isDuplicate=existing.some(e=>e.date===c.date&&Math.abs(Math.abs(e.amount_usd)-Math.abs(c.amount_usd))<0.02
      &&(!c.service_start||!e.service_start||c.service_start===e.service_start)
      &&(!c.service_end||!e.service_end||c.service_end===e.service_end));
    if(c._isDuplicate){c._status="skipped";c._skipReason="Duplicate"}
  }
}

function applyAIResults(candidates,aiResults){
  if(!aiResults){
    for(const c of candidates){
      if(c._status==="skipped")continue;
      if(c._isCCPayment)continue;
      c.category_id=CHASE_CAT_MAP[c._bankCategory]||"other";
      c.ai_confidence="low";
      c.service_end=getDefEnd(c.category_id,c.date)||c.date;
      const ss=new Date(c.service_start+"T00:00:00"),se=new Date(c.service_end+"T00:00:00");
      c.service_days=Math.max(1,Math.floor((se-ss)/864e5)+1);
      c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
    }
    return;
  }
  const byIdx={};for(const r of aiResults)byIdx[r.i]=r;
  for(let i=0;i<candidates.length;i++){
    const c=candidates[i];
    if(c._status==="skipped")continue;
    if(c._isCCPayment)continue;
    const ai=byIdx[i];
    if(ai){c.category_id=ai.cat;c.ai_confidence=ai.conf;c.description=ai.desc}
    else{c.category_id=CHASE_CAT_MAP[c._bankCategory]||"other";c.ai_confidence="low"}
    c.service_end=getDefEnd(c.category_id,c.date)||c.date;
    const ss=new Date(c.service_start+"T00:00:00"),se=new Date(c.service_end+"T00:00:00");
    c.service_days=Math.max(1,Math.floor((se-ss)/864e5)+1);
    c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
  }
}

function propagateEdits(candidates,editedIndex){
  const edited=candidates[editedIndex];
  const key=normalizeMerchant(edited._rawDescription);
  for(let i=0;i<candidates.length;i++){
    if(i===editedIndex)continue;
    const c=candidates[i];
    if(c._status!=="pending")continue;
    if(normalizeMerchant(c._rawDescription)===key){
      c.description=edited.description;
      c.category_id=edited.category_id;
      c.service_end=getDefEnd(c.category_id,c.date)||c.date;
      const ss=new Date(c.service_start+"T00:00:00"),se=new Date(c.service_end+"T00:00:00");
      c.service_days=Math.max(1,Math.floor((se-ss)/864e5)+1);
      c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
    }
  }
}

// Payslip PDF parsing (FEA-45)
function pn(s){return parseFloat(String(s).replace(/,/g,""))||0}

function extractLinesFromPage(tc){
  const items=tc.items.filter(i=>i.str.trim());
  if(!items.length)return[];
  const groups=[];let cur=[items[0]],cy=items[0].transform[5];
  for(let i=1;i<items.length;i++){
    const it=items[i],y=it.transform[5];
    if(Math.abs(y-cy)<=2){cur.push(it)}
    else{groups.push({y:cy,items:cur});cur=[it];cy=y}
  }
  groups.push({y:cy,items:cur});
  groups.sort((a,b)=>b.y-a.y);
  return groups.map(g=>{
    g.items.sort((a,b)=>a.transform[4]-b.transform[4]);
    return g.items.map(i=>i.str).join(" ");
  });
}

function parsePayslipPage(lines,fullText){
  // Extract 3 consecutive dates
  const dm=fullText.match(/(\d{2}\/\d{2}\/\d{4})\s+(\d{2}\/\d{2}\/\d{4})\s+(\d{2}\/\d{2}\/\d{4})/);
  if(!dm)return null;
  const ppb=convertMMDDYYYY(dm[1]),ppe=convertMMDDYYYY(dm[2]),cd=convertMMDDYYYY(dm[3]);

  // Parse Current summary row
  const cm=fullText.match(/Current\s+([\d,.]+)\s+([\d,.]+)\s+([\d,.]+)\s+([\d,.]+)\s+([\d,.]+)\s+([\d,.]+)/);
  if(!cm)return null;
  const grossPay=pn(cm[2]),preTaxSum=pn(cm[3]),empTaxSum=pn(cm[4]),postTaxSum=pn(cm[5]),netPay=pn(cm[6]);

  // Skip if all zeros
  if(grossPay===0&&empTaxSum===0&&preTaxSum===0&&postTaxSum===0){
    return{payPeriodBegin:ppb,payPeriodEnd:ppe,checkDate:cd,grossPay:0,netPay:0,
      earningsTotal:0,employeeTaxTotal:0,preTaxTotal:0,postTaxTotal:0,
      gtl:0,deferral401k:0,match401k:0,rsuOffset:0,isRSU:false,isSkip:true};
  }

  // Section totals: try combined-line format first (old layout), then "Total:" lines (new layout)
  let earningsTotal=0,employeeTaxTotal=0,preTaxTotal=0,postTaxTotal=0;
  for(const ln of lines){
    const em=ln.match(/^Earnings\s+([\d,.]+)\s+[\d,.]+\s+Employee Taxes\s+([\d,.]+)/);
    if(em){earningsTotal=pn(em[1]);employeeTaxTotal=pn(em[2])}
    const pm=ln.match(/^Pre Tax Deductions\s+([\d,.]+)\s+[\d,.]+\s+Post Tax Deductions\s+([\d,.]+)/);
    if(pm){preTaxTotal=pn(pm[1]);postTaxTotal=pn(pm[2])}
  }
  // Fallback: parse "Total:" lines after each section header (new PDF layout)
  if(!earningsTotal&&!employeeTaxTotal){
    const sectionOrder=["Earnings","Employee Taxes","Pre Tax Deductions","Post Tax Deductions"];
    let curSection="";
    for(const ln of lines){
      const sh=sectionOrder.find(s=>ln.trim()===s||ln.startsWith(s+" "));
      if(sh){curSection=sh;continue}
      if(curSection){const tm=ln.match(/^Total:\s+([\d,.]+)/);if(tm){
        const v=pn(tm[1]);
        if(curSection==="Earnings")earningsTotal=v;
        else if(curSection==="Employee Taxes")employeeTaxTotal=v;
        else if(curSection==="Pre Tax Deductions")preTaxTotal=v;
        else if(curSection==="Post Tax Deductions")postTaxTotal=v;
        curSection="";
      }}
    }
  }
  // Fallback to Current row values for any section totals missing due to cross-page splits
  if(!earningsTotal)earningsTotal=grossPay;
  if(!employeeTaxTotal)employeeTaxTotal=empTaxSum;
  if(!preTaxTotal&&preTaxSum)preTaxTotal=preTaxSum;
  if(!postTaxTotal&&postTaxSum)postTaxTotal=postTaxSum;

  // GTL current amount (earnings item with date range)
  const gm=fullText.match(/GTL\s+\d{2}\/\d{2}\/\d{4}\s*-\s*\d{2}\/\d{2}\/\d{4}\s+[\d,.]+\s+[\d,.]+\s+([\d,.]+)/);
  const gtl=gm?pn(gm[1]):0;

  // 401(k) After-tax Deferral: 2 numbers = [current, YTD], 1 number = YTD only
  let deferral401k=0;
  const km=fullText.match(/401\(k\) After-tax Deferral\s+([\d,.]+)(?:\s+([\d,.]+))?/);
  if(km&&km[2])deferral401k=pn(km[1]);

  // 401(k) Company/Employer Match: same pattern
  let match401k=0;
  const mm=fullText.match(/(?:401\(k\)\s*(?:Company|Employer)\s*Match|Company\s*Match|Employer\s*Match)\s+([\d,.]+)(?:\s+([\d,.]+))?/i);
  if(mm&&mm[2])match401k=pn(mm[1]);else if(mm&&mm[1]&&!mm[2])match401k=0; // YTD only, no current

  // RSU Gain Offset: same pattern
  let rsuOffset=0;
  const rm=fullText.match(/RSU Gain Offset\s+([\d,.]+)(?:\s+([\d,.]+))?/);
  if(rm&&rm[2])rsuOffset=pn(rm[1]);

  // RSU detection: RSU Gain followed by a date
  const isRSU=!!fullText.match(/RSU Gain\s+\d{2}\/\d{2}\/\d{4}/);

  return{payPeriodBegin:ppb,payPeriodEnd:ppe,checkDate:cd,grossPay,netPay,
    earningsTotal,employeeTaxTotal,preTaxTotal,postTaxTotal,
    gtl,deferral401k,match401k,rsuOffset,isRSU,isSkip:false};
}

async function parsePayslipPDF(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const pages=[];
  for(let i=1;i<=pdf.numPages;i++){
    const pg=await pdf.getPage(i);
    const tc=await pg.getTextContent();
    const lines=extractLinesFromPage(tc);
    const fullText=tc.items.map(it=>it.str).join(" ");
    const parsed=parsePayslipPage(lines,fullText);
    if(parsed)pages.push(parsed);
  }
  return pages;
}

function generatePayslipTransactions(pages,enteredDate){
  const txns=[];
  for(const p of pages){
    if(p.isSkip)continue;
    const ss=p.payPeriodBegin,se=p.payPeriodEnd;
    if(p.isRSU){
      const vp=getQuarterlyVestingPeriod(ss);
      const q=Math.ceil((new Date(ss+"T00:00:00").getMonth()+1)/3);
      const y=new Date(ss+"T00:00:00").getFullYear();
      txns.push({date:enteredDate,service_start:vp.start,service_end:vp.end,
        description:`Pinterest Stock Units Vested (Q${q} ${y})`,category_id:"income",
        amount_usd:-p.earningsTotal,payment_type:"Charles Schwab",
        _group:`${fmtD(ss)} \u2013 ${fmtD(se)} (RSU Vesting)`,_source:"rsu",_pageData:p});
      txns.push({date:enteredDate,service_start:vp.start,service_end:vp.end,
        description:"Income Taxes and Social Security",category_id:"income",
        amount_usd:p.employeeTaxTotal,payment_type:"Charles Schwab",
        _group:`${fmtD(ss)} \u2013 ${fmtD(se)} (RSU Vesting)`,_source:"rsu_tax",_pageData:p});
    }else{
      const postTaxNon401k=Math.round((p.postTaxTotal-p.deferral401k-p.rsuOffset)*100)/100;
      const medical=Math.round((p.preTaxTotal+postTaxNon401k+p.gtl)*100)/100;
      const grp=`${fmtD(ss)} \u2013 ${fmtD(se)} (Regular)`;
      txns.push({date:enteredDate,service_start:ss,service_end:se,
        description:"Pinterest Income",category_id:"income",
        amount_usd:-p.earningsTotal,payment_type:"Chase Chequing",
        _group:grp,_source:"salary",_pageData:p});
      txns.push({date:enteredDate,service_start:ss,service_end:se,
        description:"Income Taxes and Social Security",category_id:"income",
        amount_usd:p.employeeTaxTotal,payment_type:"Chase Chequing",
        _group:grp,_source:"tax",_pageData:p});
      txns.push({date:enteredDate,service_start:ss,service_end:se,
        description:"Medical Insurance Benefits",category_id:"health",
        amount_usd:medical,payment_type:"Chase Chequing",
        _group:grp,_source:"benefits",_pageData:p});
      if(p.deferral401k>0){
        txns.push({date:enteredDate,service_start:ss,service_end:se,
          description:"401K",category_id:"financial",
          amount_usd:p.deferral401k,payment_type:"Chase Chequing",
          _group:grp,_source:"401k_out",_pageData:p});
        txns.push({date:enteredDate,service_start:ss,service_end:se,
          description:"Vanguard Deposited 401K",category_id:"financial",
          amount_usd:-p.deferral401k,payment_type:"Vanguard",
          _group:grp,_source:"401k_in",_pageData:p});
      }
      if(p.match401k>0){
        txns.push({date:enteredDate,service_start:ss,service_end:se,
          description:"401K Match",category_id:"income",
          amount_usd:-p.match401k,payment_type:"Vanguard",
          _group:grp,_source:"401k_match",_pageData:p});
      }
    }
  }
  return txns;
}

// Ensure a tag exists in the tags table; prompt user to create if new
async function ensureTagExists(tagName){
  if(!tagName)return;
  const existing=await sb("tags?select=name");
  if(existing.some(t=>t.name.toLowerCase()===tagName.toLowerCase()))return;
  return new Promise(resolve=>{
    const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg){bg.remove();resolve()}}});
    const modal=h("div",{class:"modal"});
    const hdr=h("div",{style:{marginBottom:"20px"}});
    hdr.append(h("h3",{style:{margin:"0"}},"New Tag Detected"));
    hdr.append(h("div",{style:{fontSize:"12px",color:"rgba(255,255,255,0.5)",marginTop:"6px"}},`"${tagName}" doesn't exist in the tags table yet.`));
    modal.append(hdr);
    const tStart=h("input",{class:"inp",type:"date"});
    const tEnd=h("input",{class:"inp",type:"date"});
    const tType=h("select",{class:"inp"});
    ["trip","event","recurring"].forEach(v=>tType.append(h("option",{value:v},v)));
    function mF(lbl,inp){const d=h("div");d.append(h("label",{class:"lbl"},lbl));d.append(inp);return d}
    function mR(...ch){const d=h("div",{style:{display:"grid",gridTemplateColumns:ch.length===2?"1fr 1fr":"1fr",gap:"12px",marginBottom:"14px"}});ch.forEach(x=>d.append(x));return d}
    modal.append(mR(mF("Start Date",tStart),mF("End Date",tEnd)));
    modal.append(mR(mF("Tag Type",tType)));
    const errEl=h("div",{style:{color:"var(--r)",fontSize:"11px",marginBottom:"8px",minHeight:"16px"}});
    modal.append(errEl);
    const btnRow=h("div",{style:{display:"grid",gridTemplateColumns:"1fr auto",gap:"8px"}});
    const createBtn=h("button",{class:"btn",style:{background:"rgba(129,178,154,0.2)",color:"var(--g)"},onClick:async()=>{
      if(!tStart.value||!tEnd.value){errEl.textContent="Start and end dates are required.";return}
      if(tEnd.value<tStart.value){errEl.textContent="End date must be after start date.";return}
      createBtn.textContent="Creating...";createBtn.disabled=true;
      try{
        await sb("tags",{method:"POST",headers:{"Prefer":"return=representation"},body:JSON.stringify({name:tagName,start_date:tStart.value,end_date:tEnd.value,tag_type:tType.value})});
        bg.remove();resolve();
      }catch(e){errEl.textContent="Failed: "+e.message;createBtn.textContent="Create Tag";createBtn.disabled=false}
    }},"Create Tag");
    const skipBtn=h("button",{class:"btn",style:{background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.4)",width:"auto",padding:"12px 20px"},onClick:()=>{bg.remove();resolve()}},"Skip");
    btnRow.append(createBtn,skipBtn);
    modal.append(btnRow);
    bg.append(modal);
    document.body.append(bg);
  });
}

function renderReviewTable(container,candidates){
  container.innerHTML="";
  const skipped=candidates.filter(c=>c._status==="skipped");
  const dupes=candidates.filter(c=>c._isDuplicate);
  const hi=candidates.filter(c=>c.ai_confidence==="high"&&c._status!=="skipped");
  const med=candidates.filter(c=>c.ai_confidence==="medium"&&c._status!=="skipped");
  const lo=candidates.filter(c=>c.ai_confidence==="low"&&c._status!=="skipped");

  const stats=h("div",{style:{fontSize:"12px",color:"rgba(255,255,255,0.5)",marginBottom:"12px"}},
    `${candidates.length} parsed \u00b7 ${skipped.length} auto-skipped \u00b7 ${dupes.length} duplicates \u00b7 ${hi.length} high \u00b7 ${med.length} medium \u00b7 ${lo.length} low confidence`);
  container.append(stats);

  const bulkBar=h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"12px"}});
  bulkBar.append(h("button",{class:"pg-btn",style:"color:var(--g);border-color:rgba(129,178,154,0.3)",onClick:()=>{
    candidates.forEach(c=>{if(c.ai_confidence==="high"&&c._status==="pending")c._status="approved"});
    renderReviewTable(container,candidates);
  }},"\u2713 Approve All High-Confidence"));
  bulkBar.append(h("button",{class:"pg-btn",style:"color:var(--b);border-color:rgba(74,111,165,0.3)",onClick:()=>{
    candidates.forEach(c=>{if(c._status==="pending")c._status="approved"});
    renderReviewTable(container,candidates);
  }},"\u2713 Approve All"));
  let saving=false;
  const saveBtn=h("button",{class:"pg-btn",style:"color:#fff;background:rgba(129,178,154,0.2);border-color:rgba(129,178,154,0.4);font-weight:600",onClick:async()=>{
    if(saving)return;
    const approved=candidates.filter(c=>c._status==="approved");
    if(!approved.length)return alert("No approved transactions to save.");
    saving=true;saveBtn.disabled=true;saveBtn.textContent="Saving...";
    try{
      const summary=await commitImport(candidates);
      renderReviewTable(container,candidates);
      // Success summary
      const sumEl=h("div",{class:"preview",style:{marginTop:"12px"}});
      const dates=summary.imported.map(c=>c.date).sort();
      sumEl.innerHTML=`<div style="color:var(--g);font-weight:600;margin-bottom:6px">\u2713 Imported ${summary.count} transactions \u00b7 ${summary.skipped} skipped \u00b7 ${summary.dupes} duplicates</div>`;
      const viewBtn=h("button",{class:"pg-btn",style:"color:var(--b);border-color:rgba(74,111,165,0.3);margin-top:4px",onClick:()=>{
        state.tab="ledger";state.lf={cat:"",pt:"",dfrom:dates[0]||"",dto:dates[dates.length-1]||"",q:""};state.page=0;renderTabs();renderContent();
      }},"View in Ledger \u2192");
      sumEl.append(viewBtn);
      container.append(sumEl);
      saveBtn.textContent="Saved";
    }catch(e){
      console.error("commitImport error:",e);
      alert("Error saving: "+e.message);
      saveBtn.disabled=false;saveBtn.textContent="Save Approved";
    }
  }},"Save Approved");
  bulkBar.append(saveBtn);
  container.append(bulkBar);

  const wrap=h("div",{style:{overflowX:"auto"}});
  const tbl=h("table");
  const thead=h("thead");
  thead.innerHTML=`<tr><th style="width:36px"></th><th>Date</th><th>Description</th><th class="r">Amount</th><th>Category</th><th class="hide-m">Svc Period</th><th class="hide-m">Tag</th><th class="hide-m">Bank Cat</th></tr>`;
  tbl.append(thead);
  const tbody=h("tbody");

  candidates.forEach((c,idx)=>{
    const tr=h("tr",{style:{borderLeft:c._status==="approved"?"3px solid var(--g)":c._isDuplicate?"3px solid var(--y)":"3px solid transparent",opacity:c._status==="skipped"?"0.4":"1"}});

    const statusIcon=c._status==="approved"?"\u2713":c._status==="skipped"?"\u2715":c._status==="committed"?"\u2713":"\u25CB";
    const statusColor=c._status==="approved"?"var(--g)":c._status==="skipped"?"var(--r)":c._status==="committed"?"var(--b)":"rgba(255,255,255,0.3)";
    tr.append(h("td",{style:{cursor:c._status==="committed"?"default":"pointer",textAlign:"center",fontSize:"14px",color:statusColor,userSelect:"none"},onClick:()=>{
      if(c._status==="committed")return;
      if(c._isDuplicate&&c._status==="skipped")c._status="pending";
      else if(c._status==="pending")c._status="approved";
      else if(c._status==="approved")c._status="skipped";
      else c._status="pending";
      renderReviewTable(container,candidates);
    }},statusIcon));

    tr.append(h("td",{class:"m",style:{color:"rgba(255,255,255,0.55)",whiteSpace:"nowrap",cursor:"pointer"},onClick:()=>{if(c._status!=="committed")openImportEditModal(candidates,idx,container)}},fmtD(c.date)));

    const descTd=h("td",{style:{maxWidth:"220px",cursor:"pointer"},onClick:()=>{if(c._status!=="committed")openImportEditModal(candidates,idx,container)}});
    const descText=(c._isCCPayment?"\uD83D\uDCB3 ":"")+(c.description||c._rawDescription);
    const descMain=h("div",{style:{color:c._status==="skipped"?"rgba(255,255,255,0.35)":"rgba(255,255,255,0.85)",textDecoration:c._status==="skipped"?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}});
    descMain.textContent=descText;
    if(c._isCCPayment){const pairHint=h("span",{style:{color:"rgba(255,255,255,0.3)",fontSize:"11px"}}," \u2192 Chase Chequing");descMain.append(pairHint)}
    const descSub=h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.25)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}});
    descSub.textContent=c._skipReason?c._skipReason+(c._rawDescription?" \u00b7 "+c._rawDescription:""):c._rawDescription;
    descTd.append(descMain,descSub);
    tr.append(descTd);

    tr.append(h("td",{class:"r m",style:{color:c.amount_usd<0?"var(--g)":"rgba(255,255,255,0.75)"}},fmtF(c.amount_usd)));

    const catTd=h("td");
    catTd.append(h("span",{style:{display:"inline-block",width:"6px",height:"6px",borderRadius:"50%",marginRight:"4px",background:c.ai_confidence==="high"?"var(--g)":c.ai_confidence==="medium"?"var(--y)":"var(--r)"}}));
    const catSel2=h("select",{style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"5px",padding:"3px 6px",color:"#e8e8e4",fontSize:"11px",fontFamily:"var(--sans)",cursor:"pointer",outline:"none"},onChange:e=>{
      c.category_id=e.target.value;
      c.service_end=getDefEnd(c.category_id,c.date)||c.date;
      const ss=new Date(c.service_start+"T00:00:00"),se=new Date(c.service_end+"T00:00:00");
      c.service_days=Math.max(1,Math.floor((se-ss)/864e5)+1);
      c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
      propagateEdits(candidates,idx);
      renderReviewTable(container,candidates);
    }});
    CATS_LIST.forEach(cat=>{const o=h("option",{value:cat.id},cat.l);if(cat.id===c.category_id)o.selected=true;catSel2.append(o)});
    catTd.append(catSel2);
    tr.append(catTd);

    tr.append(h("td",{class:"m hide-m",style:{color:"rgba(255,255,255,0.4)",whiteSpace:"nowrap",fontSize:"11px"}},
      c.service_start===c.service_end?fmtD(c.date):`${fmtD(c.service_start)}\u2013${fmtD(c.service_end)}`));

    const tagTd=h("td",{class:"hide-m"});

function openImportEditModal(candidates,idx,reviewContainer){

  const mDate=h("input",{class:"inp",type:"date",value:c.date,onInput:updatePreview});

  const mAmt=h("input",{class:"inp",type:"number",step:"0.01",value:c.amount_usd,onInput:updatePreview});

  const mCat=h("select",{class:"inp",onChange:()=>{
    if(!seManual){mSe.value=getDefEnd(mCat.value,mSs.value)||mSs.value;updateHint()}
    updatePreview();
  }});
  CATS_LIST.forEach(cat=>{const o=h("option",{value:cat.id},cat.l);if(cat.id===c.category_id)o.selected=true;mCat.append(o)});

  const mSs=h("input",{class:"inp",type:"date",value:c.service_start,onInput:()=>{
    if(!seManual){mSe.value=getDefEnd(mCat.value,mSs.value)||mSs.value}
    updatePreview();
  }});
  const mSe=h("input",{class:"inp",type:"date",value:c.service_end,onInput:()=>{
    seManual=true;mSe.style.borderColor="rgba(242,204,143,0.3)";updatePreview();
  }});
  const hintSpan=h("span",{style:{color:"rgba(129,178,154,0.6)",textTransform:"none",letterSpacing:"0",fontWeight:"400",fontSize:"10px"}});
  function updateHint(){const r=ACCRUAL_D[mCat.value];hintSpan.textContent=!seManual&&r?(r==="month"?"(Auto: end of month)":`(Auto: ${r} days)`):""}
  updateHint();
  const seLbl=h("label",{class:"lbl"});seLbl.append("Service End ");seLbl.append(hintSpan);
  const seField=h("div");seField.append(seLbl);seField.append(mSe);

  const mPt=h("select",{class:"inp"});
  if(c.payment_type&&!PTS.includes(c.payment_type))mPt.append(h("option",{value:c.payment_type,selected:true},c.payment_type));
  PTS.forEach(p=>{const o=h("option",{value:p},p);if(p===c.payment_type)o.selected=true;mPt.append(o)});
  const mTag=h("input",{class:"inp",type:"text",value:c.tag||""});

  // Accrual preview
  const previewEl=h("div",{class:"preview hidden"});
  function updatePreview(){
    const a=parseFloat(mAmt.value);if(isNaN(a)||!mSs.value||!mSe.value){previewEl.classList.add("hidden");return}
    const ss=new Date(mSs.value+"T00:00:00"),se=new Date(mSe.value+"T00:00:00");
    if(se<ss){previewEl.classList.add("hidden");return}
    const days=Math.max(1,Math.floor((se-ss)/864e5)+1);
    const daily=a/days;
    previewEl.classList.remove("hidden");
    previewEl.innerHTML=`<div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Accrual Preview</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">USD Amount</div><div style="font-size:18px;font-weight:700;color:#fff;font-family:var(--mono)">${fmtF(a)}</div></div>
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">Service Days</div><div style="font-size:18px;font-weight:700;color:var(--b);font-family:var(--mono)">${days}</div></div>
      <div><div style="font-size:10px;color:rgba(255,255,255,0.25)">Daily Cost</div><div style="font-size:18px;font-weight:700;color:var(--g);font-family:var(--mono)">${fmtF(daily)}/d</div></div>
    </div>`;
  }
  updatePreview();

  // Action buttons
  const btnRow=h("div",{style:{display:"grid",gridTemplateColumns:"1fr auto auto",gap:"8px",marginTop:"4px"}});
  const mSave=h("button",{class:"btn",style:{background:"rgba(129,178,154,0.2)",color:"var(--g)"},onClick:()=>{
    c.date=mDate.value;c.description=mDesc.value;c.amount_usd=parseFloat(mAmt.value);
    c.original_amount=c.amount_usd;c.category_id=mCat.value;
    c.service_start=mSs.value;c.service_end=mSe.value;
    c.payment_type=mPt.value;c.tag=mTag.value;
    const ss=new Date(c.service_start+"T00:00:00"),se=new Date(c.service_end+"T00:00:00");
    c.service_days=Math.max(1,Math.floor((se-ss)/864e5)+1);
    c.daily_cost=Math.round(c.amount_usd/c.service_days*1e6)/1e6;
    c._status="approved";
    propagateEdits(candidates,idx);
    bg.remove();
    renderReviewTable(reviewContainer,candidates);
  }},"Save & Approve");
  const mSkip=h("button",{class:"btn",style:{background:"rgba(224,122,95,0.15)",color:"var(--r)",width:"auto",padding:"12px 20px"},onClick:()=>{
    c._status="skipped";bg.remove();renderReviewTable(reviewContainer,candidates);
  }},"Skip");
  const mCancel=h("button",{class:"btn",style:{background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.4)",width:"auto",padding:"12px 20px"},onClick:()=>bg.remove()},"Cancel");
  btnRow.append(mSave,mSkip,mCancel);

  modal.append(mRow(mField("Date",mDate),descField));
  modal.append(mRow(mField("Category",mCat),mField("Amount (USD)",mAmt)));
  modal.append(mRow(mField("Service Start",mSs),seField));
  modal.append(mRow(mField("Payment Account",mPt),mField("Tag",mTag)));
  modal.append(previewEl);
  modal.append(btnRow);
  bg.append(modal);
  document.body.append(bg);
}

async function commitImport(candidates){
  const approved=candidates.filter(c=>c._status==="approved");
  if(!approved.length)throw new Error("No approved transactions to save.");
  const valid=approved.filter(c=>c.date&&c.service_start&&c.service_end);
  if(valid.length<approved.length)console.warn(`commitImport: dropped ${approved.length-valid.length} rows with missing dates`);
  if(!valid.length)throw new Error("All approved transactions have invalid dates.");
  const batchId="import-"+new Date().toISOString().slice(0,16);
  const rows=valid.map(c=>({
    date:c.date,service_start:c.service_start,service_end:c.service_end,
    description:c.description,category_id:c.category_id,
    original_amount:c.original_amount,currency:c.currency,fx_rate:c.fx_rate,
    amount_usd:Math.round(c.amount_usd*100)/100,
    payment_type:c.payment_type,tag:(c.tag||"").toLowerCase().trim(),
    daily_cost:c.daily_cost,service_days:c.service_days,credit:c.credit||"",
    import_batch:batchId,bank_description:c._rawDescription||null,bank_category:c._bankCategory||null
  }));
  // Generate Side B rows for CC payments
  const ccPairs=valid.filter(c=>c._isCCPayment&&c._ccPaymentPair);
  if(ccPairs.length){
    const ccDates=ccPairs.map(c=>c.date).sort();
    const existingCQ=await sb(`transactions?payment_type=eq.${encodeURIComponent("Chase Chequing")}&date=gte.${ccDates[0]}&date=lte.${ccDates[ccDates.length-1]}&select=date,amount_usd`);
    for(const c of ccPairs){
      const p=c._ccPaymentPair;
      const isDupe=existingCQ.some(e=>e.date===c.date&&Math.abs(Math.abs(e.amount_usd)-p.amount)<0.02);
      if(!isDupe)rows.push({
        date:c.date,service_start:c.service_start,service_end:c.service_end,
        description:p.description,category_id:"financial",
        original_amount:p.amount,currency:c.currency,fx_rate:c.fx_rate,
        amount_usd:Math.round(p.amount*100)/100,
        payment_type:p.payment_type,tag:(c.tag||"").toLowerCase().trim(),
        daily_cost:p.amount,service_days:1,credit:"",
        import_batch:batchId,bank_description:null,bank_category:null
      });
    }
  }
  const uniqueTags=[...new Set(rows.map(r=>r.tag).filter(Boolean))];
  for(const t of uniqueTags)await ensureTagExists(t);
  await sb("transactions",{method:"POST",headers:{"Prefer":"return=representation"},body:JSON.stringify(rows)});
  state.txnCount+=rows.length;
  document.getElementById("dbStatus").textContent=`\u25CF ${state.txnCount.toLocaleString()} txns`;
  valid.forEach(c=>c._status="committed");
  return{
    count:valid.length,
    imported:valid,
    skipped:candidates.filter(c=>c._status==="skipped").length,
    dupes:candidates.filter(c=>c._isDuplicate).length
  };
}

      const expectedNet=Math.round((pd.earningsTotal-pd.gtl-pd.employeeTaxTotal-pd.preTaxTotal-pd.postTaxTotal)*100)/100;
      const diff=Math.abs(expectedNet-pd.netPay);
      const chk=h("span",{style:{fontSize:"10px",fontWeight:"400",color:diff>0.02?"var(--r)":"rgba(255,255,255,0.3)"}},
        ` \u00b7 Net Pay: ${fmtF(pd.netPay)}`+(diff>0.02?` \u26a0 (expected ${fmtF(expectedNet)})`:" \u2713"));
      hdrTd.append(chk);
    }
    hdrTr.append(hdrTd);
    tbody.append(hdrTr);

    // Transaction rows
    grpTxns.forEach(c=>{
      const idx=candidates.indexOf(c);
      const tr=h("tr",{style:{borderLeft:c._status==="approved"?"3px solid var(--g)":c._isDuplicate?"3px solid var(--y)":"3px solid transparent",opacity:c._status==="skipped"?"0.4":"1"}});

      const statusIcon=c._status==="approved"?"\u2713":c._status==="skipped"?"\u2715":c._status==="committed"?"\u2713":"\u25CB";
      const statusColor=c._status==="approved"?"var(--g)":c._status==="skipped"?"var(--r)":c._status==="committed"?"var(--b)":"rgba(255,255,255,0.3)";
      tr.append(h("td",{style:{cursor:c._status==="committed"?"default":"pointer",textAlign:"center",fontSize:"14px",color:statusColor,userSelect:"none"},onClick:()=>{
        if(c._status==="committed")return;
        if(c._isDuplicate&&c._status==="skipped")c._status="pending";
        else if(c._status==="pending")c._status="approved";
        else if(c._status==="approved")c._status="skipped";
        else c._status="pending";
        renderPayslipReviewTable(container,candidates,skippedPages);
      }},statusIcon));

      const descTd=h("td",{style:{maxWidth:"220px",cursor:"pointer"},onClick:()=>{if(c._status!=="committed")openPayslipEditModal(candidates,idx,container,skippedPages)}});
      const descMain=h("div",{style:{color:c._status==="skipped"?"rgba(255,255,255,0.35)":"rgba(255,255,255,0.85)",textDecoration:c._status==="skipped"?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}});
      descMain.textContent=c.description;
      const descSub=h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.25)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}});
      descSub.textContent=c._skipReason||"";
      descTd.append(descMain,descSub);
      tr.append(descTd);

      tr.append(h("td",{class:"r m",style:{color:c.amount_usd<0?"var(--g)":"rgba(255,255,255,0.75)"}},fmtF(c.amount_usd)));

        c.category_id=e.target.value;

        const ss2=new Date(c.service_start+"T00:00:00"),se2=new Date(c.service_end+"T00:00:00");
        c.service_days=Math.max(1,Math.floor((se2-ss2)/864e5)+1);

      }});
      CATS_LIST.forEach(cat=>{const o=h("option",{value:cat.id},cat.l);if(cat.id===c.category_id)o.selected=true;catSel.append(o)});
      catTd.append(catSel);

async function commitEmailImports(candidates){
  const approved=candidates.filter(c=>c._status==="approved");
  if(!approved.length)throw new Error("No approved transactions to save.");
  const valid=approved.filter(c=>c.date&&c.service_start&&c.service_end);
  if(valid.length<approved.length)console.warn(`commitEmailImports: dropped ${approved.length-valid.length} rows with missing dates`);
  if(!valid.length)throw new Error("All approved transactions have invalid dates.");
  const batchId="email-"+new Date().toISOString().slice(0,16);
  const rows=valid.map(c=>({
    date:c.date,service_start:c.service_start,service_end:c.service_end,
    description:c.description,category_id:c.category_id,
    original_amount:c.original_amount||c.amount_usd,currency:c.currency||"USD",fx_rate:c.fx_rate||1,
    amount_usd:Math.round(c.amount_usd*100)/100,
    payment_type:c.payment_type,tag:(c.tag||"").toLowerCase().trim(),
    daily_cost:c.daily_cost,service_days:c.service_days,credit:c.credit||"",
    import_batch:batchId
  }));
  const uniqueTags=[...new Set(rows.map(r=>r.tag).filter(Boolean))];
  for(const t of uniqueTags)await ensureTagExists(t);
  await sb("transactions",{method:"POST",headers:{"Prefer":"return=representation"},body:JSON.stringify(rows)});
  const now=new Date().toISOString();
  for(const c of valid){
    await sb(`pending_imports?id=eq.${c._id}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({status:"committed",committed_at:now})});
  }
  state.txnCount+=rows.length;
  document.getElementById("dbStatus").textContent=`\u25CF ${state.txnCount.toLocaleString()} txns`;
  valid.forEach(c=>c._status="committed");
  const banner=document.getElementById("emailImportBanner");
  if(banner)banner.remove();
  state.pendingEmails=0;
  // Trigger reimbursement auto-linking for newly committed Venmo reimbursements
  const newReimb=valid.filter(c=>c.amount_usd<0&&c.payment_type==="Venmo");
  if(newReimb.length)setTimeout(()=>scanForReimbursementLinks().catch(e=>console.error("Post-commit link scan:",e)),1000);
  return{
    count:valid.length,
    imported:valid,
    skipped:candidates.filter(c=>c._status==="skipped").length,
    dupes:candidates.filter(c=>c._isDuplicate).length
  };
}

    description:c.description,category_id:c.category_id,
    original_amount:c.amount_usd,currency:"USD",fx_rate:1,
    amount_usd:Math.round(c.amount_usd*100)/100,
    payment_type:c.payment_type,tag:(c.tag||"").toLowerCase().trim(),
    daily_cost:c.daily_cost,service_days:c.service_days,credit:"",
    import_batch:batchId
  }));
  const uniqueTags=[...new Set(rows.map(r=>r.tag).filter(Boolean))];
  for(const t of uniqueTags)await ensureTagExists(t);
  const created=await sb("transactions",{method:"POST",headers:{"Prefer":"return=representation"},body:JSON.stringify(rows)});
  // Auto-link payslip groups by _group
  const groupMap={};
  valid.forEach((c,i)=>{if(c._group&&created[i]){if(!groupMap[c._group])groupMap[c._group]=[];groupMap[c._group].push(created[i].id)}});
  for(const ids of Object.values(groupMap)){
    if(ids.length<2)continue;
    const gid=Math.min(...ids);
    await sb(`transactions?id=in.(${ids.join(",")})`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({transaction_group_id:gid})});
  }
  state.txnCount+=rows.length;
  document.getElementById("dbStatus").textContent=`\u25CF ${state.txnCount.toLocaleString()} txns`;
  valid.forEach(c=>c._status="committed");
  return{
    count:valid.length,
    imported:valid,
    skipped:candidates.filter(c=>c._status==="skipped").length,
    dupes:candidates.filter(c=>c._isDuplicate).length
  };
}

async function scanForReimbursementLinks(){
  try{
    const cutoff=new Date(Date.now()-90*864e5).toISOString().slice(0,10);
    const reimbursements=await sb(
      `transactions?payment_type=eq.Venmo&amount_usd=lt.0`+
      `&transaction_group_id=is.null&date=gte.${cutoff}`+
      `&select=id,date,description,amount_usd,category_id,tag`
    );
    if(!reimbursements.length)return;
    const expandedCutoff=new Date(Date.now()-120*864e5).toISOString().slice(0,10);
    const expenses=await sb(
      `transactions?amount_usd=gt.0&transaction_group_id=is.null`+
      `&date=gte.${expandedCutoff}`+
      `&select=id,date,description,amount_usd,category_id,payment_type,tag,service_start,service_end,transaction_group_id`
    );
    const links=[];
    for(const reimb of reimbursements){
      const reimbAmt=Math.abs(reimb.amount_usd);
      const noteMatch=reimb.description.match(/Reimbursed - (.+?)(?:\s*\(.+?\))?\s*-\s*\w+$/);
      const reimbNote=noteMatch?noteMatch[1].toLowerCase().trim():"";
      let bestMatch=null,bestScore=0;
      for(const exp of expenses){
        let score=0;
        if(reimbAmt>exp.amount_usd*1.05)continue;
        const ratio=reimbAmt/exp.amount_usd;
        const CLEAN_FRACTIONS=[1,1/2,1/3,1/4,1/5,2/3,3/4,2/5,3/5,4/5];
        const isCleanFraction=CLEAN_FRACTIONS.some(f=>Math.abs(ratio-f)<0.03);
        if(Math.abs(reimbAmt-exp.amount_usd)<1.0)score+=40;
        else if(isCleanFraction)score+=35;
        else if(reimbAmt<exp.amount_usd)score+=10;
        const daysDiff=Math.abs((new Date(reimb.date)-new Date(exp.date))/864e5);
        if(daysDiff<=3)score+=25;
        else if(daysDiff<=14)score+=20;
        else if(daysDiff<=30)score+=10;
        else if(daysDiff<=90)score+=5;
        else continue;
        const expDesc=exp.description.toLowerCase();
        if(reimbNote&&expDesc.includes(reimbNote))score+=35;
        else if(reimbNote){
          const words=reimbNote.split(/\s+/).filter(w=>w.length>=3);
          const matches=words.filter(w=>expDesc.includes(w));
          if(matches.length>0)score+=15*(matches.length/words.length);
        }
        if(reimb.category_id&&reimb.category_id===exp.category_id)score+=10;
        if(reimb.tag&&reimb.tag===exp.tag)score+=10;
        if(score>bestScore){bestScore=score;bestMatch=exp}
      }
      if(bestMatch&&bestScore>=60){
        links.push({reimbursement:reimb,expense:bestMatch,score:bestScore});
        expenses.splice(expenses.indexOf(bestMatch),1);
      }
    }
    for(const link of links){
      const expDate=link.expense.date,expSS=link.expense.service_start||expDate,expSE=link.expense.service_end||expDate;
      const reimbSD=Math.round((new Date(expSE)-new Date(expSS))/864e5)+1;
      const reimbDC=link.reimbursement.amount_usd/reimbSD;
      const groupId=link.expense.transaction_group_id||Math.min(link.expense.id,link.reimbursement.id);
      await sb(`transactions?id=eq.${link.reimbursement.id}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({
        transaction_group_id:groupId,
        date:expDate,service_start:expSS,service_end:expSE,
        service_days:reimbSD,daily_cost:reimbDC,
        ...(link.reimbursement.category_id==="other"?{category_id:link.expense.category_id}:{})
      })});
      if(!link.expense.transaction_group_id){
        await sb(`transactions?id=eq.${link.expense.id}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({transaction_group_id:groupId})});
      }
    }
    if(links.length>0)console.log(`Auto-linked ${links.length} reimbursement(s)`);
  }catch(e){console.error("Link scan error:",e)}
}

async function linkToGroup(txnA,txnB){
  const gA=txnA.transaction_group_id,gB=txnB.transaction_group_id;
  let targetGroup;
  if(gA&&gB&&gA!==gB){
    targetGroup=Math.min(gA,gB);const oldGroup=Math.max(gA,gB);
    await sb(`transactions?transaction_group_id=eq.${oldGroup}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({transaction_group_id:targetGroup})});
  }else if(gA){targetGroup=gA}
  else if(gB){targetGroup=gB}
  else{targetGroup=Math.min(txnA.id,txnB.id)}
  const ids=[txnA.id,txnB.id].filter(id=>{const t=id===txnA.id?txnA:txnB;return t.transaction_group_id!==targetGroup});
  if(ids.length){await sb(`transactions?id=in.(${ids.join(",")})`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({transaction_group_id:targetGroup})})}
  txnA.transaction_group_id=targetGroup;txnB.transaction_group_id=targetGroup;
  return targetGroup;
}

async function unlinkFromGroup(txnId,groupId){
  await sb(`transactions?id=eq.${txnId}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({transaction_group_id:null})});
  const remaining=await sb(`transactions?transaction_group_id=eq.${groupId}&select=id`);
  if(remaining.length<=1&&remaining.length>0){
    await sb(`transactions?id=eq.${remaining[0].id}`,{method:"PATCH",headers:{"Prefer":"return=representation"},body:JSON.stringify({transaction_group_id:null})});
  }
}

async function fetchReimburseFriends(){
  const creditRows=await sb("transactions?payment_type=eq.Transfer&credit=neq.&select=credit&limit=5000");
  const reimbRows=await sb("transactions?description=like.Reimbursed*&amount_usd=lt.0&select=description&limit=5000");
  const counts={};
  for(const r of creditRows){const name=(r.credit||"").trim();if(name)counts[name]=(counts[name]||0)+1}
  for(const r of reimbRows){const m=r.description.match(/-\s*(\w+)\s*$/);if(m){const name=m[1].trim();counts[name]=(counts[name]||0)+1}}
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([name])=>name);
}

async function createReimbursement(originalTxn,person,splitRatio,paymentType,note){
  const reimbAmount=Math.round(-(originalTxn.amount_usd*splitRatio)*100)/100;
  const ss=originalTxn.service_start||originalTxn.date;
  const se=originalTxn.service_end||originalTxn.date;
  const serviceDays=Math.max(1,Math.round((new Date(se)-new Date(ss))/864e5)+1);
  const dailyCost=Math.round(reimbAmount/serviceDays*1e6)/1e6;
  const firstName=person.split(" ")[0];
  const description=`Reimbursed - ${originalTxn.description} - ${firstName}`;
  const newTxn={
    date:originalTxn.date,
    service_start:ss,
    service_end:se,
    description,
    category_id:originalTxn.category_id,
    original_amount:reimbAmount,
    currency:"USD",
    fx_rate:1,
    amount_usd:reimbAmount,
    payment_type:paymentType,
    tag:(originalTxn.tag||"").toLowerCase().trim(),
    daily_cost:dailyCost,
    service_days:serviceDays,
    credit:""
  };
  const result=await sb("transactions",{method:"POST",headers:{"Prefer":"return=representation"},body:JSON.stringify(newTxn)});
  const newId=result[0]?.id;
  if(newId){
    const newTxnObj={id:newId,transaction_group_id:null};
    await linkToGroup(originalTxn,newTxnObj);
  }
  state.txnCount++;
  return result;
}

    mData.forEach(m=>thtml+=`<td class="r m" style="color:var(--g);font-weight:600">${fmtT(Math.round(m.net))}</td>`);
    thtml+=`<td class="r m" style="color:var(--g);font-weight:700">${fmtT(Math.round(totI-totE))}</td>`;
    thtml+=`<td class="r m" style="color:var(--g);font-weight:600">${fmtT(Math.round((totI-totE)/activeMonths))}</td></tr>`;

    thtml+=`<tr><td style="font-weight:700;color:#F2CC8F">Savings Rate</td>`;
    mData.forEach(m=>thtml+=`<td class="r m" style="color:#F2CC8F;font-weight:600;text-align:right">${m.inc>0?(m.net/m.inc*100).toFixed(1)+"%":"вЂ”"}</td>`);
    thtml+=`<td class="r m" style="color:#F2CC8F;font-weight:700;text-align:right">${totI>0?((totI-totE)/totI*100).toFixed(1)+"%":"вЂ”"}</td>`;
    thtml+=`<td class="r m" style="color:#F2CC8F;font-weight:600;text-align:right">${totI>0?((totI-totE)/totI*100).toFixed(1)+"%":"вЂ”"}</td></tr>`;

    thtml+=`</tbody></table></div>`;
    tblCard.innerHTML=thtml;
    body.append(tblCard);
  }catch(e){document.getElementById("isBody").innerHTML=`<div class="cd" style="border-color:rgba(224,122,95,0.3);color:var(--r)">Error loading: ${e.message}</div>`}
}

async function renderBS(el){
  el.innerHTML=`<div style="margin-bottom:16px"><h2>Balance Sheet</h2><p class="sub">Loading...</p></div><div id="bsBody"></div>`;
  try{
    // Fetch live ledger balances, accounts metadata, and snapshots in parallel
    const [ledgerBals,accts,snaps,creditBals]=await Promise.all([
      sbRPC("get_ledger_balances"),
      sb("accounts?order=display_order"),
      sb("balance_snapshots?select=*,accounts!inner(label,account_type)&order=snapshot_date.desc"),
      sbRPC("get_credit_balances")
    ]);
    const body=document.getElementById("bsBody");body.innerHTML="";

    // Build account type lookup from accounts table
    const acctMap={};for(const a of accts)acctMap[a.label]=a;

    // Map ledger balances to account types
    const byType={checking:[],savings:[],credit:[],investment:[],liability:[],working_capital:[],other:[]};
    for(const lb of ledgerBals){
      const pt=lb.payment_type;
      if(pt==="Transfer")continue;
      const acct=acctMap[pt];
      const t=acct?.account_type||"other";
      const bal=parseFloat(lb.net_balance)||0;
      // Skip zero-balance retired/inactive accounts
      if(Math.abs(bal)<0.01)continue;
      (byType[t]||byType.other).push({name:pt,bal});
    }
    Object.values(byType).forEach(a=>a.sort((x,y)=>y.bal-x.bal));

    // Process credit sub-ledger balances
    const creditRows=creditBals
      .map(c=>({name:c.credit_name,bal:parseFloat(c.net_balance)||0,cnt:parseInt(c.txn_count)||0}))
      .filter(c=>Math.abs(c.bal)>=0.01);
    const creditTotal=creditRows.reduce((s,c)=>s+c.bal,0);

    // Compute totals вЂ” straight sums so KPI cards match group subtotals
    const assetAccts=[...byType.checking,...byType.savings,...byType.investment,...byType.other];
    const liabAccts=[...byType.credit,...byType.working_capital,...byType.liability];
    const totA=assetAccts.reduce((s,a)=>s+a.bal,0);
    const totL=liabAccts.reduce((s,a)=>s+a.bal,0)+creditTotal;
    const nw=totA+totL;

    const txnCount=ledgerBals.reduce((s,b)=>s+parseInt(b.txn_count||0),0);
    el.querySelector(".sub").textContent=`Live from ${txnCount.toLocaleString()} ledger transactions В· USD`;

    const stats=h("div",{class:"g4"});
    stats.append(statCard("рџЏ¦","total assets",fmtN(totA),"var(--b)"));
    stats.append(statCard("рџ’і","total liabilities",fmtN(totL),"var(--r)"));
    stats.append(statCard("рџ’Ћ","net worth",fmtN(nw),"var(--g)"));
    if(Math.abs(creditTotal)>=1)stats.append(statCard("рџ¤ќ","credits & transfers",fmtN(creditTotal),"#9B59B6"));
    body.append(stats);

    // Snapshot bar (for NW over time chart + manual snapshots)
    const snapDates=[...new Set(snaps.map(s=>s.snapshot_date))].sort().reverse();
    const latestSnap=snapDates[0];
    const daysSinceSnap=latestSnap?Math.floor((new Date()-new Date(latestSnap))/864e5):999;
    if(daysSinceSnap>30){
      const banner=h("div",{class:"cd",style:{borderColor:"rgba(242,204,143,0.3)",marginBottom:"16px",padding:"14px 18px"}});
      banner.innerHTML=`<div style="display:flex;align-items:center;gap:10px"><span style="font-size:14px">вљ пёЏ</span><span style="font-size:12px;color:var(--y)">Last snapshot was ${daysSinceSnap} days ago. Consider taking a new one to keep your net worth chart current.</span></div>`;
      body.append(banner);
    }
    const snapBar=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",padding:"10px 16px",background:"rgba(255,255,255,0.02)",borderRadius:"10px",border:"1px solid var(--bdr)"}});
    snapBar.innerHTML=`<div><span style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.6)">Snapshots</span><span style="font-size:11px;color:rgba(255,255,255,0.3);margin-left:8px">${snapDates.length} saved${latestSnap?` В· Last: ${fmtD(latestSnap)} (${daysSinceSnap}d ago)`:""}</span></div>`;
    const snapBtn=h("button",{class:"pg-btn",style:{background:"rgba(129,178,154,0.12)",borderColor:"rgba(129,178,154,0.3)",color:"var(--g)",padding:"6px 14px"},onClick:async()=>{
      snapBtn.textContent="Loading...";snapBtn.disabled=true;
      try{const accounts=await sb("accounts?is_active=eq.true&order=display_order");showSnapshotForm(accounts,latestSnap,()=>renderContent())}
      catch(e){alert("Error: "+e.message);snapBtn.textContent="рџ“ё Take Snapshot";snapBtn.disabled=false}
    }},"рџ“ё Take Snapshot");
    snapBar.append(snapBtn);
    body.append(snapBar);

    // NW over time (from snapshots вЂ” historical data)
    if(snapDates.length>2){
      const nwData=snapDates.sort().map(d=>{
        let a=0,l=0;
        for(const s of snaps){if(s.snapshot_date!==d)continue;const t=s.accounts?.account_type||"other";const b=parseFloat(s.balance_usd||s.balance)||0;if(["checking","savings","investment"].includes(t))a+=b;else if(["credit","liability","working_capital"].includes(t))l+=Math.abs(b)}
        return{d,a,nw:a-l};
      });
      const nwCard=h("div",{class:"cd"});
      nwCard.innerHTML=`<h3>Net Worth Over Time</h3><div class="chrt"><canvas id="nwChart"></canvas></div>`;
      body.append(nwCard);
      setTimeout(()=>makeChart("nwChart",{type:"line",data:{labels:nwData.map(d=>fmtD(d.d)),datasets:[
        {label:"Assets",data:nwData.map(d=>Math.round(d.a)),backgroundColor:"rgba(74,111,165,0.2)",borderColor:"rgba(74,111,165,0.5)",fill:true,tension:0.3},
        {label:"Net Worth",data:nwData.map(d=>Math.round(d.nw)),borderColor:"#81B29A",backgroundColor:"rgba(129,178,154,0.1)",borderWidth:2.5,pointRadius:2,fill:false,tension:0.3}
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"rgba(255,255,255,0.5)",font:{size:11}}}},scales:{x:{ticks:{color:"rgba(255,255,255,0.3)",font:{size:9},maxTicksLimit:12},grid:{color:"rgba(255,255,255,0.04)"}},y:{ticks:{color:"rgba(255,255,255,0.3)",callback:v=>fmtN(v)},grid:{color:"rgba(255,255,255,0.04)"}}}}}),50);
    }

    // Live ledger account groups
    const row2=h("div",{class:"g2"});
    function acctGroup(title,accts,color){
      if(!accts.length)return"";
      const total=accts.reduce((s,a)=>s+a.bal,0);
      let html=`<div class="acct-grp"><div class="acct-hdr"><span style="font-size:12px;font-weight:600;color:${color};text-transform:uppercase;letter-spacing:0.05em">${title}</span><span style="font-size:13px;font-weight:700;color:${color};font-family:var(--mono)">${fmtF(total)}</span></div>`;
      accts.forEach(a=>{const cad=a.name.startsWith("TD")?` title="CA$${(a.bal/0.73).toFixed(2)}"`:"";html+=`<div class="acct-row"><span style="color:rgba(255,255,255,0.6)">${a.name}</span><span${cad} style="color:rgba(255,255,255,0.7);font-family:var(--mono)">${fmtF(a.bal)}</span></div>`});
      return html+"</div>";
    }
    const assetsCard=h("div",{class:"cd"});
    assetsCard.innerHTML=`<h3 style="color:var(--b)">Assets</h3>`+acctGroup("Cash & Equivalents",[...byType.checking,...byType.savings,...byType.other],"var(--b)")+acctGroup("Investments",byType.investment,"#2A9D8F");
    row2.append(assetsCard);

    const liabCard=h("div",{class:"cd"});
    liabCard.innerHTML=`<h3 style="color:var(--r)">Liabilities</h3>`+acctGroup("Credit Cards",byType.credit,"var(--r)");
    const workCap=[...byType.working_capital,...byType.liability];
    if(workCap.length)liabCard.innerHTML+=acctGroup("Working Capital",workCap,"var(--y)");
    if(!byType.credit.length&&!workCap.length)liabCard.innerHTML+=`<div style="color:rgba(255,255,255,0.2);font-size:12px;padding:20px;text-align:center">No liabilities recorded</div>`
    row2.append(liabCard);
    body.append(row2);

    // Credits & Transfers вЂ” standalone expandable card
    if(creditRows.length){
      const ctCard=h("div",{class:"cd",style:{marginTop:"16px"}});
      let credHtml=`<div class="acct-grp"><div class="acct-hdr" style="cursor:pointer" onclick="this.querySelector('.pf-toggle').classList.toggle('open');this.parentElement.querySelectorAll('.credit-sub').forEach(r=>r.classList.toggle('hidden'))"><span style="font-size:12px;font-weight:600;color:#9B59B6;text-transform:uppercase;letter-spacing:0.05em"><span class="pf-toggle">в–ё</span> Credits & Transfers</span><span style="font-size:13px;font-weight:700;color:#9B59B6;font-family:var(--mono)">${fmtF(creditTotal)}</span></div>`;
      creditRows.forEach(c=>{const clr=c.bal>=0?"var(--g)":"var(--r)";credHtml+=`<div class="acct-row credit-sub hidden"><span style="color:rgba(255,255,255,0.6)" title="${c.cnt} transactions">${c.name}</span><span style="color:${clr};font-family:var(--mono)" title="${c.cnt} txns">${fmtF(c.bal)}</span></div>`});
      credHtml+="</div>";
      ctCard.innerHTML=`<h3 style="color:#9B59B6">Credits & Transfers</h3>`+credHtml;
      body.append(ctCard);
    }
  }catch(e){document.getElementById("bsBody").innerHTML=`<div class="cd" style="border-color:rgba(224,122,95,0.3);color:var(--r)">Error: ${e.message}</div>`}
}

// в—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џ
// PORTFOLIO
// в—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џ

let pfState={expandedAcct:null,expandedSym:null};

async function renderPortfolio(el){
  el.innerHTML=`<div style="margin-bottom:16px"><h2>Portfolio</h2><p class="sub" id="pfSub">Loading...</p></div><div id="pfBody"><div style="text-align:center;padding:60px;color:rgba(255,255,255,0.3)">Loading...</div></div>`;
  try{
    const [accounts,symbols,lots]=await Promise.all([
      sb("investment_accounts?order=label"),
      sb("investment_symbols?order=symbol"),
      sb("investment_lots?order=lot_date")
    ]);
    const body=document.getElementById("pfBody");body.innerHTML="";

    // Build lookup maps
    const symInfo={};for(const s of symbols)symInfo[s.symbol]=s;
    const lotMap={};for(const l of lots){const k=`${l.account_id}|${l.symbol}`;if(!lotMap[k])lotMap[k]=[];lotMap[k].push(l)}

    // Compute lot market values (not stored in DB)
    for(const l of lots){
      const si=symInfo[l.symbol]||{};
      const price=parseFloat(si.latest_price||0);
      l.price_exec=parseFloat(l.price_exec||0);
      l.shares=parseFloat(l.shares||0);
      l.cost_basis=parseFloat(l.cost_basis||0);
      l.ann_return=l.ann_return!=null?parseFloat(l.ann_return):null;
      l.market_value=l.sell_date?0:(price>0?l.shares*price:l.cost_basis);
    }

    // Price date from first symbol with one
    const priceDate=symbols.find(s=>s.price_as_of)?.price_as_of||null;
    document.getElementById("pfSub").textContent=priceDate?`Prices as of ${fmtD(priceDate)} В· USD`:"Live from Supabase В· USD";

    // Symbol-level ann return: cost-basis-weighted avg of lot ann_returns
    function symAnn(acctId,sym){
      const ls=lotMap[`${acctId}|${sym}`];
      if(!ls?.length)return null;
      const wl=ls.filter(l=>l.cost_basis>0&&l.ann_return!=null);if(!wl.length)return null;
      const tc=wl.reduce((s,l)=>s+l.cost_basis,0);
      return tc>0?wl.reduce((s,l)=>s+l.cost_basis*l.ann_return,0)/tc:null;
    }

    // Process accounts вЂ” derive holdings from lots, join symbol metadata
    const acctData=[];let portCost=0,portMarket=0;
    const allocBucket={};let totalLots=0;const totalSyms=new Set();

    for(const acct of accounts){
      const acctSymSet=new Set();
      for(const l of lots)if(l.account_id===acct.id)acctSymSet.add(l.symbol);
      let ac=0,am=0;const holdings=[];
      for(const symName of acctSymSet){
        const k=`${acct.id}|${symName}`;
        const sLots=lotMap[k]||[];
        const si=symInfo[symName]||{};
        const activeLots=sLots.filter(l=>!l.sell_date);
        const sold=sLots.length>0&&activeLots.length===0;
        const activeCost=activeLots.reduce((s,l)=>s+l.cost_basis,0);
        const activeMarket=activeLots.reduce((s,l)=>s+l.market_value,0);
        const activeShares=activeLots.reduce((s,l)=>s+l.shares,0);
        totalLots+=sLots.length;totalSyms.add(symName);
        holdings.push({symbol:symName,asset_class:si.asset_class||"unknown",latest_price:parseFloat(si.latest_price||0)||null,
          shares:activeShares,cost_basis:activeCost,market_value:activeMarket,
          sold,lots:sLots,annReturn:symAnn(acct.id,symName),name:si.name||symName});
        if(!sold){
          ac+=activeCost;am+=activeMarket;
          const cls=si.asset_class;
          if(cls){if(!allocBucket[cls])allocBucket[cls]={cost:0,market:0};allocBucket[cls].market+=activeMarket;allocBucket[cls].cost+=activeCost}
        }
      }
      const gain=am-ac,pctR=ac>0?(gain/ac)*100:0;
      let annR;
      if(PF_ACCT_ANN_OVERRIDE.hasOwnProperty(acct.id)){annR=PF_ACCT_ANN_OVERRIDE[acct.id]}
      else{const al=lots.filter(l=>l.account_id===acct.id&&l.cost_basis>0&&l.ann_return!=null);if(al.length){const tc=al.reduce((s,l)=>s+l.cost_basis,0);annR=tc>0?al.reduce((s,l)=>s+l.cost_basis*l.ann_return,0)/tc:null}else annR=null}
      portCost+=ac;portMarket+=am;
      acctData.push({...acct,holdings,totalCost:ac,totalMarket:am,gain,pctReturn:pctR,annReturn:annR});
    }

    // Portfolio ann return: cost-weighted avg of accounts with data (Vanguard 401K excluded via null)
    let paNum=0,paDen=0;
    for(const a of acctData){if(a.annReturn!=null&&a.totalCost>0){paNum+=a.totalCost*a.annReturn;paDen+=a.totalCost}}
    const portfolioAnn=paDen>0?paNum/paDen:null;
    const portGain=portMarket-portCost;
    const portPct=portCost>0?(portGain/portCost)*100:0;

    // Asset allocation
    const allocation=Object.entries(allocBucket).map(([ac,d])=>({asset_class:ac,...(PF_ACM[ac]||{label:ac,color:"#666",target:0}),value:d.market,pct:portMarket>0?(d.market/portMarket)*100:0})).sort((a,b)=>b.value-a.value);
    const displayAccts=acctData.filter(a=>a.totalMarket>0).sort((a,b)=>b.totalMarket-a.totalMarket);

    // Helper for formatting percent with sign
    const fPct=v=>v!=null?`${v>=0?"+":""}${v.toFixed(1)}%`:"вЂ”";
    const pCol=v=>v!=null?(v>=0?"var(--g)":"var(--r)"):"var(--dim)";

    // в”Ђв”Ђ KPI Cards в”Ђв”Ђ
    const kpi=h("div",{class:"pf-kpi"});
    [{l:"Market Value",v:fmtT(Math.round(portMarket)),c:"var(--g)"},
     {l:"Cost Basis",v:fmtT(Math.round(portCost)),c:"var(--b)"},
     {l:"Unrealized Gain",v:fmtT(Math.round(portGain)),c:portGain>=0?"var(--g)":"var(--r)"},
     {l:"Total Return",v:fPct(portPct),c:pCol(portPct)},
     {l:"Ann. Return",v:fPct(portfolioAnn),c:pCol(portfolioAnn),s:portfolioAnn!=null?"Excl. Vanguard 401K":null}
    ].forEach(k=>{
      const d=h("div",{class:"cd st"});
      d.innerHTML=`<div class="st-l">${k.l}</div><div class="st-v" style="color:${k.c}">${k.v}</div>${k.s?`<div style="font-size:9px;color:rgba(255,255,255,0.2);margin-top:2px">${k.s}</div>`:""}`;
      kpi.append(d);
    });
    body.append(kpi);

    // в”Ђв”Ђ Two-panel overview в”Ђв”Ђ
    const overview=h("div",{class:"g2"});

    // Left: Asset Allocation doughnut + legend
    const allocCard=h("div",{class:"cd"});
    allocCard.innerHTML=`<h3>Asset Allocation</h3><p style="font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:12px">Target: 70% US / 10% Intl / 5% each other</p><div class="chrt" style="height:200px"><canvas id="pfAllocChart"></canvas></div><div id="pfAllocLegend" style="margin-top:12px"></div>`;

                for(const lot of soldLots){
                  const lg=lot.market_value-lot.cost_basis,lr=lot.cost_basis>0?(lg/lot.cost_basis)*100:0;
                  const sc=lg>=0?"rgba(129,178,154,0.5)":"rgba(224,122,95,0.5)";
                  hh+=`<tr style="background:rgba(224,122,95,0.03);opacity:0.6">`;

                  hh+=`<td class="r hide-m" style="font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.3)">${lot.shares.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:4})}</td>`;
                  hh+=`<td class="r hide-m" style="font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.3)">$${lot.price_exec.toLocaleString("en-US",{minimumFractionDigits:2})}</td>`;
                  hh+=`<td class="r" style="font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.3)">${fmtT(Math.round(lot.cost_basis))}</td>`;
                  hh+=`<td class="r" style="font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.3)">${fmtT(Math.round(lot.market_value))}</td>`;
                  hh+=`<td class="r hide-m" style="font-family:var(--mono);font-size:11px;color:${sc}">${fmtT(Math.round(lg))}</td>`;
                  hh+=`<td class="r" style="font-family:var(--mono);font-size:11px;color:${sc}">${fPct(lr)}</td>`;
                  hh+=`<td class="r hide-m" style="font-family:var(--mono);font-size:11px;color:${sc}">${lot.ann_return!=null?fPct(lot.ann_return):"вЂ”"}</td></tr>`;
                }

            }
          }
          hh+=`</tbody></table></div>`;
        }
        hh+=`</div>`;
      }
      hEl.innerHTML=hh;

      // Attach click handlers for expand/collapse
      hEl.querySelectorAll(".pf-acct-hdr").forEach(el=>{
        el.addEventListener("click",()=>{
          const id=el.dataset.acct;

async function renderTags(el){
  el.innerHTML=`<div style="margin-bottom:16px"><h2>Tags</h2><p class="sub">Loading...</p></div><div id="tagsBody"></div>`;
  try{
    const tagRows=await sb("tags?order=start_date.desc");
    // Paginate to get ALL tagged transactions (Supabase caps at 1000 per request)
    let allTxns=[];
    let offset=0;
    const batchSize=1000;
    while(true){
      const batch=await sb(`transactions?select=tag,amount_usd,daily_cost,service_start,service_end,category_id&tag=not.is.null&tag=neq.&order=id&limit=${batchSize}&offset=${offset}`);
      allTxns=allTxns.concat(batch);
      if(batch.length<batchSize)break;
      offset+=batchSize;
    }
    const txns=allTxns;
    // Build tag date lookup for accrual overlap
    const tagDates={};
    for(const t of tagRows)tagDates[t.name]={start:t.start_date,end:t.end_date};
    const tm={};
    for(const t of txns){
      if(!t.tag)continue;
      if(!tm[t.tag])tm[t.tag]={total:0,count:0,cats:{}};
      tm[t.tag].count++;
      if(t.category_id==="income"||t.category_id==="investment"||t.category_id==="adjustment")continue;
      // Accrual: compute overlap of txn service period with tag date window
      const tg=tagDates[t.tag];
      if(tg&&tg.start&&tg.end&&t.daily_cost!=null&&t.service_start&&t.service_end){
        const oStart=t.service_start>tg.start?t.service_start:tg.start;
        const oEnd=t.service_end<tg.end?t.service_end:tg.end;
        if(oStart<=oEnd){
          const oDays=Math.floor((new Date(oEnd)-new Date(oStart))/864e5)+1;
          const amt=t.daily_cost*oDays;
          tm[t.tag].total+=amt;
          tm[t.tag].cats[t.category_id]=(tm[t.tag].cats[t.category_id]||0)+amt;
        }
      }else if(t.amount_usd>0){
        // Fallback: no tag dates or no service period
        tm[t.tag].total+=t.amount_usd;
        tm[t.tag].cats[t.category_id]=(tm[t.tag].cats[t.category_id]||0)+t.amount_usd;
      }
    }

    const tags=tagRows.map(t=>({...t,...(tm[t.name]||{total:0,count:0,cats:{}})})).sort((a,b)=>b.total-a.total);
    el.querySelector(".sub").textContent=`Click any tag for breakdown В· ${tags.length} tags`;
    const body=document.getElementById("tagsBody");body.innerHTML="";
    const grid=h("div",{class:"tag-grid"});

    tags.forEach((tag,i)=>{
      const card=h("div",{class:"tag-card",style:{borderLeftColor:TCOLS[i%TCOLS.length],cursor:tag.total>0?"pointer":"default"},onClick:()=>tag.total>0&&showTagDetail(tag)});
      let inner=`<div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:14px;font-weight:600;color:#fff">${tag.name}</div>`;
      if(tag.start_date)inner+=`<div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px">${fmtD(tag.start_date)} вЂ“ ${fmtD(tag.end_date)}</div>`;
      inner+=`</div><span style="font-size:10px;color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.04);padding:2px 6px;border-radius:4px">${tag.count||0} txns</span></div>`;
      if(tag.total>0){
        const days=tag.start_date&&tag.end_date?Math.max(1,Math.floor((new Date(tag.end_date)-new Date(tag.start_date))/864e5)+1):0;
        inner+=`<div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:8px"><div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--r)">${fmtF(tag.total)}</div>`;
        if(days>0)inner+=`<div style="font-size:11px;color:rgba(255,255,255,0.25);font-family:var(--mono)">${fmtF(tag.total/days)}/day</div>`;
        inner+=`</div>`;
        if(Object.keys(tag.cats).length>0){
          const posCats=Object.entries(tag.cats).filter(([,v])=>v>0);
          if(posCats.length>0){const barTotal=posCats.reduce((s,[,v])=>s+v,0);
          inner+=`<div style="display:flex;gap:2px;margin-top:6px;height:4px;border-radius:2px;overflow:hidden">`;
          posCats.sort((a,b)=>b[1]-a[1]).forEach(([c,v])=>inner+=`<div style="width:${(v/barTotal)*100}%;background:${CC[c]||"#666"};min-width:2px"></div>`);
          inner+=`</div>`;}
        }
      }
      card.innerHTML=inner;
      grid.append(card);
    });
    body.append(grid);
    // Auto-open tag detail if navigated from Ledger tab
    if(state.tagDetail){
      const t=tags.find(tg=>tg.name===state.tagDetail);
      state.tagDetail=null;
      if(t)showTagDetail(t);
    }
  }catch(e){document.getElementById("tagsBody").innerHTML=`<div class="cd" style="color:var(--r)">Error: ${e.message}</div>`}
}

async function showTagDetail(tag){
  const existing=document.querySelector(".modal-bg");if(existing)existing.remove();
  const txns=await sb(`transactions?tag=eq.${encodeURIComponent(tag.name)}&category_id=neq.income&category_id=neq.investment&category_id=neq.adjustment&order=date.desc`);
  const cats={};let total=0;
  const txnAccruals=[];
  for(const t of txns){
    let accrual=0,oDays=0;
    if(t.daily_cost!=null&&tag.start_date&&tag.end_date&&t.service_start&&t.service_end){
      const oStart=t.service_start>tag.start_date?t.service_start:tag.start_date;
      const oEnd=t.service_end<tag.end_date?t.service_end:tag.end_date;
      if(oStart<=oEnd){
        oDays=Math.floor((new Date(oEnd)-new Date(oStart))/864e5)+1;
        accrual=t.daily_cost*oDays;
        cats[t.category_id]=(cats[t.category_id]||0)+accrual;total+=accrual;
      }
    }else if(t.amount_usd>0){accrual=t.amount_usd;cats[t.category_id]=(cats[t.category_id]||0)+t.amount_usd;total+=t.amount_usd}
    if(Math.abs(accrual)>=0.01)txnAccruals.push({...t,_accrual:accrual,_oDays:oDays});
  }
  txnAccruals.sort((a,b)=>Math.abs(b._accrual)-Math.abs(a._accrual));
  const days=tag.start_date&&tag.end_date?Math.max(1,Math.floor((new Date(tag.end_date)-new Date(tag.start_date))/864e5)+1):0;
  const mx=Math.max(...Object.values(cats).map(v=>Math.abs(v)),1);

  const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg)bg.remove()}});
  let mhtml=`<div style="display:flex;justify-content:space-between;margin-bottom:20px"><div><h2 style="font-size:22px">${tag.name}</h2>`;
  if(tag.start_date)mhtml+=`<p style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:4px">${fmtD(tag.start_date)} вЂ“ ${fmtD(tag.end_date)}</p>`;
  mhtml+=`</div><button onclick="this.closest('.modal-bg').remove()" style="background:rgba(255,255,255,0.06);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:16px">вњ•</button></div>`;
  mhtml+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px">`;
  [["Total",fmtF(total),"var(--r)"],["Days",days,"var(--b)"],["Per Day",days>0?fmtF(total/days):"вЂ”","var(--g)"]].forEach(([l,v,c])=>mhtml+=`<div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:12px 14px;text-align:center"><div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase">${l}</div><div style="font-size:20px;font-weight:700;color:${c};font-family:var(--mono)">${v}</div></div>`);
  mhtml+=`</div>`;

  Object.entries(cats).filter(([,v])=>Math.abs(v)>0.5).sort((a,b)=>Math.abs(b[1])-Math.abs(a[1])).forEach(([cat,val])=>{
    const isNeg=val<0;
    mhtml+=`<div style="display:grid;grid-template-columns:90px 1fr 65px 40px;align-items:center;gap:8px;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,0.6)"><span style="width:7px;height:7px;border-radius:2px;background:${CC[cat]||"#666"};flex-shrink:0"></span>${cat}</div>
      <div style="height:14px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden"><div style="height:100%;width:${(Math.abs(val)/mx)*100}%;background:${isNeg?"var(--g)":(CC[cat]||"#666")};border-radius:4px;opacity:0.7"></div></div>
      <div style="font-family:var(--mono);font-size:11px;color:${isNeg?"var(--g)":"rgba(255,255,255,0.5)"};text-align:right">${isNeg?"("+fmtF(Math.abs(val))+")":fmtF(val)}</div>
      <div style="font-family:var(--mono);font-size:10px;color:rgba(255,255,255,0.3);text-align:right">${total>0?((Math.abs(val)/total)*100).toFixed(0)+"%":""}</div></div>`;
  });

  // Transaction list
  if(txnAccruals.length){
    mhtml+=`<div style="margin-top:20px;border-top:1px solid rgba(255,255,255,0.06);padding-top:14px"><div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">${txnAccruals.length} Transactions</div>`;
    mhtml+=`<div style="overflow-x:auto"><table style="width:100%;font-size:11px"><thead><tr style="color:rgba(255,255,255,0.3);font-size:10px;text-transform:uppercase"><th style="text-align:left;padding:4px 6px">Date</th><th style="text-align:left;padding:4px 6px">Description</th><th style="text-align:left;padding:4px 6px" class="hide-m">Category</th><th style="text-align:right;padding:4px 6px">Amount</th><th style="text-align:right;padding:4px 6px" class="hide-m">Accrual</th><th style="text-align:right;padding:4px 6px" class="hide-m">Days</th></tr></thead><tbody>`;
    txnAccruals.forEach(t=>{
      const isNeg=t._accrual<0;
      mhtml+=`<tr class="tag-txn-row" data-tid="${t.id}" style="cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.03)"><td style="padding:5px 6px;color:rgba(255,255,255,0.4);white-space:nowrap">${fmtD(t.date)}</td><td style="padding:5px 6px;color:rgba(255,255,255,0.7);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.description}</td><td style="padding:5px 6px" class="hide-m"><span style="background:${(CC[t.category_id]||"#666")}22;color:${CC[t.category_id]||"#888"};padding:1px 5px;border-radius:3px;font-size:10px">${t.category_id}</span></td><td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:rgba(255,255,255,0.5)">${fmtF(t.amount_usd)}</td><td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:${isNeg?"var(--g)":"var(--r)"}" class="hide-m">${fmtF(t._accrual)}</td><td style="padding:5px 6px;text-align:right;font-family:var(--mono);color:rgba(255,255,255,0.3)" class="hide-m">${t._oDays||""}</td></tr>`;
    });
    mhtml+=`</tbody></table></div></div>`;
  }

  const modal=h("div",{class:"modal",style:{maxWidth:"700px"}});
  modal.innerHTML=mhtml;
  // Attach click handlers for transaction rows
  modal.querySelectorAll(".tag-txn-row").forEach(row=>{
    row.addEventListener("click",()=>{
      const tid=parseInt(row.dataset.tid);
      const txn=txnAccruals.find(t=>t.id===tid);
      if(txn){bg.remove();openLedgerEditModal(txn,()=>showTagDetail(tag))}
    });
    row.addEventListener("mouseenter",()=>row.style.background="rgba(255,255,255,0.04)");
    row.addEventListener("mouseleave",()=>row.style.background="transparent");
  });
  bg.append(modal);
  document.body.append(bg);
}

// SNAPSHOT FORM
// в—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џв—Џ

function showSnapshotForm(accounts, lastDate, onSave){
  const existing=document.querySelector(".modal-bg");if(existing)existing.remove();
  const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg)bg.remove()}});
  const modal=h("div",{class:"modal",style:{maxWidth:"640px"}});

  const groups={checking:[],savings:[],credit:[],investment:[],liability:[]};
  accounts.forEach(a=>(groups[a.account_type]||[]).push(a));
  const typeLabels={checking:"Checking",savings:"Savings",credit:"Credit Cards",investment:"Investments",liability:"Liabilities"};

  let mhtml=`<div style="display:flex;justify-content:space-between;margin-bottom:20px"><div><h2 style="font-size:20px">New Balance Snapshot</h2><p style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:4px">Enter current balances for each account</p></div><button onclick="this.closest('.modal-bg').remove()" style="background:rgba(255,255,255,0.06);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:16px">\u2715</button></div>`;
  mhtml+=`<div style="margin-bottom:16px"><label class="lbl">Snapshot Date</label><input type="date" id="snapDate" class="inp" value="${today()}" style="max-width:200px"></div>`;

  for(const[type,accts]of Object.entries(groups)){
    if(!accts.length)continue;
    mhtml+=`<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">${typeLabels[type]||type}</div>`;
    accts.forEach(a=>{
      mhtml+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="font-size:12px;color:rgba(255,255,255,0.6);min-width:160px">${a.label}</span><input type="number" step="0.01" class="inp snap-bal" data-id="${a.id}" placeholder="0.00" style="max-width:160px;font-family:var(--mono)"></div>`;
    });
    mhtml+=`</div>`;
  }
  mhtml+=`<button id="saveSnapBtn" class="btn" style="background:rgba(129,178,154,0.2);color:var(--g);margin-top:12px">Save Snapshot</button>`;

  modal.innerHTML=mhtml;
  bg.append(modal);
  document.body.append(bg);

  document.getElementById("saveSnapBtn").addEventListener("click",async()=>{
    const btn=document.getElementById("saveSnapBtn");
    btn.textContent="Saving...";btn.disabled=true;
    const date=document.getElementById("snapDate").value;
    const rows=[];
    document.querySelectorAll(".snap-bal").forEach(inp=>{
      const val=parseFloat(inp.value);
      if(!isNaN(val)&&val!==0)rows.push({account_id:inp.dataset.id,snapshot_date:date,balance:val,balance_usd:val});
    });
    if(!rows.length){alert("Enter at least one balance.");btn.textContent="Save Snapshot";btn.disabled=false;return}
    try{
      const resp=await fetch(`${SB_URL}/rest/v1/balance_snapshots`,{method:"POST",headers:authHeaders({Prefer:"resolution=merge-duplicates,return=representation"}),body:JSON.stringify(rows)});
      if(!resp.ok)throw new Error(await resp.text());
      bg.remove();
      if(onSave)onSave();
    }catch(e){alert("Error saving: "+e.message);btn.textContent="Save Snapshot";btn.disabled=false}
  });
}
